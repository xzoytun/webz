<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Xtrimer — Riwayat</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght=400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
/* ── TOKENS SYNCHRONIZED WITH DASHBOARD.HTML (PREMIUM LIGHT MODE) ── */
:root {
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #3D0F72;
  --purple-light: #9B4FDE;
  
  --purple-soft:  #E2E8F0; 
  --purple-mid:   #CBD5E1;
  --accent:       #FF6B2B;
  --accent2:      #FFD600;
  --green:        #12C28A;
  --green-bg:     #E2F7F1;
  --red:          #E84040;
  --red-bg:       #FEE2E2;
  --orange:       #FE9431;
  --orange-bg:    #FFF3E5;
  
  --white:        #FFFFFF;
  --bg:           #F1F5F9; 
  --card:         #F8FAFC; 
  --gray-line:    #E2E8F0; 
  
  --text-dark:    #0F172A; 
  --text-mid:     #334155; 
  --text-light:   #64748B; 

  --shadow-sm:  0 4px 12px rgba(15, 23, 42, 0.03);
  --shadow-md:  0 6px 18px rgba(15, 23, 42, 0.05);
  --shadow-lg:  0 10px 25px rgba(15, 23, 42, 0.05);

  --r-card: 14px;
  --r-btn:  10px;
  
  --nav-bg:       #F8FAFC;
  --nav-shadow:   rgba(15, 23, 42, 0.08);
}

/* ── SINKRONISASI GOPAY-INSPIRED DARK THEME (FROM DASHBOARD) ── */
html[data-theme="dark"] {
  --purple-soft:  #202124;
  --purple-mid:   #2a2b2f;
  --green-bg:     #0c2a21;
  --red-bg:       #311111;
  --orange-bg:    #3A2A14;
  --white:        #17181c;
  --bg:           #0a0b0d;
  --card:         #1c1d21;
  --gray-line:    #303135;
  --text-dark:    #E2E8F0; 
  --text-mid:     #94A3B8;  
  --text-light:   #64748B;
  --nav-bg:       #17181c;
  --nav-shadow:   rgba(0,0,0,0.4);
}
html[data-theme="dark"] body { background: var(--bg); color: var(--text-dark); }
html[data-theme="dark"] .tab-container,
html[data-theme="dark"] .filter-btn,
html[data-theme="dark"] .summary-card,
html[data-theme="dark"] .history-card,
html[data-theme="dark"] .status-box,
html[data-theme="dark"] .bottom-nav { background: var(--card); border-color: var(--gray-line); }
html[data-theme="dark"] .hdr-btn.theme-toggle .icon-sun { display: none; }
html[data-theme="dark"] .hdr-btn.theme-toggle .icon-moon { display: flex; }
html:not([data-theme="dark"]) .hdr-btn.theme-toggle .icon-sun { display: flex; }
html:not([data-theme="dark"]) .hdr-btn.theme-toggle .icon-moon { display: none; }

html { background: var(--bg); }
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text-dark);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: 90px; 
  -webkit-tap-highlight-color: transparent;
  transition: background .25s ease, color .25s ease;
}
a { text-decoration:none; color:inherit; }
button { font-family:inherit; cursor:pointer; border:none; background:none; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── HERO HEADER ── */
.header {
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple) 60%, var(--purple-light) 100%);
  padding: 24px 20px 48px;
  animation: fadeUp 0.4s ease both;
}
.header::before {
  content:''; position:absolute; top:-40px; right:-20px;
  width:140px; height:140px;
  border:28px solid rgba(255,255,255,0.05); border-radius:50%;
}
.hero-dots {
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 200px 20px; pointer-events:none;
}
.header-inner {
  max-width: 440px; margin: 0 auto;
  display: flex; align-items:center; justify-content:space-between;
  position: relative; z-index:2;
}
.header-left { display:flex; align-items:center; gap:12px; flex: 1; }

.back-btn {
  width:32px; height:32px; border-radius:50%;
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.15);
  display: flex; align-items:center; justify-content:center;
  transition: all .2s; backdrop-filter:blur(10px); flex-shrink: 0;
}
.back-btn:hover { background:rgba(255,255,255,.2); transform:translateY(-2px); }
.back-btn svg { width:15px; height:15px; stroke:#fff; stroke-width:2.5; fill:none; }

.header-greeting { display: flex; flex-direction:column; gap:2px; flex: 1; }
.header-title-text { font-size: 16px; font-weight: 900; color: #fff; letter-spacing:-.2px; line-height:1.2; }
.header-sub-text { font-size: 10.5px; font-weight:600; color: rgba(255,255,255,.75); letter-spacing: .3px; }

.hdr-actions { display:flex; gap:8px; align-items:center; flex-shrink: 0; }
.hdr-btn {
  width:32px; height:32px; border-radius:50%;
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.15);
  display: flex; align-items:center; justify-content:center;
  transition: all .2s; backdrop-filter:blur(10px);
}
.hdr-btn:hover { background:rgba(255,255,255,.2); transform:translateY(-2px); }
.hdr-btn svg { width:15px; height:15px; stroke:#fff; stroke-width:2.2; fill:none; }
.hdr-btn.theme-toggle { position: relative; }
.hdr-btn.theme-toggle .icon-sun,
.hdr-btn.theme-toggle .icon-moon { position: absolute; align-items:center; justify-content:center; }

.hero-badge {
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.15);
  border-radius: 20px; padding: 4px 10px; font-size: 10px; font-weight: 800; color: #fff;
  white-space: nowrap; backdrop-filter: blur(10px);
}

.main { max-width:440px; margin:0 auto; padding:0 16px; }

/* ── TAB NAVIGATION SYSTEM ── */
.tab-wrap {
  max-width:440px; margin:-24px auto 0;
  position: relative; z-index:10;
  animation: fadeUp 0.4s 0.08s ease both;
}
.tab-container {
  display: grid; grid-template-columns: 1fr 1fr; background: var(--white);
  border: 1px solid var(--gray-line); padding: 5px; border-radius: 14px;
  box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
  transition: background 0.25s, border-color 0.25s;
}
.tab-btn {
  background: transparent; border: none; padding: 10px; font-size: 11.5px;
  font-weight: 800; color: var(--text-light); cursor: pointer; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.25s;
}
.tab-btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2.2; }
.tab-btn.active {
  background: var(--purple); color: #ffffff;
}
html[data-theme="dark"] .tab-btn.active {
  background: var(--purple-light); color: var(--text-dark);
}

/* ── FILTER SEGMENT ── */
.filter-container {
  display: flex; gap: 6px; margin: 14px 0 10px; overflow-x: auto;
  padding: 2px 2px 6px; scrollbar-width: none;
}
.filter-container::-webkit-scrollbar { display: none; }
.filter-btn {
  background: var(--white); border: 1px solid var(--gray-line);
  padding: 6px 12px; border-radius: 20px; font-size: 10.5px; font-weight: 800;
  color: var(--text-mid); cursor: pointer; white-space: nowrap; transition: all 0.2s;
  display: inline-flex; align-items: center; gap: 5px;
  box-shadow: var(--shadow-sm);
}
.filter-btn svg { width: 13px; height: 13px; flex-shrink: 0; stroke: var(--text-light); fill: none; }
.filter-btn.active {
  background: var(--purple); color: #FFFFFF; border-color: var(--purple);
}
html[data-theme="dark"] .filter-btn.active { background: var(--purple-light); border-color: var(--purple-light); color: var(--white); }
.filter-btn.active svg { stroke: #FFFFFF !important; }

.filter-btn.btn-pending svg { stroke: var(--orange); }
.filter-btn.btn-sukses svg { stroke: var(--green); }
.filter-btn.btn-gagal svg { stroke: var(--red); }

/* ── SUMMARY CARD ── */
.summary-card {
  background: var(--white); border-radius: 14px; padding: 10px;
  margin-bottom: 14px; border: 1px solid var(--gray-line);
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  box-shadow: var(--shadow-sm);
  animation: fadeUp 0.4s ease both; transition: background 0.25s, border-color 0.25s;
}
.summary-item { border-radius: 10px; padding: 8px 10px; }
.summary-item.green-item { background: var(--green-bg); border: 1px solid rgba(12,42,33,0.05); }
.summary-item.purple-item { background: var(--purple-soft); border: 1px solid var(--gray-line); }

.summary-label {
  font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-light); margin-bottom: 3px; display: flex; align-items: center; gap: 4px;
}
.summary-label svg { width:12px; height:12px; fill:none; stroke:currentColor; stroke-width:2.2; }
.summary-label.green-label { color: var(--green); }
.summary-label.purple-label { color: var(--purple-light); }
.summary-val { font-size:14.5px; font-weight:900; color:var(--text-dark); }
.summary-val.green-val { color: var(--green); }
html[data-theme="dark"] .summary-val.green-val { color: #12C28A; }

/* ── LIST & CARDS ── */
.history-list { display: flex; flex-direction: column; gap: 10px; }
.history-card {
  background: var(--white); border-radius: var(--r-card); padding: 12px 14px;
  border: 1px solid var(--gray-line); display: flex; flex-direction: column; gap: 8px;
  box-shadow: var(--shadow-sm); animation: fadeUp 0.35s ease both;
  transition: background 0.25s, border-color 0.25s, transform 0.15s;
}
.history-card:hover { transform: translateY(-1px); }

.card-top { display: flex; justify-content: space-between; align-items: center; }
.card-service { font-size: 13px; font-weight: 900; color: var(--text-dark); }
.card-date { font-size: 10.5px; font-weight: 700; color: var(--text-light); display: inline-flex; align-items: center; gap: 4px; }
.card-date svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2.2; }

.card-mid { 
  display: flex; flex-direction: column; gap: 5px; 
  background: var(--bg); padding: 10px; border-radius: 10px; transition: background 0.25s; 
}
.info-row { display: flex; justify-content: space-between; font-size: 11px; align-items: flex-start; }
.info-label { color: var(--text-light); font-weight: 700; }
.info-value { color: var(--text-dark); font-weight: 800; text-align: right; word-break: break-all; margin-left: 16px; }

.card-bottom { display: flex; justify-content: space-between; align-items: center; }
.card-price { font-size: 14.5px; font-weight: 900; color: var(--text-dark); }
.card-price.ppob-cost { color: var(--purple); }
html[data-theme="dark"] .card-price.ppob-cost { color: var(--purple-light); }

/* Style Card Topup */
.topup-card-border-left { border-left: 3.5px solid var(--green); }
.topup-flex-inner { display: flex; align-items: center; gap: 10px; width: 100%; }
.topup-icon-box {
  width:34px; height:34px; border-radius:10px;
  background: var(--green);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.topup-icon-box svg { width:15px; height:15px; fill:none; stroke:#fff; stroke-width:2.5; }
.topup-amount-val { font-size:14.5px; font-weight:900; color:var(--green); }

/* BADGES & BUTTONS */
.badge { font-size: 9.5px; font-weight: 900; padding: 2px 8px; border-radius: 6px; text-transform: uppercase; display: inline-flex; align-items: center; gap: 4px; }
.badge.sukses { background: var(--green-bg); color: var(--green); }
.badge.pending { background: var(--orange-bg); color: var(--orange); animation: pulse 1.5s infinite; }
.badge.gagal { background: var(--red-bg); color: var(--red); }
@keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

.btn-copy {
  background: var(--purple-soft); border: none; color: var(--text-dark);
  padding: 1px 6px; border-radius: 5px; font-size: 9px; font-weight: 800;
  cursor: pointer; display: inline-flex; align-items: center; gap: 3px; transition: all 0.15s; margin-left: 6px;
}
.btn-copy svg { fill: none; stroke: currentColor; }

/* ─── STATUS BOX ─── */
.status-box {
  background: var(--white); border-radius: var(--r-card); padding: 32px 16px;
  border: 1px solid var(--gray-line); text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 10px; color: var(--text-light);
  transition: background 0.25s, border-color 0.25s;
}
.status-icon-badge {
  width: 38px; height: 38px; border-radius: 50%; background: var(--purple-soft);
  display: flex; align-items: center; justify-content: center;
}
.status-box svg { width: 18px; height: 18px; fill: none; stroke: var(--purple); stroke-width: 2.3; }
html[data-theme="dark"] .status-box svg { stroke: var(--purple-light); }
.status-box.loading svg { animation: spin 1s linear infinite; }
.status-box p { font-size: 11.5px; font-weight: 700; max-width: 240px; line-height: 1.5; color: var(--text-mid); }
.hidden { display: none !important; }

/* ─── BOTTOM NAV ─── */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 440px; background: var(--nav-bg);
  border-top: 1px solid var(--gray-line); box-shadow: var(--nav-shadow); z-index: 999;
  transition: background 0.25s ease, border-color 0.25s ease;
}
.bottom-nav-inner { display: flex; align-items: center; justify-content: space-around; padding: 10px 0 14px; }
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  text-decoration: none; color: var(--text-light); width: 70px; transition: all 0.2s;
}
.nav-icon svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; transition: transform 0.2s; }
.nav-label { font-size: 9px; font-weight: 800; }
.nav-item:hover .nav-icon svg { transform: translateY(-2px); }
.nav-item.active { color: var(--purple); }
html[data-theme="dark"] .nav-item.active { color: var(--purple-light); }
.nav-item.active .nav-icon svg { stroke: var(--purple); }
html[data-theme="dark"] .nav-item.active .nav-icon svg { stroke: var(--purple-light); }
</style>
</head>
<body>

<header class="header">

      <a class="back-btn" href="dashboard.html" aria-label="Kembali">

    <div class="hdr-actions">

            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>

<div class="tab-wrap">

<div class="main">

      <svg viewBox="0 0 24 24" stroke-width="2.3"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>

  </div>
</nav>

<script>
  // ─── THEME MANAGER FUNCTION (ALIGNED WITH DASHBOARD) ───
  (function initTheme(){
    const saved = localStorage.getItem('theme');
    if (saved === 'dark' || saved === 'light') {
      document.documentElement.setAttribute('data-theme', saved);
    } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.setAttribute('data-theme', 'dark');
    } else {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  })();

  document.getElementById('themeToggle').addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  });

  // Core Variables
  let currentTab = 'PPOB'; 
  let currentFilter = 'ALL';
  let dataPPOB = [];
  let dataTopup = [];

  const token = localStorage.getItem('token') || '';
  if (!token) {
    window.location.href = 'index.html';
  }

  const headers = {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${token}`
  };

  function formatWIB(dateStr) {
    if (!dateStr) return '—';
    let d = new Date(dateStr);
    if (typeof dateStr === 'string' && !dateStr.includes('Z') && !dateStr.includes('+')) {
      d = new Date(dateStr.replace(' ', 'T') + 'Z'); 
    }
    if (isNaN(d.getTime())) d = new Date(dateStr);
    
    return d.toLocaleString('id-ID', {
      timeZone: 'Asia/Jakarta',
      day: '2-digit',
      month: 'short',
      year: 'numeric',
      hour: '2-digit',
      minute: '2-digit',
      hour12: false
    });
  }

  async function initHistory() {
    await Promise.all([fetchPPOB(), fetchTopup()]);
    renderData();
  }

  async function fetchPPOB() {
    try {
      const res = await fetch('/api/ppob/history', { method: 'GET', headers });
      const data = await res.json();
      if (data.success) dataPPOB = data.transactions || [];
    } catch (e) { console.error('Fetch PPOB Error:', e); }
  }

  async function fetchTopup() {
    try {
      const res = await fetch('/api/topup-history', { method: 'GET', headers });
      const data = await res.json();
      if (data.success) dataTopup = data.data || [];
    } catch (e) { console.error('Fetch Topup Error:', e); }
  }

  function switchTab(tabName) {
    currentTab = tabName;
    document.getElementById('tab-ppob').classList.toggle('active', tabName === 'PPOB');
    document.getElementById('tab-topup').classList.toggle('active', tabName === 'TOPUP');
    
    currentFilter = 'ALL';
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector('.filter-container .filter-btn:first-child').classList.add('active');

    renderData();
  }

  function filterStatus(status, element) {
    currentFilter = status;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    element.classList.add('active');
    renderData();
  }

  function renderData() {
    const grid = document.getElementById('history-grid');
    const statusBox = document.getElementById('history-status');
    grid.innerHTML = '';
    
    const targetData = (currentTab === 'PPOB') ? dataPPOB : dataTopup;
    
    if (currentTab === 'PPOB') {
      document.getElementById('mainTitle').textContent = 'Riwayat Pembelian';
      document.getElementById('sumLabelText').textContent = 'Total Belanja';
    } else {
      document.getElementById('mainTitle').textContent = 'Riwayat Topup';
      document.getElementById('sumLabelText').textContent = 'Total Topup';
    }

    const filtered = targetData.filter(item => {
      if (currentFilter === 'ALL') return true;
      const rawStat = (item.status || 'SUKSES').toUpperCase(); 
      
      if (currentFilter === 'SUKSES') return rawStat === 'SUKSES' || rawStat === 'SUCCESS' || rawStat === 'BERHASIL';
      if (currentFilter === 'GAGAL') return rawStat === 'GAGAL' || rawStat === 'FAILED' || rawStat === 'FAILURE';
      if (currentFilter === 'PENDING') return rawStat === 'PENDING';
      return false;
    });

    const totalSum = filtered.reduce((acc, curr) => acc + Number(curr.price || curr.amount || 0), 0);
    document.getElementById('subtitle').textContent = `${filtered.length} transaksi ditemukan`;
    document.getElementById('countBadge').textContent = `${filtered.length} Trx`;
    document.getElementById('sumTotal').textContent = 'Rp ' + totalSum.toLocaleString('id-ID');
    document.getElementById('sumCount').textContent = filtered.length + 'x';

    if (filtered.length === 0) {
      statusBox.className = "status-box";
      statusBox.classList.remove('hidden');
      statusBox.innerHTML = `
        <div class="status-icon-badge">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <p>Tidak ada riwayat transaksi dengan kriteria ini.</p>
      `;
      return;
    }

    statusBox.classList.add('hidden');

    filtered.forEach((item, index) => {
      if (currentTab === 'PPOB') {
        const card = document.createElement('div');
        card.className = "history-card";
        card.style.animationDelay = `${index * 0.04}s`;

        const stat = (item.status || 'PENDING').toUpperCase();
        let statusClass = 'pending'; let statusLabel = 'PENDING';
        if (stat === 'SUKSES' || stat === 'SUCCESS') { statusClass = 'sukses'; statusLabel = 'SUKSES'; }
        else if (stat === 'GAGAL' || stat === 'FAILED' || stat === 'FAILURE') { statusClass = 'gagal'; statusLabel = 'GAGAL'; }

        card.innerHTML = `
          <div class="card-top">
            <div class="card-service">${item.sku || 'Produk Konten'}</div>
            <div class="card-date">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12,7 12,12 15,15"/></svg>
              ${formatWIB(item.created_at)}
            </div>
          </div>
          <div class="card-mid">
            <div class="info-row"><span class="info-label">No. Target</span><span class="info-value">${item.target}</span></div>
            <div class="info-row"><span class="info-label">Ref ID</span><span class="info-value" style="font-family:monospace;">${item.ref_id || '—'}</span></div>
            ${ item.sn ? `
            <div class="info-row">
              <span class="info-label">SN / Keterangan</span>
              <span class="info-value" style="display:inline-flex; align-items:center; justify-content:flex-end; gap:4px;">
                <span>${item.sn}</span>
                <button class="btn-copy" onclick="copyText('${item.sn}')">
                  <svg width="10" height="10" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Copy
                </button>
              </span>
            </div>` : '' }
          </div>
          <div class="card-bottom">
            <div class="card-price ppob-cost">Rp ${(item.price || 0).toLocaleString('id-ID')}</div>
            <span class="badge ${statusClass}">${statusLabel}</span>
          </div>
        `;
        grid.appendChild(card);
      } else {
        const card = document.createElement('div');
        card.className = "history-card topup-card-border-left";
        card.style.animationDelay = `${index * 0.04}s`;

        card.innerHTML = `
          <div class="topup-flex-inner">
            <div class="topup-icon-box">
              <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5,12 12,5 19,12"/></svg>
            </div>
            <div style="flex:1; min-width:0;">
              <div class="topup-amount-val">+ Rp ${Number(item.amount || 0).toLocaleString('id-ID')}</div>
              <div style="font-size:10.5px; font-weight:800; color:var(--text-mid); margin-top:2px; display:flex; align-items:center; gap:4px;">
                <span style="width:5px; height:5px; background:var(--purple-light); border-radius:50%;"></span>
                ${item.metode || 'QRIS'}
              </div>
              <div class="badge sukses" style="margin-top:5px; font-size:8.5px; padding:1px 6px;">BERHASIL</div>
            </div>
            <div style="text-align:right; flex-shrink:0;">
              <div style="font-size:9px; font-weight:800; color:var(--text-light); font-family:monospace; margin-bottom:2px;">${item.reference || '—'}</div>
              <div class="card-date">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12,7 12,12 15,15"/></svg>
                ${formatWIB(item.created_at)}
              </div>
            </div>
          </div>
        `;
        grid.appendChild(card);
      }
    });
  }

  function copyText(text) {
    navigator.clipboard.writeText(text).then(() => {
      const Toast = Swal.mixin({
        toast: true, position: 'top', showConfirmButton: false, timer: 1500, timerProgressBar: true
      });
      Toast.fire({ icon: 'success', title: 'SN berhasil disalin!' });
    });
  }

  initHistory();
</script>
</body>
</html>
