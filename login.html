<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — GabutStore</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="login">

<div id="toast"></div>

<div class="auth-wrapper">
  <div class="auth-box">
    <div class="auth-logo">
      <a href="index.html" style="text-decoration:none">
        <div class="brand">⚡ GabutStore</div>
      </a>
      <p>VPN Premium Store</p>
    </div>

    <h2 class="auth-title">Masuk ke Akun</h2>

    <div id="loginAlert" class="alert alert-error"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="username">Username atau Email</label>
        <input
          class="form-input"
          type="text"
          id="username"
          placeholder="Masukkan username atau email"
          autocomplete="username"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">
          Password
          <a href="#" onclick="togglePassword()" style="float:right;font-weight:400;color:var(--accent)">Tampilkan</a>
        </label>
        <input
          class="form-input"
          type="password"
          id="password"
          placeholder="Masukkan password"
          autocomplete="current-password"
          required
        >
      </div>

      <button
        type="submit"
        id="loginBtn"
        class="btn btn-primary btn-block"
        style="margin-top:8px;padding:12px"
        data-label="🔐 Masuk"
      >🔐 Masuk</button>
    </form>

    <div class="form-divider">atau</div>

    <a href="https://t.me/yourtelegrambot" target="_blank" class="btn btn-secondary btn-block" style="margin-bottom:8px">
      🤖 Login via Bot Telegram
    </a>

    <div class="form-footer">
      Belum punya akun? <a href="register.html">Daftar Gratis</a>
    </div>

    <div class="form-footer" style="margin-top:8px">
      <a href="index.html" style="color:var(--text2);font-size:12px">← Kembali ke Beranda</a>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
function togglePassword() {
  const input = document.getElementById('password');
  const link = event.target;
  if (input.type === 'password') {
    input.type = 'text';
    link.textContent = 'Sembunyikan';
  } else {
    input.type = 'password';
    link.textContent = 'Tampilkan';
  }
}
</script>
</body>
</html>
