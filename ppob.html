<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PPOB — Xtrimer Tunnel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --purple:       #7B2FBE;
      --purple-dark:  #5A1A9A;
      --purple-deep:  #3D0F72;
      --purple-light: #9B4FDE;
      --purple-soft:  #F0E8FF;
      --bg:           #F8F6FC;
      --white:        #FFFFFF;
      --green:        #12C28A;
      --green-bg:     #EDFAF4;
      --green-border: #A7F3D0;
      --red:          #E84040;
      --red-bg:       #FEF2F2;
      --red-border:   #FECACA;
      --accent:       #FF6B2B;
      --amber:        #F59E0B;
      --amber-bg:     #FFFBEB;
      --text-dark:    #1A0533;
      --text-mid:     #6B3FA0;
      --text-light:   #A882CC;
      --border-soft:  #E8DDF5;
      --gray-line:    #EDE8F6;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:'Nunito', sans-serif;
      background:var(--bg);
      min-height:100vh;
      color:var(--text-dark);
    }

    /* ── BLOB BG ── */
    .blob1, .blob2 {
      position:fixed; pointer-events:none; z-index:0;
      border-radius:50%; filter:blur(60px);
    }
    .blob1 {
      width:340px; height:340px;
      top:-100px; right:-80px;
      background:radial-gradient(circle, rgba(155,79,222,0.12) 0%, transparent 70%);
    }
    .blob2 {
      width:280px; height:280px;
      bottom:-80px; left:-60px;
      background:radial-gradient(circle, rgba(123,47,190,0.09) 0%, transparent 70%);
    }

    /* ── HEADER ── */
    .header {
      background:linear-gradient(135deg, var(--purple-deep) 0%, var(--purple) 55%, var(--purple-light) 100%);
      padding:0 0 28px;
      position:relative; overflow:hidden;
    }
    .header-dots {
      position:absolute; inset:0; pointer-events:none;
      background-image:radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size:20px 20px;
    }
    .header-inner {
      position:relative; z-index:1;
      display:flex; align-items:flex-start; gap:12px;
      padding:20px 20px 0;
    }
    .back-btn-hdr {
      width:38px; height:38px; border-radius:12px;
      background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.2);
      display:flex; align-items:center; justify-content:center;
      color:#fff; text-decoration:none; flex-shrink:0; margin-top:2px;
      transition:background 0.15s;
    }
    .back-btn-hdr:hover { background:rgba(255,255,255,0.25); }
    .back-btn-hdr svg {
      width:18px; height:18px; fill:none;
      stroke:#fff; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round;
    }
    .header-title { flex:1; }
    .header-title h1 {
      color:#fff; font-size:20px; font-weight:900;
      display:flex; align-items:center; gap:8px; margin-bottom:3px;
    }
    .header-title h1 svg {
      width:22px; height:22px; fill:none;
      stroke:#fff; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0;
    }
    .header-title p {
      color:rgba(255,255,255,0.75); font-size:13px; font-weight:700;
    }
    .header-badge {
      background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.2);
      border-radius:10px; padding:6px 11px;
      color:#fff; font-size:11px; font-weight:800;
      display:flex; align-items:center; gap:5px; flex-shrink:0;
    }
    .header-badge svg {
      width:14px; height:14px; fill:none;
      stroke:#fff; stroke-width:2.2; stroke-linecap:round;
    }

    /* ── TABS ── */
    .tab-row-wrap {
      position:relative; z-index:1;
      padding:14px 20px 0;
    }
    .tab-row {
      display:flex; gap:8px; overflow-x:auto; padding-bottom:2px;
      scrollbar-width:none;
    }
    .tab-row::-webkit-scrollbar { display:none; }
    .tab-btn {
      white-space:nowrap; padding:7px 16px;
      border-radius:20px; border:1.5px solid rgba(255,255,255,0.25);
      background:rgba(255,255,255,0.12);
      color:rgba(255,255,255,0.8); font-family:'Nunito',sans-serif;
      font-size:13px; font-weight:800; cursor:pointer;
      transition:all 0.18s; flex-shrink:0;
      display:flex; align-items:center; gap:5px;
    }
    .tab-btn svg {
      width:14px; height:14px; fill:none;
      stroke:currentColor; stroke-width:2.2; stroke-linecap:round; flex-shrink:0;
    }
    .tab-btn.active {
      background:#fff; border-color:#fff; color:var(--purple-dark);
    }

    /* ── MAIN CONTENT ── */
    .container {
      position:relative; z-index:1;
      max-width:480px; margin:0 auto;
      padding:20px 16px 100px;
      display:flex; flex-direction:column; gap:16px;
    }

    /* ── SECTION TITLE ── */
    .sec-label {
      font-size:12px; font-weight:800; color:var(--text-light);
      text-transform:uppercase; letter-spacing:0.5px;
      display:flex; align-items:center; gap:6px; margin-bottom:10px;
    }
    .sec-label svg {
      width:14px; height:14px; fill:none;
      stroke:var(--text-light); stroke-width:2.2; flex-shrink:0;
    }

    /* ── BRAND GRID ── */
    .brand-grid {
      display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
    }
    .brand-card {
      background:var(--white); border:1.5px solid var(--gray-line);
      border-radius:14px; padding:14px 10px;
      display:flex; flex-direction:column; align-items:center; gap:7px;
      cursor:pointer; transition:all 0.18s;
      box-shadow:0 2px 8px rgba(90,26,154,0.04);
    }
    .brand-card:hover { border-color:var(--purple-light); background:var(--purple-soft); }
    .brand-card.selected { border-color:var(--purple); background:var(--purple-soft); }
    .brand-card.selected .brand-name { color:var(--purple-dark); }
    .brand-icon {
      width:44px; height:44px; border-radius:12px;
      background:linear-gradient(135deg, var(--purple-soft), var(--gray-line));
      display:flex; align-items:center; justify-content:center;
    }
    .brand-icon svg {
      width:22px; height:22px; fill:none;
      stroke:var(--purple); stroke-width:2.2; stroke-linecap:round;
    }
    .brand-name {
      font-size:12px; font-weight:800; color:var(--text-mid);
      text-align:center; line-height:1.2;
    }

    /* ── PRODUCT LIST ── */
    .product-list { display:flex; flex-direction:column; gap:8px; }
    .product-card {
      background:var(--white); border:1.5px solid var(--gray-line);
      border-radius:14px; padding:14px 16px;
      display:flex; align-items:center; gap:12px;
      cursor:pointer; transition:all 0.18s;
      box-shadow:0 2px 8px rgba(90,26,154,0.04);
    }
    .product-card:hover { border-color:var(--purple-light); }
    .product-card.selected { border-color:var(--purple); background:var(--purple-soft); }
    .product-radio {
      width:20px; height:20px; border-radius:50%;
      border:2px solid var(--gray-line); flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.18s;
    }
    .product-card.selected .product-radio {
      border-color:var(--purple); background:var(--purple);
    }
    .product-card.selected .product-radio::after {
      content:''; width:7px; height:7px;
      background:#fff; border-radius:50%;
    }
    .product-info { flex:1; min-width:0; }
    .product-name {
      font-size:14px; font-weight:800; color:var(--text-dark); margin-bottom:2px;
    }
    .product-desc {
      font-size:12px; font-weight:700; color:var(--text-light);
    }
    .product-price {
      font-size:14px; font-weight:900; color:var(--purple-dark);
      white-space:nowrap;
    }

    /* ── INPUT CARD ── */
    .input-card {
      background:var(--white); border:1.5px solid var(--gray-line);
      border-radius:18px; padding:18px;
      box-shadow:0 4px 16px rgba(90,26,154,0.06);
    }
    .field-label {
      font-size:12px; font-weight:800; color:var(--text-mid);
      display:flex; align-items:center; gap:6px; margin-bottom:8px;
    }
    .field-label svg {
      width:14px; height:14px; fill:none;
      stroke:var(--purple); stroke-width:2.2; flex-shrink:0;
    }
    .field-input {
      width:100%; padding:13px 14px;
      border:1.5px solid var(--gray-line); border-radius:12px;
      background:var(--bg); color:var(--text-dark);
      font-family:'Nunito',sans-serif; font-size:15px; font-weight:700;
      outline:none; transition:border-color 0.15s;
    }
    .field-input:focus { border-color:var(--purple-light); }
    .field-input::placeholder { color:var(--text-light); font-weight:600; }
    .field-hint {
      font-size:11px; font-weight:700; color:var(--text-light);
      margin-top:6px; display:flex; align-items:center; gap:4px;
    }
    .field-hint svg {
      width:12px; height:12px; fill:none;
      stroke:var(--text-light); stroke-width:2; flex-shrink:0;
    }

    /* ── CONFIRM SUMMARY ── */
    .confirm-card {
      background:var(--white); border:1.5px solid var(--gray-line);
      border-radius:18px; overflow:hidden;
      box-shadow:0 4px 16px rgba(90,26,154,0.06);
    }
    .confirm-head {
      background:linear-gradient(135deg, var(--purple-soft), var(--bg));
      padding:14px 18px; border-bottom:1.5px solid var(--gray-line);
    }
    .confirm-title {
      font-size:15px; font-weight:900; color:var(--purple-dark);
      display:flex; align-items:center; gap:7px;
    }
    .confirm-title svg {
      width:18px; height:18px; fill:none;
      stroke:var(--purple); stroke-width:2.2; flex-shrink:0;
    }
    .confirm-body { padding:16px 18px; }
    .confirm-row {
      display:flex; align-items:center; justify-content:space-between;
      padding:8px 0; border-bottom:1px solid var(--gray-line);
      font-size:13px;
    }
    .confirm-row:last-child { border-bottom:none; }
    .confirm-lbl { font-weight:700; color:var(--text-light); }
    .confirm-val { font-weight:800; color:var(--text-dark); }
    .confirm-val.price { font-weight:900; font-size:16px; color:var(--purple-dark); }

    /* ── SUCCESS CARD ── */
    .success-card {
      background:var(--white); border:1.5px solid var(--green-border);
      border-radius:18px; padding:28px 20px;
      text-align:center;
      box-shadow:0 4px 16px rgba(18,194,138,0.1);
      animation:bounceIn 0.5s ease both;
    }
    .success-icon {
      width:72px; height:72px; border-radius:50%;
      background:linear-gradient(135deg, var(--green), #34D399);
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 14px;
    }
    .success-icon svg {
      width:34px; height:34px; fill:none;
      stroke:#fff; stroke-width:2.5; stroke-linecap:round;
    }
    .success-title {
      font-size:20px; font-weight:900; color:var(--green); margin-bottom:6px;
    }
    .success-sub {
      font-size:13px; font-weight:700; color:var(--text-light);
    }

    /* ── HISTORY CARD ── */
    .hist-card {
      background:var(--white); border:1.5px solid var(--gray-line);
      border-radius:14px; padding:14px 16px;
      display:flex; align-items:center; gap:12px;
      box-shadow:0 2px 8px rgba(90,26,154,0.04);
      animation:fadeUp 0.3s ease both;
    }
    .hist-icon {
      width:40px; height:40px; border-radius:12px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
    }
    .hist-icon svg {
      width:20px; height:20px; fill:none;
      stroke:currentColor; stroke-width:2.2; stroke-linecap:round;
    }
    .hist-icon.success-ic { background:var(--green-bg); color:var(--green); }
    .hist-icon.fail-ic    { background:var(--red-bg);   color:var(--red);   }
    .hist-icon.pending-ic { background:var(--amber-bg); color:var(--amber); }
    .hist-main { flex:1; min-width:0; }
    .hist-name {
      font-size:14px; font-weight:800; color:var(--text-dark);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .hist-meta {
      font-size:12px; font-weight:700; color:var(--text-light); margin-top:2px;
    }
    .hist-right { text-align:right; flex-shrink:0; }
    .hist-price {
      font-size:14px; font-weight:900; color:var(--purple-dark);
    }
    .hist-status {
      font-size:11px; font-weight:800; margin-top:4px;
      padding:3px 8px; border-radius:6px;
      display:inline-block;
    }
    .hist-status.s-success { background:var(--green-bg); color:var(--green); }
    .hist-status.s-failed  { background:var(--red-bg);   color:var(--red);   }
    .hist-status.s-pending { background:var(--amber-bg); color:var(--amber); }

    /* ── BUTTONS ── */
    .btn-primary {
      width:100%; padding:15px;
      background:linear-gradient(135deg, var(--purple-dark), var(--purple));
      border:none; border-radius:16px;
      color:#fff; font-family:'Nunito',sans-serif;
      font-size:15px; font-weight:900;
      cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
      transition:opacity 0.15s, transform 0.1s;
      box-shadow:0 8px 24px rgba(90,26,154,0.3);
    }
    .btn-primary:hover { opacity:0.92; }
    .btn-primary:active { transform:scale(0.98); }
    .btn-primary:disabled { opacity:0.55; cursor:not-allowed; }
    .btn-primary svg {
      width:18px; height:18px; fill:none;
      stroke:#fff; stroke-width:2.2; stroke-linecap:round; flex-shrink:0;
    }
    .btn-secondary {
      width:100%; padding:13px;
      background:var(--white); border:1.5px solid var(--border-soft);
      border-radius:14px; color:var(--text-mid);
      font-family:'Nunito',sans-serif; font-size:14px; font-weight:800;
      cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
      transition:all 0.15s;
      box-shadow:0 2px 8px rgba(90,26,154,0.04);
    }
    .btn-secondary:hover { border-color:var(--purple-light); color:var(--purple-dark); background:var(--purple-soft); }
    .btn-secondary svg {
      width:16px; height:16px; fill:none;
      stroke:currentColor; stroke-width:2.2; stroke-linecap:round;
    }

    /* ── LOADING / EMPTY ── */
    .loading-state, .empty-state {
      display:flex; flex-direction:column; align-items:center;
      padding:40px 20px; gap:10px;
    }
    .loading-icon, .empty-icon {
      width:56px; height:56px; border-radius:16px;
      background:var(--purple-soft);
      display:flex; align-items:center; justify-content:center;
    }
    .loading-icon svg {
      width:26px; height:26px; fill:none;
      stroke:var(--purple); stroke-width:2; stroke-linecap:round;
      animation:spin 1.2s linear infinite;
    }
    .empty-icon svg {
      width:26px; height:26px; fill:none;
      stroke:var(--purple-light); stroke-width:2; stroke-linecap:round;
    }
    .empty-title { font-size:15px; font-weight:800; color:var(--text-mid); }
    .empty-sub   { font-size:13px; font-weight:700; color:var(--text-light); text-align:center; }

    /* ── STEPPER ── */
    .stepper {
      display:flex; align-items:center; gap:0; margin-bottom:4px;
    }
    .step-item {
      display:flex; flex-direction:column; align-items:center; gap:4px;
      flex:1; position:relative;
    }
    .step-item:not(:last-child)::after {
      content:''; position:absolute; top:14px; left:50%; right:-50%;
      height:2px; background:var(--gray-line); z-index:0;
    }
    .step-item.done:not(:last-child)::after { background:var(--purple-light); }
    .step-dot {
      width:28px; height:28px; border-radius:50%;
      background:var(--white); border:2px solid var(--gray-line);
      display:flex; align-items:center; justify-content:center;
      font-size:12px; font-weight:900; color:var(--text-light);
      position:relative; z-index:1; transition:all 0.25s;
    }
    .step-item.active .step-dot {
      background:var(--purple); border-color:var(--purple); color:#fff;
      box-shadow:0 0 0 4px rgba(123,47,190,0.15);
    }
    .step-item.done .step-dot {
      background:var(--purple-dark); border-color:var(--purple-dark); color:#fff;
    }
    .step-lbl {
      font-size:10px; font-weight:800; color:var(--text-light); white-space:nowrap;
    }
    .step-item.active .step-lbl { color:var(--purple-dark); }

    /* ── MAIN NAV TABS ── */
    .main-tabs {
      display:flex; gap:8px; margin-bottom:4px;
    }
    .main-tab-btn {
      flex:1; padding:12px;
      background:var(--white); border:1.5px solid var(--gray-line);
      border-radius:14px; color:var(--text-mid);
      font-family:'Nunito',sans-serif; font-size:13px; font-weight:800;
      cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
      transition:all 0.18s;
    }
    .main-tab-btn svg {
      width:15px; height:15px; fill:none;
      stroke:currentColor; stroke-width:2.2; stroke-linecap:round;
    }
    .main-tab-btn.active {
      background:var(--purple-soft); border-color:var(--purple);
      color:var(--purple-dark);
    }

    /* ── TOAST ── */
    .toast {
      position:fixed; top:20px; left:50%;
      transform:translateX(-50%) translateY(-80px);
      z-index:999; padding:12px 22px;
      border-radius:16px; font-weight:800; font-size:13px;
      display:flex; align-items:center; gap:8px;
      box-shadow:0 8px 24px rgba(90,26,154,0.25);
      transition:transform 0.3s cubic-bezier(0.34,1.2,0.64,1), opacity 0.3s;
      opacity:0; white-space:nowrap; color:#fff;
      background:var(--purple-dark);
    }
    .toast svg { width:15px; height:15px; fill:none; stroke:#fff; stroke-width:2; flex-shrink:0; }
    .toast.show  { transform:translateX(-50%) translateY(0); opacity:1; }
    .toast.error   { background:linear-gradient(135deg, var(--red), #F87171); box-shadow:0 8px 24px rgba(232,64,64,0.25); }
    .toast.warn    { background:linear-gradient(135deg, var(--accent), #FF9E74); color:#fff; }
    .toast.success { background:linear-gradient(135deg, var(--green), #34D399); box-shadow:0 8px 24px rgba(18,194,138,0.25); }

    @keyframes fadeUp    { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes bounceIn  { 0%{opacity:0;transform:scale(0.8)} 70%{transform:scale(1.04)} 100%{opacity:1;transform:scale(1)} }
    @keyframes spin      { to{transform:rotate(360deg)} }
    @keyframes pulseSpin { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .spin { animation:spin 1s linear infinite; }
    .hidden { display:none !important; }
  </style>
</head>
<body>

<div class="blob1"></div>
<div class="blob2"></div>

<!-- HEADER -->
<div class="header">
  <div class="header-dots"></div>
  <div class="header-inner">
    <a class="back-btn-hdr" href="dashboard.html">
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </a>
    <div class="header-title">
      <h1>
        <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        PPOB
      </h1>
      <p>Pulsa, Paket Data, PLN &amp; lebih</p>
    </div>
    <div class="header-badge">
      <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      Instan
    </div>
  </div>
  <!-- CATEGORY TABS -->
  <div class="tab-row-wrap">
    <div class="tab-row" id="catTabs">
      <button class="tab-btn active" data-cat="PULSA" onclick="selectCat(this)">
        <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18" stroke-width="3"/></svg>
        Pulsa
      </button>
      <button class="tab-btn" data-cat="DATA" onclick="selectCat(this)">
        <svg viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1" fill="currentColor" stroke="none"/></svg>
        Paket Data
      </button>
      <button class="tab-btn" data-cat="PLN" onclick="selectCat(this)">
        <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        PLN / Token
      </button>
      <button class="tab-btn" data-cat="TV" onclick="selectCat(this)">
        <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        TV Kabel
      </button>
      <button class="tab-btn" data-cat="GAMES" onclick="selectCat(this)">
        <svg viewBox="0 0 24 24"><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><circle cx="15" cy="11" r="1" fill="currentColor" stroke="none"/><circle cx="17" cy="13" r="1" fill="currentColor" stroke="none"/><path d="M3 8h18l-2 12H5L3 8z"/><path d="M6 4l1 4M18 4l-1 4"/></svg>
        Games

      <button class="tab-btn" data-cat="LAINNYA" onclick="selectCat(this)">
        <svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="19" cy="12" r="1" fill="currentColor" stroke="none"/></svg>
        Lainnya
      </button>
    </div>
  </div>
</div>

<!-- MAIN CONTAINER -->
<div class="container">

  <!-- MAIN NAVIGATION TABS -->
  <div class="main-tabs">
    <button class="main-tab-btn active" id="tabBeli" onclick="switchMainTab('beli')">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1" fill="currentColor" stroke="none"/><circle cx="20" cy="21" r="1" fill="currentColor" stroke="none"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      Beli Produk
    </button>
    <button class="main-tab-btn" id="tabHistori" onclick="switchMainTab('histori')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12,7 12,12 15,15"/></svg>
      Riwayat
    </button>
  </div>

  <!-- ═══ PANEL BELI ═══ -->
  <div id="panelBeli">

    <!-- STEPPER -->
    <div class="stepper">
      <div class="step-item active" id="step1">
        <div class="step-dot">1</div>
        <div class="step-lbl">Pilih</div>
      </div>
      <div class="step-item" id="step2">
        <div class="step-dot">2</div>
        <div class="step-lbl">Nomor</div>
      </div>
      <div class="step-item" id="step3">
        <div class="step-dot">3</div>
        <div class="step-lbl">Konfirmasi</div>
      </div>
    </div>

    <!-- STEP 1: BRAND + PRODUCT -->
    <div id="stepBrand">
      <div class="sec-label">
        <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
        Pilih Operator / Layanan
      </div>
      <div class="brand-grid" id="brandGrid">
        <div class="loading-state">
          <div class="loading-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
          </div>
        </div>
      </div>

      <div id="productSection" class="hidden" style="margin-top:16px;">
        <div class="sec-label">
          <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          Pilih Produk
        </div>
        <div class="product-list" id="productList">
          <div class="loading-state">
            <div class="loading-icon">
              <svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
            </div>
          </div>
        </div>

        <div id="toStep2Wrap" class="hidden" style="margin-top:12px;">
          <button class="btn-primary" onclick="goToStep2()">
            <svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg>
            Lanjut — Masukkan Nomor
          </button>
        </div>
      </div>
    </div>

    <!-- STEP 2: INPUT NOMOR -->
    <div id="stepNomor" class="hidden">
      <div class="input-card">
        <div class="field-label">
          <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18" stroke-width="3"/></svg>
          <span id="nomorLabel">Nomor / ID Pelanggan</span>
        </div>
        <input class="field-input" type="tel" id="nomorInput"
          placeholder="Contoh: 0812xxxxxxxx"
          oninput="onNomorChange()" />
        <div class="field-hint">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16" stroke-width="3"/></svg>
          <span id="nomorHint">Masukkan nomor yang ingin diisi</span>
        </div>
      </div>

      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="btn-secondary" onclick="goToStep1()">
          <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
          Kembali
        </button>
        <button class="btn-primary" id="btnToStep3" onclick="goToStep3()" disabled>
          <svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg>
          Konfirmasi
        </button>
      </div>
    </div>

    <!-- STEP 3: KONFIRMASI -->
    <div id="stepKonfirmasi" class="hidden">
      <div class="confirm-card">
        <div class="confirm-head">
          <div class="confirm-title">
            <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22,4 12,14.01 9,11.01"/></svg>
            Konfirmasi Pembelian
          </div>
        </div>
        <div class="confirm-body">
          <div class="confirm-row">
            <div class="confirm-lbl">Produk</div>
            <div class="confirm-val" id="cfmProduk">—</div>
          </div>
          <div class="confirm-row">
            <div class="confirm-lbl">Nomor</div>
            <div class="confirm-val" id="cfmNomor">—</div>
          </div>
          <div class="confirm-row">
            <div class="confirm-lbl">Kategori</div>
            <div class="confirm-val" id="cfmKategori">—</div>
          </div>
          <div class="confirm-row">
            <div class="confirm-lbl">Total Bayar</div>
            <div class="confirm-val price" id="cfmHarga">—</div>
          </div>
        </div>
      </div>

      <div id="resultArea"></div>

      <div style="display:flex;gap:8px;margin-top:4px;" id="konfirmBtnRow">
        <button class="btn-secondary" onclick="goToStep2()">
          <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
          Kembali
        </button>
        <button class="btn-primary" id="btnBeli" onclick="doBeli()">
          <svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7" stroke-width="3"/></svg>
          Bayar Sekarang
        </button>
      </div>
    </div>

  </div><!-- /panelBeli -->

  <!-- ═══ PANEL HISTORI ═══ -->
  <div id="panelHistori" class="hidden">
    <div class="sec-label">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12,7 12,12 15,15"/></svg>
      Riwayat Transaksi PPOB
    </div>
    <div id="histList">
      <div class="loading-state">
        <div class="loading-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
        </div>
        <div class="empty-title">Memuat riwayat...</div>
      </div>
    </div>
  </div>

  <!-- BACK BTN -->
  <button class="btn-secondary" onclick="location.href='dashboard.html'">
    <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Kembali ke Dashboard
  </button>

</div><!-- /container -->

<div class="toast" id="toast"></div>

<script>

const token     = localStorage.getItem('token');
const localUser = JSON.parse(localStorage.getItem('user') || 'null');

if (!localUser) window.location.href = 'index.html';

/* ═══ STATE ═══ */
let activeCat      = 'PULSA';
let selectedBrand  = null;
let selectedProduct = null;
let brandsCache    = {};
let productsCache  = {};

/* ═══ INIT ═══ */
loadBrands(activeCat);

/* ═══ CATEGORY ═══ */
function selectCat(el) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  activeCat = el.dataset.cat;
  resetFlow();
  loadBrands(activeCat);
}

/* ═══ BRANDS ═══ */
async function loadBrands(cat) {
  document.getElementById('brandGrid').innerHTML = `
    <div class="loading-state" style="grid-column:1/-1;">
      <div class="loading-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
      </div>
    </div>`;

  if (brandsCache[cat]) { renderBrands(brandsCache[cat]); return; }

  try {
    const res  = await fetch(`/api/ppob/brands?category=${encodeURIComponent(cat)}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();
    if (!data.success) { showBrandError(data.message); return; }
    brandsCache[cat] = data.brands || [];
    renderBrands(brandsCache[cat]);
  } catch(e) {
    showBrandError('Gagal memuat, periksa koneksi');
  }
}

const BRAND_ICONS = {
  TELKOMSEL: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
  INDOSAT:   `<svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>`,
  XL:        `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="8" y1="8" x2="16" y2="16"/><line x1="16" y1="8" x2="8" y2="16"/></svg>`,
  AXIS:      `<svg viewBox="0 0 24 24"><polygon points="12 2 22 21 2 21"/></svg>`,
  TRI:       `<svg viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2z"/><path d="M12 8v8M9 14h6"/></svg>`,
  SMARTFREN: `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M8 12h8M12 8v8"/></svg>`,
  PLN:       `<svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>`,
  INDIHOME:  `<svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>`,
};

const CAT_LABELS = {
  PULSA: 'Nomor Tujuan', DATA: 'Nomor Tujuan',
  PLN: 'No. Meter / ID Pelanggan', TV: 'ID Pelanggan',
  GAMES: 'ID / Username', LAINNYA: 'Nomor / ID'
};
const CAT_HINTS = {
  PULSA: 'Masukkan nomor HP tujuan',
  DATA:  'Masukkan nomor HP tujuan',
  PLN:   'Contoh: 5204xxxxxxxxxx',
  TV:    'Cek di tagihan atau aplikasi TV',
  GAMES: 'User ID atau Username game',
  LAINNYA: 'Masukkan nomor / ID pelanggan'
};

function getIcon(brand) {
  const key = (brand.brand_name || brand.brand_code || '').toUpperCase();
  for (const k in BRAND_ICONS) if (key.includes(k)) return BRAND_ICONS[k];
  return `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>`;
}

function renderBrands(brands) {
  if (!brands.length) {
    document.getElementById('brandGrid').innerHTML = `
      <div class="empty-state" style="grid-column:1/-1;">
        <div class="empty-icon"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg></div>
        <div class="empty-title">Belum Tersedia</div>
        <div class="empty-sub">Produk kategori ini belum ada</div>
      </div>`;
    return;
  }

  let html = '';
  brands.forEach((b, i) => {
    const name = b.brand_name || b.brand_code || 'Operator';
    html += `
    <div class="brand-card" onclick="selectBrand(this,'${b.brand_code}','${name.replace(/'/g,"\\'")}')">
      <div class="brand-icon">${getIcon(b)}</div>
      <div class="brand-name">${name}</div>
    </div>`;
  });
  document.getElementById('brandGrid').innerHTML = html;
}

function showBrandError(msg) {
  document.getElementById('brandGrid').innerHTML = `
    <div class="empty-state" style="grid-column:1/-1;">
      <div class="empty-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16" stroke-width="3"/></svg></div>
      <div class="empty-title">Gagal Memuat</div>
      <div class="empty-sub">${msg}</div>
    </div>`;
}

/* ═══ SELECT BRAND → LOAD PRODUCTS ═══ */
function selectBrand(el, brandCode, brandName) {
  document.querySelectorAll('.brand-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedBrand = { code: brandCode, name: brandName };
  selectedProduct = null;

  const ps = document.getElementById('productSection');
  ps.classList.remove('hidden');
  document.getElementById('toStep2Wrap').classList.add('hidden');

  loadProducts(brandCode);
  ps.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

async function loadProducts(brandCode) {
  document.getElementById('productList').innerHTML = `
    <div class="loading-state">
      <div class="loading-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
      </div>
    </div>`;

  const cacheKey = activeCat + '|' + brandCode;
  if (productsCache[cacheKey]) { renderProducts(productsCache[cacheKey]); return; }

  try {
    const res  = await fetch(`/api/ppob/products?category=${encodeURIComponent(activeCat)}&brand=${encodeURIComponent(brandCode)}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();
    if (!data.success) { renderProductsEmpty(data.message); return; }
    productsCache[cacheKey] = data.products || [];
    renderProducts(productsCache[cacheKey]);
  } catch(e) {
    renderProductsEmpty('Gagal memuat produk');
  }
}

function renderProducts(products) {
  if (!products.length) { renderProductsEmpty('Produk tidak tersedia'); return; }
  let html = '';
  products.forEach(p => {
    const harga = Number(p.price || 0).toLocaleString('id-ID');
    const desc  = p.description || p.product_name || '';
    html += `
    <div class="product-card" data-code="${p.product_code}" onclick="selectProduct(this)">
      <div class="product-radio"></div>
      <div class="product-info">
        <div class="product-name">${p.product_name || p.product_code}</div>
        ${desc ? `<div class="product-desc">${desc}</div>` : ''}
      </div>
      <div class="product-price">Rp ${harga}</div>
    </div>`;
  });
  document.getElementById('productList').innerHTML = html;
}

function renderProductsEmpty(msg) {
  document.getElementById('productList').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div>
      <div class="empty-title">Produk Tidak Ada</div>
      <div class="empty-sub">${msg}</div>
    </div>`;
}

function selectProduct(el) {
  document.querySelectorAll('.product-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  const code = el.dataset.code;
  const cacheKey = activeCat + '|' + (selectedBrand?.code || '');
  const products = productsCache[cacheKey] || [];
  selectedProduct = products.find(p => p.product_code === code) || { product_code: code };
  document.getElementById('toStep2Wrap').classList.remove('hidden');
}

/* ═══ STEP NAVIGATION ═══ */
function goToStep2() {
  if (!selectedProduct) { showToast('Pilih produk terlebih dahulu', 'warn'); return; }
  document.getElementById('stepBrand').classList.add('hidden');
  document.getElementById('stepNomor').classList.remove('hidden');
  document.getElementById('stepKonfirmasi').classList.add('hidden');
  setStep(2);

  const label = CAT_LABELS[activeCat] || 'Nomor / ID';
  const hint  = CAT_HINTS[activeCat]  || 'Masukkan nomor atau ID pelanggan';
  document.getElementById('nomorLabel').textContent = label;
  document.getElementById('nomorHint').textContent  = hint;
  document.getElementById('nomorInput').value = '';
  document.getElementById('btnToStep3').disabled = true;
  if (activeCat === 'PLN' || activeCat === 'TV' || activeCat === 'GAMES') {
    document.getElementById('nomorInput').setAttribute('type','text');
  } else {
    document.getElementById('nomorInput').setAttribute('type','tel');
  }
  window.scrollTo({ top:0, behavior:'smooth' });
}

function goToStep1() {
  document.getElementById('stepBrand').classList.remove('hidden');
  document.getElementById('stepNomor').classList.add('hidden');
  document.getElementById('stepKonfirmasi').classList.add('hidden');
  setStep(1);
}

function goToStep3() {
  const nomor = document.getElementById('nomorInput').value.trim();
  if (!nomor) { showToast('Masukkan nomor terlebih dahulu', 'warn'); return; }

  document.getElementById('stepBrand').classList.add('hidden');
  document.getElementById('stepNomor').classList.add('hidden');
  document.getElementById('stepKonfirmasi').classList.remove('hidden');
  document.getElementById('resultArea').innerHTML = '';
  document.getElementById('konfirmBtnRow').classList.remove('hidden');
  setStep(3);

  document.getElementById('cfmProduk').textContent   = selectedProduct?.product_name || selectedProduct?.product_code || '—';
  document.getElementById('cfmNomor').textContent    = nomor;
  document.getElementById('cfmKategori').textContent = activeCat;
  document.getElementById('cfmHarga').textContent    = 'Rp ' + Number(selectedProduct?.price || 0).toLocaleString('id-ID');
  window.scrollTo({ top:0, behavior:'smooth' });
}

function onNomorChange() {
  const v = document.getElementById('nomorInput').value.trim();
  document.getElementById('btnToStep3').disabled = !v;
}

function setStep(n) {
  for (let i = 1; i <= 3; i++) {
    const el = document.getElementById('step' + i);
    el.classList.remove('active','done');
    if (i < n) el.classList.add('done');
    else if (i === n) el.classList.add('active');
  }
}

function resetFlow() {
  selectedBrand = null; selectedProduct = null;
  document.getElementById('stepBrand').classList.remove('hidden');
  document.getElementById('stepNomor').classList.add('hidden');
  document.getElementById('stepKonfirmasi').classList.add('hidden');
  document.getElementById('productSection').classList.add('hidden');
  document.getElementById('toStep2Wrap').classList.add('hidden');
  setStep(1);
}

/* ═══ BELI ═══ */
async function doBeli() {
  const nomor = document.getElementById('nomorInput').value.trim();
  if (!selectedProduct || !nomor) { showToast('Data tidak lengkap', 'error'); return; }

  const btn = document.getElementById('btnBeli');
  btn.disabled = true;
  btn.innerHTML = `<svg class="spin" viewBox="0 0 24 24"><path d="M12 2a10 10 0 0 1 10 10"/></svg> Memproses...`;

  try {
    const res  = await fetch('/api/ppob/buy', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({
        email:        localUser.email,
        product_code: selectedProduct.product_code,
        target:       nomor
      })
    });
    const data = await res.json();

    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7" stroke-width="3"/></svg> Bayar Sekarang`;

    if (!data.success) {
      document.getElementById('resultArea').innerHTML = `
        <div style="background:var(--red-bg);border:1.5px solid var(--red-border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:10px;margin-top:8px;">
          <svg style="width:20px;height:20px;fill:none;stroke:var(--red);stroke-width:2.2;flex-shrink:0;" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          <span style="font-size:13px;font-weight:800;color:var(--red);">${data.message || 'Transaksi gagal'}</span>
        </div>`;
      return;
    }

    document.getElementById('resultArea').innerHTML = `
      <div class="success-card" style="margin-top:8px;">
        <div class="success-icon">
          <svg viewBox="0 0 24 24"><polyline points="20,6 9,17 4,12"/></svg>
        </div>
        <div class="success-title">Transaksi Berhasil!</div>
        <div class="success-sub">Produk telah dikirim ke ${nomor}</div>
        ${data.sn ? `<div style="margin-top:10px;font-size:12px;font-weight:800;color:var(--text-mid);">SN: ${data.sn}</div>` : ''}
      </div>`;
    document.getElementById('konfirmBtnRow').classList.add('hidden');
    delete productsCache[activeCat + '|' + (selectedBrand?.code || '')];

  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7" stroke-width="3"/></svg> Bayar Sekarang`;
    showToast('Gagal, periksa koneksi', 'error');
  }
}

/* ═══ MAIN TAB SWITCH ═══ */
function switchMainTab(tab) {
  const isBeli = tab === 'beli';
  document.getElementById('tabBeli').classList.toggle('active', isBeli);
  document.getElementById('tabHistori').classList.toggle('active', !isBeli);
  document.getElementById('panelBeli').classList.toggle('hidden', !isBeli);
  document.getElementById('panelHistori').classList.toggle('hidden', isBeli);
  if (!isBeli) loadHistory();
}

/* ═══ HISTORY ═══ */
async function loadHistory() {
  document.getElementById('histList').innerHTML = `
    <div class="loading-state">
      <div class="loading-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
      </div>
      <div class="empty-title">Memuat riwayat...</div>
    </div>`;

  try {
    const res  = await fetch(`/api/ppob/history?email=${encodeURIComponent(localUser.email)}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();
    if (!data.success) { histError(data.message); return; }
    renderHistory(data.transactions || []);
  } catch(e) {
    histError('Gagal memuat riwayat');
  }
}

function renderHistory(txs) {
  if (!txs.length) {
    document.getElementById('histList').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12,7 12,12 15,15"/></svg></div>
        <div class="empty-title">Belum Ada Transaksi</div>
        <div class="empty-sub">Riwayat PPOB akan muncul di sini</div>
      </div>`;
    return;
  }

  let html = '';
  txs.forEach((tx, i) => {
    const statusCls = tx.status === 'Sukses' ? 's-success' : tx.status === 'Pending' ? 's-pending' : 's-failed';
    const iconCls   = tx.status === 'Sukses' ? 'success-ic' : tx.status === 'Pending' ? 'pending-ic' : 'fail-ic';
    const date = (tx.created_at || '').replace('T',' ').slice(0,16) || '—';
    const icon = tx.status === 'Sukses'
      ? `<svg viewBox="0 0 24 24"><polyline points="20,6 9,17 4,12"/></svg>`
      : tx.status === 'Pending'
        ? `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12,7 12,12 15,15"/></svg>`
        : `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`;
    html += `
    <div class="hist-card" style="animation-delay:${i*0.04}s;">
      <div class="hist-icon ${iconCls}">${icon}</div>
      <div class="hist-main">
        <div class="hist-name">${tx.product_name || tx.product_code || '—'}</div>
        <div class="hist-meta">${tx.target || '—'} &bull; ${date}</div>
      </div>
      <div class="hist-right">
        <div class="hist-price">Rp ${Number(tx.price||0).toLocaleString('id-ID')}</div>
        <span class="hist-status ${statusCls}">${tx.status || '—'}</span>
      </div>
    </div>`;
  });
  document.getElementById('histList').innerHTML = html;
}

function histError(msg) {
  document.getElementById('histList').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16" stroke-width="3"/></svg></div>
      <div class="empty-title">Gagal Memuat</div>
      <div class="empty-sub">${msg}</div>
    </div>`;
}

/* ═══ TOAST ═══ */
function showToast(msg, type='success') {
  const icons = {
    success: `<svg viewBox="0 0 24 24"><polyline points="20,6 9,17 4,12"/></svg>`,
    error:   `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
    warn:    `<svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17" stroke-width="3"/></svg>`,
  };
  const t = document.getElementById('toast');
  t.innerHTML = (icons[type] || icons.success) + msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.className = 'toast ' + type, 2600);
}

</script>
