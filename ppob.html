<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPOB Store - Extrimer Tunneling</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-main: #0b0f19;
      --bg-card: #151c2c;
      --purple: #7c4dff;
      --purple-hover: #651fff;
      --text-main: #ffffff;
      --text-light: #94a3b8;
      --border-color: #24324d;
      --success: #10b981;
      --error: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding-bottom: 60px;
    }

    h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Kategori Selector Grid */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    @media (max-width: 480px) {
      .category-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .cat-item {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .cat-item.active {
      border-color: var(--purple);
      background: rgba(124, 77, 255, 0.1);
    }

    .cat-icon {
      font-size: 20px;
      margin-bottom: 6px;
    }

    .cat-name {
      font-size: 11px;
      color: var(--text-light);
      font-weight: 500;
    }

    .cat-item.active .cat-name {
      color: var(--text-main);
      font-weight: 600;
    }

    /* Input Target */
    .form-group {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      color: var(--text-light);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 12px;
      color: var(--text-main);
      font-size: 15px;
      outline: none;
      font-weight: 600;
    }

    .form-group input:focus {
      border-color: var(--purple);
    }

    /* Brand / Operator Selector */
    .brand-section {
      margin-bottom: 20px;
      display: none;
    }

    .brand-title {
      font-size: 12px;
      color: var(--text-light);
      font-weight: 600;
      margin-bottom: 10px;
    }

    .brand-flex {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      white-space: nowrap;
      padding-bottom: 5px;
    }

    .brand-flex::-webkit-scrollbar {
      height: 4px;
    }

    .brand-flex::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 10px;
    }

    .brand-badge {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 500;
    }

    .brand-badge.active {
      background: var(--purple);
      border-color: var(--purple);
      color: #fff;
    }

    /* Grid Daftar Produk */
    .list-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-light);
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    @media (max-width: 400px) {
      .product-grid {
        grid-template-columns: 1fr;
      }
    }

    .product-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 14px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
      transition: transform 0.2s, border-color 0.2s;
    }

    .product-card:hover {
      transform: translateY(-2px);
      border-color: var(--purple);
    }

    .prod-name {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
    }

    .prod-desc {
      font-size: 10px;
      color: var(--text-light);
      margin-top: 4px;
    }

    .prod-price {
      font-size: 14px;
      font-weight: 700;
      color: var(--purple);
      margin-top: auto;
    }

    /* Bottom Sheet Konfirmasi */
    .sheet-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      opacity: 0; visibility: hidden;
      transition: all 0.3s ease;
      z-index: 999;
    }

    .sheet-overlay.active {
      opacity: 1; visibility: visible;
    }

    .bottom-sheet {
      position: fixed;
      bottom: -100%; left: 0; right: 0;
      background: var(--bg-card);
      border-top: 2px solid var(--border-color);
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      padding: 24px;
      transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      z-index: 1000;
      max-width: 600px;
      margin: 0 auto;
    }

    .bottom-sheet.active {
      bottom: 0;
    }

    .sheet-header {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      text-align: center;
    }

    .sheet-detail {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .detail-row:last-child {
      margin-bottom: 0;
      padding-top: 12px;
      border-top: 1px dashed var(--border-color);
    }

    .detail-label { color: var(--text-light); }
    .detail-value { font-weight: 600; text-align: right; }
    .price-total { color: var(--success); font-size: 16px; font-weight: 700; }

    .pay-btn {
      width: 100%;
      background: var(--purple);
      color: var(--text-main);
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }

    .pay-btn:hover { background: var(--purple-hover); }
    .close-sheet-btn {
      width: 100%;
      background: transparent;
      color: var(--text-light);
      border: none;
      padding: 10px;
      font-size: 13px;
      margin-top: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2><i class="fa-solid fa-bolt" style="color:var(--purple)"></i> PPOB Store & Topup</h2>

    <div class="category-grid" id="categoryGrid">
      </div>

    <div class="form-group">
      <label id="inputLabel">Nomor Telepon / Tujuan</label>
      <input type="text" id="targetInput" placeholder="Contoh: 08123456789" oninput="handleTargetInput()">
    </div>

    <div class="brand-section" id="brandSection">
      <div class="brand-title" id="brandTitle">Pilih Operator / Provider</div>
      <div class="brand-flex" id="brandFlex">
        </div>
    </div>

    <div class="list-title" id="listTitle">Pilih Nominal Produk</div>
    <div class="product-grid" id="productGrid">
      <div style="grid-column: span 2; text-align:center; padding:20px; font-size:12px; color:var(--text-light);">Memuat kategori...</div>
    </div>
  </div>

  <div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>
  <div class="bottom-sheet" id="bottomSheet">
    <div class="sheet-header">Konfirmasi Pembelian</div>
    <div class="sheet-detail">
      <div class="detail-row">
        <span class="detail-label">Kategori</span>
        <span class="detail-value" id="detCat">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Produk</span>
        <span class="detail-value" id="detName">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Tujuan</span>
        <span class="detail-value" id="detTarget">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Total Bayar</span>
        <span class="detail-value price-total" id="detPrice">Rp 0</span>
      </div>
    </div>
    <button class="pay-btn" onclick="processOrder()">Beli Sekarang</button>
    <button class="close-sheet-btn" onclick="closeSheet()">Batal</button>
  </div>

  <script>
    let currentCategory = 'Pulsa';
    let selectedBrand = '';
    let selectedSub = '';
    let selectedProduct = null;

    // Ambit token JWT dari localStorage
    const token = localStorage.getItem('token'); 

    // 1. Ambil Kategori dari Backend
    async function loadCategories() {
      try {
        const res = await fetch('/api/ppob/categories');
        const result = await res.json();
        if (result.success) {
          const grid = document.getElementById('categoryGrid');
          grid.innerHTML = '';
          result.data.forEach((cat, idx) => {
            const item = document.createElement('div');
            item.className = `cat-item ${idx === 0 ? 'active' : ''}`;
            item.onclick = () => switchCategory(cat.id, item);
            item.innerHTML = `
              <div class="cat-icon">${cat.icon}</div>
              <div class="cat-name">${cat.name}</div>
            `;
            grid.appendChild(item);
          });
          switchCategory(result.data[0].id, grid.firstChild);
        }
      } catch (err) {
        console.error("Gagal load kategori:", err);
      }
    }

    // 2. Aksi Pindah Kategori
    async function switchCategory(catId, element) {
      currentCategory = catId;
      selectedBrand = '';
      selectedSub = '';
      
      document.querySelectorAll('.cat-item').forEach(b => b.classList.remove('active'));
      if(element) element.classList.add('active');

      const label = document.getElementById('inputLabel');
      const input = document.getElementById('targetInput');
      const listTitle = document.getElementById('listTitle');

      input.value = ''; // Reset inputan

      if (catId === 'PLN') {
        label.innerText = 'Nomor Meter / ID Pelanggan';
        input.placeholder = 'Contoh: 53001234567';
        listTitle.innerText = 'Pilih Token PLN';
      } else if (catId === 'Games') {
        label.innerText = 'ID Player Game';
        input.placeholder = 'Contoh: 87654321 (Zone ID)';
        listTitle.innerText = 'Pilih Voucher Game';
      } else {
        label.innerText = 'Nomor Handphone Tujuan';
        input.placeholder = 'Contoh: 08123456789';
        listTitle.innerText = `Pilih Paket ${catId}`;
      }

      document.getElementById('brandSection').style.display = 'none';
      await fetchProducts();
    }

    // 3. Ambil Daftar Produk dari API Backend
    async function fetchProducts() {
      const grid = document.getElementById('productGrid');
      grid.innerHTML = '<div style="grid-column: span 2; text-align:center; padding:20px; font-size:12px; color:var(--text-light);">⏳ Memuat produk dari provider...</div>';

      try {
        let url = `/api/ppob/products?category=${encodeURIComponent(currentCategory)}`;
        if (selectedBrand) url += `&brand=${encodeURIComponent(selectedBrand)}`;
        
        const response = await fetch(url);
        const result = await response.json();

        if (result.success && result.data.length > 0) {
          renderProducts(result.data);

          // Render Badge Brand jika kategori Pulsa/Data/E-Money
          if (!selectedBrand) {
            const brands = [...new Set(result.data.map(p => p.brand))];
            renderBrandBadges(brands);
          }
        } else {
          grid.innerHTML = `<div style="grid-column: span 2; text-align:center; padding:20px; font-size:12px; color:var(--error); font-weight:600;">❌ ${result.message || 'Produk kosong / gangguan'}</div>`;
        }
      } catch (err) {
        grid.innerHTML = '<div style="grid-column: span 2; text-align:center; padding:20px; font-size:12px; color:var(--error); font-weight:600;">❌ Gagal memuat data server</div>';
      }
    }

    // 4. Render Tombol Pilihan Operator (Brand)
    function renderBrandBadges(brands) {
      const section = document.getElementById('brandSection');
      const flex = document.getElementById('brandFlex');
      
      if (brands.length <= 1) {
        section.style.display = 'none';
        return;
      }

      section.style.display = 'block';
      flex.innerHTML = '';

      // Tombol Semua
      const allBtn = document.createElement('div');
      allBtn.className = `brand-badge ${!selectedBrand ? 'active' : ''}`;
      allBtn.innerText = 'Semua';
      allBtn.onclick = () => {
        selectedBrand = '';
        document.querySelectorAll('.brand-badge').forEach(b => b.classList.remove('active'));
        allBtn.classList.add('active');
        fetchProducts();
      };
      flex.appendChild(allBtn);

      brands.forEach(bName => {
        const btn = document.createElement('div');
        btn.className = `brand-badge ${selectedBrand === bName ? 'active' : ''}`;
        btn.innerText = bName;
        btn.onclick = () => {
          selectedBrand = bName;
          document.querySelectorAll('.brand-badge').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          fetchProducts();
        };
        flex.appendChild(btn);
      });
    }

    // 5. Render List Card Produk
    function renderProducts(products) {
      const grid = document.getElementById('productGrid');
      grid.innerHTML = '';

      products.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.onclick = () => openSheet(p);
        card.innerHTML = `
          <div>
            <div class="prod-name">${p.product_name}</div>
            <div class="prod-desc">${p.brand}</div>
          </div>
          <div class="prod-price">Rp ${p.price.toLocaleString('id-ID')}</div>
        `;
        grid.appendChild(card);
      });
    }

    // Otomatis Deteksi Operator Berdasarkan Prefix Nomor (08xx)
    function handleTargetInput() {
      const target = document.getElementById('targetInput').value;
      if ((currentCategory === 'Pulsa' || currentCategory === 'Data') && target.length >= 4) {
        const prefix = target.substring(0, 4);
        let detected = '';

        if (['0811', '0812', '0813', '0821', '0822', '0823', '0852', '0853', '0851'].includes(prefix)) detected = 'Telkomsel';
        else if (['0814', '0815', '0816', '0855', '0856', '0857', '0858'].includes(prefix)) detected = 'Indosat';
        else if (['0817', '0818', '0819', '0859', '0877', '0878'].includes(prefix)) detected = 'XL';
        else if (['0831', '0832', '0833', '0838'].includes(prefix)) detected = 'Axis';
        else if (['0895', '0896', '0897', '0898', '0899'].includes(prefix)) detected = 'Tri';
        else if (['0881', '0882', '0883', '0884', '0885', '0886', '0887', '0888', '0889'].includes(prefix)) detected = 'Smartfren';

        if (detected && selectedBrand !== detected) {
          selectedBrand = detected;
          fetchProducts();
        }
      }
    }

    // 6. Buka Bottom Sheet Konfirmasi
    function openSheet(product) {
      const target = document.getElementById('targetInput').value;
      if (!token) {
        alert('Kamu harus login terlebih dahulu!');
        return;
      }
      if (!target || target.length < 5) {
        alert('Harap masukkan nomor tujuan dengan benar!');
        return;
      }

      selectedProduct = product;
      document.getElementById('detCat').innerText = currentCategory;
      document.getElementById('detName').innerText = product.product_name;
      document.getElementById('detTarget').innerText = target;
      document.getElementById('detPrice').innerText = 'Rp ' + product.price.toLocaleString('id-ID');

      document.getElementById('sheetOverlay').classList.add('active');
      document.getElementById('bottomSheet').classList.add('active');
    }

    function closeSheet() {
      document.getElementById('sheetOverlay').classList.remove('active');
      document.getElementById('bottomSheet').classList.remove('active');
    }

    // 7. Proses Transaksi Kirim ke Backend API
    async function processOrder() {
      const target = document.getElementById('targetInput').value;
      const btn = document.querySelector('.pay-btn');

      btn.disabled = true;
      btn.innerText = 'Memproses Pesanan...';
      btn.style.background = '#475569';

      try {
        const response = await fetch('/api/ppob/buy', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            sku: selectedProduct.buyer_sku_code,
            target: target
          })
        });

        const result = await response.json();
        closeSheet();

        if (result.success) {
          alert(`✅ Sukses!\n\n${result.message}\nRef ID: ${result.data.ref_id}\n\nPesanan Anda aman diproses sistem.`);
          document.getElementById('targetInput').value = '';
        } else {
          alert(`❌ Gagal:\n${result.message}`);
        }
      } catch (err) {
        console.error(err);
        alert('❌ Terjadi gangguan jaringan ke server.');
      } finally {
        btn.disabled = false;
        btn.innerText = 'Beli Sekarang';
        btn.style.background = 'var(--purple)';
      }
    }

    // Load Pertama Kali
    loadCategories();
  </script>
</body>
</html>
