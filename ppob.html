<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPOB Store - GabutStore</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #0f172a; color: #f8fafc; }
    .custom-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
  </style>
</head>
<body class="min-h-screen font-sans">

  <div class="max-w-6xl mx-auto px-4 py-8">
    <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 border-b border-slate-800 pb-6">
      <div>
        <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 tracking-tight">
          🚀 PPOB Digital Market
        </h1>
        <p class="text-slate-400 text-sm mt-1">Isi pulsa, kuota data, e-wallet, dan game terlengkap & otomatis.</p>
      </div>
      <a href="/dashboard.html" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-200 rounded-xl text-sm font-medium transition flex items-center gap-2">
        <i class="fa-solid fa-arrow-left"></i> Kembali ke Dashboard
      </a>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <div class="lg:col-span-1 flex flex-col gap-6">
        <div class="custom-card p-6 rounded-2xl shadow-xl flex flex-col gap-5">
          <h2 class="text-xl font-bold text-slate-100 flex items-center gap-2">
            <i class="fa-solid fa-cart-shopping text-cyan-400"></i> Pilih Layanan
          </h2>

          <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Kategori Utama</label>
            <select id="select-category" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-slate-200 text-sm focus:outline-none focus:border-cyan-500 transition">
              <option value="">-- Pilih Kategori --</option>
            </select>
          </div>

          <div id="box-brand" class="hidden">
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Provider / Operator</label>
            <select id="select-brand" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-slate-200 text-sm focus:outline-none focus:border-cyan-500 transition">
              <option value="">-- Pilih Provider --</option>
            </select>
          </div>

          <div id="box-subcategory" class="hidden">
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Sub Kategori Paket</label>
            <select id="select-subcategory" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-slate-200 text-sm focus:outline-none focus:border-cyan-500 transition">
              <option value="">-- Semua Tipe --</option>
            </select>
          </div>

          <div id="box-target" class="hidden">
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Nomor HP / ID Tujuan</label>
            <div class="relative">
              <input type="text" id="input-target" placeholder="Contoh: 081234567890" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 pl-10 text-slate-100 text-sm focus:outline-none focus:border-cyan-500 tracking-wider">
              <i class="fa-solid fa-phone absolute left-3.5 top-4 text-slate-500 text-xs"></i>
            </div>
          </div>
        </div>
      </div>

      <div class="lg:col-span-2">
        <div class="custom-card p-6 rounded-2xl shadow-xl min-h-[400px]">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-slate-100 flex items-center gap-2">
              <i class="fa-solid fa-cubes text-blue-400"></i> Daftar Produk Tersedia
            </h2>
            <span id="product-count" class="text-xs bg-slate-800 text-slate-400 px-3 py-1 rounded-full font-medium">0 produk</span>
          </div>

          <div id="product-status" class="flex flex-col items-center justify-center text-slate-500 py-20 text-center gap-3">
            <i class="fa-solid fa-folder-open text-4xl opacity-40"></i>
            <p class="text-sm">Silakan pilih Kategori dan Provider terlebih dahulu untuk memuat daftar produk.</p>
          </div>

          <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // Ambil token JWT dari localStorage web app kamu
    const token = localStorage.getItem('token') || '';

    // Headers global helper
    const getHeaders = () => ({
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`
    });

    // Elements
    const selectCategory = document.getElementById('select-category');
    const selectBrand = document.getElementById('select-brand');
    const selectSubcategory = document.getElementById('select-subcategory');
    const inputTarget = document.getElementById('input-target');
    
    const boxBrand = document.getElementById('box-brand');
    const boxSubcategory = document.getElementById('box-subcategory');
    const boxTarget = document.getElementById('box-target');
    
    const productGrid = document.getElementById('product-grid');
    const productStatus = document.getElementById('product-status');
    const productCount = document.getElementById('product-count');

    // 1. Ambil Kategori Saat Halaman Load
    async function loadCategories() {
      try {
        const res = await fetch('/api/ppob/categories', { headers: getHeaders() });
        const data = await res.json();
        if (data.success) {
          data.categories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat; opt.textContent = cat;
            selectCategory.appendChild(opt);
          });
        }
      } catch (err) {
        console.error("Gagal load kategori", err);
      }
    }

    // 2. Event Listener Kategori Berubah -> Load Brand
    selectCategory.addEventListener('change', async () => {
      const cat = selectCategory.value;
      resetForm(['brand', 'sub', 'prod']);
      if (!cat) return;

      try {
        const res = await fetch(`/api/ppob/brands?category=${encodeURIComponent(cat)}`, { headers: getHeaders() });
        const data = await res.json();
        if (data.success && data.brands.length > 0) {
          boxBrand.classList.remove('hidden');
          selectBrand.innerHTML = '<option value="">-- Pilih Provider --</option>';
          data.brands.forEach(b => {
            const opt = document.createElement('option');
            opt.value = b.brand; opt.textContent = b.brand;
            selectBrand.appendChild(opt);
          });
        }
      } catch (err) { console.error(err); }
    });

    // 3. Event Listener Brand Berubah -> Load Sub Kategori & Tampilkan Input Target
    selectBrand.addEventListener('change', async () => {
      const cat = selectCategory.value;
      const brd = selectBrand.value;
      resetForm(['sub', 'prod']);
      if (!brd) return;

      boxTarget.classList.remove('hidden');

      try {
        // Tarik daftar sub-kategori
        const res = await fetch(`/api/ppob/subcategories?category=${encodeURIComponent(cat)}&brand=${encodeURIComponent(brd)}`, { headers: getHeaders() });
        const data = await res.json();
        
        if (data.success && data.subcategories.length > 0) {
          boxSubcategory.classList.remove('hidden');
          selectSubcategory.innerHTML = '<option value="">-- Semua Tipe --</option>';
          data.subcategories.forEach(sub => {
            const opt = document.createElement('option');
            opt.value = sub; opt.textContent = sub;
            selectSubcategory.appendChild(opt);
          });
        }
        // Ambil list produk default (all sub-categories)
        loadProducts(cat, brd, '');
      } catch (err) { console.error(err); }
    });

    // 4. Event Listener Sub Kategori Berubah -> Filter Produk
    selectSubcategory.addEventListener('change', () => {
      loadProducts(selectCategory.value, selectBrand.value, selectSubcategory.value);
    });

    // 5. Load & Tampilkan Produk Ke Dalam Grid
    async function loadProducts(category, brand, subcategory) {
      productGrid.innerHTML = '';
      productStatus.innerHTML = `
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-cyan-400"></div>
        <p class="text-sm mt-2">Menyelaraskan produk dari server...</p>
      `;
      productStatus.classList.remove('hidden');
      productCount.textContent = '0 produk';

      try {
        let url = `/api/ppob/products?category=${encodeURIComponent(category)}&brand=${encodeURIComponent(brand)}`;
        if (subcategory) url += `&subcategory=${encodeURIComponent(subcategory)}`;

        const res = await fetch(url, { headers: getHeaders() });
        const data = await res.json();

        if (data.success && data.products.length > 0) {
          productStatus.classList.add('hidden');
          productCount.textContent = `${data.products.length} produk`;

          data.products.forEach(p => {
            const card = document.createElement('div');
            card.className = "bg-slate-900 border border-slate-800 rounded-xl p-4 flex flex-col justify-between hover:border-slate-700 transition shadow-sm relative overflow-hidden group";
            
            card.innerHTML = `
              <div>
                <div class="text-xs font-bold text-cyan-400 tracking-wide uppercase mb-1">${p.brand}</div>
                <h3 class="text-sm font-bold text-slate-100 leading-snug">${p.name}</h3>
                <p class="text-xs text-slate-400 mt-1.5 line-clamp-2">${p.desc}</p>
              </div>
              <div class="mt-4 pt-3 border-t border-slate-800 flex justify-between items-center">
                <div class="text-base font-extrabold text-emerald-400">Rp ${p.price.toLocaleString('id-ID')}</div>
                <button onclick="prosesBeli('${p.sku}', '${p.name}', ${p.price})" class="px-3.5 py-1.5 bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 text-white rounded-lg text-xs font-bold transition shadow-md shadow-blue-900/20 flex items-center gap-1.5">
                  Beli <i class="fa-solid fa-chevron-right text-[10px]"></i>
                </button>
              </div>
            `;
            productGrid.appendChild(card);
          });
        } else {
          productStatus.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-amber-500 text-2xl"></i><p class="text-sm">Produk tidak tersedia saat ini.</p>`;
        }
      } catch (err) {
        productStatus.innerHTML = `<i class="fa-solid fa-circle-xmark text-red-500 text-2xl"></i><p class="text-sm">Gagal memuat produk.</p>`;
      }
    }

    // 6. Aksi Transaksi Beli Produk PPOB
    async function prosesBeli(sku, productName, price) {
      const target = inputTarget.value.trim();
      if (!target) {
        Swal.fire({ icon: 'warning', title: 'Target Kosong', text: 'Silakan isi nomor HP / ID tujuan terlebih dahulu!', confirmButtonColor: '#2563eb' });
        inputTarget.focus();
        return;
      }

      Swal.fire({
        title: 'Konfirmasi Pembelian',
        html: `Apakah Anda yakin ingin membeli:<br><b class="text-cyan-400">${productName}</b><br>Tujuan: <code class="bg-slate-800 px-2 py-0.5 rounded text-yellow-300 font-mono">${target}</code><br>Harga: <b class="text-emerald-400">Rp ${price.toLocaleString('id-ID')}</b>`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#10b981',
        cancelButtonColor: '#ef4444',
        confirmButtonText: 'Ya, Beli Sekarang!',
        cancelButtonText: 'Batal'
      }).then(async (result) => {
        if (result.isConfirmed) {
          Swal.fire({ title: 'Memproses Transaksi...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
          
          try {
            const res = await fetch('/api/ppob/buy', {
              method: 'POST',
              headers: getHeaders(),
              body: JSON.stringify({ sku, target, product_name: productName, price })
            });
            const data = await res.json();
            
            if (data.success) {
              Swal.fire({ icon: 'success', title: 'Transaksi Berhasil!', text: data.message || 'Pembelian sukses diproses.', confirmButtonColor: '#10b981' });
            } else {
              Swal.fire({ icon: 'error', title: 'Transaksi Gagal', text: data.message || 'Terjadi kesalahan.', confirmButtonColor: '#ef4444' });
            }
          } catch (err) {
            Swal.fire({ icon: 'error', title: 'Server Error', text: 'Gagal terhubung ke api backend.', confirmButtonColor: '#ef4444' });
          }
        }
      });
    }

    // Helper Reset Element Form
    function resetForm(steps) {
      if (steps.includes('brand')) { boxBrand.classList.add('hidden'); selectBrand.innerHTML = ''; }
      if (steps.includes('sub')) { boxSubcategory.classList.add('hidden'); selectSubcategory.innerHTML = ''; }
      if (steps.includes('target')) { boxTarget.classList.add('hidden'); inputTarget.value = ''; }
      if (steps.includes('prod')) { productGrid.innerHTML = ''; productCount.textContent = '0 produk'; productStatus.classList.remove('hidden'); productStatus.innerHTML = `<i class="fa-solid fa-folder-open text-4xl opacity-40"></i><p class="text-sm">Pilih Kategori & Provider terlebih dahulu.</p>`; }
    }

    // Jalankan pertama kali saat load page
    loadCategories();
  </script>
</body>
</html>
