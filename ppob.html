<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPOB Market - Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
:root {
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #3D0F72;
  --purple-light: #9B4FDE;
  --purple-soft:  #F3EAFD;
  --purple-mid:   #EAD5FA;
  --accent:       #FF6B2B;
  --accent2:      #FFD600;
  --green:        #12C28A;
  --green-bg:     #E6FAF4;
  --red:          #E84040;
  --red-bg:       #FFECEC;
  --white:        #FFFFFF;
  --bg:           #F8F6FC;
  --card:         #FFFFFF;
  --gray-line:    #EEF0F6;
  --text-dark:    #1A0533;
  --text-mid:     #6B3FA0;
  --text-light:   #A882CC;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  overflow-x: hidden;
  padding-bottom: 100px;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ─── HERO COMPACT ─── */
.hero {
  background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple) 60%, var(--purple-light) 100%);
  padding: 24px 20px 64px;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.4s ease both;
}
.hero::before {
  content:''; position:absolute; top:-40px; right:-20px;
  width:160px; height:160px;
  border:32px solid rgba(255,255,255,0.05); border-radius:50%;
}
.hero-dots {
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 20px 20px; pointer-events:none;
}
.hero-top {
  display:flex; align-items:center; justify-content:between; position:relative; z-index:2;
  max-width: 440px; margin: 0 auto;
}
.hero-title-area { flex: 1; }
.hero-greeting {
  font-size:11px; font-weight:800; color:rgba(255,255,255,0.6);
  margin-bottom:1px; letter-spacing:0.3px;
  display:flex; align-items:center; gap:4px;
}
.hero-greeting svg { width: 12px; height: 12px; stroke: rgba(255,255,255,0.7); stroke-width: 2.2; fill: none; }
.hero-main-title { font-size:20px; font-weight:900; color:#fff; line-height:1.2; letter-spacing:-0.2px; }
.btn-back {
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px; padding: 6px 12px; color: #fff; font-size: 11px; font-weight: 800;
  text-decoration: none; display: flex; align-items: center; gap: 4px; transition: all 0.2s;
}
.btn-back:hover { background: #fff; color: var(--purple-deep); }
.btn-back svg { width: 12px; height: 12px; stroke: currentColor; stroke-width: 2.5; fill: none; }

/* ─── BALANCE CARD ─── */
.balance-card {
  background:var(--white); border-radius:18px; padding:16px 18px;
  margin: -40px auto 0; position:relative; z-index:10; max-width: 440px;
  box-shadow: 0 10px 30px rgba(90,26,154,0.12), 0 1px 3px rgba(0,0,0,0.02);
  border: 1px solid rgba(234, 213, 250, 0.6);
  animation: fadeUp 0.4s 0.08s ease both;
}
.balance-inner { display:flex; align-items:center; }
.balance-left { flex:1; }
.balance-label {
  font-size:10px; font-weight:800; color:var(--text-light);
  text-transform:uppercase; letter-spacing:1px; margin-bottom:2px;
  display:flex; align-items:center; gap:4px;
}
.balance-label svg { width:13px; height:13px; fill:none; stroke:var(--text-light); stroke-width:2.2; }
.balance-amount { font-size:24px; font-weight:900; color:var(--text-dark); line-height:1.1; letter-spacing:-0.4px; }

/* ─── CONTAINER ─── */
.container { padding:20px 16px 0; max-width:440px; margin:0 auto; }

/* ─── SECTION TITLE ─── */
.sec-title {
  font-size:14px; font-weight:900; color:var(--text-dark);
  margin-bottom:12px; display:flex; align-items:center; justify-content: space-between; letter-spacing:-0.1px;
}
.sec-title-left { display: flex; align-items: center; gap: 6px; }
.sec-title-pill {
  font-size:10px; font-weight:800; background:var(--purple-soft);
  color:var(--purple); border-radius:6px; padding:1px 8px;
}

/* ─── FORM & SELECTION PANEL ─── */
.form-panel {
  background: var(--white); border-radius: 16px; padding: 16px;
  border: 1px solid var(--gray-line); margin-bottom: 20px;
  box-shadow: 0 4px 12px rgba(90,26,154,0.02);
  display: flex; flex-direction: column; gap: 14px;
  animation: fadeUp 0.4s 0.12s ease both;
}
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label {
  font-size: 11px; font-weight: 800; color: var(--text-light);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.form-select, .form-input {
  width: 100%; background: var(--bg); border: 1px solid var(--gray-line);
  border-radius: 12px; padding: 11px 14px; font-family: 'Nunito', sans-serif;
  font-size: 13px; font-weight: 700; color: var(--text-dark);
  outline: none; transition: all 0.2s;
}
.form-select:focus, .form-input:focus {
  border-color: var(--purple-light); background: var(--white);
  box-shadow: 0 0 0 3px rgba(123,47,190,0.1);
}
.input-relative { position: relative; }
.input-relative .form-input { padding-left: 38px; }
.input-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px; fill: none; stroke: var(--text-light); stroke-width: 2.5;
}
.hidden { display: none !important; }

/* ─── PROVIDER LOGO GRID ─── */
.provider-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.provider-chip {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 5px; padding: 10px 6px;
  background: var(--bg); border: 2px solid var(--gray-line);
  border-radius: 12px; cursor: pointer; transition: all 0.18s cubic-bezier(0.16,1,0.3,1);
  user-select: none;
}
.provider-chip:hover {
  border-color: var(--purple-mid);
  background: var(--purple-soft);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(123,47,190,0.1);
}
.provider-chip.active {
  border-color: var(--purple);
  background: var(--purple-soft);
  box-shadow: 0 0 0 3px rgba(123,47,190,0.15);
}
.provider-chip.active .provider-name { color: var(--purple-dark); }
.provider-logo {
  width: 40px; height: 40px; border-radius: 8px;
  object-fit: contain; background: #fff;
  padding: 4px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  transition: transform 0.18s;
}
.provider-chip:hover .provider-logo { transform: scale(1.06); }
.provider-name {
  font-size: 9px; font-weight: 800; color: var(--text-light);
  text-align: center; letter-spacing: 0.3px; text-transform: uppercase;
  line-height: 1.2;
}
/* Fallback logo (inisial) kalau gambar gagal load */
.provider-logo-fallback {
  width: 40px; height: 40px; border-radius: 8px;
  background: linear-gradient(135deg, var(--purple) 0%, var(--purple-light) 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 900; color: #fff; letter-spacing: -0.5px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  flex-shrink: 0;
}

/* ─── PRODUCT LIST AREA ─── */
.product-area { animation: fadeUp 0.4s 0.16s ease both; }
.status-box {
  background: var(--white); border-radius: 16px; padding: 32px 20px;
  border: 1px solid var(--gray-line); text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 12px; color: var(--text-mid);
}
.status-icon-badge {
  width: 44px; height: 44px; border-radius: 50%; background: var(--purple-soft);
  display: flex; align-items: center; justify-content: center; margin-bottom: 2px;
}
.status-box svg { width: 20px; height: 20px; fill: none; stroke: var(--purple); stroke-width: 2.3; }
.status-box.error-status .status-icon-badge { background: var(--red-bg); }
.status-box.error-status svg { stroke: var(--red); }
.status-box.loading svg { animation: spin 1s linear infinite; }
.status-box p { font-size: 12px; font-weight: 700; max-width: 280px; color: var(--text-light); line-height: 1.5; }

@keyframes spin { to { transform: rotate(360deg); } }

/* ─── PRODUCT CARD ─── */
.product-list { display: flex; flex-direction: column; gap: 10px; }
.product-card {
  background: var(--white); border-radius: 14px; padding: 14px;
  border: 1px solid var(--gray-line); display: flex; align-items: center; justify-content: space-between; gap: 12px;
  transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
}
.product-card:hover { transform: translateY(-1px); border-color: var(--purple-mid); box-shadow: 0 6px 16px rgba(90,26,154,0.05); }
.prod-details { flex: 1; min-width: 0; }
.prod-brand { font-size: 9px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 1px; }
.prod-name { font-size: 13px; font-weight: 800; color: var(--text-dark); line-height: 1.3; }
.prod-desc { font-size: 11px; color: var(--text-light); font-weight: 600; margin-top: 2px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
.prod-action { text-align: right; flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.prod-price { font-size: 15px; font-weight: 900; color: var(--green); letter-spacing: -0.2px; }
.btn-buy {
  background: var(--purple); border: none; border-radius: 8px; padding: 5px 12px;
  color: #fff; font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 800;
  cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.15s;
}
.btn-buy:hover { background: var(--purple-dark); }
.btn-buy svg { width: 10px; height: 10px; fill: none; stroke: #fff; stroke-width: 3; }

/* ─── BOTTOM NAV ─── */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; background:#fff;
  border-top:1px solid var(--gray-line); display:flex; padding:10px 0 14px;
  box-shadow:0 -4px 20px rgba(90,26,154,0.04); z-index:100; max-width:440px; margin:0 auto;
}
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; text-decoration:none; }
.nav-icon svg { width:20px; height:20px; fill:none; stroke: var(--text-light); stroke-width:2.2; transition: stroke 0.2s; }
.nav-label { font-size:10px; font-weight:800; color:var(--text-light); transition: color 0.2s; }
.nav-item.active .nav-label { color:var(--purple); }
.nav-item.active .nav-icon svg { stroke: var(--purple); }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-dots"></div>
  <div class="hero-top">
    <div class="hero-title-area">
      <div class="hero-greeting">
        <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/></svg>
        Multi Payment PPOB
      </div>
      <div class="hero-main-title">Top Up &amp; Pulsa</div>
    </div>
    <a href="dashboard.html" class="btn-back">
      <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Kembali
    </a>
  </div>
</div>

<div style="max-width:440px; margin:0 auto; padding:0 16px;">
  <div class="balance-card">
    <div class="balance-inner">
      <div class="balance-left">
        <div class="balance-label">
          <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
          Saldo Sisa Kamu
        </div>
        <div class="balance-amount" id="web-balance">Rp 0</div>
      </div>
    </div>
  </div>
</div>

<div class="container">
  
  <div class="sec-title">
    <div class="sec-title-left">
      Konfigurasi <span class="sec-title-pill">Pembelian</span>
    </div>
  </div>

  <div class="form-panel">
    <!-- Kategori -->
    <div class="form-group">
      <label class="form-label">Kategori Layanan</label>
      <select id="select-category" class="form-select">
        <option value="">-- Pilih Kategori --</option>
      </select>
    </div>

    <!-- Provider Logo Grid (gantikan select brand) -->
    <div class="form-group hidden" id="box-brand">
      <label class="form-label">Operator / Provider</label>
      <div id="provider-grid" class="provider-grid"></div>
      <!-- Hidden input untuk nilai brand terpilih -->
      <input type="hidden" id="select-brand" value="">
    </div>

    <!-- Sub Kategori -->
    <div class="form-group hidden" id="box-subcategory">
      <label class="form-label">Tipe / Sub Paket</label>
      <select id="select-subcategory" class="form-select">
        <option value="">-- Semua Tipe --</option>
      </select>
    </div>

    <!-- Target Nomor -->
    <div class="form-group hidden" id="box-target">
      <label class="form-label">Nomor / ID Target Tujuan</label>
      <div class="input-relative">
        <svg class="input-icon" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <input type="text" id="input-target" placeholder="Contoh: 08123456789" class="form-input">
      </div>
    </div>
  </div>

  <div class="sec-title">
    <div class="sec-title-left">
      Produk Tersedia <span class="sec-title-pill" id="product-count" style="background: var(--purple-soft); color: var(--purple);">0 item</span>
    </div>
  </div>

  <div class="product-area">
    <div id="product-status" class="status-box">
      <div class="status-icon-badge">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <p>Silakan tentukan kategori dan operator di atas terlebih dahulu untuk memunculkan list produk otomatis.</p>
    </div>
    <div id="product-grid" class="product-list"></div>
  </div>

</div>

<nav class="bottom-nav">
  <a class="nav-item" href="dashboard.html">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
    </div>
    <div class="nav-label">Home</div>
  </a>
  <a class="nav-item" href="transactions.html">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" stroke-width="1.5"/><polyline points="7,17 10,13 13,15 17,9"/></svg>
    </div>
    <div class="nav-label">Riwayat</div>
  </a>
  <a class="nav-item" href="profile.html">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    </div>
    <div class="nav-label">Profile</div>
  </a>
</nav>

<script>
  const token = localStorage.getItem('token') || '';
  const localUser = JSON.parse(localStorage.getItem('user'));
  
  if (!localUser) {
    window.location.href = 'index.html';
  }

  const getHeaders = () => ({
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${token}`
  });

  // ─── PROVIDER LOGO MAP ───
  // Key: nama brand (lowercase, flexible matching)
  // Value: URL logo dari CDN
  // Kategori yang disembunyikan dari dropdown
  const HIDDEN_CATEGORIES = ['gas', 'tv', 'tv kabel', 'gas pln', 'gas elpiji', 'tagihan gas'];

  const PROVIDER_BASE = 'https://app.isdarprem.net/images/provider/';
  const PROVIDER_LOGOS = {
    // Telco
    'axis':           PROVIDER_BASE + 'axisnet.png',
    'axisnet':        PROVIDER_BASE + 'axisnet.png',
    'axis net':       PROVIDER_BASE + 'axisnet.png',
    'bayu':           PROVIDER_BASE + 'bayu.jpg',
    'indosat':        PROVIDER_BASE + 'indosat.jpg',
    'im3':            PROVIDER_BASE + 'indosat.jpg',
    'im3 ooredoo':    PROVIDER_BASE + 'indosat.jpg',
    'smartfren':      PROVIDER_BASE + 'smartfren.png',
    'smart':          PROVIDER_BASE + 'smartfren.png',
    'telkomsel':      PROVIDER_BASE + 'telkomsel.png',
    'simpati':        PROVIDER_BASE + 'telkomsel.png',
    'kartu as':       PROVIDER_BASE + 'telkomsel.png',
    'loop':           PROVIDER_BASE + 'telkomsel.png',
    'tri':            PROVIDER_BASE + 'tri.jpg',
    '3':              PROVIDER_BASE + 'tri.jpg',
    'three':          PROVIDER_BASE + 'tri.jpg',
    'xl':             PROVIDER_BASE + 'xl.jpg',
    'xl axiata':      PROVIDER_BASE + 'xl.jpg',
    // E-Wallet
    'dana':           PROVIDER_BASE + 'dana.jpeg',
    'gopay':          PROVIDER_BASE + 'gopay.jpeg',
    'go-pay':         PROVIDER_BASE + 'gopay.jpeg',
    'ovo':            PROVIDER_BASE + 'ovo.jpg',
    'shopeepay':      PROVIDER_BASE + 'ShopeePay.png',
    'shopee pay':     PROVIDER_BASE + 'ShopeePay.png',
    'shopee':         PROVIDER_BASE + 'ShopeePay.png',
    // Game
    'free fire':      PROVIDER_BASE + 'FreeFire.png',
    'freefire':       PROVIDER_BASE + 'FreeFire.png',
    'ff':             PROVIDER_BASE + 'FreeFire.png',
    'pubg':           PROVIDER_BASE + 'pubg.webp',
    'pubg mobile':    PROVIDER_BASE + 'pubg.webp',
    'mobile legends': PROVIDER_BASE + 'mobillegend.jpeg',
    'mobile legend':  PROVIDER_BASE + 'mobillegend.jpeg',
    'mobilelegends':  PROVIDER_BASE + 'mobillegend.jpeg',
    'ml':             PROVIDER_BASE + 'mobillegend.jpeg',
    'mlbb':           PROVIDER_BASE + 'mobillegend.jpeg',
    // Listrik
    'pln':            PROVIDER_BASE + 'pln.png',
    'listrik':        PROVIDER_BASE + 'pln.png',
    'token pln':      PROVIDER_BASE + 'pln.png',
  };

  /**
   * Resolve logo URL dari nama brand.
   * Matching case-insensitive & partial key check.
   */
  function getProviderLogo(brandName) {
    const key = brandName.toLowerCase().trim();
    if (PROVIDER_LOGOS[key]) return PROVIDER_LOGOS[key];
    // Partial matching: cek apakah key ada dalam brand name atau sebaliknya
    for (const [k, v] of Object.entries(PROVIDER_LOGOS)) {
      if (key.includes(k) || k.includes(key)) return v;
    }
    return null; // tidak ada logo, fallback ke inisial
  }

  /**
   * Render satu provider chip (logo card).
   * Kalau logo tidak ada / gagal load, tampilkan fallback inisial.
   */
  function createProviderChip(brandName, onClick) {
    const logoUrl = getProviderLogo(brandName);
    const initials = brandName.substring(0, 2).toUpperCase();

    const chip = document.createElement('div');
    chip.className = 'provider-chip';
    chip.dataset.brand = brandName;
    chip.title = brandName;

    let logoEl;
    if (logoUrl) {
      logoEl = document.createElement('img');
      logoEl.src = logoUrl;
      logoEl.alt = brandName;
      logoEl.className = 'provider-logo';
      // Fallback kalau gambar gagal load
      logoEl.onerror = function() {
        const fb = document.createElement('div');
        fb.className = 'provider-logo-fallback';
        fb.textContent = initials;
        this.replaceWith(fb);
      };
    } else {
      logoEl = document.createElement('div');
      logoEl.className = 'provider-logo-fallback';
      logoEl.textContent = initials;
    }

    const nameEl = document.createElement('div');
    nameEl.className = 'provider-name';
    nameEl.textContent = brandName;

    chip.appendChild(logoEl);
    chip.appendChild(nameEl);
    chip.addEventListener('click', () => onClick(chip, brandName));

    return chip;
  }

  // DOM Elements
  const selectCategory   = document.getElementById('select-category');
  const selectSubcategory= document.getElementById('select-subcategory');
  const inputTarget      = document.getElementById('input-target');
  const hiddenBrand      = document.getElementById('select-brand');
  const providerGridEl   = document.getElementById('provider-grid');
  
  const boxBrand         = document.getElementById('box-brand');
  const boxSubcategory   = document.getElementById('box-subcategory');
  const boxTarget        = document.getElementById('box-target');
  
  const productGrid      = document.getElementById('product-grid');
  const productStatus    = document.getElementById('product-status');
  const productCount     = document.getElementById('product-count');

  // Load Saldo
  async function fetchBalance() {
    try {
      const response = await fetch(`/api/profile?email=${encodeURIComponent(localUser.email)}`);
      const result = await response.json();
      if (result.success) {
        document.getElementById('web-balance').innerText = 'Rp ' + Number(result.user.balance || 0).toLocaleString('id-ID');
      }
    } catch (err) { console.error("Gagal sinkron saldo:", err); }
  }

  // 1. Load Kategori
  async function loadCategories() {
    try {
      const res = await fetch('/api/ppob/categories', { headers: getHeaders() });
      const data = await res.json();
      if (data.success) {
        data.categories.forEach(cat => {
          // Sembunyikan kategori Gas & TV
          if (HIDDEN_CATEGORIES.some(h => cat.toLowerCase().includes(h))) return;
          const opt = document.createElement('option');
          opt.value = cat; opt.textContent = cat;
          selectCategory.appendChild(opt);
        });
      }
    } catch (err) { console.error("Gagal load kategori", err); }
  }

  // 2. Kategori berubah → load brand / provider
  selectCategory.addEventListener('change', async () => {
    const cat = selectCategory.value;
    resetForm(['brand', 'sub', 'prod']);
    if (!cat) return;

    try {
      const res = await fetch(`/api/ppob/brands?category=${encodeURIComponent(cat)}`, { headers: getHeaders() });
      const data = await res.json();
      if (data.success && data.brands.length > 0) {
        boxBrand.classList.remove('hidden');
        providerGridEl.innerHTML = '';

        data.brands.forEach(b => {
          const chip = createProviderChip(b.brand, (chipEl, brandName) => {
            // Deselect semua, aktifkan yang dipilih
            providerGridEl.querySelectorAll('.provider-chip').forEach(c => c.classList.remove('active'));
            chipEl.classList.add('active');
            hiddenBrand.value = brandName;
            // Trigger logika brand change
            onBrandSelected(cat, brandName);
          });
          providerGridEl.appendChild(chip);
        });
      }
    } catch (err) { console.error(err); }
  });

  // 3. Brand dipilih → load sub kategori + produk
  async function onBrandSelected(cat, brd) {
    resetForm(['sub', 'prod']);
    boxTarget.classList.remove('hidden');

    try {
      const res = await fetch(`/api/ppob/subcategories?category=${encodeURIComponent(cat)}&brand=${encodeURIComponent(brd)}`, { headers: getHeaders() });
      const data = await res.json();

      if (data.success && data.subcategories.length > 0) {
        boxSubcategory.classList.remove('hidden');
        selectSubcategory.innerHTML = '<option value="">-- Semua Tipe --</option>';
        data.subcategories.forEach(sub => {
          const opt = document.createElement('option');
          opt.value = sub; opt.textContent = sub;
          selectSubcategory.appendChild(opt);
        });
      }
      loadProducts(cat, brd, '');
    } catch (err) { console.error(err); }
  }

  // 4. Filter sub kategori
  selectSubcategory.addEventListener('change', () => {
    loadProducts(selectCategory.value, hiddenBrand.value, selectSubcategory.value);
  });

  // 5. Load produk
  async function loadProducts(category, brand, subcategory) {
    productGrid.innerHTML = '';
    productStatus.className = "status-box loading";
    productStatus.innerHTML = `
      <div class="status-icon-badge">
        <svg viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="6.34" y1="17.66" x2="9.17" y2="14.83"/><line x1="14.83" y1="9.17" x2="17.66" y2="6.34"/></svg>
      </div>
      <p>Menyelaraskan produk server...</p>
    `;
    productStatus.classList.remove('hidden');
    productCount.textContent = '0 item';

    try {
      let url = `/api/ppob/products?category=${encodeURIComponent(category)}&brand=${encodeURIComponent(brand)}`;
      if (subcategory) url += `&subcategory=${encodeURIComponent(subcategory)}`;

      const res = await fetch(url, { headers: getHeaders() });
      const data = await res.json();

      if (data.success && data.products.length > 0) {
        productStatus.classList.add('hidden');
        productCount.textContent = `${data.products.length} item`;

        data.products.forEach(p => {
          const card = document.createElement('div');
          card.className = "product-card";
          card.innerHTML = `
            <div class="prod-details">
              <div class="prod-brand">${p.brand}</div>
              <div class="prod-name">${p.name}</div>
              <div class="prod-desc">${p.desc}</div>
            </div>
            <div class="prod-action">
              <div class="prod-price">Rp ${p.price.toLocaleString('id-ID')}</div>
              <button onclick="prosesBeli('${p.sku}', '${p.name}', ${p.price})" class="btn-buy">
                Beli <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
              </button>
            </div>
          `;
          productGrid.appendChild(card);
        });
      } else {
        productStatus.className = "status-box error-status";
        productStatus.innerHTML = `
          <div class="status-icon-badge">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <p>Produk tidak tersedia saat ini.</p>`;
      }
    } catch (err) {
      productStatus.className = "status-box error-status";
      productStatus.innerHTML = `
        <div class="status-icon-badge">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        </div>
        <p>Gagal memuat produk dari server.</p>`;
    }
  }

  // 6. Proses Beli
  async function prosesBeli(sku, productName, price) {
    const target = inputTarget.value.trim();
    if (!target) {
      Swal.fire({ icon: 'warning', title: 'Target Kosong', text: 'Nomor HP / ID tujuan tidak boleh kosong!', confirmButtonColor: '#7B2FBE' });
      inputTarget.focus();
      return;
    }

    Swal.fire({
      title: 'Konfirmasi Transaksi',
      html: `Apakah kamu yakin ingin memesan:<br><span style="color:var(--purple); font-weight:800;">${productName}</span><br><br>Tujuan:<br><code style="background:var(--purple-soft); padding:4px 10px; border-radius:6px; color:var(--purple-dark); font-weight:bold;">${target}</code><br><br>Total Bayar: <b style="color:var(--green)">Rp ${price.toLocaleString('id-ID')}</b>`,
      icon: 'question',
      showCancelButton: true,
      confirmButtonColor: '#12C28A',
      cancelButtonColor: '#E84040',
      confirmButtonText: 'Beli Sekarang',
      cancelButtonText: 'Batal'
    }).then(async (result) => {
      if (result.isConfirmed) {
        Swal.fire({ title: 'Memproses Pembelian...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
        
        try {
          const res = await fetch('/api/ppob/buy', {
            method: 'POST',
            headers: getHeaders(),
            body: JSON.stringify({ sku, target, product_name: productName, price })
          });
          const data = await res.json();
          
          if (data.success) {
            Swal.fire({ icon: 'success', title: 'Sukses!', text: data.message || 'Transaksi berhasil diproses server.', confirmButtonColor: '#12C28A' });
            fetchBalance();
          } else {
            Swal.fire({ icon: 'error', title: 'Gagal', text: data.message || 'Gagal melakukan pembelian.', confirmButtonColor: '#E84040' });
          }
        } catch (err) {
          Swal.fire({ icon: 'error', title: 'Error Server', text: 'Koneksi API bermasalah.', confirmButtonColor: '#E84040' });
        }
      }
    });
  }

  function resetForm(steps) {
    if (steps.includes('brand')) {
      boxBrand.classList.add('hidden');
      providerGridEl.innerHTML = '';
      hiddenBrand.value = '';
    }
    if (steps.includes('sub')) {
      boxSubcategory.classList.add('hidden');
      selectSubcategory.innerHTML = '';
    }
    if (steps.includes('target')) {
      boxTarget.classList.add('hidden');
      inputTarget.value = '';
    }
    if (steps.includes('prod')) {
      productGrid.innerHTML = '';
      productCount.textContent = '0 item';
      productStatus.classList.remove('hidden');
      productStatus.className = "status-box";
      productStatus.innerHTML = `
        <div class="status-icon-badge">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <p>Silakan tentukan kategori dan operator di atas terlebih dahulu untuk memunculkan list produk otomatis.</p>`;
    }
  }

  // Init
  fetchBalance();
  loadCategories();
</script>
</body>
</html>
