<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riwayat Transaksi - Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>

:root {
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #3D0F72;
  --purple-light: #9B4FDE;
  --purple-soft:  #F3EAFD;
  --purple-mid:   #EAD5FA;
  --accent:       #FF6B2B;
  --accent-light: #FFEFEA;
  --green:        #12C28A;
  --green-bg:     #E6FAF4;
  --red:          #E84040;
  --red-bg:       #FFECEC;
  --blue:         #1ABCFE;
  --blue-bg:      #E6F8FF;
  --pink:         #E8007A;
  --pink-bg:      #FFE6F2;
  
  /* Light theme variables */
  --white:        #FFFFFF;
  --bg:           #F4F0FA;
  --gray-line:    #EEF0F6;
  --text-dark:    #1A0533;
  --text-mid:     #6B3FA0;
  --text-light:   #A882CC;
  --card-bg:      #FFFFFF;
  --nav-bg:       #FFFFFF;
  --nav-border:   #EEF0F6;
}

[data-theme="dark"] {
  --white:        #1E1130;
  --bg:           #120B22;
  --gray-line:    #2A1D42;
  --text-dark:    #F0E8FF;
  --text-mid:     #C4A0EE;
  --text-light:   #7A5BAA;
  --card-bg:      #1E1130;
  --nav-bg:       #17102A;
  --nav-border:   #2A1D42;
  --purple-soft:  #2D1A50;
  --purple-mid:   #3D2265;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  color: var(--text-dark);
  padding-bottom: 100px; /* Jarak agar tidak tertutup bottom nav */
  overflow-x: hidden;
  transition: background 0.3s ease, color 0.3s ease;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple) 60%, var(--purple-light) 100%);
  padding: 28px 20px 48px;
  position: relative; overflow: hidden; z-index: 2;
}
.header::before {
  content:''; position:absolute; top:-40px; right:-20px;
  width:160px; height:160px;
  border:32px solid rgba(255,255,255,0.05); border-radius:50%;
}
.hero-dots {
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 20px 20px;
  pointer-events:none;
}
.header-inner {
  display:flex; align-items:center; gap:12px; position:relative; z-index:2;
}
.back-btn-hdr {
  width:36px; height:36px; border-radius:11px;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.18);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  color:#fff; text-decoration:none; flex-shrink:0; transition:background 0.15s;
  backdrop-filter:blur(8px);
}
.back-btn-hdr:hover { background:rgba(255,255,255,0.2); }
.back-btn-hdr svg { width:18px; height:18px; fill:none; stroke:#fff; stroke-width:2.5; }

.header-title { flex:1; }
.header-title h1 {
  font-size:18px; font-weight:900;
  color:#fff; line-height:1.1; letter-spacing:-0.2px;
  display:flex; align-items:center; gap:6px;
}
.header-title h1 svg { width:20px; height:20px; fill:none; stroke:#fff; stroke-width:2.2; }
.header-title p { font-size:11px; color:rgba(255,255,255,0.55); font-weight:700; margin-top:3px; }

.header-count {
  background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.2);
  border-radius:12px; padding:6px 12px;
  font-size:11px; font-weight:800; color:#fff; white-space:nowrap;
}

/* ── CONTAINER ── */
.container {
  max-width:440px; margin:0 auto;
  padding:0 16px; position:relative; z-index:2;
}

/* ── TOOLBAR ── */
.toolbar {
  background:var(--card-bg); border-radius:16px; padding:12px;
  border:1px solid var(--gray-line);
  box-shadow:0 8px 24px rgba(90,26,154,0.03);
  margin-top:-28px; margin-bottom:12px;
  position:relative; z-index:5;
  display:flex; flex-direction:column; gap:8px;
  animation: fadeUp 0.4s 0.05s ease both;
  transition: background 0.3s, border-color 0.3s;
}
.search-row {
  display:flex; align-items:center; gap:10px;
  background:var(--bg); border-radius:12px;
  border:1px solid var(--gray-line); padding:9px 12px;
  transition:all 0.15s;
}
.search-row:focus-within { border-color:var(--purple); background:var(--card-bg); box-shadow:0 0 0 3px rgba(123,47,190,0.05); }
.search-row svg { color:var(--text-light); flex-shrink:0; width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.5; }
.search-input {
  flex:1; border:none; outline:none;
  font-family:'Nunito',sans-serif; font-size:13px; font-weight:700;
  color:var(--text-dark); background:transparent;
}
.search-input::placeholder { color:var(--text-light); font-weight:600; }

.filter-row { display:flex; gap:6px; flex-wrap:wrap; }
.filter-chip {
  padding:6px 12px; border-radius:10px;
  font-family:'Nunito',sans-serif; font-size:11px; font-weight:800;
  cursor:pointer; border:1px solid var(--gray-line);
  background:var(--bg); color:var(--text-mid);
  transition:all 0.15s; white-space:nowrap;
  display:flex; align-items:center; gap:4px;
}
.filter-chip svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2.2; }
.filter-chip:hover { border-color:var(--purple); color:var(--purple); }
.filter-chip.active {
  background:var(--purple); border-color:transparent; color:#fff;
  box-shadow:0 4px 12px rgba(123,47,190,0.18);
}
.filter-chip[data-val="SSH"].active       { background: var(--accent); }
.filter-chip[data-val="VMESS"].active     { background: #0098DB; }
.filter-chip[data-val="VLESS"].active     { background: var(--purple-dark); }
.filter-chip[data-val="TROJAN"].active    { background: var(--red); }
.filter-chip[data-val="SHADOWSOCKS"].active { background: var(--pink); }

/* ── STATS CHIPS ── */
.stats-row {
  display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;
  animation: fadeUp 0.4s 0.10s ease both;
}
.stat-chip {
  background:var(--card-bg); border:1px solid var(--gray-line);
  border-radius:10px; padding:6px 12px;
  font-size:11px; font-weight:700; color:var(--text-mid);
  display:flex; align-items:center; gap:4px;
  box-shadow:0 2px 8px rgba(90,26,154,0.01);
  transition: background 0.3s, border-color 0.3s;
}
.stat-chip svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2.2; }
.stat-chip strong { color:var(--purple); font-weight:800; margin-left:2px; }

/* ── TRANSACTION CARDS ── */
.tx-list { animation: fadeUp 0.4s 0.15s ease both; }
.tx-card {
  background:var(--card-bg); border-radius:16px; margin-bottom:10px;
  border:1px solid var(--gray-line);
  box-shadow:0 2px 10px rgba(90,26,154,0.01);
  overflow:hidden; transition:all 0.15s;
}
.tx-card:hover { transform:translateY(-1px); box-shadow:0 6px 16px rgba(90,26,154,0.03); }
.tx-card-inner { padding:12px 14px; display:flex; align-items:center; gap:12px; }

/* Left boundary logic markers mapped dynamically */
.tx-card[data-proto="SSH"]         { border-left:4px solid var(--accent); }
.tx-card[data-proto="VMESS"]       { border-left:4px solid var(--blue); }
.tx-card[data-proto="VLESS"]       { border-left:4px solid var(--purple); }
.tx-card[data-proto="TROJAN"]      { border-left:4px solid var(--red); }
.tx-card[data-proto="SHADOWSOCKS"] { border-left:4px solid var(--pink); }
.tx-card[data-proto=""]            { border-left:4px solid var(--text-light); }

.tx-proto-icon {
  width:38px; height:38px; border-radius:11px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; font-size:16px; color:#fff;
}
.tx-proto-icon svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.2; }
.pi-ssh    { background: linear-gradient(135deg, var(--accent), #FF8A50); }
.pi-vmess  { background: linear-gradient(135deg, var(--blue), #0098DB); }
.pi-vless  { background: linear-gradient(135deg, var(--purple), var(--purple-light)); }
.pi-trojan { background: linear-gradient(135deg, var(--red), #FF7A7A); }
.pi-ss     { background: linear-gradient(135deg, var(--pink), #FF5CA8); }
.pi-other  { background: linear-gradient(135deg, #9CA3AF, #6B7280); }

.tx-main { flex:1; min-width:0; }
.tx-user { font-size:14px; font-weight:800; color:var(--text-dark); line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tx-email { font-size:11px; color:var(--text-light); font-weight:600; margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tx-product { font-size:12px; font-weight:700; color:var(--text-mid); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display: flex; align-items: center; gap: 4px; }
.tx-product svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2; }

.tx-right { text-align:right; flex-shrink:0; }
.proto-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:8px; font-size:10px; font-weight:800; margin-bottom:4px; }
.proto-badge svg { width: 10px; height: 10px; fill: none; stroke: currentColor; stroke-width: 2.2; }
.pb-ssh    { background:var(--accent-light); color:var(--accent); }
.pb-vmess  { background:var(--blue-bg); color:#0077AA; }
.pb-vless  { background:var(--purple-soft); color:var(--purple); }
.pb-trojan { background:var(--red-bg); color:var(--red); }
.pb-ss     { background:var(--pink-bg); color:var(--pink); }
.pb-other  { background:var(--bg); color:#6B7280; }

.tx-date { font-size:10px; font-weight:700; color:var(--text-light); display:flex; align-items:center; gap:3px; justify-content:flex-end; }
.tx-date svg { width: 10px; height: 10px; fill: none; stroke: currentColor; stroke-width: 2; }

/* ── EMPTY / LOADING ── */
.empty-state, .loading-state { text-align:center; padding:40px 20px; display:flex; flex-direction:column; align-items:center; gap:8px; }
.empty-icon svg { width: 44px; height: 44px; fill: none; stroke: var(--text-light); stroke-width: 2; }
.loading-icon svg { width: 24px; height: 24px; fill: none; stroke: var(--purple); stroke-width: 2.5; animation:spin 1s linear infinite; }
.empty-title { font-size:15px; font-weight:800; color:var(--text-dark); }
.empty-sub { font-size:12px; color:var(--text-mid); font-weight:600; }

/* ── PAGINATION ── */
.pagination {
  background:var(--card-bg); border-radius:14px; border:1px solid var(--gray-line);
  padding:10px 14px; margin-top:4px; display:flex; align-items:center; justify-content:space-between;
  box-shadow:0 4px 12px rgba(90,26,154,0.01);
  transition: background 0.3s, border-color 0.3s;
}
.page-info { font-size:12px; font-weight:700; color:var(--text-mid); }
.page-btns { display:flex; gap:4px; align-items:center; }
.page-btn {
  width:30px; height:30px; border:none; border-radius:8px;
  background:var(--bg); color:var(--text-mid);
  font-family:'Nunito',sans-serif; font-weight:800; font-size:12px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all 0.15s; border:1px solid var(--gray-line);
}
.page-btn:hover:not(:disabled) { border-color:var(--purple); color:var(--purple); }
.page-btn:disabled { opacity:0.3; cursor:default; }
.page-btn.active { background:var(--purple); border-color:transparent; color:#fff; box-shadow:0 3px 10px rgba(123,47,190,0.15); }
.page-btn svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2.5; }
.page-dots { color:var(--text-light); font-weight:700; padding:0 2px; font-size:12px; }

/* ── BACK BTN ── */
.back-btn {
  width:100%; padding:12px; margin-top:12px;
  border:1px solid var(--gray-line); border-radius:14px;
  background:var(--card-bg); color:var(--text-mid);
  font-family:'Nunito',sans-serif; font-weight:800; font-size:13px;
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
  transition:all 0.15s; box-shadow:0 4px 12px rgba(90,26,154,0.01);
}
.back-btn:hover { border-color:var(--purple); color:var(--purple); }
.back-btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2.5; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--nav-bg); border-top: 1px solid var(--nav-border);
  display: flex; padding: 10px 0 14px;
  box-shadow: 0 -4px 20px rgba(90,26,154,0.05); z-index: 100;
  transition: background 0.3s, border-color 0.3s;
}
.bottom-nav-inner { display: flex; width: 100%; max-width: 440px; margin: 0 auto; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; text-decoration: none; }
.nav-icon svg { width: 20px; height: 20px; fill: none; stroke: var(--text-light); stroke-width: 2.2; transition: stroke 0.2s; }
.nav-label { font-size: 9.5px; font-weight: 800; color: var(--text-light); transition: color 0.2s; }
.nav-item.active .nav-label { color: var(--purple); }
.nav-item.active .nav-icon svg { stroke: var(--purple); }

</style>
</head>
<body>

<div class="header">
  <div class="hero-dots"></div>
  <div class="header-inner">
    <a class="back-btn-hdr" href="admin.html">
      <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    </a>
    <div class="header-title">
      <h1>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>

      </h1>
      <p id="subtitle">Memuat data...</p>

</div>

<div class="container">

  <div class="toolbar">
    <div class="search-row">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Cari username / email / produk..." oninput="applyFilter()">
    </div>
    <div class="filter-row" id="filterRow">
      <div class="filter-chip active" data-val="" onclick="setProtocolFilter(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
        Semua
      </div>
      <div class="filter-chip" data-val="SSH" onclick="setProtocolFilter(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
        SSH
      </div>
      <div class="filter-chip" data-val="VMESS" onclick="setProtocolFilter(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
        VMESS
      </div>
      <div class="filter-chip" data-val="VLESS" onclick="setProtocolFilter(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
        VLESS
      </div>
      <div class="filter-chip" data-val="TROJAN" onclick="setProtocolFilter(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        TROJAN
      </div>
      <div class="filter-chip" data-val="SHADOWSOCKS" onclick="setProtocolFilter(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
        SS
      </div>

  </div>

  <div class="stats-row" id="statsBar"></div>

  <div id="txList">

        <svg viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>

  <div class="pagination" id="pagination" style="display:none;">

    <div class="page-btns" id="pageBtns"></div>

  <button class="back-btn" onclick="location.href='admin.html'">
    <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>

</div>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a class="nav-item" href="dashboard.html">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg></div>

      <div class="nav-label">Riwayat</div>

<script>

// ─── AUTO RUN THEME SYNCHRONIZER ───
(function() {
  const saved = localStorage.getItem('xt-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
})();

const token = localStorage.getItem('token');
const localUser = JSON.parse(localStorage.getItem('user'));

if (!localUser || !token) {
  location.href = 'index.html';
} else if (localUser.role !== 'admin') {
  alert('Akses ditolak!');
  location.href = 'dashboard.html';
}

const PER_PAGE = 10;
let allData    = [];
let filtered   = [];
let currentPage = 1;
let activeProto = '';

const svgListTemplate     = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>`;
const svgSearchTemplate   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>`;
const svgPackageTemplate  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>`;
const svgClockTemplate    = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`;
const svgAlertTemplate    = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"></line><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.5c0 0-4 7.5-11 7.5a10.42 10.42 0 0 1-3.64-.67"></path><path d="M6.62 6.62A10.71 10.71 0 0 0 1 12.5c0 0 4 7.5 11 7.5a11.12 11.12 0 0 0 5-.12"></path><path d="M22 12.5a11.16 11.16 0 0 0-2.3-3.06"></path><path d="M10.59 10.59a3 3 0 1 0 4.24 4.24"></path></svg>`;

const PROTO_CONFIG = {
  SSH:         { cls:'pi-ssh',    badge:'pb-ssh',    label:'SSH',          icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>` },
  VMESS:       { cls:'pi-vmess',  badge:'pb-vmess',  label:'VMESS',        icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>` },
  VLESS:       { cls:'pi-vless',  badge:'pb-vless',  label:'VLESS',        icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>` },
  TROJAN:      { cls:'pi-trojan', badge:'pb-trojan', label:'TROJAN',       icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>` },
  SHADOWSOCKS: { cls:'pi-ss',     badge:'pb-ss',     label:'SS',           icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>` },
};

function getProtoConf(p) {
  return PROTO_CONFIG[(p||'').toUpperCase()] || { cls:'pi-other', badge:'pb-other', label: p || '—', icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>` };
}

loadTransactions();

async function loadTransactions() {
  try {
    const res  = await fetch('/api/admin/transactions?email=' + encodeURIComponent(localUser.email), {
      method: 'GET',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      }
    });
    
    const data = await res.json();
    if (!data.success) { document.getElementById('txList').innerHTML = errorState(data.message); return; }
    allData = data.transactions || [];
    applyFilter();
  } catch (err) {
    console.error(err);
    document.getElementById('txList').innerHTML = errorState('Server tidak dapat dihubungi');
  }
}

function setProtocolFilter(el) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeProto = el.dataset.val;
  applyFilter();
}

function applyFilter() {
  const kw = document.getElementById('searchInput').value.toLowerCase();
  filtered = allData.filter(tx => {
    const matchSearch =
      (tx.username    || '').toLowerCase().includes(kw) ||
      (tx.email       || '').toLowerCase().includes(kw) ||
      (tx.product_name|| '').toLowerCase().includes(kw);
    const matchProto = !activeProto ||
      (tx.product_type || '').toUpperCase() === activeProto;
    return matchSearch && matchProto;
  });
  currentPage = 1;
  renderStats();
  renderList();
  renderPagination();
}

function renderStats() {
  const counts = {};
  allData.forEach(tx => {
    const p = (tx.product_type || 'Unknown').toUpperCase();
    counts[p] = (counts[p] || 0) + 1;
  });
  
  document.getElementById('subtitle').textContent = `${filtered.length} dari ${allData.length} transaksi`;
  document.getElementById('countBadge').textContent = allData.length + ' Total';

  let html = `
    <div class="stat-chip">
      ${svgListTemplate}
      Total <strong>${allData.length}</strong>
    </div>`;
  Object.entries(counts).forEach(([p, c]) => {
    const conf = getProtoConf(p);
    html += `
      <div class="stat-chip">
        ${conf.icon}
        ${conf.label} <strong>${c}</strong>
      </div>`;
  });
  document.getElementById('statsBar').innerHTML = html;
}

function renderList() {
  if (!filtered.length) {
    document.getElementById('txList').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${svgSearchTemplate}</div>
        <div class="empty-title">Tidak Ada Data</div>
        <div class="empty-sub">Coba ubah filter atau kata kunci</div>
      </div>`;
    return;
  }

  const start = (currentPage - 1) * PER_PAGE;
  const slice = filtered.slice(start, start + PER_PAGE);
  const proto = (p) => (p || '').toUpperCase();

  let html = '<div class="tx-list">';
  slice.forEach((tx, i) => {
    const p    = proto(tx.product_type);
    const conf = getProtoConf(p);
    const date = tx.created_at
      ? new Date(tx.created_at).toLocaleString('id-ID', {
          timeZone: 'Asia/Jakarta',
          day: '2-digit',
          month: '2-digit',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
          hour12: false
        })
      : '—';

    html += `
    <div class="tx-card" data-proto="${p}" style="animation:fadeUp 0.35s ${i*0.04}s ease both;">
      <div class="tx-card-inner">
        <div class="tx-proto-icon ${conf.cls}">
          ${conf.icon}
        </div>
        <div class="tx-main">
          <div class="tx-user">${tx.username || '—'}</div>
          <div class="tx-email">${tx.email || '—'}</div>
          <div class="tx-product">
            ${svgPackageTemplate}
            ${tx.product_name || '—'}
          </div>
        </div>
        <div class="tx-right">
          <div class="proto-badge ${conf.badge}">
            ${conf.icon}
            ${conf.label}
          </div>
          <div class="tx-date">
            ${svgClockTemplate}
            ${date}
          </div>
        </div>
      </div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('txList').innerHTML = html;
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PER_PAGE);
  const pag   = document.getElementById('pagination');
  if (total <= 1) { pag.style.display = 'none'; return; }
  pag.style.display = 'flex';
  document.getElementById('pageInfo').textContent = `Hal ${currentPage} / ${total}`;

  let btns = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
  </button>`;

  let lastDotted = false;
  for (let i = 1; i <= total; i++) {
    if (i === 1 || i === total || (i >= currentPage - 1 && i <= currentPage + 1)) {
      btns += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
      lastDotted = false;
    } else {
      if (!lastDotted) {
        btns += `<span class="page-dots">…</span>`;
        lastDotted = true;
      }
    }
  }

  btns += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg>
  </button>`;
  document.getElementById('pageBtns').innerHTML = btns;
}

function goPage(p) {
  const total = Math.ceil(filtered.length / PER_PAGE);
  if (p < 1 || p > total) return;
  currentPage = p;
  renderList();
  renderPagination();
  window.scrollTo({ top:0, behavior:'smooth' });
}

function errorState(msg) {
  return `<div class="empty-state">
    <div class="empty-icon">${svgAlertTemplate}</div>
    <div class="empty-title">Gagal Memuat</div>
    <div class="empty-sub">${msg}</div>
  </div>`;
}

</script>
</body>
</html>
