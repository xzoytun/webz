<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riwayat Transaksi - Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght=400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>

:root {
  --purple:    #6B21D6;
  --purple2:   #8B3FF5;
  --pink:      #E8007A;
  --pink2:     #FF3D9A;
  --orange:    #FF6B2C;
  --yellow:    #FFD600;
  --green:     #00C853;
  --red:       #EF4444;
  --blue:      #1ABCFE;
  --white:     #FFFFFF;
  --text-dark: #1a0033;
  --text-mid:  #5B3A8C;
  --bg-light:  #F6F0FF;
  --border:    #EDE0FF;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg-light);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  color: var(--text-dark);
  padding-bottom: 40px;
  overflow-x: hidden;
}

.blob1 {
  position:fixed; top:-80px; left:-60px;
  width:300px; height:300px;
  background:radial-gradient(circle,rgba(107,33,214,0.12) 0%,transparent 70%);
  pointer-events:none; z-index:0;
}
.blob2 {
  position:fixed; bottom:-60px; right:-60px;
  width:260px; height:260px;
  background:radial-gradient(circle,rgba(232,0,122,0.10) 0%,transparent 70%);
  pointer-events:none; z-index:0;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(145deg, var(--purple) 0%, var(--purple2) 60%, #A855F7 100%);
  padding: 22px 20px 32px;
  position: relative; overflow: hidden; z-index: 2;
}
.header::before {
  content:''; position:absolute; top:-40px; right:-30px;
  width:180px; height:180px; background:rgba(255,255,255,0.07); border-radius:50%;
}
.header::after {
  content:''; position:absolute; bottom:-50px; left:-20px;
  width:130px; height:130px; background:rgba(255,255,255,0.05); border-radius:50%;
}
.header-inner {
  display:flex; align-items:center; gap:14px; position:relative; z-index:2;
}
.back-btn-hdr {
  width:40px; height:40px; border-radius:12px;
  background:rgba(255,255,255,0.15); border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:#fff; text-decoration:none; flex-shrink:0; transition:background 0.15s;
}
.back-btn-hdr:hover { background:rgba(255,255,255,0.25); }
.back-btn-hdr svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

.header-title { flex:1; }
.header-title h1 {
  font-family:'Fredoka One',cursive;
  font-size:22px; color:#fff; line-height:1;
  display:flex; align-items:center; gap:8px;
}
.header-title h1 svg { width: 22px; height: 22px; fill: currentColor; }
.header-title p { font-size:12px; color:rgba(255,255,255,0.7); font-weight:600; margin-top:4px; }
.header-count {
  background:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.3);
  border-radius:20px; padding:5px 14px;
  font-size:11px; font-weight:800; color:#fff; white-space:nowrap;
}

/* ── CONTAINER ── */
.container {
  max-width:480px; margin:0 auto;
  padding:0 18px; position:relative; z-index:2;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── TOOLBAR ── */
.toolbar {
  background:var(--white);
  border-radius:18px; padding:14px;
  border:1.5px solid var(--border);
  box-shadow:0 4px 14px rgba(107,33,214,0.10);
  margin-top:-18px; margin-bottom:14px;
  position:relative; z-index:5;
  display:flex; flex-direction:column; gap:10px;
  animation: fadeUp 0.4s 0.05s ease both;
}
.search-row {
  display:flex; align-items:center; gap:10px;
  background:#FBF8FF; border-radius:12px;
  border:1.5px solid var(--border); padding:10px 14px;
  transition:border-color 0.15s;
}
.search-row:focus-within { border-color:var(--purple2); }
.search-row svg { color:#B0A0C0; flex-shrink:0; width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
.search-input {
  flex:1; border:none; outline:none;
  font-family:'Nunito',sans-serif; font-size:14px; font-weight:700;
  color:var(--text-dark); background:transparent;
}
.search-input::placeholder { color:#C4B0D8; font-weight:600; }

.filter-row { display:flex; gap:8px; flex-wrap:wrap; }
.filter-chip {
  padding:7px 14px; border-radius:20px;
  font-family:'Nunito',sans-serif; font-size:12px; font-weight:800;
  cursor:pointer; border:2px solid var(--border);
  background:#FBF8FF; color:var(--text-mid);
  transition:all 0.15s; white-space:nowrap;
  display:flex; align-items:center; gap:5px;
}
.filter-chip svg { width: 13px; height: 13px; fill: currentColor; }
.filter-chip:hover { border-color:var(--purple2); color:var(--purple); }
.filter-chip.active {
  background:linear-gradient(135deg,var(--purple),var(--purple2));
  border-color:transparent; color:#fff;
  box-shadow:0 3px 10px rgba(107,33,214,0.28);
}
.filter-chip[data-val="SSH"].active       { background:linear-gradient(135deg,#FF6B2C,#FFD600); }
.filter-chip[data-val="VMESS"].active     { background:linear-gradient(135deg,#1ABCFE,#0098DB); }
.filter-chip[data-val="VLESS"].active     { background:linear-gradient(135deg,#6B21D6,#8B3FF5); }
.filter-chip[data-val="TROJAN"].active    { background:linear-gradient(135deg,#EF4444,#F97316); }
.filter-chip[data-val="SHADOWSOCKS"].active { background:linear-gradient(135deg,#E8007A,#FF3D9A); }

/* ── STATS CHIPS ── */
.stats-row {
  display:flex; gap:8px; flex-wrap:wrap;
  margin-bottom:14px;
  animation: fadeUp 0.4s 0.10s ease both;
}
.stat-chip {
  background:var(--white); border:1.5px solid var(--border);
  border-radius:20px; padding:6px 14px;
  font-size:12px; font-weight:700; color:var(--text-mid);
  display:flex; align-items:center; gap:5px;
  box-shadow:0 2px 8px rgba(107,33,214,0.07);
}
.stat-chip svg { width: 13px; height: 13px; fill: currentColor; }
.stat-chip strong { color:var(--purple); font-weight:900; }

/* ── TRANSACTION CARDS ── */
.tx-list { animation: fadeUp 0.4s 0.15s ease both; }

.tx-card {
  background:var(--white);
  border-radius:18px; margin-bottom:10px;
  border:1.5px solid var(--border);
  box-shadow:0 2px 10px rgba(107,33,214,0.07);
  overflow:hidden;
  transition:transform 0.15s, box-shadow 0.15s;
}
.tx-card:hover {
  transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(107,33,214,0.12);
}

.tx-card-inner {
  padding:14px 16px;
  display:flex; align-items:center; gap:12px;
}

/* left accent bar per protocol */
.tx-card[data-proto="SSH"]         { border-left:4px solid #FF6B2C; }
.tx-card[data-proto="VMESS"]       { border-left:4px solid #1ABCFE; }
.tx-card[data-proto="VLESS"]       { border-left:4px solid var(--purple); }
.tx-card[data-proto="TROJAN"]      { border-left:4px solid var(--red); }
.tx-card[data-proto="SHADOWSOCKS"] { border-left:4px solid var(--pink); }
.tx-card[data-proto=""]            { border-left:4px solid #B0A0C0; }

.tx-proto-icon {
  width:42px; height:42px; border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; font-size:20px; color:#fff;
}
.tx-proto-icon svg { width: 20px; height: 20px; fill: currentColor; }
.pi-ssh    { background:linear-gradient(135deg,#FF6B2C,#FFD600); }
.pi-vmess  { background:linear-gradient(135deg,#1ABCFE,#0098DB); }
.pi-vless  { background:linear-gradient(135deg,var(--purple),var(--purple2)); }
.pi-trojan { background:linear-gradient(135deg,var(--red),#F97316); }
.pi-ss     { background:linear-gradient(135deg,var(--pink),var(--pink2)); }
.pi-other  { background:linear-gradient(135deg,#9CA3AF,#6B7280); }

.tx-main { flex:1; min-width:0; }
.tx-user {
  font-family:'Fredoka One',cursive;
  font-size:15px; color:var(--text-dark); line-height:1.1;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.tx-email {
  font-size:11px; color:#B0A0C0; font-weight:600; margin-top:2px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.tx-product {
  font-size:12px; font-weight:700; color:var(--text-mid); margin-top:4px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  display: flex; align-items: center; gap: 2px;
}
.tx-product svg { width: 11px; height: 11px; fill: currentColor; }

.tx-right { text-align:right; flex-shrink:0; }
.proto-badge {
  display:inline-flex; align-items:center; gap:4px;
  padding:4px 10px; border-radius:20px;
  font-size:10px; font-weight:800; letter-spacing:0.5px;
  margin-bottom:6px;
}
.proto-badge svg { width: 10px; height: 10px; fill: currentColor; }
.pb-ssh    { background:#FFF0E0; color:var(--orange); }
.pb-vmess  { background:#E0F7FF; color:#0077AA; }
.pb-vless  { background:#EDE0FF; color:var(--purple); }
.pb-trojan { background:#FFE0E0; color:var(--red); }
.pb-ss     { background:#FFE0F5; color:var(--pink); }
.pb-other  { background:#F3F4F6; color:#6B7280; }

.tx-date {
  font-size:10px; font-weight:700; color:#B0A0C0;
  display:flex; align-items:center; gap:3px; justify-content:flex-end;
}
.tx-date svg { width: 10px; height: 10px; fill: currentColor; }

/* ── EMPTY / LOADING ── */
.empty-state, .loading-state {
  text-align:center; padding:44px 20px;
  display:flex; flex-direction:column; align-items:center; gap:12px;
}
.empty-icon svg { width: 52px; height: 52px; fill: currentColor; color:#C4B0D8; }
.loading-icon svg { width: 36px; height: 36px; fill: none; stroke: var(--purple); stroke-width: 2.5; stroke-linecap: round; animation:spin 1s linear infinite; }
.empty-title {
  font-family:'Fredoka One',cursive;
  font-size:18px; color:var(--text-dark);
}
.empty-sub { font-size:13px; color:var(--text-mid); font-weight:600; }

/* ── PAGINATION ── */
.pagination {
  background:var(--white); border-radius:16px;
  border:1.5px solid var(--border);
  padding:12px 16px; margin-top:4px;
  display:flex; align-items:center; justify-content:space-between;
  box-shadow:0 2px 10px rgba(107,33,214,0.07);
}
.page-info { font-size:12px; font-weight:700; color:var(--text-mid); }
.page-btns { display:flex; gap:6px; align-items:center; }
.page-btn {
  width:34px; height:34px; border:none; border-radius:10px;
  background:#FBF8FF; color:var(--text-mid);
  font-family:'Nunito',sans-serif; font-weight:800; font-size:13px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:background 0.15s, color 0.15s;
  border:1.5px solid var(--border);
}
.page-btn:hover:not(:disabled) { border-color:var(--purple2); color:var(--purple); }
.page-btn:disabled { opacity:0.3; cursor:default; }
.page-btn.active {
  background:linear-gradient(135deg,var(--purple),var(--purple2));
  border-color:transparent; color:#fff;
  box-shadow:0 3px 10px rgba(107,33,214,0.28);
}
.page-btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
.page-dots { color:#B0A0C0; font-weight:700; padding:0 2px; }

/* ── BACK BTN ── */
.back-btn {
  width:100%; padding:14px; margin-top:14px;
  border:2px solid var(--border); border-radius:16px;
  background:var(--white); color:var(--text-mid);
  font-family:'Nunito',sans-serif; font-weight:800; font-size:14px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:6px;
  transition:border-color 0.15s, color 0.15s;
}
.back-btn:hover { border-color:var(--purple2); color:var(--purple); }
.back-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

</style>
</head>
<body>

<div class="blob1"></div>
<div class="blob2"></div>

<div class="header">
  <div class="header-inner">
    <a class="back-btn-hdr" href="admin.html">
      <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>

      <h1>
        <svg viewBox="0 0 24 24" style="fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>

<div class="container">

  <div class="toolbar">

  <div class="stats-row" id="statsBar"></div>

<script>

const token = localStorage.getItem('token');
const localUser = JSON.parse(localStorage.getItem('user'));

// Proteksi Halaman Admin Berlapis
if (!localUser || !token) {
  location.href = 'index.html';
} else if (localUser.role !== 'admin') {
  alert('Akses ditolak!');
  location.href = 'dashboard.html';
}

const PER_PAGE = 10;
let allData    = [];
let filtered   = [];
let currentPage = 1;
let activeProto = '';

// ── DEFINISI SVG TEMPLATE UNTUK JS RENDER ──
const svgListTemplate     = `<svg viewBox="0 0 24 24" style="fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>`;

const svgPackageTemplate  = `<svg viewBox="0 0 24 24" style="fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>`;
const svgClockTemplate    = `<svg viewBox="0 0 24 24" style="fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`;
const svgAlertTemplate    = `<svg viewBox="0 0 24 24" style="fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><line x1="1" y1="1" x2="23" y2="23"></line><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.5c0 0-4 7.5-11 7.5a10.42 10.42 0 0 1-3.64-.67"></path><path d="M6.62 6.62A10.71 10.71 0 0 0 1 12.5c0 0 4 7.5(11 7.5a11.12 11.12 0 0 0 5-.12"></path><path d="M22 12.5a11.16 11.16 0 0 0-2.3-3.06"></path><path d="M10.59 10.59a3 3 0 1 0 4.24 4.24"></path></svg>`;

const PROTO_CONFIG = {
  SSH:         { cls:'pi-ssh',    badge:'pb-ssh',    label:'SSH',          icon:`<svg viewBox="0 0 24 24" style="fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>` },
  VMESS:       { cls:'pi-vmess',  badge:'pb-vmess',  label:'VMESS',        icon:`<svg viewBox="0 0 24 24" style="fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>` },
  VLESS:       { cls:'pi-vless',  badge:'pb-vless',  label:'VLESS',        icon:`<svg viewBox="0 0 24 24" style="fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>` },
  TROJAN:      { cls:'pi-trojan', badge:'pb-trojan', label:'TROJAN',       icon:`<svg viewBox="0 0 24 24" style="fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>` },
  SHADOWSOCKS: { cls:'pi-ss',     badge:'pb-ss',     label:'SS',           icon:`<svg viewBox="0 0 24 24" style="fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>` },
};

function getProtoConf(p) {
  return PROTO_CONFIG[(p||'').toUpperCase()] || { cls:'pi-other', badge:'pb-other', label: p || '—', icon: `<svg viewBox="0 0 24 24" style="fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>` };
}

loadTransactions();

async function loadTransactions() {
  try {
    // FIX 1: Ditambahkan Header Bearer Token JWT agar diijinkan masuk oleh middleware backend
    const res  = await fetch('/api/admin/transactions?email=' + encodeURIComponent(localUser.email), {
      method: 'GET',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      }
    });
    
    const data = await res.json();
    if (!data.success) { document.getElementById('txList').innerHTML = errorState(data.message); return; }
    allData = data.transactions || [];
    applyFilter();
  } catch (err) {
    console.error(err);
    document.getElementById('txList').innerHTML = errorState('Server tidak dapat dihubungi');
  }
}

function setProtocolFilter(el) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeProto = el.dataset.val;
  applyFilter();
}

function applyFilter() {
  const kw = document.getElementById('searchInput').value.toLowerCase();
  filtered = allData.filter(tx => {
    const matchSearch =
      (tx.username    || '').toLowerCase().includes(kw) ||
      (tx.email       || '').toLowerCase().includes(kw) ||
      (tx.product_name|| '').toLowerCase().includes(kw);
    const matchProto = !activeProto ||
      (tx.product_type || '').toUpperCase() === activeProto;
    return matchSearch && matchProto;
  });
  currentPage = 1;
  renderStats();
  renderList();
  renderPagination();
}

function renderStats() {
  const counts = {};
  allData.forEach(tx => {
    const p = (tx.product_type || 'Unknown').toUpperCase();
    counts[p] = (counts[p] || 0) + 1;
  });
  
  // FIX 2: Mengubah tanda kutip dua ke backtick (`) agar interpolasi string jumlah data dinamis berjalan
  document.getElementById('subtitle').textContent = `${filtered.length} dari ${allData.length} transaksi`;
  document.getElementById('countBadge').textContent = allData.length + ' Total';

  let html = `
    <div class="stat-chip">
      ${svgListTemplate}
      Total <strong>${allData.length}</strong>
    </div>`;
  Object.entries(counts).forEach(([p, c]) => {
    const conf = getProtoConf(p);
    html += `
      <div class="stat-chip">
        ${conf.icon}
        ${conf.label} <strong>${c}</strong>
      </div>`;
  });
  document.getElementById('statsBar').innerHTML = html;
}

function renderList() {
  if (!filtered.length) {
    document.getElementById('txList').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${svgSearchTemplate}</div>
        <div class="empty-title">Tidak Ada Data</div>
        <div class="empty-sub">Coba ubah filter atau kata kunci</div>
      </div>`;
    return;
  }

  const start = (currentPage - 1) * PER_PAGE;
  const slice = filtered.slice(start, start + PER_PAGE);
  const proto = (p) => (p || '').toUpperCase();

  let html = '<div class="tx-list">';
  slice.forEach((tx, i) => {
    const p    = proto(tx.product_type);
    const conf = getProtoConf(p);
    const date = (tx.created_at || '').replace('T',' ').slice(0,16) || '—';

    html += `
    <div class="tx-card" data-proto="${p}" style="animation:fadeUp 0.35s ${i*0.04}s ease both;">
      <div class="tx-card-inner">
        <div class="tx-proto-icon ${conf.cls}">
          ${conf.icon}
        </div>
        <div class="tx-main">
          <div class="tx-user">${tx.username || '—'}</div>
          <div class="tx-email">${tx.email || '—'}</div>
          <div class="tx-product">
            ${svgPackageTemplate}
            ${tx.product_name || '—'}
          </div>
        </div>
        <div class="tx-right">
          <div class="proto-badge ${conf.badge}">
            ${conf.icon}
            ${conf.label}
          </div>
          <div class="tx-date">
            ${svgClockTemplate}
            ${date}
          </div>
        </div>
      </div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('txList').innerHTML = html;
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PER_PAGE);
  const pag   = document.getElementById('pagination');
  if (total <= 1) { pag.style.display = 'none'; return; }
  pag.style.display = 'flex';
  document.getElementById('pageInfo').textContent = `Hal ${currentPage} / ${total}`;

  let btns = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
  </button>`;

  // FIX 3: Perbaikan bendera dots generator agar titik tiga (...) tidak meluber di pagination
  let lastDotted = false;
  for (let i = 1; i <= total; i++) {
    if (i === 1 || i === total || (i >= currentPage - 1 && i <= currentPage + 1)) {
      btns += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
      lastDotted = false;
    } else {
      if (!lastDotted) {
        btns += `<span class="page-dots">…</span>`;
        lastDotted = true;
      }
    }
  }

  btns += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>
    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
  </button>`;
  document.getElementById('pageBtns').innerHTML = btns;
}

function goPage(p) {
  const total = Math.ceil(filtered.length / PER_PAGE);
  if (p < 1 || p > total) return;
  currentPage = p;
  renderList();
  renderPagination();
  window.scrollTo({ top:0, behavior:'smooth' });
}

function errorState(msg) {
  return `<div class="empty-state">
    <div class="empty-icon">${svgAlertTemplate}</div>
    <div class="empty-title">Gagal Memuat</div>
    <div class="empty-sub">${msg}</div>
  </div>`;
}

</script>
</body>
</html>
