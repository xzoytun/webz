<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Xtrimer — Riwayat Transaksi</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ── TOKENS SYNCHRONIZED WITH DASHBOARD.HTML (PREMIUM LIGHT & DARK MODE) ── */
    :root {
      --purple:       #7B2FBE;
      --purple-dark:  #5A1A9A;
      --purple-deep:  #3D0F72;
      --purple-light: #9B4FDE;
      
      --purple-soft:  #E2E8F0; 
      --purple-mid:   #CBD5E1;
      --accent:       #FF6B2B;
      --accent-light: #FFF3E0;
      --accent2:      #FFD600;
      --green:        #12C28A;
      --green-bg:     #E2F7F1;
      --red:          #E84040;
      --red-bg:       #FEE2E2;
      --blue:         #1ABCFE;
      --blue-bg:      #EEF4FF;
      --pink:         #E8007A;
      --pink-bg:      #FFE6F2;
      
      --white:        #FFFFFF;
      --bg:           #F1F5F9; 
      --card:         #F8FAFC; 
      --gray-line:    #E2E8F0; 
      
      --text-dark:    #0F172A; 
      --text-mid:     #334155; 
      --text-light:   #64748B; 

      --shadow-sm:  0 4px 12px rgba(15, 23, 42, 0.03);
      --shadow-md:  0 6px 18px rgba(15, 23, 42, 0.05);
      --shadow-lg:  0 10px 25px rgba(15, 23, 42, 0.05);

      --r-card: 14px;
      --r-btn:  10px;
      
      --nav-bg:       #F8FAFC;
      --nav-shadow:   rgba(15, 23, 42, 0.08);
    }

    html[data-theme="dark"] {
      --purple-soft:  #202124;
      --purple-mid:   #2a2b2f;
      --green-bg:     #0c2a21;
      --red-bg:       #311111;
      --blue-bg:      #15233F;
      --pink-bg:      #321122;
      --accent-light: #3A2A14;
      --white:        #17181c;
      --bg:           #0a0b0d;
      --card:         #1c1d21;
      --gray-line:    #303135;
      --text-dark:    #E2E8F0; 
      --text-mid:     #94A3B8;  
      --text-light:   #64748B;
      --nav-bg:       #17181c;
      --nav-shadow:   rgba(0,0,0,0.4);
    }

    html { background: var(--bg); }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      min-height: 100vh;
      overflow-x: hidden;
      padding-bottom: 90px; 
      -webkit-tap-highlight-color: transparent;
      transition: background .25s ease, color .25s ease;
    }
    a { text-decoration:none; color:inherit; }
    button { font-family:inherit; cursor:pointer; border:none; background:none; }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── HEADER ── */
    .header {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple) 60%, var(--purple-light) 100%);
      padding: 24px 20px 52px;
      animation: fadeUp 0.4s ease both;
    }
    .header::before {
      content:''; position:absolute; top:-40px; right:-20px;
      width:140px; height:140px;
      border:28px solid rgba(255,255,255,0.05); border-radius:50%;
    }
    .hero-dots {
      position:absolute; inset:0;
      background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 200px 20px; pointer-events:none;
    }
    .header-inner {
      max-width: 440px; margin: 0 auto;
      display: flex; align-items:center; gap:12px;
      position: relative; z-index:2;
    }

    .back-btn-hdr {
      width:32px; height:32px; border-radius:50%;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.15);
      display: flex; align-items:center; justify-content:center;
      transition: all .2s; backdrop-filter:blur(10px);
    }
    .back-btn-hdr:hover { background:rgba(255,255,255,.2); transform:translateY(-2px); }
    .back-btn-hdr svg { width:15px; height:15px; stroke:#fff; stroke-width:2.5; fill:none; }

    .header-title { flex:1; min-width:0; }
    .header-title h1 {
      font-size:16px; font-weight:900; color:#fff; letter-spacing:-.2px; line-height:1.2;
      display:flex; align-items:center; gap:6px;
    }
    .header-title h1 svg { width:16px; height:16px; flex-shrink:0; fill:none; stroke:#fff; stroke-width:2.2; }
    .header-title p { font-size:10.5px; font-weight:600; color: rgba(255,255,255,.75); letter-spacing: .3px; margin-top:2px; }

    .hdr-actions { display:flex; gap:8px; align-items:center; }
    .hdr-btn {
      width:32px; height:32px; border-radius:50%;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.15);
      display: flex; align-items:center; justify-content:center;
      transition: all .2s; backdrop-filter:blur(10px);
    }
    .hdr-btn:hover { background:rgba(255,255,255,.2); transform:translateY(-2px); }
    .hdr-btn svg { width:15px; height:15px; stroke:#fff; stroke-width:2.2; fill:none; }
    .hdr-btn.theme-toggle { position: relative; }
    
    .hdr-btn.theme-toggle .icon-sun,
    .hdr-btn.theme-toggle .icon-moon { position: absolute; align-items:center; justify-content:center; }
    html[data-theme="dark"] .hdr-btn.theme-toggle .icon-sun { display: none; }
    html[data-theme="dark"] .hdr-btn.theme-toggle .icon-moon { display: flex; }
    html:not([data-theme="dark"]) .hdr-btn.theme-toggle .icon-sun { display: flex; }
    html:not([data-theme="dark"]) .hdr-btn.theme-toggle .icon-moon { display: none; }

    .header-count {
      background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.15);
      border-radius:20px; padding:4px 10px;
      font-size:9px; font-weight:800; color:#fff;
      letter-spacing:0.5px; white-space:nowrap; backdrop-filter:blur(10px);
    }

    /* ── CONTAINER ── */
    .container { max-width:440px; margin:0 auto; padding:0 16px; }

    /* ── TOOLBAR ── */
    .toolbar {
      background: var(--white); border-radius: 16px; padding: 14px;
      border: 1px solid var(--gray-line);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      margin-top: -28px; margin-bottom: 16px;
      position: relative; z-index: 20;
      display: flex; flex-direction: column; gap: 10px;
      animation: fadeUp 0.4s 0.08s ease both;
      transition: background .25s ease, border-color .25s ease;
    }

    .search-row {
      display:flex; align-items:center; gap:10px;
      background: var(--bg); border-radius: 10px;
      border: 1px solid var(--gray-line); padding: 8px 12px;
      transition: all 0.2s ease;
    }
    .search-row svg { color:var(--text-light); flex-shrink:0; width:15px; height:15px; fill:none; stroke:currentColor; stroke-width:2.5; }
    .search-input {
      flex:1; border:none; outline:none;
      font-family:'Nunito',sans-serif; font-size:12px; font-weight:700;
      color:var(--text-dark); background:transparent;
    }
    .search-input::placeholder { color:var(--text-light); font-weight:600; }

    .filter-row { display:flex; gap:6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-chip {
      padding: 6px 12px; border-radius: 8px;
      font-family:'Nunito',sans-serif; font-size:10.5px; font-weight:800;
      cursor:pointer; border:1px solid var(--gray-line);
      background: var(--bg); color:var(--text-mid);
      transition:all 0.15s; white-space:nowrap;
      display:flex; align-items:center; gap:4px;
    }
    .filter-chip svg { width:12px; height:12px; fill:none; stroke:currentColor; stroke-width:2.2; }
    .filter-chip:hover { border-color:var(--purple); color:var(--purple); }
    .filter-chip.active { background:var(--purple); border-color:transparent; color:#fff; box-shadow: 0 4px 12px rgba(123, 47, 190, 0.15); }
    
    /* Active filter dynamic color matching */
    .filter-chip[data-val="SSH"].active         { background:var(--accent); box-shadow: 0 4px 12px rgba(255, 107, 43, 0.2); }
    .filter-chip[data-val="VMESS"].active       { background:var(--blue); box-shadow: 0 4px 12px rgba(26, 188, 254, 0.2); }
    .filter-chip[data-val="VLESS"].active       { background:var(--purple-dark); box-shadow: 0 4px 12px rgba(90, 26, 154, 0.2); }
    .filter-chip[data-val="TROJAN"].active      { background:var(--red); box-shadow: 0 4px 12px rgba(232, 64, 64, 0.2); }
    .filter-chip[data-val="SHADOWSOCKS"].active { background:var(--pink); box-shadow: 0 4px 12px rgba(232, 0, 122, 0.2); }

    /* ── STATS BAR ── */
    .stats-row { display:flex; gap:6px; overflow-x: auto; scrollbar-width: none; margin-bottom:12px; animation:fadeUp 0.4s 0.1s ease both; }
    .stats-row::-webkit-scrollbar { display: none; }
    .stat-chip {
      background: var(--card); border:1px solid var(--gray-line);
      border-radius:8px; padding: 5px 10px; white-space: nowrap;
      font-size:10.5px; font-weight:700; color:var(--text-mid);
      display:flex; align-items:center; gap:4px;
      box-shadow: var(--shadow-sm);
      transition: background .25s ease, border-color .25s ease;
    }
    .stat-chip svg { width:12px; height:12px; fill:none; stroke:currentColor; stroke-width:2.2; }
    .stat-chip strong { color:var(--purple); font-weight:800; margin-left:2px; }
    html[data-theme="dark"] .stat-chip strong { color:var(--purple-light); }

    /* ── TRANSACTION CARD ── */
    .tx-card {
      background: var(--card); border-radius: var(--r-card); margin-bottom:8px;
      border:1px solid var(--gray-line);
      box-shadow: var(--shadow-sm);
      overflow:hidden; transition: all 0.2s ease;
    }
    .tx-card:hover { transform:translateY(-1px); box-shadow: var(--shadow-md); }
    .tx-card-inner { padding: 12px 14px; display:flex; align-items:center; gap:12px; }

    .tx-card[data-proto="SSH"]         { border-left:4px solid var(--accent); }
    .tx-card[data-proto="VMESS"]       { border-left:4px solid var(--blue); }
    .tx-card[data-proto="VLESS"]       { border-left:4px solid var(--purple); }
    .tx-card[data-proto="TROJAN"]      { border-left:4px solid var(--red); }
    .tx-card[data-proto="SHADOWSOCKS"] { border-left:4px solid var(--pink); }
    .tx-card[data-proto=""]            { border-left:4px solid var(--text-light); }

    .tx-proto-icon {
      width:36px; height:36px; border-radius: 10px;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; font-size:15px; color:#fff;
    }
    .tx-proto-icon svg { width:16px; height:16px; fill:none; stroke:currentColor; stroke-width:2.2; }
    .pi-ssh    { background:linear-gradient(135deg,var(--accent),#FF8A50); }
    .pi-vmess  { background:linear-gradient(135deg,var(--blue),#0098DB); }
    .pi-vless  { background:linear-gradient(135deg,var(--purple),var(--purple-light)); }
    .pi-trojan { background:linear-gradient(135deg,var(--red),#FF7A7A); }
    .pi-ss     { background:linear-gradient(135deg,var(--pink),#FF5CA8); }
    .pi-other  { background:linear-gradient(135deg,#9CA3AF,#6B7280); }

    .tx-main { flex:1; min-width:0; }
    .tx-user { font-size:13.5px; font-weight:800; color:var(--text-dark); line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .tx-email { font-size:10.5px; color:var(--text-light); font-weight:600; margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .tx-product { font-size:11.5px; font-weight:700; color:var(--text-mid); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; gap:4px; }
    .tx-product svg { width:12px; height:12px; fill:none; stroke:currentColor; stroke-width:2; }

    .tx-right { text-align:right; flex-shrink:0; }
    .proto-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:6px; font-size:8.5px; font-weight:900; text-transform:uppercase; margin-bottom:4px; letter-spacing:0.5px; }
    .proto-badge svg { width:10px; height:10px; fill:none; stroke:currentColor; stroke-width:2.2; }
    
    .pb-ssh    { background:var(--accent-light); color:var(--accent); }
    .pb-vmess  { background:var(--blue-bg); color:#0077AA; }
    html[data-theme="dark"] .pb-vmess { color:#38BDF8; }
    .pb-vless  { background:var(--purple-soft); color:var(--purple); }
    html[data-theme="dark"] .pb-vless { color:var(--purple-light); }
    .pb-trojan { background:var(--red-bg); color:var(--red); }
    html[data-theme="dark"] .pb-trojan { color:#FF6B6B; }
    .pb-ss     { background:var(--pink-bg); color:var(--pink); }
    html[data-theme="dark"] .pb-ss { color:#F472B6; }
    .pb-other  { background:var(--purple-soft); color:var(--text-light); }

    .tx-date { font-size:9.5px; font-weight:700; color:var(--text-light); display:flex; align-items:center; gap:3px; justify-content:flex-end; }
    .tx-date svg { width:10px; height:10px; fill:none; stroke:currentColor; stroke-width:2; }

    /* ── STATES ── */
    .empty-state, .loading-state { text-align:center; padding:40px 20px; display:flex; flex-direction:column; align-items:center; gap:8px; }
    .empty-icon svg { width:40px; height:40px; fill:none; stroke:var(--text-light); stroke-width:2; }
    .loading-icon svg { width:24px; height:24px; fill:none; stroke:var(--purple); stroke-width:2.5; animation:spin 1s linear infinite; }
    html[data-theme="dark"] .loading-icon svg { stroke:var(--purple-light); }
    .empty-title { font-size:14px; font-weight:800; color:var(--text-dark); }
    .empty-sub { font-size:11.5px; color:var(--text-mid); font-weight:600; }

    /* ── PAGINATION ── */
    .pagination {
      background: var(--card); border-radius: 12px; border:1px solid var(--gray-line);
      padding:8px 12px; margin-top:8px; display:flex; align-items:center; justify-content:space-between;
      box-shadow: var(--shadow-sm);
      transition: background 0.25s, border-color 0.25s;
    }
    .page-info { font-size:11.5px; font-weight:700; color:var(--text-mid); }
    .page-btns { display:flex; gap:4px; align-items:center; }
    .page-btn {
      width:28px; height:28px; border:1px solid var(--gray-line); border-radius:6px;
      background: var(--bg); color:var(--text-mid);
      font-family:'Nunito',sans-serif; font-weight:800; font-size:11.5px;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all 0.15s;
    }
    .page-btn:hover:not(:disabled) { border-color:var(--purple); color:var(--purple); }
    .page-btn:disabled { opacity:0.3; cursor:default; }
    .page-btn.active { background:var(--purple); border-color:transparent; color:#fff; box-shadow: 0 3px 10px rgba(123,47,190,0.15); }
    .page-btn svg { width:12px; height:12px; fill:none; stroke:currentColor; stroke-width:2.5; }
    .page-dots { color:var(--text-light); font-weight:700; padding:0 2px; font-size:11.5px; }

    .back-btn {
      width:100%; padding:11px; margin-top:12px;
      border:1px solid var(--gray-line); border-radius: 12px;
      background: var(--card); color:var(--text-mid);
      font-family:'Nunito',sans-serif; font-weight:800; font-size:12.5px;
      cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
      transition:all 0.15s; box-shadow: var(--shadow-sm);
    }
    .back-btn:hover { border-color:var(--purple); color:var(--purple); transform: translateY(-1px); }
    .back-btn svg { width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:2.5; }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position:fixed; bottom:0; left:50%; transform:translateX(-50%);
      width:100%; max-width:440px; background:var(--nav-bg);
      border-top:1px solid var(--gray-line);
      box-shadow: var(--nav-shadow); z-index:999;
      transition:background 0.25s ease, border-color 0.25s ease;
    }
    .bottom-nav-inner { display:flex; align-items:center; justify-content:space-around; padding:10px 0 14px; }
    .nav-item {
      display:flex; flex-direction:column; align-items:center; gap:4px;
      text-decoration:none; color:var(--text-light); width:70px; transition:all 0.2s;
    }
    .nav-icon svg { width:18px; height:18px; fill:none; stroke:currentColor; stroke-width:2; transition:transform 0.2s; }
    .nav-label { font-size:9px; font-weight:800; }
    .nav-item:hover .nav-icon svg { transform:translateY(-2px); }
    .nav-item.active { color:var(--purple); }
    html[data-theme="dark"] .nav-item.active { color:var(--purple-light); }
    .nav-item.active .nav-icon svg { stroke:var(--purple); }
    html[data-theme="dark"] .nav-item.active .nav-icon svg { stroke:var(--purple-light); }
  </style>
</head>
<body>

<div class="header">
  <div class="hero-dots"></div>
  <div class="header-inner">
    <a class="back-btn-hdr" href="admin.html" aria-label="Kembali">
      <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </a>
    <div class="header-title">
      <h1>
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Riwayat Transaksi
      </h1>
      <p id="subtitle">Memuat data...</p>
    </div>
    <div class="hdr-actions">
      <button class="hdr-btn theme-toggle" id="themeToggle" aria-label="Ganti tema">
        <span class="icon-sun">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
          </svg>
        </span>
        <span class="icon-moon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
        </span>
      </button>
      <div class="header-count" id="countBadge">—</div>
    </div>
  </div>
</div>

<div class="container">
  <div class="toolbar">
    <div class="search-row">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Cari username / email / produk..." oninput="applyFilter()">
    </div>
    <div class="filter-row" id="filterRow">
      <div class="filter-chip active" data-val="" onclick="setProtocolFilter(this)">
        <svg viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        Semua
      </div>
      <div class="filter-chip" data-val="SSH" onclick="setProtocolFilter(this)">
        <svg viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        SSH
      </div>
      <div class="filter-chip" data-val="VMESS" onclick="setProtocolFilter(this)">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        VMESS
      </div>
      <div class="filter-chip" data-val="VLESS" onclick="setProtocolFilter(this)">
        <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        VLESS
      </div>
      <div class="filter-chip" data-val="TROJAN" onclick="setProtocolFilter(this)">
        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        TROJAN
      </div>
      <div class="filter-chip" data-val="SHADOWSOCKS" onclick="setProtocolFilter(this)">
        <svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        SS
      </div>
    </div>
  </div>

  <div class="stats-row" id="statsBar"></div>

  <div id="txList">
    <div class="loading-state">
      <div class="loading-icon">
        <svg viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>
      </div>
      <div class="empty-title">Memuat transaksi...</div>
    </div>
  </div>

  <div class="pagination" id="pagination" style="display:none;">
    <div class="page-info" id="pageInfo"></div>
    <div class="page-btns" id="pageBtns"></div>
  </div>

  <button class="back-btn" onclick="location.href='admin.html'">
    <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Kembali ke Admin Panel
  </button>
</div>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a class="nav-item" href="admin.html">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg></div>
      <div class="nav-label">Home</div>
    </a>
    <a class="nav-item active" href="transactions.html">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" stroke-width="1.5"/><polyline points="7,17 10,13 13,15 17,9"/></svg></div>
      <div class="nav-label">Riwayat</div>
    </a>
    <a class="nav-item" href="profile.html">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>
      <div class="nav-label">Profile</div>
    </a>
  </div>
</nav>

<script>
  /* ── THEME INITIALIZATION & TRIGGER (MATCHED WITH DASHBOARD) ── */
  (function initTheme(){
    const saved = localStorage.getItem('theme');
    if (saved === 'dark' || saved === 'light') {
      document.documentElement.setAttribute('data-theme', saved);
    } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.setAttribute('data-theme', 'dark');
    } else {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  })();

  document.getElementById('themeToggle').addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  });

  const token = localStorage.getItem('token');
  const localUser = JSON.parse(localStorage.getItem('user'));

  if (!localUser || !token || localUser.role !== 'admin') {
    window.location.replace('dashboard.html');
  }

  const PER_PAGE = 10;
  let allData    = [];
  let filtered   = [];
  let currentPage = 1;
  let activeProto = '';

  const svgListTemplate    = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`;
  const svgSearchTemplate  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`;
  const svgPackageTemplate = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`;
  const svgClockTemplate   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
  const svgAlertTemplate   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.5c0 0-4 7.5-11 7.5a10.42 10.42 0 0 1-3.64-.67"/><path d="M6.62 6.62A10.71 10.71 0 0 0 1 12.5c0 0 4 7.5 11 7.5a11.12 11.12 0 0 0 5-.12"/><path d="M22 12.5a11.16 11.16 0 0 0-2.3-3.06"/><path d="M10.59 10.59a3 3 0 1 0 4.24 4.24"/></svg>`;

  const PROTO_CONFIG = {
    SSH: { 
      cls: 'pi-ssh', badge: 'pb-ssh', label: 'SSH',
      icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>` 
    },
    VMESS: { 
      cls: 'pi-vmess', badge: 'pb-vmess', label: 'VMESS',
      icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>` 
    },
    VLESS: { 
      cls: 'pi-vless', badge: 'pb-vless', label: 'VLESS',
      icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>` 
    },
    TROJAN: { 
      cls: 'pi-trojan', badge: 'pb-trojan', label: 'TROJAN',
      icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>` 
    },
    SHADOWSOCKS: { 
      cls: 'pi-ss', badge: 'pb-ss', label: 'SS',
      icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>` 
    },
  };

  function getProtoConf(p) {
    return PROTO_CONFIG[(p || '').toUpperCase()] || {
      cls: 'pi-other', badge: 'pb-other', label: p || '—',
      icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`
    };
  }

  document.addEventListener("DOMContentLoaded", () => { loadTransactions(); });

  async function loadTransactions() {
    try {
      const res = await fetch('/api/admin/transactions?email=' + encodeURIComponent(localUser.email), {
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
      });
      const data = await res.json();
      if (!data.success) { 
        document.getElementById('txList').innerHTML = errorState(data.message); 
        return; 
      }
      allData = data.transactions || [];
      applyFilter();
    } catch (err) {
      console.error(err);
      document.getElementById('txList').innerHTML = errorState('Server tidak dapat dihubungi');
    }
  }

  function setProtocolFilter(el) {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    activeProto = el.dataset.val;
    applyFilter();
  }

  function applyFilter() {
    const kw = document.getElementById('searchInput').value.toLowerCase();
    filtered = allData.filter(tx => {
      const matchSearch =
        (tx.username     || '').toLowerCase().includes(kw) ||
        (tx.email        || '').toLowerCase().includes(kw) ||
        (tx.product_name || '').toLowerCase().includes(kw);
      const matchProto = !activeProto || (tx.product_type || '').toUpperCase() === activeProto;
      return matchSearch && matchProto;
    });
    currentPage = 1;
    renderStats();
    renderList();
    renderPagination();
  }

  function renderStats() {
    const counts = {};
    allData.forEach(tx => {
      const p = (tx.product_type || 'Unknown').toUpperCase();
      counts[p] = (counts[p] || 0) + 1;
    });
    document.getElementById('subtitle').textContent = `${filtered.length} dari ${allData.length} transaksi`;
    document.getElementById('countBadge').textContent = allData.length + ' Total';

    let html = `<div class="stat-chip">${svgListTemplate} Total <strong>${allData.length}</strong></div>`;
    Object.entries(counts).forEach(([p, c]) => {
      const conf = getProtoConf(p);
      html += `<div class="stat-chip">${conf.icon} ${conf.label} <strong>${c}</strong></div>`;
    });
    document.getElementById('statsBar').innerHTML = html;
  }

  function renderList() {
    if (!filtered.length) {
      document.getElementById('txList').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">${svgSearchTemplate}</div>
          <div class="empty-title">Tidak Ada Data</div>
          <div class="empty-sub">Coba ubah filter atau kata kunci</div>
        </div>`;
      return;
    }
    const start = (currentPage - 1) * PER_PAGE;
    const slice = filtered.slice(start, start + PER_PAGE);
    let html = '<div class="tx-list">';
    
    slice.forEach((tx, i) => {
      const p    = (tx.product_type || '').toUpperCase();
      const conf = getProtoConf(p);
      let date = '—';
      
      if (tx.created_at) {
        let d = new Date(tx.created_at);
        if (typeof tx.created_at === 'string' && !tx.created_at.includes('Z') && !tx.created_at.includes('+')) {
          d = new Date(tx.created_at.replace(' ', 'T') + 'Z');
        }
        if (isNaN(d.getTime())) d = new Date(tx.created_at);
        date = d.toLocaleString('id-ID', {
          timeZone: 'Asia/Jakarta', day: '2-digit', month: '2-digit', year: 'numeric',
          hour: '2-digit', minute: '2-digit', hour12: false
        });
      }
      
      html += `
      <div class="tx-card" data-proto="${p}" style="animation:fadeUp 0.35s ${i*0.04}s ease both;">
        <div class="tx-card-inner">
          <div class="tx-proto-icon ${conf.cls}">${conf.icon}</div>
          <div class="tx-main">
            <div class="tx-user">${tx.username || '—'}</div>
            <div class="tx-email">${tx.email || '—'}</div>
            <div class="tx-product">${svgPackageTemplate} ${tx.product_name || '—'}</div>
          </div>
          <div class="tx-right">
            <div class="proto-badge ${conf.badge}">${conf.icon} ${conf.label}</div>
            <div class="tx-date">${svgClockTemplate} ${date}</div>
          </div>
        </div>
      </div>`;
    });
    html += '</div>';
    document.getElementById('txList').innerHTML = html;
  }

  function renderPagination() {
    const total = Math.ceil(filtered.length / PER_PAGE);
    const pag   = document.getElementById('pagination');
    if (total <= 1) { pag.style.display = 'none'; return; }
    pag.style.display = 'flex';
    document.getElementById('pageInfo').textContent = `Hal ${currentPage} / ${total}`;
    
    let btns = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>`;
    
    let lastDotted = false;
    for (let i = 1; i <= total; i++) {
      if (i===1 || i===total || (i>=currentPage-1 && i<=currentPage+1)) {
        btns += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
        lastDotted = false;
      } else if (!lastDotted) {
        btns += `<span class="page-dots">…</span>`;
        lastDotted = true;
      }
    }
    
    btns += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>`;
    document.getElementById('pageBtns').innerHTML = btns;
  }

  function goPage(p) {
    const total = Math.ceil(filtered.length / PER_PAGE);
    if (p < 1 || p > total) return;
    currentPage = p;
    renderList();
    renderPagination();
    window.scrollTo({ top:0, behavior:'smooth' });
  }

  function errorState(msg) {
    return `<div class="empty-state"><div class="empty-icon">${svgAlertTemplate}</div>
      <div class="empty-title">Gagal Memuat</div><div class="empty-sub">${msg}</div></div>`;
  }
</script>
</body>
</html>
