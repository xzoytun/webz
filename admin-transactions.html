<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riwayat Transaksi</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #0b132b;
    color: white;
    padding: 20px;
}

h2 {
    color: #facc15;
    margin-bottom: 8px;
}

.subtitle {
    color: #9ca3af;
    font-size: 13px;
    margin-bottom: 16px;
}

/* ── Search & Filter ── */
.toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
}

.search-box {
    flex: 1;
    min-width: 160px;
    padding: 10px 14px;
    border: none;
    border-radius: 10px;
    background: #1f2937;
    color: white;
    font-size: 14px;
    outline: none;
}

.search-box::placeholder { color: #6b7280; }

.filter-select {
    padding: 10px 14px;
    border: none;
    border-radius: 10px;
    background: #1f2937;
    color: white;
    font-size: 14px;
    outline: none;
    cursor: pointer;
}

/* ── Stats bar ── */
.stats-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
}

.stat-chip {
    background: #1f2937;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: #9ca3af;
}

.stat-chip span {
    color: #facc15;
    font-weight: bold;
}

/* ── Table layout ── */
.table-wrap {
    background: #1f2937;
    border-radius: 15px;
    overflow: hidden;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

thead {
    background: #111827;
}

thead th {
    padding: 12px 16px;
    text-align: left;
    color: #facc15;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
}

tbody tr {
    border-bottom: 1px solid #374151;
    transition: background 0.15s;
}

tbody tr:last-child { border-bottom: none; }

tbody tr:hover { background: #263044; }

tbody td {
    padding: 12px 16px;
    vertical-align: middle;
    color: #d1d5db;
}

.td-user strong {
    display: block;
    color: white;
    font-size: 14px;
}

.td-user small {
    color: #6b7280;
    font-size: 11px;
}

.badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: bold;
    white-space: nowrap;
}

.ssh        { background: #78350f; color: #fde68a; }
.vmess      { background: #065f46; color: #6ee7b7; }
.vless      { background: #1e3a5f; color: #93c5fd; }
.trojan     { background: #7f1d1d; color: #fca5a5; }
.ss         { background: #4c1d95; color: #c4b5fd; }

.td-date {
    color: #9ca3af;
    font-size: 12px;
    white-space: nowrap;
}

/* ── Empty state ── */
.empty {
    text-align: center;
    padding: 40px 20px;
    color: #6b7280;
}

/* ── Pagination ── */
.pagination {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: #111827;
    font-size: 12px;
    color: #9ca3af;
    border-top: 1px solid #374151;
}

.page-btns {
    display: flex;
    gap: 6px;
}

.page-btn {
    padding: 5px 12px;
    border: none;
    border-radius: 8px;
    background: #1f2937;
    color: white;
    cursor: pointer;
    font-size: 12px;
}

.page-btn:disabled {
    opacity: 0.3;
    cursor: default;
}

.page-btn.active {
    background: #facc15;
    color: #0b132b;
    font-weight: bold;
}

/* ── Back button ── */
.back-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #374151;
    color: white;
    font-weight: bold;
    cursor: pointer;
    margin-top: 16px;
}

</style>
</head>
<body>

<h2>📜 Riwayat Transaksi</h2>
<div class="subtitle" id="subtitle">Memuat data...</div>

<div class="toolbar">
    <input
        class="search-box"
        id="searchInput"
        placeholder="🔍 Cari username / email..."
        oninput="applyFilter()">
    <select class="filter-select" id="filterProtocol" onchange="applyFilter()">
        <option value="">Semua Protocol</option>
        <option value="SSH">SSH</option>
        <option value="VMESS">VMESS</option>
        <option value="VLESS">VLESS</option>
        <option value="TROJAN">TROJAN</option>
        <option value="SHADOWSOCKS">Shadowsocks</option>
    </select>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>User</th>
                <th>Produk</th>
                <th>Protocol</th>
                <th>Tanggal</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="4" class="empty">Memuat...</td></tr>
        </tbody>
    </table>
    <div class="pagination" id="pagination" style="display:none">
        <span id="pageInfo"></span>
        <div class="page-btns" id="pageBtns"></div>
    </div>
</div>

<button class="back-btn" onclick="location.href='admin.html'">🏠 Kembali</button>

<script>

const localUser = JSON.parse(localStorage.getItem('user'));
if (!localUser) location.href = 'index.html';

const PER_PAGE = 10;
let allData = [];
let filtered = [];
let currentPage = 1;

loadTransactions();

async function loadTransactions() {
    try {
        const res = await fetch('/api/admin/transactions?email=' + encodeURIComponent(localUser.email));
        const data = await res.json();

        if (!data.success) {
            alert(data.message);
            return;
        }

        allData = data.transactions;
        applyFilter();

    } catch (err) {
        console.error(err);
        document.getElementById('tableBody').innerHTML =
            '<tr><td colspan="4" class="empty">❌ Gagal load transaksi</td></tr>';
    }
}

function applyFilter() {
    const keyword = document.getElementById('searchInput').value.toLowerCase();
    const protocol = document.getElementById('filterProtocol').value.toLowerCase();

    filtered = allData.filter(tx => {
        const matchSearch =
            (tx.username || '').toLowerCase().includes(keyword) ||
            (tx.email || '').toLowerCase().includes(keyword) ||
            (tx.product_name || '').toLowerCase().includes(keyword);

        const matchProtocol = !protocol ||
            (tx.product_type || '').toLowerCase() === protocol;

        return matchSearch && matchProtocol;
    });

    currentPage = 1;
    renderStats();
    renderTable();
    renderPagination();
}

function renderStats() {
    const counts = {};
    allData.forEach(tx => {
        const p = tx.product_type || 'Unknown';
        counts[p] = (counts[p] || 0) + 1;
    });

    let html = `<div class="stat-chip">Total <span>${allData.length}</span></div>`;
    Object.entries(counts).forEach(([p, c]) => {
        html += `<div class="stat-chip">${p} <span>${c}</span></div>`;
    });

    document.getElementById('statsBar').innerHTML = html;
    document.getElementById('subtitle').textContent =
        `Menampilkan ${filtered.length} dari ${allData.length} transaksi`;
}

function renderTable() {
    if (filtered.length === 0) {
        document.getElementById('tableBody').innerHTML =
            '<tr><td colspan="4" class="empty">Tidak ada data ditemukan</td></tr>';
        return;
    }

    const start = (currentPage - 1) * PER_PAGE;
    const slice = filtered.slice(start, start + PER_PAGE);

    let html = '';
    slice.forEach(tx => {
        let badgeClass = (tx.product_type || '').toLowerCase();
        if (badgeClass === 'shadowsocks') badgeClass = 'ss';

        const date = tx.created_at
            ? tx.created_at.replace('T', ' ').slice(0, 16)
            : '-';

        html += `
        <tr>
            <td class="td-user">
                <strong>${tx.username || '-'}</strong>
                <small>${tx.email || '-'}</small>
            </td>
            <td>${tx.product_name || '-'}</td>
            <td>
                <span class="badge ${badgeClass}">
                    ${tx.product_type || '-'}
                </span>
            </td>
            <td class="td-date">${date}</td>
        </tr>`;
    });

    document.getElementById('tableBody').innerHTML = html;
}

function renderPagination() {
    const totalPages = Math.ceil(filtered.length / PER_PAGE);
    const pag = document.getElementById('pagination');

    if (totalPages <= 1) {
        pag.style.display = 'none';
        return;
    }

    pag.style.display = 'flex';
    document.getElementById('pageInfo').textContent =
        `Hal ${currentPage} / ${totalPages}`;

    let btns = '';
    btns += `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹</button>`;

    for (let i = 1; i <= totalPages; i++) {
        if (
            i === 1 || i === totalPages ||
            (i >= currentPage - 1 && i <= currentPage + 1)
        ) {
            btns += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
        } else if (i === currentPage - 2 || i === currentPage + 2) {
            btns += `<span style="color:#6b7280;padding:0 4px">…</span>`;
        }
    }

    btns += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>›</button>`;
    document.getElementById('pageBtns').innerHTML = btns;
}

function goPage(page) {
    const totalPages = Math.ceil(filtered.length / PER_PAGE);
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderTable();
    renderPagination();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

</script>
</body>
</html>
