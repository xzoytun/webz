<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Profile - Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── TOKENS UPGRADED & SYNCHRONIZED WITH DASHBOARD ── */
:root {
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #210943;
  --purple-light: #9B4FDE;
  --purple-soft:  #F5EEFE;
  --purple-mid:   #EAD5FA;
  --accent:       #FF6B2B;
  --accent2:      #FFD600;
  --green:        #10B981;
  --green-bg:     #E6F4EA;
  --red:          #EF4444;
  --red-bg:       #FCE8E6;
  --white:        #FFFFFF;
  --bg:           #F9FAFB;
  --card:         #FFFFFF;
  --gray-line:    #F3F4F6;
  --text-dark:    #111827;
  --text-mid:     #4B5563;
  --text-light:   #9CA3AF;

  --shadow-sm:  0 2px 8px rgba(123,47,190,0.04);
  --shadow-md:  0 8px 24px rgba(123,47,190,0.06);
  --shadow-lg:  0 16px 32px rgba(123,47,190,0.08);
  --glass:      rgba(255, 255, 255, 0.8);
  --glass-border: rgba(255, 255, 255, 0.5);

  --r-card: 20px;
  --r-btn:  14px;
}

html[data-theme="dark"] {
  --purple-soft:  #1F152E;
  --purple-mid:   #372254;
  --green-bg:     #062F24;
  --red-bg:       #3B1414;
  --white:        #18191E;
  --bg:           #0E0F12;
  --card:         #18191E;
  --gray-line:    #262833;
  --text-dark:    #F9FAFB;
  --text-mid:     #9CA3AF;
  --text-light:   #6B7280;
  --glass:        rgba(24, 25, 30, 0.8);
  --glass-border: rgba(255, 255, 255, 0.05);
}

html { background: var(--bg); transition: background .3s ease; }

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  overflow-x: hidden;
  padding-bottom: 110px;
  -webkit-tap-highlight-color: transparent;
  transition: background .3s ease, color .3s ease;
}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes pulse {
  0%,100% { transform:scale(1); opacity: 1; }
  50%      { transform:scale(1.2); opacity: 0.7; }
}

/* ─── HERO PROFILE ─── */
.hero {
  background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple) 50%, var(--purple-light) 100%);
  padding: 40px 24px 80px;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
}
.hero::before {
  content:''; position:absolute; top:-50px; right:-30px;
  width:200px; height:200px;
  background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
  border-radius:50%;
}
.hero-dots {
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.08) 1.2px, transparent 1.2px);
  background-size: 24px 24px; pointer-events:none;
  opacity: 0.7;
}

/* ─── HEADER ROW ─── */
.hero-topbar {
  position: relative; z-index: 2;
  display: flex; align-items:center; justify-content:flex-end;
  max-width: 440px; margin: 0 auto 12px;
}
.hdr-actions { display:flex; gap:10px; align-items:center; }
.hdr-btn {
  width:38px; height:38px; border-radius:50%;
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.15);
  display: flex; align-items:center; justify-content:center;
  transition: all .25s cubic-bezier(0.4, 0, 0.2, 1); backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px); cursor: pointer;
}
.hdr-btn:hover { background:rgba(255,255,255,.2); transform:translateY(-2px); }
.hdr-btn:active { transform:scale(0.95); }
.hdr-btn svg { width:18px; height:18px; stroke:#fff; stroke-width:2.2; fill:none; }

.hdr-btn.theme-toggle { position: relative; }
.hdr-btn.theme-toggle .icon-sun,
.hdr-btn.theme-toggle .icon-moon { position: absolute; display: flex; align-items:center; justify-content:center; }

html[data-theme="dark"] .hdr-btn.theme-toggle .icon-sun { display: none; }
html[data-theme="dark"] .hdr-btn.theme-toggle .icon-moon { display: flex; }
html:not([data-theme="dark"]) .hdr-btn.theme-toggle .icon-sun { display: flex; }
html:not([data-theme="dark"]) .hdr-btn.theme-toggle .icon-moon { display: none; }

.hero-profile {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}

.avatar-wrap { position: relative; }
.avatar {
  width: 84px; height: 84px; border-radius: 50%;
  border: 2.5px solid rgba(255,255,255,0.6);
  object-fit: cover; background: rgba(255,255,255,0.1);
  display: block; box-shadow: 0 4px 14px rgba(0,0,0,0.15);
}
.online-dot {
  position: absolute; bottom: 4px; right: 4px;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--green); border: 2.5px solid var(--purple-deep);
  animation: pulse 2s infinite; z-index: 3;
}
.edit-avatar-btn {
  position: absolute; bottom: -2px; right: -2px;
  width: 26px; height: 26px; border-radius: 50%;
  background: #fff; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15); cursor: pointer; border: none;
  transition: all .2s cubic-bezier(0.4, 0, 0.2, 1);
}
.edit-avatar-btn:hover { transform: scale(1.05); }
.edit-avatar-btn:active { transform: scale(0.9); }
.edit-avatar-btn svg { width: 13px; height: 13px; fill: none; stroke: var(--purple); stroke-width: 2.5; }

html[data-theme="dark"] .edit-avatar-btn { background: var(--card); }
html[data-theme="dark"] .edit-avatar-btn svg { stroke: var(--text-dark); }

.profile-name { font-size: 21px; font-weight: 900; color: #fff; letter-spacing: -0.3px; text-align: center; }
.profile-email { font-size: 13px; color: rgba(255,255,255,0.7); text-align: center; font-weight: 600; }

/* ─── CONTENT WRAPPER ─── */
.content-wrap { max-width: 440px; margin: -55px auto 0; padding: 0 16px; position: relative; z-index: 10; }

/* ─── STAT CHIPS FINTECH ─── */
.stat-row { display: flex; gap: 12px; margin-bottom: 16px; animation: fadeUp 0.5s 0.08s ease both; }
.stat-chip {
  flex: 1; border-radius: 16px; padding: 14px; display: flex; align-items: center; gap: 12px;
  background: var(--card); border: 1px solid var(--gray-line);
  box-shadow: var(--shadow-sm); transition: background .3s, border-color .3s;
}
.chip-icon { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.balance-chip .chip-icon { background: var(--purple-soft); }
.status-chip .chip-icon { background: var(--green-bg); }

.chip-icon svg { width: 18px; height: 18px; fill: none; stroke-width: 2.4; }
.balance-chip .chip-icon svg { stroke: var(--purple); }
.status-chip .chip-icon svg { stroke: var(--green); }

.chip-text-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-light); margin-bottom: 2px; }
.chip-text-val { font-size: 15px; font-weight: 800; color: var(--text-dark); }

/* ─── PREMIUM CARD ─── */
.card {
  background: var(--card); border-radius: var(--r-card); padding: 20px; margin-bottom: 16px;
  box-shadow: var(--shadow-sm); border: 1px solid var(--gray-line);
  animation: fadeUp 0.5s 0.12s ease both; transition: background .3s, border-color .3s;
}
.card-title {
  font-size: 14px; font-weight: 900; color: var(--text-dark); margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px; letter-spacing: -0.2px;
}
.card-title svg { width: 18px; height: 18px; fill: none; stroke: var(--purple); stroke-width: 2.2; flex-shrink: 0; }
html[data-theme="dark"] .card-title svg { stroke: var(--text-dark); }

.card-title-pill, .sec-title-pill { font-size: 10px; font-weight: 800; background: var(--purple-soft); color: var(--purple); border-radius: 8px; padding: 2px 8px; }
html[data-theme="dark"] .card-title-pill, html[data-theme="dark"] .sec-title-pill { color: var(--text-mid); }

/* ─── INFO LAYOUT SEAMLESS ─── */
.info-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--gray-line); transition: border-color .3s; }
.info-item:last-child { border-bottom: none; padding-bottom: 0; }
.info-item:first-child { padding-top: 0; }

.info-label { font-size: 12px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.6px; }
.info-value { font-size: 14px; font-weight: 800; color: var(--text-dark); text-align: right; }

/* ─── MICRO ROLE BADGE ─── */
.role-badge {
  display: inline-block; padding: 2px 10px; border-radius: 8px;
  font-size: 11px; font-weight: 800; background: var(--purple-soft); color: var(--purple);
  text-transform: uppercase; border: 1px solid rgba(123,47,190,0.1);
  transition: background .3s, border-color .3s;
}
.role-badge.admin { background: var(--red-bg); color: var(--red); border-color: rgba(239,68,68,0.1); }
html[data-theme="dark"] .role-badge { color: var(--text-mid); }
html[data-theme="dark"] .role-badge.admin { background: var(--red-bg); color: var(--red); border-color: rgba(239,68,68,0.15); }

/* ─── SETTINGS ACTIONS ─── */
.logout-btn {
  width: 100%; padding: 14px; border: 1.5px solid var(--gray-line); border-radius: var(--r-btn);
  background: var(--card); color: var(--text-mid); font-family: 'Nunito', sans-serif;
  font-weight: 800; font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  animation: fadeUp 0.5s 0.16s ease both;
}
.logout-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); box-shadow: 0 4px 14px rgba(239,68,68,0.08); }
.logout-btn:active { transform: scale(0.98); }
.logout-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.2; }

/* ─── BOTTOM NAV ─── */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; background: var(--glass);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top:1px solid var(--glass-border); display:flex; padding:12px 0 calc(12px + env(safe-area-inset-bottom, 0px));
  box-shadow: 0 -8px 32px rgba(0,0,0,0.05); z-index:100; max-width:440px; margin:0 auto;
  border-radius: 24px 24px 0 0; transition: background .3s, border-color .3s;
}
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; text-decoration:none; position: relative; }
.nav-icon svg { width:22px; height:22px; fill:none; stroke: var(--text-light); stroke-width:2.2; transition: all 0.25s ease; }
.nav-label { font-size:11px; font-weight:700; color:var(--text-light); transition: color 0.25s ease; }

.nav-item.active .nav-label { color:var(--purple); font-weight: 800; }
.nav-item.active .nav-icon svg { stroke: var(--purple); transform: translateY(-2px); }
.nav-item::after {
  content: ''; position: absolute; bottom: -6px; width: 4px; height: 4px; 
  border-radius: 50%; background: transparent; transition: background 0.25s;
}
.nav-item.active::after { background: var(--purple); }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-dots"></div>
  <div class="hero-topbar">
    <div class="hdr-actions">
      <button class="hdr-btn theme-toggle" id="themeToggle" aria-label="Ganti tema">
        <span class="icon-sun">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
          </svg>
        </span>
        <span class="icon-moon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
        </span>
      </button>
    </div>
  </div>
  <div class="hero-profile">
    <div class="avatar-wrap">
      <img class="avatar" id="avatar" src="https://via.placeholder.com/84">
      <div class="online-dot"></div>
      <button class="edit-avatar-btn">
        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
    </div>
    <div class="profile-name" id="username">—</div>
    <div class="profile-email" id="email">—</div>
  </div>
</div>

<div class="content-wrap">

  <div class="stat-row">
    <div class="stat-chip balance-chip">
      <div class="chip-icon">
        <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      </div>
      <div>
        <div class="chip-text-label">Saldo</div>
        <div class="chip-text-val" id="balance">Rp 0</div>
      </div>
    </div>
    <div class="stat-chip status-chip">
      <div class="chip-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M8 12l2.5 2.5L16 9"/></svg>
      </div>
      <div>
        <div class="chip-text-label">Status</div>
        <div class="chip-text-val">Aktif</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Informasi Akun
      <span class="card-title-pill">Detail</span>
    </div>

    <div class="info-item">
      <div class="info-label">Username</div>
      <div class="info-value" id="username2">—</div>
    </div>
    <div class="info-item">
      <div class="info-label">Email</div>
      <div class="info-value" id="email2">—</div>
    </div>
    <div class="info-item">
      <div class="info-label">Role</div>
      <div class="info-value">
        <span class="role-badge" id="role">User</span>
      </div>
    </div>
    <div class="info-item">
      <div class="info-label">Terdaftar Sejak</div>
      <div class="info-value" id="created_at">—</div>
    </div>
  </div>

  <div class="sec-title" style="font-size:14px; font-weight:900; color:var(--text-dark); margin: 8px 0 12px 4px; display:flex; align-items:center; gap:6px;">
    Aksi <span class="sec-title-pill">Akun</span>
  </div>

  <button class="logout-btn" onclick="logout()">
    <svg viewBox="0 0 24 24">
      <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    Keluar dari Akun
  </button>

</div>

<nav class="bottom-nav">
  <a class="nav-item" href="dashboard.html">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
    </div>
    <div class="nav-label">Home</div>
  </a>
  <a class="nav-item" href="transactions.html">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" stroke-width="1.5"/><polyline points="7,17 10,13 13,15 17,9"/></svg>
    </div>
    <div class="nav-label">Riwayat</div>
  </a>
  <a class="nav-item active" href="#">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    </div>
    <div class="nav-label">Profile</div>
  </a>
</nav>

<script>
/* ── THEME TOGGLE (auto + manual, synced with dashboard.html) ── */
(function initTheme(){
  const saved = localStorage.getItem('theme');
  if (saved === 'dark' || saved === 'light') {
    document.documentElement.setAttribute('data-theme', saved);
  } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  } else {
    document.documentElement.setAttribute('data-theme', 'light');
  }
})();

document.getElementById('themeToggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
});

const localUser = JSON.parse(localStorage.getItem('user'));
const token     = localStorage.getItem('token');

if (!localUser || !token) {
  localStorage.clear();
  window.location.href = 'index.html';
}

loadProfile();

async function loadProfile() {
  try {
    const response = await fetch('/api/profile', {
      method: 'GET',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      }
    });
    
    const result = await response.json();

    if (!result.success) {
      alert(result.message || 'Sesi telah berakhir, silakan login kembali.');
      localStorage.clear();
      window.location.href = 'index.html';
      return;
    }

    const user = result.user;

    document.getElementById('username').innerText  = user.username || '—';
    document.getElementById('username2').innerText = user.username || '—';
    document.getElementById('email').innerText     = user.email    || '—';
    document.getElementById('email2').innerText    = user.email    || '—';
    document.getElementById('balance').innerText   = 'Rp ' + Number(user.balance || 0).toLocaleString('id-ID');
    document.getElementById('avatar').src          = user.avatar   || 'https://via.placeholder.com/84';
    document.getElementById('created_at').innerText = user.created_at
      ? new Date(user.created_at).toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' })
      : '—';

    const roleBadge = document.getElementById('role');
    if (user.role === 'admin') {
      roleBadge.innerText = 'Admin';
      roleBadge.classList.add('admin');
    } else {
      roleBadge.innerText = 'User';
      roleBadge.classList.remove('admin');
    }

  } catch (err) {
    console.error('Gagal memuat profil:', err);
  }
}

function logout() {
  if (confirm('Yakin mau keluar?')) {
    localStorage.clear();
    window.location.href = 'index.html';
  }
}
</script>
</body>
</html>
