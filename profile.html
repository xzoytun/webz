<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #3D0F72;
  --purple-light: #9B4FDE;
  --purple-soft:  #F3EAFD;
  --purple-mid:   #EAD5FA;
  --accent:       #FF6B2B;
  --accent2:      #FFD600;
  --green:        #12C28A;
  --green-bg:     #E6FAF4;
  --red:          #E84040;
  --red-bg:       #FFECEC;
  --white:        #FFFFFF;
  --bg:           #F8F6FC;
  --card:         #FFFFFF;
  --gray-line:    #EEF0F6;
  --text-dark:    #1A0533;
  --text-mid:     #6B3FA0;
  --text-light:   #A882CC;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  overflow-x: hidden;
  padding-bottom: 100px;
}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes pulse {
  0%,100% { transform:scale(1); }
  50%      { transform:scale(1.1); }
}

/* ─── HERO PROFILE MODERN ─── */
.hero {
  background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple) 60%, var(--purple-light) 100%);
  padding: 32px 20px 64px;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.4s ease both;
}
.hero::before {
  content:''; position:absolute; top:-40px; right:-20px;
  width:160px; height:160px;
  border:32px solid rgba(255,255,255,0.05); border-radius:50%;
}
.hero-dots {
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 20px 20px; pointer-events:none;
}
.hero-profile {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}

.avatar-wrap { position: relative; }
.avatar {
  width: 76px; height: 76px; border-radius: 50%;
  border: 2.5px solid rgba(255,255,255,0.4);
  object-fit: cover; background: rgba(255,255,255,0.1);
  display: block;
}
.online-dot {
  position: absolute; bottom: 3px; right: 3px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--green); border: 2px solid var(--purple-deep);
  animation: pulse 2s infinite;
}
.edit-avatar-btn {
  position: absolute; bottom: -2px; right: -2px;
  width: 24px; height: 24px; border-radius: 50%;
  background: #fff; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15); cursor: pointer; border: none;
}
.edit-avatar-btn svg { width: 12px; height: 12px; fill: none; stroke: var(--purple); stroke-width: 2.5; }

.profile-name { font-size: 19px; font-weight: 900; color: #fff; letter-spacing: -0.2px; text-align: center; }
.profile-email { font-size: 12px; color: rgba(255,255,255,0.55); text-align: center; font-weight: 600; }

/* ─── CONTENT WRAPPER ─── */
.content-wrap { max-width: 440px; margin: -40px auto 0; padding: 0 16px; position: relative; z-index: 10; }

/* ─── STAT CHIPS FINTECH ─── */
.stat-row { display: flex; gap: 10px; margin-bottom: 16px; animation: fadeUp 0.4s 0.08s ease both; }
.stat-chip {
  flex: 1; border-radius: 14px; padding: 12px 14px; display: flex; align-items: center; gap: 10px;
  background: var(--white); border: 1px solid rgba(234, 213, 250, 0.6);
  box-shadow: 0 6px 18px rgba(90,26,154,0.04);
}
.chip-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.chip-icon svg { width: 20px; height: 20px; fill: none; stroke-width: 2.2; }
.balance-chip .chip-icon svg { stroke: var(--purple); }
.status-chip .chip-icon svg { stroke: var(--green); }

.chip-text-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-light); margin-bottom: 1px; }
.chip-text-val { font-size: 14px; font-weight: 900; color: var(--text-dark); }

/* ─── PREMIUM CARD ─── */
.card {
  background: var(--card); border-radius: 16px; padding: 16px 18px; margin-bottom: 16px;
  box-shadow: 0 4px 16px rgba(90,26,154,0.04); border: 1px solid var(--gray-line);
  animation: fadeUp 0.4s 0.12s ease both;
}
.card-title {
  font-size: 13px; font-weight: 900; color: var(--text-dark); margin-bottom: 14px;
  display: flex; align-items: center; gap: 6px; letter-spacing: -0.1px;
}
.card-title svg { width: 16px; height: 16px; fill: none; stroke: var(--purple); stroke-width: 2.2; flex-shrink: 0; }
.card-title-pill { font-size: 9px; font-weight: 800; background: var(--purple-soft); color: var(--purple); border-radius: 6px; padding: 1px 6px; }

/* ─── INFO LAYOUT SEAMLESS ─── */
.info-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #F6F4FA; }
.info-item:last-child { border-bottom: none; padding-bottom: 0; }
.info-item:first-child { padding-top: 0; }

.info-label { font-size: 11px; font-weight: 800; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }
.info-value { font-size: 13px; font-weight: 800; color: var(--text-dark); text-align: right; }

/* ─── MICRO ROLE BADGE ─── */
.role-badge {
  display: inline-block; padding: 2px 8px; border-radius: 6px;
  font-size: 10px; font-weight: 800; background: var(--purple-soft); color: var(--purple);
  text-transform: uppercase; border: 1px solid rgba(123,47,190,0.1);
}
.role-badge.admin { background: var(--red-bg); color: var(--red); border-color: rgba(232,64,64,0.1); }

/* ─── SETTINGS ACTIONS ─── */
.logout-btn {
  width: 100%; padding: 12px; border: 1.5px solid var(--gray-line); border-radius: 12px;
  background: var(--white); color: var(--text-mid); font-family: 'Nunito', sans-serif;
  font-weight: 800; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.2s ease;
  animation: fadeUp 0.4s 0.16s ease both;
}
.logout-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); box-shadow: 0 4px 12px rgba(232,64,64,0.06); }
.logout-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.2; }

/* ─── BOTTOM NAV ─── */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; background:#fff;
  border-top:1px solid var(--gray-line); display:flex; padding:10px 0 14px;
  box-shadow:0 -4px 20px rgba(90,26,154,0.04); z-index:100; max-width:440px; margin:0 auto;
}
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; text-decoration:none; }
.nav-icon svg { width:20px; height:20px; fill:none; stroke: var(--text-light); stroke-width:2.2; transition: stroke 0.2s; }
.nav-label { font-size:10px; font-weight:800; color:var(--text-light); transition: color 0.2s; }
.nav-item.active .nav-label { color:var(--purple); }
.nav-item.active .nav-icon svg { stroke: var(--purple); }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-dots"></div>
  <div class="hero-profile">
    <div class="avatar-wrap">
      <img class="avatar" id="avatar" src="https://via.placeholder.com/76">
      <div class="online-dot"></div>
      <button class="edit-avatar-btn">
        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
    </div>
    <div class="profile-name" id="username">—</div>
    <div class="profile-email" id="email">—</div>
  </div>
</div>

<div class="content-wrap">

  <div class="stat-row">
    <div class="stat-chip balance-chip">
      <div class="chip-icon">
        <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      </div>
      <div>
        <div class="chip-text-label">Saldo</div>
        <div class="chip-text-val" id="balance">Rp 0</div>
      </div>
    </div>
    <div class="stat-chip status-chip">
      <div class="chip-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M8 12l2.5 2.5L16 9"/></svg>
      </div>
      <div>
        <div class="chip-text-label">Status</div>
        <div class="chip-text-val">Aktif</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Informasi Akun
      <span class="card-title-pill">Detail</span>
    </div>

    <div class="info-item">
      <div class="info-label">Username</div>
      <div class="info-value" id="username2">—</div>
    </div>
    <div class="info-item">
      <div class="info-label">Email</div>
      <div class="info-value" id="email2">—</div>
    </div>
    <div class="info-item">
      <div class="info-label">Role</div>
      <div class="info-value">
        <span class="role-badge" id="role">User</span>
      </div>
    </div>
    <div class="info-item">
      <div class="info-label">Terdaftar Sejak</div>
      <div class="info-value" id="created_at">—</div>
    </div>
  </div>

  <div class="sec-title" style="font-size:13px; font-weight:900; color:var(--text-dark); margin: 4px 0 10px 4px; display:flex; align-items:center; gap:6px;">
    Aksi <span class="sec-title-pill" style="font-size: 9px; background:var(--purple-soft); color:var(--purple); padding:1px 6px; border-radius:6px;">Akun</span>
  </div>

  <button class="logout-btn" onclick="logout()">
    <svg viewBox="0 0 24 24">
      <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    Keluar dari Akun
  </button>

</div>

<nav class="bottom-nav">
  <a class="nav-item" href="dashboard.html">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
    </div>
    <div class="nav-label">Home</div>
  </a>
  <a class="nav-item" href="transactions.html">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" stroke-width="1.5"/><polyline points="7,17 10,13 13,15 17,9"/></svg>
    </div>
    <div class="nav-label">Riwayat</div>
  </a>
  <a class="nav-item active" href="#">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    </div>
    <div class="nav-label">Profile</div>
  </a>
</nav>

<script>
const localUser = JSON.parse(localStorage.getItem('user'));
if (!localUser) window.location.href = 'index.html';

loadProfile();

async function loadProfile() {
  try {
    const response = await fetch(`/api/profile?email=${encodeURIComponent(localUser.email)}`);
    const result   = await response.json();

    if (!result.success) {
      localStorage.removeItem('user');
      window.location.href = 'index.html';
      return;
    }

    const user = result.user;

    document.getElementById('username').innerText  = user.username || '—';
    document.getElementById('username2').innerText = user.username || '—';
    document.getElementById('email').innerText     = user.email    || '—';
    document.getElementById('email2').innerText    = user.email    || '—';
    document.getElementById('balance').innerText   = 'Rp ' + Number(user.balance || 0).toLocaleString('id-ID');
    document.getElementById('avatar').src          = user.avatar   || 'https://via.placeholder.com/76';
    document.getElementById('created_at').innerText = user.created_at
      ? new Date(user.created_at).toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' })
      : '—';

    const roleBadge = document.getElementById('role');
    if (user.role === 'admin') {
      roleBadge.innerText = 'Admin';
      roleBadge.classList.add('admin');
    } else {
      roleBadge.innerText = 'User';
    }

  } catch (err) {
    console.error(err);
  }
}

function logout() {
  if (confirm('Yakin mau keluar?')) {
    localStorage.removeItem('user');
    window.location.href = 'index.html';
  }
}
</script>
</body>
</html>
