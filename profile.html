<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile - Xtrimer Tunnel</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--blue:#0070E0;
--blue2:#004FA3;
--bg:#F2F6FB;
--card:#FFFFFF;
--text:#0A1F44;
--muted:#7B8BA7;
--line:#D8E5F5;
--red:#E84040;
--green:#00C48C;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Plus Jakarta Sans',sans-serif;
}

body{
background:var(--bg);
min-height:100vh;
padding-bottom:100px;
}

/* HEADER */

.profile-header{
background:
linear-gradient(
135deg,
var(--blue2),
var(--blue)
);

padding:40px 20px 80px;
position:relative;
overflow:hidden;
}

.profile-header::before{
content:'';
position:absolute;
top:-60px;
right:-40px;
width:200px;
height:200px;
border-radius:50%;
background:rgba(255,255,255,.06);
}

.profile-box{
position:relative;
z-index:2;
display:flex;
flex-direction:column;
align-items:center;
}

.avatar-wrap{
position:relative;
margin-bottom:14px;
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
border:4px solid rgba(255,255,255,.3);
object-fit:cover;
background:#fff;
}

.edit-avatar{
position:absolute;
right:0;
bottom:0;
width:30px;
height:30px;
border-radius:50%;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
box-shadow:0 4px 12px rgba(0,0,0,.15);
cursor:pointer;
}

.profile-name{
font-size:24px;
font-weight:800;
color:#fff;
margin-bottom:4px;
}

.profile-email{
font-size:13px;
color:rgba(255,255,255,.75);
}

/* CARD */

.profile-content{
max-width:480px;
margin:-50px auto 0;
padding:0 18px;
position:relative;
z-index:10;
}

.card{
background:var(--card);
border-radius:20px;
padding:18px;
margin-bottom:16px;
box-shadow:
0 4px 18px rgba(0,0,0,.06);
border:1px solid var(--line);
}

.card-title{
font-size:15px;
font-weight:800;
color:var(--text);
margin-bottom:14px;
}

.info-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 0;
border-bottom:1px solid #EEF3FA;
}

.info-item:last-child{
border-bottom:none;
padding-bottom:0;
}

.info-label{
font-size:13px;
font-weight:700;
color:var(--muted);
}

.info-value{
font-size:14px;
font-weight:800;
color:var(--text);
text-align:right;
}

/* BUTTON */

.menu-btn{
width:100%;
padding:15px;
border:none;
border-radius:14px;
font-size:14px;
font-weight:800;
cursor:pointer;
margin-bottom:12px;
transition:.15s;
}

.primary-btn{
background:linear-gradient(
135deg,
var(--blue),
#00ADB5
);
color:#fff;
}

.primary-btn:hover{
opacity:.92;
}

.outline-btn{
background:#fff;
border:1.5px solid var(--line);
color:var(--text);
}

.outline-btn:hover{
background:#F9FBFF;
}

.logout-btn{
background:#FFECEC;
color:var(--red);
}

.logout-btn:hover{
opacity:.9;
}

/* BADGE */

.role-badge{
display:inline-block;
padding:6px 12px;
border-radius:999px;
font-size:11px;
font-weight:800;
background:#E8F1FD;
color:var(--blue);
}

/* BOTTOM NAV */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#fff;
display:flex;
padding:10px 0 14px;
border-top:1px solid var(--line);
max-width:480px;
margin:auto;
box-shadow:0 -4px 20px rgba(0,0,0,.05);
}

.nav-item{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
gap:4px;
text-decoration:none;
}

.nav-icon{
font-size:20px;
}

.nav-label{
font-size:10px;
font-weight:700;
color:#7B8BA7;
}

.active .nav-label{
color:var(--blue);
}

</style>
</head>
<body>

<!-- HEADER -->

<div class="profile-header">

<div class="profile-box">

<div class="avatar-wrap">

<img
id="avatar"
class="avatar"
src="https://via.placeholder.com/90"
>

<div class="edit-avatar">
✏️
</div>

</div>

<div
class="profile-name"
id="username"
>
—
</div>

<div
class="profile-email"
id="email"
>
—
</div>

</div>

</div>

<!-- CONTENT -->

<div class="profile-content">

<!-- ACCOUNT -->

<div class="card">

<div class="card-title">
👤 Informasi Akun
</div>

<div class="info-item">
<div class="info-label">
Username
</div>

<div
class="info-value"
id="username2"
>
—
</div>
</div>

<div class="info-item">
<div class="info-label">
Email
</div>

<div
class="info-value"
id="email2"
>
—
</div>
</div>

<div class="info-item">
<div class="info-label">
Saldo
</div>

<div
class="info-value"
id="balance"
>
Rp 0
</div>
</div>

<div class="info-item">
<div class="info-label">
Role
</div>

<div class="info-value">
<span
class="role-badge"
id="role"
>
User
</span>
</div>
</div>

</div>

<!-- MENU -->

<div class="card">

<div class="card-title">
⚙️ Pengaturan
</div>

<button
class="menu-btn primary-btn"
onclick="alert('Coming Soon')"
>
✏️ Edit Profile
</button>

<button
class="menu-btn outline-btn"
onclick="alert('Coming Soon')"
>
🔒 Ganti Password
</button>

<button
class="menu-btn outline-btn"
onclick="window.location.href='topup.html'"
>
💳 Topup Saldo
</button>

<button
class="menu-btn logout-btn"
onclick="logout()"
>
🚪 Logout
</button>

</div>

</div>

<!-- BOTTOM NAV -->

<nav class="bottom-nav">

<a
class="nav-item"
href="dashboard.html"
>
<div class="nav-icon">🏠</div>
<div class="nav-label">Home</div>
</a>

<a
class="nav-item"
href="products.html"
>
<div class="nav-icon">📦</div>
<div class="nav-label">Produk</div>
</a>

<a
class="nav-item"
href="ppob.html"
>
<div class="nav-icon">📱</div>
<div class="nav-label">PPOB</div>
</a>

<a
class="nav-item active"
href="#"
>
<div class="nav-icon">👤</div>
<div class="nav-label">Profile</div>
</a>

</nav>

<script>

const localUser =
JSON.parse(
localStorage.getItem('user')
);

if(!localUser){

window.location.href='index.html';

}

loadProfile();

async function loadProfile(){

try{

const response =
await fetch(
`/api/profile?email=${
encodeURIComponent(localUser.email)
}`
);

const result =
await response.json();

if(!result.success){

alert(result.message);

localStorage.removeItem('user');

window.location.href='index.html';

return;

}

const user =
result.user;

document.getElementById('username').innerText =
user.username || '-';

document.getElementById('username2').innerText =
user.username || '-';

document.getElementById('email').innerText =
user.email || '-';

document.getElementById('email2').innerText =
user.email || '-';

document.getElementById('balance').innerText =
'Rp ' +
Number(user.balance || 0)
.toLocaleString('id-ID');

document.getElementById('avatar').src =
user.avatar ||
'https://via.placeholder.com/90';

document.getElementById('role').innerText =
user.role || 'user';

}catch(err){

console.error(err);

alert('Gagal memuat profile');

}

}

function logout(){

localStorage.removeItem('user');

window.location.href='index.html';

}

</script>

</body>
</html>
