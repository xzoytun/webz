<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #3D0F72;
  --purple-light: #9B4FDE;
  --purple-soft:  #F3EAFD;
  --purple-mid:   #EAD5FA;
  --accent:       #FF6B2B;
  --accent2:      #FFD600;
  --green:        #12C28A;
  --green-bg:     #E6FAF4;
  --red:          #E84040;
  --red-bg:       #FFECEC;
  --white:        #FFFFFF;
  --bg:           #F7F0FD;
  --card:         #FFFFFF;
  --gray-line:    #E8D8F8;
  --text-dark:    #1A0533;
  --text-mid:     #6B3FA0;
  --text-light:   #A882CC;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  overflow-x: hidden;
  padding-bottom: 90px;
}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(22px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes pulse {
  0%,100% { transform:scale(1); }
  50%      { transform:scale(1.12); }
}

/* ─── HERO ─── */
.hero {
  background: linear-gradient(150deg, var(--purple-deep) 0%, var(--purple) 55%, var(--purple-light) 100%);
  padding: 24px 20px 72px;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.45s ease both;
}
.hero::before {
  content:'';
  position:absolute; top:-50px; right:-30px;
  width:200px; height:200px;
  border:48px solid rgba(255,255,255,0.07);
  border-radius:50%;
}
.hero::after {
  content:'';
  position:absolute; bottom:-60px; left:-30px;
  width:170px; height:170px;
  border:36px solid rgba(255,214,0,0.12);
  border-radius:50%;
}
.hero-dots {
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size: 22px 22px;
  pointer-events:none;
}

/* ─── HERO PROFILE BOX ─── */
.hero-profile {
  position: relative; z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.avatar-wrap { position: relative; }
.avatar {
  width: 82px; height: 82px; border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.45);
  object-fit: cover;
  background: rgba(255,255,255,0.18);
  display: block;
}
.online-dot {
  position: absolute; bottom: 4px; right: 4px;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--green);
  border: 2.5px solid var(--purple-deep);
  animation: pulse 2s infinite;
}
.edit-avatar-btn {
  position: absolute; bottom: 0; right: -2px;
  width: 26px; height: 26px; border-radius: 50%;
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  cursor: pointer;
  border: none;
}

.profile-name {
  font-size: 22px; font-weight: 900;
  color: #fff; letter-spacing: -0.3px;
  text-align: center;
}
.profile-email {
  font-size: 12px; color: rgba(255,255,255,0.6);
  text-align: center;
}

/* ─── CONTENT WRAPPER ─── */
.content-wrap {
  max-width: 480px;
  margin: -50px auto 0;
  padding: 0 18px;
  position: relative; z-index: 10;
}

/* ─── CARD ─── */
.card {
  background: var(--card);
  border-radius: 20px;
  padding: 18px;
  margin-bottom: 16px;
  box-shadow: 0 4px 20px rgba(90,26,154,0.10), 0 2px 6px rgba(0,0,0,0.04);
  border: 1px solid var(--gray-line);
  animation: fadeUp 0.45s ease both;
}
.card:nth-child(1) { animation-delay: 0.05s; }
.card:nth-child(2) { animation-delay: 0.12s; }
.card:nth-child(3) { animation-delay: 0.18s; }

.card-title {
  font-size: 14px; font-weight: 900;
  color: var(--text-dark);
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
  letter-spacing: -0.2px;
}
.card-title-pill {
  font-size: 10px; font-weight: 800;
  background: var(--purple);
  color: #fff; border-radius: 20px;
  padding: 2px 10px; letter-spacing: 0.5px;
}

/* ─── INFO ITEMS ─── */
.info-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 13px 0;
  border-bottom: 1px solid #F2EAF9;
}
.info-item:last-child {
  border-bottom: none;
  padding-bottom: 0;
}
.info-item:first-child { padding-top: 0; }

.info-label {
  font-size: 12px; font-weight: 800;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.7px;
}
.info-value {
  font-size: 14px; font-weight: 900;
  color: var(--text-dark);
  text-align: right;
}

/* ─── ROLE BADGE ─── */
.role-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 999px;
  font-size: 11px; font-weight: 900;
  background: var(--purple-soft);
  color: var(--purple);
  letter-spacing: 0.3px;
}
.role-badge.admin {
  background: var(--red-bg);
  color: var(--red);
}

/* ─── STAT ROW ─── */
.stat-row {
  display: flex; gap: 10px;
  margin-bottom: 16px;
  animation: fadeUp 0.45s 0.08s ease both;
}
.stat-chip {
  flex: 1; border-radius: 14px;
  padding: 12px 14px;
  display: flex; align-items: center; gap: 10px;
  border: 1.5px solid transparent;
}
.stat-chip.balance-chip {
  background: var(--purple-soft);
  border-color: rgba(123,47,190,0.2);
}
.stat-chip.status-chip {
  background: var(--green-bg);
  border-color: rgba(18,194,138,0.25);
}
.chip-icon { font-size: 20px; }
.chip-text-label {
  font-size: 10px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text-light); margin-bottom: 1px;
}
.chip-text-val {
  font-size: 13px; font-weight: 900;
  color: var(--text-dark);
}

/* ─── MENU BUTTONS ─── */
.menu-btn {
  width: 100%;
  padding: 14px 16px;
  border: none; border-radius: 14px;
  font-family: 'Nunito', sans-serif;
  font-size: 14px; font-weight: 800;
  cursor: pointer;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 10px;
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
  text-decoration: none;
}
.menu-btn:last-child { margin-bottom: 0; }

.menu-btn .btn-icon {
  width: 34px; height: 34px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.menu-btn .btn-text { flex: 1; text-align: left; }
.menu-btn .btn-arrow {
  font-size: 18px; color: var(--text-light);
}

.btn-primary {
  background: linear-gradient(135deg, var(--purple), var(--purple-light));
  color: #fff;
  box-shadow: 0 4px 16px rgba(123,47,190,0.35);
}
.btn-primary .btn-icon { background: rgba(255,255,255,0.2); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(123,47,190,0.45); }

.btn-outline {
  background: var(--white);
  border: 1.5px solid var(--gray-line);
  color: var(--text-dark);
}
.btn-outline .btn-icon { background: var(--purple-soft); }
.btn-outline:hover { background: var(--purple-soft); border-color: var(--purple-mid); }

.btn-danger {
  background: var(--white);
  border: 1.5px solid rgba(232,64,64,0.25);
  color: var(--red);
}
.btn-danger .btn-icon { background: var(--red-bg); }
.btn-danger:hover { background: var(--red-bg); border-color: var(--red); }

/* ─── BOTTOM NAV ─── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #fff;
  border-top: 1px solid var(--gray-line);
  display: flex; padding: 10px 0 14px;
  box-shadow: 0 -4px 22px rgba(90,26,154,0.10);
  z-index: 100; max-width: 480px; margin: 0 auto;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 3px;
  text-decoration: none; cursor: pointer;
}
.nav-icon { font-size: 21px; line-height: 1; }
.nav-label {
  font-size: 10px; font-weight: 800;
  color: var(--text-light);
}
.nav-item.active .nav-label { color: var(--purple); }
.nav-item.active .nav-icon { filter: drop-shadow(0 0 4px rgba(123,47,190,0.4)); }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-dots"></div>
  <div class="hero-profile">
    <div class="avatar-wrap">
      <img class="avatar" id="avatar" src="https://via.placeholder.com/82">
      <div class="online-dot"></div>
      <button class="edit-avatar-btn">✏️</button>
    </div>
    <div class="profile-name" id="username">—</div>
    <div class="profile-email" id="email">—</div>
  </div>
</div>

<!-- CONTENT -->
<div class="content-wrap">

  <!-- STAT CHIPS -->
  <div class="stat-row">
    <div class="stat-chip balance-chip">
      <div class="chip-icon">💳</div>
      <div>
        <div class="chip-text-label">Saldo</div>
        <div class="chip-text-val" id="balance">Rp 0</div>
      </div>
    </div>
    <div class="stat-chip status-chip">
      <div class="chip-icon">✅</div>
      <div>
        <div class="chip-text-label">Status</div>
        <div class="chip-text-val">Aktif</div>
      </div>
    </div>
  </div>

  <!-- ACCOUNT INFO -->
  <div class="card">
    <div class="card-title">👤 Informasi Akun <span class="card-title-pill">Detail</span></div>

    <div class="info-item">
      <div class="info-label">Username</div>
      <div class="info-value" id="username2">—</div>
    </div>
    <div class="info-item">
      <div class="info-label">Email</div>
      <div class="info-value" id="email2">—</div>
    </div>
    <div class="info-item">
      <div class="info-label">Role</div>
      <div class="info-value">
        <span class="role-badge" id="role">User</span>
      </div>
    </div>
    <div class="info-item">
      <div class="info-label">Terdaftar Sejak</div>
      <div class="info-value" id="created_at">—</div>
    </div>
  </div>

  <!-- SETTINGS -->
  <div class="card">
    <div class="card-title">⚙️ Pengaturan</div>

    <a class="menu-btn btn-primary" href="topup.html">
      <div class="btn-icon">💳</div>
      <div class="btn-text">Top Up Saldo</div>
      <div class="btn-arrow">›</div>
    </a>

    <a class="menu-btn btn-outline" href="my-vpn.html">
      <div class="btn-icon">🗂</div>
      <div class="btn-text">Akun VPN Saya</div>
      <div class="btn-arrow">›</div>
    </a>

    <a class="menu-btn btn-outline" href="transactions.html">
      <div class="btn-icon">📈</div>
      <div class="btn-text">Riwayat Transaksi</div>
      <div class="btn-arrow">›</div>
    </a>

    <button class="menu-btn btn-danger" onclick="logout()">
      <div class="btn-icon">🚪</div>
      <div class="btn-text">Keluar dari Akun</div>
    </button>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a class="nav-item" href="dashboard.html">
    <div class="nav-icon">🏠</div>
    <div class="nav-label">Home</div>
  </a>
  <a class="nav-item" href="transactions.html">
    <div class="nav-icon">📈</div>
    <div class="nav-label">Riwayat</div>
  </a>
  <a class="nav-item active" href="#">
    <div class="nav-icon">👤</div>
    <div class="nav-label">Profile</div>
  </a>
</nav>

<script>
const localUser = JSON.parse(localStorage.getItem('user'));
if (!localUser) window.location.href = 'index.html';

loadProfile();

async function loadProfile() {
  try {
    const response = await fetch(`/api/profile?email=${encodeURIComponent(localUser.email)}`);
    const result   = await response.json();

    if (!result.success) {
      alert(result.message);
      localStorage.removeItem('user');
      window.location.href = 'index.html';
      return;
    }

    const user = result.user;

    document.getElementById('username').innerText  = user.username || '—';
    document.getElementById('username2').innerText = user.username || '—';
    document.getElementById('email').innerText     = user.email    || '—';
    document.getElementById('email2').innerText    = user.email    || '—';
    document.getElementById('balance').innerText   = 'Rp ' + Number(user.balance || 0).toLocaleString('id-ID');
    document.getElementById('avatar').src          = user.avatar   || 'https://via.placeholder.com/82';
    document.getElementById('created_at').innerText = user.created_at
      ? new Date(user.created_at).toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' })
      : '—';

    const roleBadge = document.getElementById('role');
    if (user.role === 'admin') {
      roleBadge.innerText = 'Admin';
      roleBadge.classList.add('admin');
    } else {
      roleBadge.innerText = 'User';
    }

  } catch (err) {
    console.error(err);
    alert('Gagal memuat data profile');
  }
}

function logout() {
  if (confirm('Yakin mau keluar?')) {
    localStorage.removeItem('user');
    window.location.href = 'index.html';
  }
}
</script>
</body>
</html>
