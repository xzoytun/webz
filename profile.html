<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile – Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --p:   #8B5CF6;
  --p2:  #7C3AED;
  --acc: #10B981;
  --red: #EF4444;

  --bg:    #0F0F13;
  --s1:    #18181F;
  --s2:    #1F1F28;
  --line:  rgba(255,255,255,0.06);
  --t1:    #F1F1F5;
  --t2:    #9191A4;
  --t3:    #5C5C72;
}

html[data-theme="light"] {
  --bg:   #F4F4F8;
  --s1:   #FFFFFF;
  --s2:   #F8F8FC;
  --line: rgba(0,0,0,0.06);
  --t1:   #111118;
  --t2:   #4A4A60;
  --t3:   #9191A4;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--t1);
  min-height: 100vh;
  padding-bottom: 72px;
  -webkit-font-smoothing: antialiased;
}

/* ── HERO ── */
.hero {
  position: relative;
  padding: 48px 20px 20px;
  background: linear-gradient(160deg, #1A0E3A 0%, #0F0F13 70%);
  overflow: hidden;
}
html[data-theme="light"] .hero {
  background: linear-gradient(160deg, #EDE9FF 0%, #F4F4F8 70%);
}
.hero-glow {
  position: absolute;
  top: -30px; left: 50%;
  transform: translateX(-50%);
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(139,92,246,0.25) 0%, transparent 70%);
  pointer-events: none;
}

.topbar {
  position: absolute; top: 14px; right: 16px;
  display: flex; gap: 8px;
}
.icon-btn {
  width: 30px; height: 30px; border-radius: 8px;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .2s;
}
html[data-theme="light"] .icon-btn { background: rgba(0,0,0,0.05); }
.icon-btn:hover { background: rgba(255,255,255,0.12); }
.icon-btn svg { width:14px; height:14px; fill:none; stroke:var(--t2); stroke-width:2; }

/* Avatar row */
.profile-row {
  display: flex; align-items: center; gap: 14px;
}
.ava-wrap { position: relative; flex-shrink: 0; }
.ava {
  width: 56px; height: 56px; border-radius: 16px;
  background: linear-gradient(135deg, var(--p2), var(--p));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 800; color: #fff;
  letter-spacing: -1px;
}
.ava-dot {
  position: absolute; bottom: -2px; right: -2px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--acc); border: 2px solid var(--bg);
}
.profile-info { flex: 1; min-width: 0; }
.profile-name {
  font-size: 16px; font-weight: 700; color: var(--t1);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.profile-email { font-size: 11.5px; color: var(--t2); margin-top: 2px; }
.admin-tag {
  display: inline-block; padding: 1px 7px; border-radius: 5px;
  background: rgba(239,68,68,0.15); color: var(--red);
  font-size: 9.5px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.5px; margin-top: 4px; border: 1px solid rgba(239,68,68,0.2);
}

/* ── BALANCE ROW ── */
.bal-row {
  display: flex; gap: 8px;
  padding: 14px 16px 0;
}
.bal-card {
  flex: 1; background: var(--s1); border-radius: 12px;
  border: 1px solid var(--line);
  padding: 10px 12px;
  display: flex; align-items: center; gap: 10px;
}
.bal-icon {
  width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.bal-icon.p { background: rgba(139,92,246,0.15); }
.bal-icon.g { background: rgba(16,185,129,0.15); }
.bal-icon svg { width:15px; height:15px; fill:none; stroke-width:2; }
.bal-icon.p svg { stroke: var(--p); }
.bal-icon.g svg { stroke: var(--acc); }
.bal-label { font-size: 9.5px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: 0.5px; }
.bal-val { font-size: 13px; font-weight: 700; color: var(--t1); margin-top: 1px; }

/* ── SECTION ── */
.sec {
  margin: 12px 16px 0;
  background: var(--s1);
  border-radius: 14px;
  border: 1px solid var(--line);
  overflow: hidden;
}
.sec-hdr {
  padding: 10px 14px 8px;
  display: flex; align-items: center; gap: 6px;
  border-bottom: 1px solid var(--line);
}
.sec-hdr svg { width:13px; height:13px; fill:none; stroke:var(--p); stroke-width:2.2; flex-shrink:0; }
.sec-hdr-label { font-size: 11px; font-weight: 700; color: var(--t2); text-transform: uppercase; letter-spacing: 0.6px; }

/* Info rows */
.info-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 14px;
  border-bottom: 1px solid var(--line);
}
.info-row:last-child { border-bottom: none; }
.info-k { font-size: 11px; font-weight: 500; color: var(--t3); }
.info-v { font-size: 12px; font-weight: 600; color: var(--t1); text-align: right; }

/* Device row */
.device-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
}
.dev-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: rgba(139,92,246,0.12);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.dev-name { font-size: 12px; font-weight: 600; color: var(--t1); }
.dev-sub { font-size: 10.5px; color: var(--t3); margin-top: 1px; }

/* Menu item */
.menu-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 14px;
  text-decoration: none; color: inherit;
  border-bottom: 1px solid var(--line);
}
.menu-row:last-child { border-bottom: none; }
.menu-l { display: flex; align-items: center; gap: 9px; }
.menu-l svg { width:14px; height:14px; fill:none; stroke:var(--t2); stroke-width:2; }
.menu-text { font-size: 12.5px; font-weight: 600; color: var(--t1); }
.menu-arr { width:12px; height:12px; fill:none; stroke:var(--t3); stroke-width:2.5; }

/* Logout */
.logout-wrap { margin: 12px 16px 0; }
.logout-btn {
  width: 100%; padding: 10px;
  background: rgba(239,68,68,0.07);
  border: 1px solid rgba(239,68,68,0.15);
  border-radius: 12px;
  color: var(--red); font-family: 'Inter', sans-serif;
  font-size: 12.5px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  transition: background .2s;
}
.logout-btn:hover { background: rgba(239,68,68,0.13); }
.logout-btn svg { width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:2.2; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--s1);
  border-top: 1px solid var(--line);
  display: flex; padding: 8px 0 10px;
  z-index: 100;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  text-decoration: none;
}
.nav-item svg { width:18px; height:18px; fill:none; stroke:var(--t3); stroke-width:2; }
.nav-label { font-size: 9.5px; font-weight: 600; color: var(--t3); }
.nav-item.active svg { stroke: var(--p); }
.nav-item.active .nav-label { color: var(--p); }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-glow"></div>
  <div class="topbar">
    <button class="icon-btn" id="themeToggle" aria-label="Ganti tema">
      <svg id="iconSun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
    </button>
  </div>
  <div class="profile-row">
    <div class="ava-wrap">
      <div class="ava" id="avatarInitial">Z</div>
      <div class="ava-dot"></div>
    </div>
    <div class="profile-info">
      <div class="profile-name" id="username">zoytun santosa</div>
      <div class="profile-email" id="email">zoytunsantosa@gmail.com</div>
      <div class="admin-tag" id="roleTag">Admin</div>
    </div>
  </div>
</div>

<div class="bal-row">
  <div class="bal-card">
    <div class="bal-icon p">
      <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
    </div>
    <div>
      <div class="bal-label">Saldo</div>
      <div class="bal-val" id="balance">Rp 85.170</div>
    </div>
  </div>
  <div class="bal-card">
    <div class="bal-icon g">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M8 12l2.5 2.5L16 9"/></svg>
    </div>
    <div>
      <div class="bal-label">Status</div>
      <div class="bal-val" style="color:var(--acc)">Aktif</div>
    </div>
  </div>
</div>

<!-- Info Akun -->
<div class="sec">
  <div class="sec-hdr">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    <span class="sec-hdr-label">Informasi Akun</span>
  </div>
  <div class="info-row">
    <span class="info-k">Username</span>
    <span class="info-v" id="username2">zoytun santosa</span>
  </div>
  <div class="info-row">
    <span class="info-k">Email</span>
    <span class="info-v" id="email2">zoytunsantosa@gmail.com</span>
  </div>
  <div class="info-row">
    <span class="info-k">Role</span>
    <span class="info-v"><span class="admin-tag">Admin</span></span>
  </div>
  <div class="info-row">
    <span class="info-k">Terdaftar Sejak</span>
    <span class="info-v" id="created_at">3 Juni 2026</span>
  </div>
</div>

<!-- Device Login -->
<div class="sec" style="margin-top:10px">
  <div class="sec-hdr">
    <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
    <span class="sec-hdr-label">Device Login</span>
  </div>
  <div class="device-row">
    <div class="dev-icon" id="deviceIcon">📱</div>
    <div>
      <div class="dev-name" id="deviceName">Loading...</div>
      <div class="dev-sub">IP: <span id="deviceIp">—</span></div>
      <div class="dev-sub">Aktif: <span id="lastOnlineTime">—</span></div>
    </div>
  </div>
</div>

<!-- Support -->
<div class="sec" style="margin-top:10px">
  <div class="sec-hdr">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <span class="sec-hdr-label">Pusat Bantuan</span>
  </div>
  <a class="menu-row" href="help.html">
    <div class="menu-l">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="menu-text">FAQ & Bantuan</span>
    </div>
    <svg class="menu-arr" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
  </a>
</div>

<!-- Logout -->
<div class="logout-wrap">
  <button class="logout-btn" onclick="logout()">
    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    Keluar dari Akun
  </button>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <a class="nav-item" href="dashboard.html">
    <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
    <span class="nav-label">Home</span>
  </a>
  <a class="nav-item" href="transactions.html">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" stroke-width="1.5"/><polyline points="7,17 10,13 13,15 17,9"/></svg>
    <span class="nav-label">Riwayat</span>
  </a>
  <a class="nav-item active" href="#">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    <span class="nav-label">Profile</span>
  </a>
</nav>

<script>
// Theme
(function(){
  const saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
})();

document.getElementById('themeToggle').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
});

// Load profile from API
const token = localStorage.getItem('token');
const localUser = JSON.parse(localStorage.getItem('user') || 'null');
if (!localUser || !token) { localStorage.clear(); window.location.href = 'index.html'; }

async function loadProfile() {
  try {
    const res = await fetch('/api/profile', { headers: { 'Authorization': `Bearer ${token}` } });
    const result = await res.json();
    if (!result.success) { localStorage.clear(); window.location.href = 'index.html'; return; }
    const u = result.user;
    const name = u.username || '—';
    document.getElementById('username').innerText = name;
    document.getElementById('username2').innerText = name;
    document.getElementById('email').innerText = u.email || '—';
    document.getElementById('email2').innerText = u.email || '—';
    document.getElementById('avatarInitial').innerText = name.charAt(0).toUpperCase();
    document.getElementById('balance').innerText = 'Rp ' + Number(u.balance || 0).toLocaleString('id-ID');
    document.getElementById('created_at').innerText = u.created_at
      ? new Date(u.created_at).toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' })
      : '—';
    displayLastOnline(u.last_login);
  } catch(e) { console.error(e); }
}

async function detectDevice() {
  const ua = navigator.userAgent;
  let device = /iPhone/i.test(ua) ? 'iPhone' : /iPad/i.test(ua) ? 'iPad' : /Android/i.test(ua) ? (() => { const m = ua.match(/Android[^;]+;\s+([^;)]+)/i); return m ? m[1].trim() : 'Android'; })() : /Windows/i.test(ua) ? 'Windows PC' : /Mac/i.test(ua) ? 'Mac' : 'Unknown';
  const mobile = /Android|iPhone|iPad/i.test(ua);
  document.getElementById('deviceIcon').innerText = mobile ? '📱' : '💻';
  document.getElementById('deviceName').innerText = device;
}

async function loadIP() {
  try {
    const r = await fetch('https://api.ipify.org?format=json');
    const d = await r.json();
    document.getElementById('deviceIp').innerText = d.ip;
  } catch { document.getElementById('deviceIp').innerText = 'N/A'; }
}

function displayLastOnline(ts) {
  const d = ts ? new Date(ts) : new Date();
  document.getElementById('lastOnlineTime').innerText =
    d.toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric' }) + ' ' +
    d.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', hour12:false });
}

function logout() {
  if (confirm('Keluar dari akun?')) { localStorage.clear(); window.location.href = 'index.html'; }
}

loadProfile(); detectDevice(); loadIP();
</script>
</body>
</html>
