<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #3D0F72;
  --purple-light: #9B4FDE;
  --purple-soft:  #F3EAFD;
  --purple-mid:   #EAD5FA;
  --accent:       #FF6B2B;
  --accent2:      #FFD600;
  --green:        #12C28A;
  --green-bg:     #E6FAF4;
  --red:          #E84040;
  --red-bg:       #FFECEC;
  --white:        #FFFFFF;
  --bg:           #F8F6FC;
  --card-bg:      #FFFFFF;
  --gray-line:    #EEF0F6;
  --text-dark:    #1A0533;
  --text-mid:     #6B3FA0;
  --text-light:   #A882CC;
  --nav-bg:       #FFFFFF;
  --nav-shadow:   rgba(90,26,154,0.04);
}

[data-theme="dark"] {
  --white:        #1E1130;
  --bg:           #120B22;
  --gray-line:    #2A1D42;
  --text-dark:    #F0E8FF;
  --text-mid:     #C4A0EE;
  --text-light:   #7A5BAA;
  --card-bg:      #1E1130;
  --purple-soft:  #2D1A50;
  --purple-mid:   #3D2265;
  --nav-bg:       #1E1130;
  --nav-shadow:   rgba(0,0,0,0.3);
  --red-bg:       #3A1F1F;
  --green-bg:     #143A2E;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  overflow-x: hidden;
  padding-bottom: 90px;
  color: var(--text-dark);
  transition: background 0.3s ease, color 0.3s ease;
}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes pulse {
  0%,100% { transform:scale(1); }
  50%      { transform:scale(1.1); }
}

/* ─── HERO PROFILE MODERN ─── */
.hero {
  background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple) 60%, var(--purple-light) 100%);
  padding: 24px 20px 56px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content:''; position:absolute; top:-40px; right:-20px;
  width:160px; height:160px;
  border:32px solid rgba(255,255,255,0.05); border-radius:50%;
}
.hero-dots {
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 20px 20px; pointer-events:none;
}
.hero-top {
  display: flex; align-items: center; justify-content: flex-end;
  position: relative; z-index: 5; max-width: 440px; margin: 0 auto -20px;
}
.hero-profile {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  animation: fadeUp 0.4s ease both;
}

/* ─── THEME TOGGLE ─── */
.theme-toggle {
  width: 36px; height: 36px; border-radius: 11px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.18);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s;
  backdrop-filter: blur(8px);
}
.theme-toggle:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
.theme-toggle svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2.3; }
.icon-sun { display: none; }
.icon-moon { display: block; }
[data-theme="dark"] .icon-sun  { display: block; }
[data-theme="dark"] .icon-moon { display: none; }

.avatar-wrap { position: relative; }
.avatar {
  width: 76px; height: 76px; border-radius: 50%;
  border: 2.5px solid rgba(255,255,255,0.4);
  object-fit: cover; background: rgba(255,255,255,0.1);
  display: block;
}
.online-dot {
  position: absolute; bottom: 3px; right: 3px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--green); border: 2px solid var(--purple-deep);
  animation: pulse 2s infinite;
}
.edit-avatar-btn {
  position: absolute; bottom: -2px; right: -2px;
  width: 24px; height: 24px; border-radius: 50%;
  background: #fff; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15); cursor: pointer; border: none;
}
.edit-avatar-btn svg { width: 12px; height: 12px; fill: none; stroke: var(--purple); stroke-width: 2.5; }

.profile-name { font-size: 19px; font-weight: 900; color: #fff; letter-spacing: -0.2px; text-align: center; }
.profile-email { font-size: 12px; color: rgba(255,255,255,0.55); text-align: center; font-weight: 600; }

/* ─── CONTENT WRAPPER ─── */
.content-wrap { max-width: 440px; margin: -30px auto 0; padding: 0 16px; position: relative; z-index: 10; }

/* ─── STAT CHIPS FINTECH ─── */
.stat-row { display: flex; gap: 10px; margin-bottom: 16px; animation: fadeUp 0.4s 0.08s ease both; }
.stat-chip {
  flex: 1; border-radius: 14px; padding: 12px 14px; display: flex; align-items: center; gap: 10px;
  background: var(--card-bg); border: 1px solid var(--gray-line);
  box-shadow: 0 6px 18px rgba(90,26,154,0.02);
  transition: background 0.3s, border-color 0.3s;
}
.chip-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.chip-icon svg { width: 20px; height: 20px; fill: none; stroke-width: 2.2; }
.balance-chip .chip-icon svg { stroke: var(--purple); }
.status-chip .chip-icon svg { stroke: var(--green); }

.chip-text-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-light); margin-bottom: 1px; }
.chip-text-val { font-size: 14px; font-weight: 900; color: var(--text-dark); }

/* ─── PREMIUM CARD ─── */
.card {
  background: var(--card-bg); border-radius: 16px; padding: 16px 18px; margin-bottom: 16px;
  box-shadow: 0 4px 16px rgba(90,26,154,0.02); border: 1px solid var(--gray-line);
  animation: fadeUp 0.4s 0.12s ease both;
  transition: background 0.3s, border-color 0.3s;
}
.card-title {
  font-size: 13px; font-weight: 900; color: var(--text-dark); margin-bottom: 14px;
  display: flex; align-items: center; gap: 6px; letter-spacing: -0.1px;
}
.card-title svg { width: 16px; height: 16px; fill: none; stroke: var(--purple); stroke-width: 2.2; flex-shrink: 0; }
.card-title-pill { font-size: 9px; font-weight: 800; background: var(--purple-soft); color: var(--purple); border-radius: 6px; padding: 1px 6px; }

/* ─── INFO LAYOUT SEAMLESS ─── */
.info-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--gray-line); }
.info-item:last-child { border-bottom: none; padding-bottom: 0; }
.info-item:first-child { padding-top: 0; }

.info-label { font-size: 11px; font-weight: 800; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }
.info-value { font-size: 13px; font-weight: 800; color: var(--text-dark); text-align: right; }

/* ─── MICRO ROLE BADGE ─── */
.role-badge {
  display: inline-block; padding: 2px 8px; border-radius: 6px;
  font-size: 10px; font-weight: 800; background: var(--purple-soft); color: var(--purple);
  text-transform: uppercase; border: 1px solid rgba(123,47,190,0.1);
}
.role-badge.admin { background: var(--red-bg); color: var(--red); border-color: rgba(232,64,64,0.1); }

/* ─── SECTION TITLE ─── */
.sec-title {
  font-size:13px; font-weight:900; color:var(--text-dark);
  margin: 4px 0 10px 4px; display:flex; align-items:center; gap:6px;
}
.sec-title-pill { font-size: 9px; background:var(--purple-soft); color:var(--purple); padding:1px 6px; border-radius:6px; font-weight: 800; }

/* ─── SETTINGS ACTIONS ─── */
.logout-btn {
  width: 100%; padding: 12px; border: 1.5px solid var(--gray-line); border-radius: 12px;
  background: var(--card-bg); color: var(--text-mid); font-family: 'Nunito', sans-serif;
  font-weight: 800; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.2s ease;
  animation: fadeUp 0.4s 0.16s ease both;
}
.logout-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); box-shadow: 0 4px 12px rgba(232,64,64,0.06); }
.logout-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.2; }

/* ─── BOTTOM NAV ─── */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 440px; background: var(--nav-bg);
  border-top: 1px solid var(--gray-line);
  box-shadow: 0 -4px 20px var(--nav-shadow); z-index: 999;
  transition: background 0.3s, border-color 0.3s;
}
.bottom-nav-inner { display: flex; align-items: center; justify-content: space-around; padding: 8px 0; }
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  text-decoration: none; color: var(--text-light); width: 70px; transition: all 0.2s;
}
.nav-icon svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; transition: transform 0.2s; }
.nav-label { font-size: 11px; font-weight: 800; }
.nav-item:hover .nav-icon svg { transform: translateY(-2px); }
.nav-item.active { color: var(--purple); }
.nav-item.active .nav-icon svg { stroke: var(--purple); fill: var(--purple-soft); }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-dots"></div>
  <div class="hero-top">
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle tema">
      <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </div>
  <div class="hero-profile">
    <div class="avatar-wrap">
      <img class="avatar" id="avatar" src="https://via.placeholder.com/76">
      <div class="online-dot"></div>
      <button class="edit-avatar-btn">
        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
    </div>
    <div class="profile-name" id="username">—</div>
    <div class="profile-email" id="email">—</div>
  </div>
</div>

<div class="content-wrap">

  <div class="stat-row">
    <div class="stat-chip balance-chip">
      <div class="chip-icon">
        <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      </div>
      <div>
        <div class="chip-text-label">Saldo</div>
        <div class="chip-text-val" id="balance">Rp 0</div>
      </div>
    </div>
    <div class="stat-chip status-chip">
      <div class="chip-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M8 12l2.5 2.5L16 9"/></svg>
      </div>
      <div>
        <div class="chip-text-label">Status</div>
        <div class="chip-text-val">Aktif</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Informasi Akun
      <span class="card-title-pill">Detail</span>
    </div>

    <div class="info-item">
      <div class="info-label">Username</div>
      <div class="info-value" id="username2">—</div>
    </div>
    <div class="info-item">
      <div class="info-label">Email</div>
      <div class="info-value" id="email2">—</div>
    </div>
    <div class="info-item">
      <div class="info-label">Role</div>
      <div class="info-value">
        <span class="role-badge" id="role">User</span>
      </div>
    </div>
    <div class="info-item">
      <div class="info-label">Terdaftar Sejak</div>
      <div class="info-value" id="created_at">—</div>
    </div>
  </div>

  <div class="sec-title">
    Aksi <span class="sec-title-pill">Akun</span>
  </div>

  <button class="logout-btn" onclick="logout()">
    <svg viewBox="0 0 24 24">
      <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    Keluar dari Akun
  </button>

</div>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a class="nav-item" href="dashboard.html">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg></div>
      <div class="nav-label">Home</div>
    </a>
    <a class="nav-item" href="riwayat-ppob.html">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" stroke-width="1.5"/><polyline points="7,17 10,13 13,15 17,9"/></svg></div>
      <div class="nav-label">Riwayat</div>
    </a>
    <a class="nav-item active" href="#">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>
      <div class="nav-label">Profile</div>
    </a>
  </div>
</nav>

<script>
// ─── THEME MANAGER ───
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('xt-theme', next);
}
(function() {
  const saved = localStorage.getItem('xt-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
})();

// 1. Ambil data user & token dari localStorage
const localUser = JSON.parse(localStorage.getItem('user'));
const token     = localStorage.getItem('token');

// Jika tidak ada user atau token, tendang kembali ke halaman login
if (!localUser || !token) {
  localStorage.clear();
  window.location.href = 'index.html';
} else {
  loadProfile();
}

async function loadProfile() {
  try {
    // 2. Lakukan fetch aman via Header Authorization Bearer Token
    const response = await fetch('/api/profile', {
      method: 'GET',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      }
    });
    
    const result = await response.json();

    // Jika token kedaluwarsa / ditolak oleh middleware checkAuth backend
    if (!result.success) {
      alert(result.message || 'Sesi telah berakhir, silakan login kembali.');
      localStorage.clear();
      window.location.href = 'index.html';
      return;
    }

    const user = result.user;

    // 3. Render data ke elemen HTML
    document.getElementById('username').innerText  = user.username || '—';
    document.getElementById('username2').innerText = user.username || '—';
    document.getElementById('email').innerText     = user.email    || '—';
    document.getElementById('email2').innerText    = user.email    || '—';
    document.getElementById('balance').innerText   = 'Rp ' + Number(user.balance || 0).toLocaleString('id-ID');
    document.getElementById('avatar').src          = user.avatar   || 'https://via.placeholder.com/76';
    document.getElementById('created_at').innerText = user.created_at
      ? new Date(user.created_at).toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' })
      : '—';

    const roleBadge = document.getElementById('role');
    if (user.role === 'admin') {
      roleBadge.innerText = 'Admin';
      roleBadge.classList.add('admin');
    } else {
      roleBadge.innerText = 'User';
      roleBadge.classList.remove('admin');
    }

  } catch (err) {
    console.error('Gagal memuat profil:', err);
  }
}

function logout() {
  if (confirm('Yakin mau keluar?')) {
    localStorage.clear(); // Bersihkan semua data auth termasuk token
    window.location.href = 'index.html';
  }
}
</script>
</body>
</html>
