<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile – Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --p:   #8B5CF6;
  --p2:  #7C3AED;
  --acc: #10B981;
  --red: #EF4444;

  --bg:   #0C0C12;
  --s1:   #13131C;
  --s2:   #1A1A26;
  --line: rgba(255,255,255,0.07);
  --t1:   #EDEDF5;
  --t2:   #8A8AA8;
  --t3:   #4E4E68;
}

html[data-theme="light"] {
  --bg:   #F0EFF8;
  --s1:   #FFFFFF;
  --s2:   #F7F6FD;
  --line: rgba(0,0,0,0.06);
  --t1:   #0F0F1A;
  --t2:   #52526E;
  --t3:   #9898B2;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--t1);
  min-height: 100vh;
  padding-bottom: 80px;
  -webkit-font-smoothing: antialiased;
}

/* ── HERO ── */
.hero {
  position: relative;
  padding: 52px 20px 24px;
  overflow: hidden;
  background: var(--s1);
  border-bottom: 1px solid var(--line);
}

/* purple noise texture overlay */
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 120% 80% at 50% -10%, rgba(124,58,237,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 90% 110%, rgba(139,92,246,0.1) 0%, transparent 60%);
  pointer-events: none;
}
/* subtle grid */
.hero::after {
  content: '';
  position: absolute; inset: 0;
  background-image: linear-gradient(var(--line) 1px, transparent 1px),
                    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
  opacity: 0.5;
}

.topbar {
  position: absolute; top: 14px; right: 16px;
  display: flex; gap: 8px; z-index: 2;
}
.icon-btn {
  width: 30px; height: 30px; border-radius: 8px;
  background: rgba(139,92,246,0.08);
  border: 1px solid rgba(139,92,246,0.18);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .2s;
}
.icon-btn:hover { background: rgba(139,92,246,0.16); }
.icon-btn svg { width:14px; height:14px; fill:none; stroke:var(--p); stroke-width:2; }

/* Avatar row */
.profile-row {
  display: flex; align-items: center; gap: 14px;
  position: relative; z-index: 1;
}
.ava-wrap { position: relative; flex-shrink: 0; }
.ava {
  width: 58px; height: 58px; border-radius: 18px;
  background: linear-gradient(135deg, var(--p2) 0%, #A78BFA 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 800; color: #fff;
  letter-spacing: -1px;
  box-shadow: 0 8px 24px rgba(124,58,237,0.35);
}
.ava-dot {
  position: absolute; bottom: -2px; right: -2px;
  width: 13px; height: 13px; border-radius: 50%;
  background: var(--acc); border: 2.5px solid var(--s1);
  box-shadow: 0 0 6px rgba(16,185,129,0.5);
}
.profile-info { flex: 1; min-width: 0; }
.profile-name {
  font-size: 16px; font-weight: 800; color: var(--t1);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  letter-spacing: -0.3px;
}
.profile-email { font-size: 11.5px; color: var(--t2); margin-top: 3px; font-weight: 500; }
.admin-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 6px;
  background: rgba(239,68,68,0.1); color: var(--red);
  font-size: 9.5px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.6px; margin-top: 5px;
  border: 1px solid rgba(239,68,68,0.18);
}
.admin-tag::before {
  content: ''; width: 5px; height: 5px;
  border-radius: 50%; background: var(--red);
}

/* ── BALANCE ROW ── */
.bal-row {
  display: flex; gap: 8px;
  padding: 12px 16px 0;
}
.bal-card {
  flex: 1;
  background: var(--s1);
  border-radius: 14px;
  border: 1px solid var(--line);
  padding: 11px 13px;
  display: flex; align-items: center; gap: 10px;
  position: relative; overflow: hidden;
}
.bal-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
}
.bal-card.purple::before { background: linear-gradient(90deg, var(--p2), var(--p)); }
.bal-card.green::before  { background: linear-gradient(90deg, #059669, var(--acc)); }

.bal-icon {
  width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.bal-icon.p { background: rgba(139,92,246,0.12); }
.bal-icon.g { background: rgba(16,185,129,0.12); }
.bal-icon svg { width:16px; height:16px; fill:none; stroke-width:2; }
.bal-icon.p svg { stroke: var(--p); }
.bal-icon.g svg { stroke: var(--acc); }
.bal-label { font-size: 9.5px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: 0.6px; }
.bal-val { font-size: 13.5px; font-weight: 800; color: var(--t1); margin-top: 2px; letter-spacing: -0.2px; }

/* ── SECTIONS ── */
.sec-wrap { padding: 12px 16px 0; display: flex; flex-direction: column; gap: 8px; }

.sec {
  background: var(--s1);
  border-radius: 16px;
  border: 1px solid var(--line);
  overflow: hidden;
}

.sec-hdr {
  padding: 10px 14px;
  display: flex; align-items: center; gap: 7px;
  border-bottom: 1px solid var(--line);
  background: rgba(139,92,246,0.04);
}
.sec-hdr-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--p); flex-shrink: 0;
}
.sec-hdr svg { width:13px; height:13px; fill:none; stroke:var(--p); stroke-width:2.2; flex-shrink:0; }
.sec-hdr-label { font-size: 10.5px; font-weight: 700; color: var(--t2); text-transform: uppercase; letter-spacing: 0.8px; flex: 1; }
.sec-hdr-badge {
  font-size: 9px; font-weight: 700;
  padding: 1px 7px; border-radius: 5px;
  background: rgba(139,92,246,0.1); color: var(--p);
  text-transform: uppercase; letter-spacing: 0.4px;
}

/* Info rows */
.info-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
}
.info-row:last-child { border-bottom: none; }
.info-k { font-size: 11.5px; font-weight: 500; color: var(--t3); }
.info-v { font-size: 12px; font-weight: 600; color: var(--t1); text-align: right; max-width: 60%; }

/* Device row */
.device-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
}
.dev-icon {
  width: 40px; height: 40px; border-radius: 12px;
  background: rgba(139,92,246,0.1);
  border: 1px solid rgba(139,92,246,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.dev-name { font-size: 12.5px; font-weight: 700; color: var(--t1); }
.dev-sub { font-size: 10.5px; color: var(--t3); margin-top: 2px; font-weight: 500; }

/* Menu rows */
.menu-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px;
  text-decoration: none; color: inherit;
  border-bottom: 1px solid var(--line);
  transition: background .15s;
}
.menu-row:last-child { border-bottom: none; }
.menu-row:active { background: rgba(139,92,246,0.05); }
.menu-l { display: flex; align-items: center; gap: 10px; }
.menu-icon {
  width: 28px; height: 28px; border-radius: 8px;
  background: rgba(139,92,246,0.1);
  display: flex; align-items: center; justify-content: center;
}
.menu-icon svg { width:13px; height:13px; fill:none; stroke:var(--p); stroke-width:2.2; }
.menu-text { font-size: 12.5px; font-weight: 600; color: var(--t1); }
.menu-arr { width:13px; height:13px; fill:none; stroke:var(--t3); stroke-width:2.5; }

/* Logout */
.logout-wrap { padding: 8px 16px 0; }
.logout-btn {
  width: 100%; padding: 11px;
  background: rgba(239,68,68,0.06);
  border: 1px solid rgba(239,68,68,0.14);
  border-radius: 14px;
  color: var(--red); font-family: 'Inter', sans-serif;
  font-size: 12.5px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  transition: background .2s, border-color .2s;
}
.logout-btn:hover { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.25); }
.logout-btn svg { width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:2.2; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--s1);
  border-top: 1px solid var(--line);
  display: flex; padding: 8px 0 12px;
  z-index: 100;
  backdrop-filter: blur(12px);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  text-decoration: none;
}
.nav-item svg { width:18px; height:18px; fill:none; stroke:var(--t3); stroke-width:2; }
.nav-label { font-size: 9.5px; font-weight: 600; color: var(--t3); }
.nav-item.active svg { stroke: var(--p); }
.nav-item.active .nav-label { color: var(--p); }
</style>
</head>
<body>

<div class="hero">
  <div class="topbar">
    <button class="icon-btn" id="themeToggle" aria-label="Ganti tema">
      <svg id="iconSun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
    </button>
  </div>
  <div class="profile-row">
    <div class="ava-wrap">
      <div class="ava" id="avatarInitial">Z</div>
      <div class="ava-dot"></div>
    </div>
    <div class="profile-info">
      <div class="profile-name" id="username">zoytun santosa</div>
      <div class="profile-email" id="email">zoytunsantosa@gmail.com</div>
      <div class="admin-tag" id="roleTag">Admin</div>
    </div>
  </div>
</div>

<div class="bal-row">
  <div class="bal-card purple">
    <div class="bal-icon p">
      <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
    </div>
    <div>
      <div class="bal-label">Saldo</div>
      <div class="bal-val" id="balance">Rp 85.170</div>
    </div>
  </div>
  <div class="bal-card green">
    <div class="bal-icon g">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M8 12l2.5 2.5L16 9"/></svg>
    </div>
    <div>
      <div class="bal-label">Status</div>
      <div class="bal-val" style="color:var(--acc)">Aktif</div>
    </div>
  </div>
</div>

<div class="sec-wrap">

  <!-- Info Akun -->
  <div class="sec">
    <div class="sec-hdr">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span class="sec-hdr-label">Informasi Akun</span>
      <span class="sec-hdr-badge">Detail</span>
    </div>
    <div class="info-row">
      <span class="info-k">Username</span>
      <span class="info-v" id="username2">zoytun santosa</span>
    </div>
    <div class="info-row">
      <span class="info-k">Email</span>
      <span class="info-v" id="email2">zoytunsantosa@gmail.com</span>
    </div>
    <div class="info-row">
      <span class="info-k">Role</span>
      <span class="info-v"><span class="admin-tag">Admin</span></span>
    </div>
    <div class="info-row">
      <span class="info-k">Terdaftar Sejak</span>
      <span class="info-v" id="created_at">3 Juni 2026</span>
    </div>
  </div>

  <!-- Device Login -->
  <div class="sec">
    <div class="sec-hdr">
      <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
      <span class="sec-hdr-label">Device Login</span>
      <span class="sec-hdr-badge" style="background:rgba(16,185,129,0.1);color:var(--acc)">Aktif</span>
    </div>
    <div class="device-row">
      <div class="dev-icon" id="deviceIcon">📱</div>
      <div>
        <div class="dev-name" id="deviceName">Loading...</div>
        <div class="dev-sub">IP: <span id="deviceIp">—</span></div>
        <div class="dev-sub">Aktif: <span id="lastOnlineTime">—</span></div>
      </div>
    </div>
  </div>

  <!-- Pusat Bantuan -->
  <div class="sec">
    <div class="sec-hdr">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span class="sec-hdr-label">Pusat Bantuan</span>
    </div>
    <a class="menu-row" href="help.html">
      <div class="menu-l">
        <div class="menu-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <span class="menu-text">FAQ & Bantuan</span>
      </div>
      <svg class="menu-arr" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </a>
  </div>

</div>

<!-- Logout -->
<div class="logout-wrap" style="margin-bottom: 8px;">
  <button class="logout-btn" onclick="logout()">
    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    Keluar dari Akun
  </button>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <a class="nav-item" href="dashboard.html">
    <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
    <span class="nav-label">Home</span>
  </a>
  <a class="nav-item" href="transactions.html">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" stroke-width="1.5"/><polyline points="7,17 10,13 13,15 17,9"/></svg>
    <span class="nav-label">Riwayat</span>
  </a>
  <a class="nav-item active" href="#">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    <span class="nav-label">Profile</span>
  </a>
</nav>

<script>
// Theme
(function(){
  const saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
})();

document.getElementById('themeToggle').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
});

// Load profile from API
const token = localStorage.getItem('token');
const localUser = JSON.parse(localStorage.getItem('user') || 'null');
if (!localUser || !token) { localStorage.clear(); window.location.href = 'index.html'; }

async function loadProfile() {
  try {
    const res = await fetch('/api/profile', { headers: { 'Authorization': `Bearer ${token}` } });
    const result = await res.json();
    if (!result.success) { localStorage.clear(); window.location.href = 'index.html'; return; }
    const u = result.user;
    const name = u.username || '—';
    document.getElementById('username').innerText = name;
    document.getElementById('username2').innerText = name;
    document.getElementById('email').innerText = u.email || '—';
    document.getElementById('email2').innerText = u.email || '—';
    document.getElementById('avatarInitial').innerText = name.charAt(0).toUpperCase();
    document.getElementById('balance').innerText = 'Rp ' + Number(u.balance || 0).toLocaleString('id-ID');
    document.getElementById('created_at').innerText = u.created_at
      ? new Date(u.created_at).toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' })
      : '—';
    displayLastOnline(u.last_login);
  } catch(e) { console.error(e); }
}

async function detectDevice() {
  const ua = navigator.userAgent;
  let device = /iPhone/i.test(ua) ? 'iPhone' : /iPad/i.test(ua) ? 'iPad' : /Android/i.test(ua) ? (() => { const m = ua.match(/Android[^;]+;\s+([^;)]+)/i); return m ? m[1].trim() : 'Android'; })() : /Windows/i.test(ua) ? 'Windows PC' : /Mac/i.test(ua) ? 'Mac' : 'Unknown';
  const mobile = /Android|iPhone|iPad/i.test(ua);
  document.getElementById('deviceIcon').innerText = mobile ? '📱' : '💻';
  document.getElementById('deviceName').innerText = device;
}

async function loadIP() {
  try {
    const r = await fetch('https://api.ipify.org?format=json');
    const d = await r.json();
    document.getElementById('deviceIp').innerText = d.ip;
  } catch { document.getElementById('deviceIp').innerText = 'N/A'; }
}

function displayLastOnline(ts) {
  const d = ts ? new Date(ts) : new Date();
  document.getElementById('lastOnlineTime').innerText =
    d.toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric' }) + ' ' +
    d.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', hour12:false });
}

function logout() {
  if (confirm('Keluar dari akun?')) { localStorage.clear(); window.location.href = 'index.html'; }
}

loadProfile(); detectDevice(); loadIP();
</script>
</body>
</html>
