<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout VPN - Xtrimer Tunnel</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #0b132b;
    color: white;
    padding: 20px;
    min-height: 100vh;
}

.container {
    max-width: 480px;
    margin: 0 auto;
}

/* ── Header ── */
.page-header {
    text-align: center;
    margin-bottom: 20px;
}

.page-header h2 {
    color: #facc15;
    font-size: 22px;
    margin-bottom: 4px;
}

.page-header p {
    color: #9ca3af;
    font-size: 13px;
}

/* ── Server Info Card ── */
.server-card {
    background: #1c2541;
    border: 1px solid #2d3a55;
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 16px;
}

.server-name {
    color: #facc15;
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.server-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    padding: 6px 0;
    border-bottom: 1px solid #2d3a55;
    color: #d1d5db;
}

.server-row:last-child { border-bottom: none; }

.server-row span:first-child { color: #9ca3af; }

.server-row strong { color: white; }

.price-highlight {
    color: #facc15 !important;
    font-size: 18px !important;
    font-weight: bold;
}

/* ── Form Card ── */
.form-card {
    background: #1f2937;
    border: 1px solid #2d3a55;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
}

.form-card h3 {
    color: #facc15;
    font-size: 14px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
}

.form-group {
    margin-bottom: 14px;
}

.form-group label {
    display: block;
    font-size: 12px;
    color: #9ca3af;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.form-input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #374151;
    border-radius: 10px;
    background: #111827;
    color: white;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
}

.form-input:focus {
    border-color: #facc15;
}

.form-input::placeholder {
    color: #4b5563;
}

/* Duration selector */
.duration-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
}

.duration-opt {
    padding: 10px;
    border: 2px solid #374151;
    border-radius: 10px;
    background: #111827;
    color: #9ca3af;
    font-size: 13px;
    font-weight: bold;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
}

.duration-opt:hover {
    border-color: #facc15;
    color: white;
}

.duration-opt.selected {
    border-color: #facc15;
    background: #78350f;
    color: #facc15;
}

/* Protocol selector */
.protocol-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
}

.proto-opt {
    padding: 10px 6px;
    border: 2px solid #374151;
    border-radius: 10px;
    background: #111827;
    color: #9ca3af;
    font-size: 12px;
    font-weight: bold;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
}

.proto-opt:hover { border-color: #6b7280; color: white; }
.proto-opt.selected { color: white; }

.proto-opt[data-val="SSH"].selected       { border-color: #fde68a; background: #78350f; color: #fde68a; }
.proto-opt[data-val="VMESS"].selected     { border-color: #6ee7b7; background: #065f46; color: #6ee7b7; }
.proto-opt[data-val="VLESS"].selected     { border-color: #93c5fd; background: #1e3a5f; color: #93c5fd; }
.proto-opt[data-val="TROJAN"].selected    { border-color: #fca5a5; background: #7f1d1d; color: #fca5a5; }
.proto-opt[data-val="SHADOWSOCKS"].selected { border-color: #c4b5fd; background: #4c1d95; color: #c4b5fd; }

/* ── Buttons ── */
.btn-primary {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: #facc15;
    color: #0b132b;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
    margin-bottom: 10px;
    transition: opacity 0.15s;
}

.btn-primary:hover { opacity: 0.9; }

.btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.btn-back {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: #374151;
    color: #d1d5db;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.15s;
}

.btn-back:hover { background: #4b5563; }

/* ── Result ── */
#result { margin-top: 16px; }

/* ── Loading ── */
.loading-text {
    text-align: center;
    color: #9ca3af;
    font-size: 13px;
    padding: 10px 0;
}

</style>
</head>
<body>

<div class="container">

    <div class="page-header">
        <h2>🛒 Checkout VPN</h2>
        <p>Isi form di bawah untuk membuat akun</p>
    </div>

    <!-- Server Info -->
    <div class="server-card" id="serverInfo">
        <div class="loading-text">⏳ Memuat info server...</div>
    </div>

    <!-- Form -->
    <div class="form-card">
        <h3>🔧 Konfigurasi Akun</h3>

        <!-- Username -->
        <div class="form-group">
            <label>Username</label>
            <input
                class="form-input"
                id="username"
                placeholder="Contoh: user123"
                autocomplete="off">
        </div>

        <!-- Password (SSH only) -->
        <div class="form-group" id="passwordBox">
            <label>Password</label>
            <input
                class="form-input"
                id="password"
                type="password"
                placeholder="Password VPN">
        </div>

        <!-- Duration -->
        <div class="form-group">
            <label>Masa Aktif</label>
            <div class="duration-grid">
                <div class="duration-opt" data-val="7"  onclick="selectDuration(this)">7 Hari</div>
                <div class="duration-opt" data-val="15" onclick="selectDuration(this)">15 Hari</div>
                <div class="duration-opt selected" data-val="30" onclick="selectDuration(this)">30 Hari</div>
            </div>
        </div>

        <!-- Protocol -->
        <div class="form-group">
            <label>Protocol</label>
            <div class="protocol-grid">
                <div class="proto-opt selected" data-val="SSH"         onclick="selectProto(this)">SSH</div>
                <div class="proto-opt"          data-val="VMESS"       onclick="selectProto(this)">VMESS</div>
                <div class="proto-opt"          data-val="VLESS"       onclick="selectProto(this)">VLESS</div>
                <div class="proto-opt"          data-val="TROJAN"      onclick="selectProto(this)">TROJAN</div>
                <div class="proto-opt"          data-val="SHADOWSOCKS" onclick="selectProto(this)">SS</div>
            </div>
        </div>

    </div>

    <button class="btn-primary" id="buyBtn" onclick="createAccount()">
        🚀 Buat Akun
    </button>

    <button class="btn-back" onclick="history.back()">
        ← Kembali
    </button>

    <div id="result"></div>

</div>

<script>

const params   = new URLSearchParams(window.location.search);
const serverId = params.get('id');

let serverData    = null;
let selectedProto    = 'SSH';
let selectedDuration = 30;

loadServer();

// ── Duration selector ──
function selectDuration(el) {
    document.querySelectorAll('.duration-opt').forEach(d => d.classList.remove('selected'));
    el.classList.add('selected');
    selectedDuration = parseInt(el.dataset.val);
    updatePrice();
}

// ── Protocol selector ──
function selectProto(el) {
    document.querySelectorAll('.proto-opt').forEach(p => p.classList.remove('selected'));
    el.classList.add('selected');
    selectedProto = el.dataset.val;

    const passwordBox = document.getElementById('passwordBox');
    passwordBox.style.display = selectedProto === 'SSH' ? 'block' : 'none';
}

// ── Load server info ──
async function loadServer() {
    try {
        const res  = await fetch('/api/server/' + serverId);
        const data = await res.json();

        if (!data.success) {
            alert('Server tidak ditemukan');
            return;
        }

        serverData = data.server;
        renderServerInfo();

    } catch (err) {
        console.error(err);
        document.getElementById('serverInfo').innerHTML =
            '<div class="loading-text" style="color:#f87171">❌ Gagal memuat server</div>';
    }
}
selectProto(
document.querySelector(
'.proto-opt.selected'
)
);
function renderServerInfo() {
    if (!serverData) return;

    const hargaPerHari = Number(serverData.harga || 0);
    const quotaPerHari = parseInt(serverData.quota) || 0;
    const harga = hargaPerHari * selectedDuration;
    const quota = quotaPerHari * selectedDuration;

    document.getElementById('serverInfo').innerHTML = `
        <div class="server-name">🌐 ${serverData.nama_server}</div>
        <div class="server-row">
            <span>📍 Lokasi</span>
            <strong>${serverData.lokasi || '-'}</strong>
        </div>
        <div class="server-row">
            <span>📦 Quota</span>
            <strong>${quota} GB</strong>
        </div>
        <div class="server-row">
            <span>📱 Device</span>
            <strong>${serverData.iplimit || 0} IP</strong>
        </div>
        <div class="server-row">
            <span>🗓 Masa Aktif</span>
            <strong>${selectedDuration} Hari</strong>
        </div>
        <div class="server-row">
            <span>💰 Total Harga</span>
            <strong class="price-highlight">Rp ${harga.toLocaleString('id-ID')}</strong>
        </div>
    `;
}

function updatePrice() {
    if (serverData) renderServerInfo();
}

// ── Create account ──
async function createAccount() {
    const localUser = JSON.parse(localStorage.getItem('user'));
    if (!localUser) {
        alert('Silakan login terlebih dahulu');
        return;
    }

    const username =
document.getElementById('username')
.value
.trim()
.toLowerCase();
    const password = document.getElementById('password').value.trim();

    if (!username) {
    alert('Username wajib diisi');
    return;
}

if (!/^[a-zA-Z0-9]+$/.test(username)) {
    alert('Username hanya boleh huruf & angka');
    return;
}

    if (selectedProto === 'SSH' && !password) {
        alert('Password wajib diisi untuk SSH');
        return;
    }

    const btn = document.getElementById('buyBtn');
    btn.disabled = true;
    btn.innerText = '⏳ Memproses...';

    try {
        const res = await fetch('/api/create-account', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email:     localUser.email,
                server_id: serverId,
                username,
                password,
                protocol:  selectedProto,
                duration:  selectedDuration
            })
        });

        const data = await res.json();

        if (!data.success) {
            alert(data.message);
            btn.disabled = false;
            btn.innerText = '🚀 Buat Akun';
            return;
        }

        document.getElementById('result').innerHTML = data.html;
        document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        btn.disabled = false;
        btn.innerText = '🚀 Buat Akun';

    } catch (err) {
        console.error(err);
        alert('Gagal membuat akun, coba lagi');
        btn.disabled = false;
        btn.innerText = '🚀 Buat Akun';
    }
}

</script>
</body>
</html>
