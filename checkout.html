<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout VPN - Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>

:root {
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #3D0F72;
  --purple-light: #9B4FDE;
  --purple-soft:  #F3EAFD;
  --purple-mid:   #EAD5FA;
  --accent:       #FF6B2B;
  --accent-light: #FFEFEA;
  --green:        #12C28A;
  --green-bg:     #E6FAF4;
  --green-dark:   #0A9E70;
  --red:          #E84040;
  --red-bg:       #FFECEC;
  --white:        #FFFFFF;
  --bg:           #F8F6FC;
  --gray-line:    #EEF0F6;
  --text-dark:    #1A0533;
  --text-mid:     #6B3FA0;
  --text-light:   #A882CC;
  --card-bg:      #FFFFFF;
  --input-bg:     #F8F6FC;
  --nav-bg:       #FFFFFF;
  --nav-shadow:   rgba(90,26,154,0.06);
}

/* ── SINKRONISASI TOTAL DENGAN PRODUCTS.HTML (GOPAY-INSPIRED DARK THEME) ── */
html[data-theme="dark"] {
  --purple-soft:  #202124;
  --purple-mid:   #2a2b2f;
  --green-bg:     #0c2a21;
  --red-bg:       #311111;
  --white:        #17181c;
  --bg:           #0a0b0d;
  --card-bg:      #1c1d21; /* Menggunakan basis warna card yang sama */
  --gray-line:    #303135;
  --text-dark:    #e8eaed;
  --text-mid:     #bdc1c6;
  --text-light:   #9aa0a6;
  --input-bg:     #202124;
  --accent-light: #3A241F;
  --nav-bg:       #17181c;
  --nav-shadow:   rgba(0,0,0,0.4);
}

/* prevent flash before JS runs */
html { background: var(--bg); }

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  color: var(--text-dark);
  padding-bottom: 90px;
  overflow-x: hidden;
  transition: background 0.25s ease, color 0.25s ease;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes spin { to { transform:rotate(360deg); } }

.header {
  background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple) 60%, var(--purple-light) 100%);
  padding: 28px 20px 48px;
  position: relative; overflow: hidden; z-index: 2;
}
.header::before {
  content:''; position:absolute; top:-40px; right:-20px;
  width:160px; height:160px;
  border:32px solid rgba(255,255,255,0.05); border-radius:50%;
}
.hero-dots {
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 20px 20px; pointer-events:none;
}
.header-inner {
  display:flex; align-items:center; gap:12px;
  max-width: 440px; margin: 0 auto; position:relative; z-index:2;
}
.back-btn-hdr {
  width:36px; height:36px; border-radius:11px;
  background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.18);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:background 0.15s; backdrop-filter:blur(8px);
}
.back-btn-hdr:hover { background:rgba(255,255,255,0.2); }
.back-btn-hdr svg { width:18px; height:18px; fill:none; stroke:#fff; stroke-width:2.5; }
.header-title { flex:1; }
.header-title h1 {
  font-size:18px; font-weight:900; color:#fff; line-height:1.1; letter-spacing:-0.2px;
  display:flex; align-items:center; gap:6px;
}
.header-title h1 svg { width:20px; height:20px; fill:none; stroke:#fff; stroke-width:2.2; }
.header-title p { font-size:11px; color:rgba(255,255,255,0.55); font-weight:700; margin-top:3px; }

.theme-toggle {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s; backdrop-filter: blur(6px);
}
.theme-toggle:hover { background: rgba(255,255,255,0.25); transform: scale(1.08); }
.theme-toggle svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2.2; }
.icon-sun  { display: none; }
.icon-moon { display: block; }
html:not([data-theme="dark"]) .icon-sun  { display: block; }
html:not([data-theme="dark"]) .icon-moon { display: none; }

.container {
  max-width:440px; margin:0 auto; padding:0 16px;
  position:relative; z-index:2;
}

.server-card {
  background:var(--card-bg); border-radius:16px; margin-top:-28px; margin-bottom:14px;
  overflow:hidden; border:1px solid var(--gray-line);
  box-shadow:0 8px 24px rgba(90,26,154,0.04);
  position:relative; z-index:3;
  animation: fadeUp 0.4s 0.05s ease both;
  transition: background 0.25s ease, border-color 0.25s ease;
}
html[data-theme="dark"] .server-card {
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
}
.server-card-head {
  background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple) 60%);
  padding:14px 16px; display:flex; align-items:center; gap:10px;
}
.server-icon {
  width:36px; height:36px; border-radius:10px;
  background:rgba(255,255,255,0.15);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.server-icon svg { width:18px; height:18px; fill:none; stroke:#fff; stroke-width:2.2; }
.server-name { font-size:15px; font-weight:900; color:#fff; line-height:1.2; }
.server-sub { font-size:11px; color:rgba(255,255,255,0.55); font-weight:700; }
.server-info-grid { padding:14px 16px; display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.si-label {
  font-size:10px; font-weight:800; color:var(--text-light);
  text-transform:uppercase; letter-spacing:0.5px; margin-bottom:2px;
  display:flex; align-items:center; gap:4px;
}
.si-label svg { width:12px; height:12px; fill:none; stroke:var(--text-light); stroke-width:2; }
.si-val { font-size:14px; font-weight:900; color:var(--text-dark); }
.si-val.price-val { color:var(--purple); font-size:16px; }
html[data-theme="dark"] .si-val.price-val { color: var(--purple-light); }

.server-loading {
  padding:24px; text-align:center; color:var(--text-mid); font-weight:700; font-size:13px;
  display:flex; flex-direction:column; align-items:center; gap:8px;
}
.server-loading svg {
  width:24px; height:24px; fill:none; stroke:var(--purple);
  stroke-width:2.5; animation: spin 1s linear infinite;
}

.form-card {
  background:var(--card-bg); border-radius:16px; padding:16px; margin-bottom:14px;
  border:1px solid var(--gray-line); box-shadow:0 4px 14px rgba(90,26,154,0.02);
  animation: fadeUp 0.4s 0.12s ease both;
  transition: background 0.25s ease, border-color 0.25s ease;
}
html[data-theme="dark"] .form-card {
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
}
.form-section-title {
  font-size:14px; font-weight:900; color:var(--text-dark);
  display:flex; align-items:center; gap:6px; margin-bottom:14px;
}
.form-section-title svg { width:16px; height:16px; fill:none; stroke:var(--purple); stroke-width:2.2; }
html[data-theme="dark"] .form-section-title svg { stroke: var(--purple-light); }

.form-group { margin-bottom:14px; }
.form-group:last-child { margin-bottom:0; }
.field-label {
  font-size:10px; font-weight:800; color:var(--text-mid); text-transform:uppercase;
  letter-spacing:0.5px; margin-bottom:6px; display:flex; align-items:center; gap:4px;
}
.field-label svg { width:12px; height:12px; fill:none; stroke:var(--text-mid); stroke-width:2; }
.field-input {
  width:100%; padding:11px 14px; border:1px solid var(--gray-line); border-radius:12px;
  font-family:'Nunito',sans-serif; font-size:13px; font-weight:700;
  color:var(--text-dark); background:var(--input-bg); outline:none; transition:all 0.15s;
}
.field-input:focus { border-color:var(--purple); background:var(--card-bg); box-shadow:0 0 0 3px rgba(123,47,190,0.06); }
html[data-theme="dark"] .field-input:focus { border-color: var(--purple-light); box-shadow: 0 0 0 3px rgba(155,79,222,0.15); }
.field-input::placeholder { color:var(--text-light); font-weight:600; }

.duration-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
.duration-opt {
  padding:10px 4px; border:1px solid var(--gray-line); border-radius:11px;
  background:var(--input-bg); color:var(--text-mid);
  font-family:'Nunito',sans-serif; font-size:12px; font-weight:800;
  text-align:center; cursor:pointer; transition:all 0.15s;
}
.duration-opt:hover { border-color:var(--purple); color:var(--purple); background:var(--card-bg); }
html[data-theme="dark"] .duration-opt:hover { border-color: var(--purple-light); color: var(--purple-light); }
.duration-opt.selected { border-color:var(--purple); background:var(--purple-soft); color:var(--purple); }
html[data-theme="dark"] .duration-opt.selected { border-color: var(--purple-light); background: var(--purple-soft); color: var(--purple-light); }

.protocol-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
.proto-opt {
  padding:10px 2px; border:1px solid var(--gray-line); border-radius:11px;
  background:var(--input-bg); color:var(--text-mid);
  font-family:'Nunito',sans-serif; cursor:pointer;
  transition:all 0.15s; display:flex; flex-direction:column; align-items:center; gap:4px;
}
.proto-opt:hover { border-color:var(--purple); color:var(--purple); background:var(--card-bg); }
html[data-theme="dark"] .proto-opt:hover { border-color: var(--purple-light); color: var(--purple-light); }
.proto-opt .proto-icon svg { width:16px; height:16px; fill:none; stroke:currentColor; stroke-width:2.2; }
.proto-opt .proto-name { font-size:10px; font-weight:800; }

.proto-opt[data-val="SSH"].selected    { border-color:var(--accent); background:var(--accent-light); color:var(--accent); }
.proto-opt[data-val="VMESS"].selected  { border-color:#0077AA; background:rgba(0,119,170,0.1); color:#0077AA; }
html[data-theme="dark"] .proto-opt[data-val="VMESS"].selected { background:rgba(0,119,170,0.2); }
.proto-opt[data-val="VLESS"].selected  { border-color:var(--purple); background:var(--purple-soft); color:var(--purple); }
html[data-theme="dark"] .proto-opt[data-val="VLESS"].selected { border-color:var(--purple-light); color:var(--purple-light); }
.proto-opt[data-val="TROJAN"].selected { border-color:var(--red); background:var(--red-bg); color:var(--red); }

.btn-checkout {
  width:100%; padding:14px; border:none; border-radius:14px;
  background:linear-gradient(135deg, var(--purple-dark), var(--purple));
  color:#fff; font-family:'Nunito',sans-serif; font-weight:900; font-size:14px;
  cursor:pointer; margin-bottom:10px;
  display:flex; align-items:center; justify-content:center; gap:6px;
  box-shadow:0 6px 18px rgba(90,26,154,0.2);
  transition:all 0.15s; animation: fadeUp 0.4s 0.2s ease both;
}
html[data-theme="dark"] .btn-checkout { color: var(--bg); background: var(--text-dark); box-shadow: 0 6px 18px rgba(0,0,0,0.3); }
html[data-theme="dark"] .btn-checkout:hover { background: var(--purple); color: #fff; }
.btn-checkout svg { width:16px; height:16px; fill:none; stroke:#fff; stroke-width:2.2; }
html[data-theme="dark"] .btn-checkout svg { stroke: var(--bg); }
html[data-theme="dark"] .btn-checkout:hover svg { stroke: #fff; }
.btn-checkout:hover { opacity: 0.95; transform:translateY(-1px); }
.btn-checkout:disabled { opacity:0.55; cursor:not-allowed; transform:none; }

.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 440px; background: var(--nav-bg);
  border-top: 1px solid var(--gray-line);
  box-shadow: 0 -4px 20px var(--nav-shadow); z-index: 999;
  transition: background 0.25s ease, border-color 0.25s ease;
}
.bottom-nav-inner { display: flex; align-items: center; justify-content: space-around; padding: 10px 0 14px; }
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  text-decoration: none; color: var(--text-light); width: 70px; transition: all 0.2s;
}
.nav-icon svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; transition: transform 0.2s; }
.nav-label { font-size: 9.5px; font-weight: 800; }
.nav-item:hover .nav-icon svg { transform: translateY(-2px); }
.nav-item.active { color: var(--purple); }
html[data-theme="dark"] .nav-item.active { color: var(--purple-light); }
.nav-item.active .nav-icon svg { stroke: var(--purple); }
html[data-theme="dark"] .nav-item.active .nav-icon svg { stroke: var(--purple-light); }

#result { margin-top:14px; animation: fadeUp 0.4s ease both; }

.toast {
  position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-80px);
  z-index:1000; padding:10px 18px; border-radius:12px; font-weight:700; font-size:12px;
  display:flex; align-items:center; gap:6px; box-shadow:0 8px 24px rgba(0,0,0,0.12);
  transition:all 0.3s cubic-bezier(0.34,1.2,0.64,1); opacity:0; white-space:nowrap;
  color:#fff; background:var(--text-dark);
}
.toast svg { width:14px; height:14px; fill:none; stroke:#fff; stroke-width:2.5; flex-shrink:0; }
.toast.show    { transform:translateX(-50%) translateY(0); opacity:1; }
.toast.success { background:linear-gradient(135deg, var(--green), #00E676); }
.toast.error   { background:linear-gradient(135deg, var(--red), #FF7A7A); }

</style>
</head>

<script>

const params         = new URLSearchParams(window.location.search);
const serverId       = params.get('id');
let serverData       = null;
let selectedProto    = 'SSH';
let selectedDuration = 30;

// ─── THEME MANAGER ───
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}
(function() {
  const saved = localStorage.getItem('theme');
  if (saved === 'dark' || saved === 'light') {
    document.documentElement.setAttribute('data-theme', saved);
  } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  } else {
    document.documentElement.setAttribute('data-theme', 'light');
  }
})();

const token = localStorage.getItem('token');

loadServer();
selectProto(document.querySelector('.proto-opt.selected'));

function selectDuration(el) {
  document.querySelectorAll('.duration-opt').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
  selectedDuration = parseInt(el.dataset.val);
  updatePrice();
}

function selectProto(el) {
  document.querySelectorAll('.proto-opt').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');
  selectedProto = el.dataset.val;
  document.getElementById('passwordBox').style.display =
    selectedProto === 'SSH' ? 'block' : 'none';
}

async function loadServer() {
  try {
    const res  = await fetch('/api/server/' + serverId);
    const data = await res.json();
    if (!data.success) { showToast('Server tidak ditemukan', 'error'); return; }
    serverData = data.server;
    renderServerInfo();
  } catch (err) {
    console.error(err);
    document.getElementById('serverInfo').innerHTML = `
      <div class="server-loading" style="color:var(--red);">
        <svg viewBox="0 0 24 24" style="stroke:var(--red);animation:none;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16" stroke-width="3"/></svg>
        Gagal memuat server
      </div>`;
  }
}

function renderServerInfo() {
  if (!serverData) return;
  const harga = Number(serverData.harga || 0) * selectedDuration;
  const quota = (parseInt(serverData.quota) || 0) * selectedDuration;

  document.getElementById('serverInfo').innerHTML = `
    <div class="server-card-head">
      <div class="server-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      </div>
      <div>
        <div class="server-name">${serverData.nama_server}</div>
        <div class="server-sub">${serverData.lokasi || 'Server VPN'}</div>
      </div>
    </div>
    <div class="server-info-grid">
      <div>
        <div class="si-label">
          <svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
          Quota
        </div>
        <div class="si-val">${quota} GB</div>
      </div>
      <div>
        <div class="si-label">
          <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18" stroke-width="3"/></svg>
          Device
        </div>
        <div class="si-val">${serverData.iplimit || 0} IP</div>
      </div>
      <div>
        <div class="si-label">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Masa Aktif
        </div>
        <div class="si-val">${selectedDuration} Hari</div>
      </div>
      <div>
        <div class="si-label">
          <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Total Harga
        </div>
        <div class="si-val price-val">Rp ${harga.toLocaleString('id-ID')}</div>
      </div>
    </div>`;
}

function updatePrice() {
  if (serverData) renderServerInfo();
}

async function createAccount() {
  if (!token) {
    showToast('Silakan login terlebih dahulu', 'error');
    setTimeout(() => window.location.href = 'index.html', 1500);
    return;
  }

  const username = document.getElementById('username').value.trim().toLowerCase();
  const password = document.getElementById('password').value.trim();

  if (!username) { showToast('Username wajib diisi', 'error'); return; }
  if (!/^[a-zA-Z0-9]+$/.test(username)) { showToast('Username hanya huruf & angka', 'error'); return; }
  if (selectedProto === 'SSH' && !password) { showToast('Password wajib untuk SSH', 'error'); return; }

  const btn = document.getElementById('buyBtn');
  btn.disabled = true;
  btn.innerHTML = `
    <svg viewBox="0 0 24 24" style="animation:spin 1s linear infinite;"><path d="M12 2a10 10 0 0 1 10 10"/></svg>
    Memproses...`;

  try {
    const res  = await fetch('/api/create-account', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({
        server_id: serverId,
        username,
        password,
        protocol:  selectedProto,
        duration:  selectedDuration
      })
    });
    const data = await res.json();

    if (!data.success) {
      showToast(data.message || 'Gagal membuat akun', 'error');
      resetBtn();
      return;
    }

    showToast('Akun berhasil dibuat!', 'success');
    document.getElementById('result').innerHTML = data.html;
    document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
    resetBtn();

  } catch (err) {
    console.error(err);
    showToast('Gagal membuat akun, coba lagi', 'error');
    resetBtn();
  }
}

function resetBtn() {
  const btn = document.getElementById('buyBtn');
  btn.disabled = false;
  btn.innerHTML = `
    <svg viewBox="0 0 24 24"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2"/><path d="M12 8L8 12l1.5 4L15.5 9.5z"/><path d="M22 2L15.5 9.5"/><path d="M22 2s-4 0-9 5c-2 2-3 4-3 4"/></svg>
    Buat Akun Sekarang`;
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  const icon = type === 'success'
    ? `<svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>`
    : `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`;
  t.innerHTML = icon + msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.className = 'toast ' + type, 2600);
}

function copyDirectLink(btnEl, encodedText) {
  var rowEl = btnEl.closest('.link-row');
  var text = decodeURIComponent(encodedText);
  var originalHTML = btnEl.innerHTML;

  function onSuccess() {
    rowEl.classList.add('copied-active');
    btnEl.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="display:inline-block;vertical-align:middle;margin-right:4px"><polyline points="20 6 9 17 4 12"></polyline></svg> Berhasil!';
    setTimeout(function() {
      rowEl.classList.remove('copied-active');
      btnEl.innerHTML = originalHTML;
    }, 2000);
  }

  function fallback() {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;font-size:16px';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    ta.setSelectionRange(0, 99999);
    try {
      var ok = document.execCommand('copy');
      if (ok) onSuccess();
    } catch(e) {
      console.error('Copy gagal:', e);
    }
    document.body.removeChild(ta);
  }

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(onSuccess).catch(fallback);
  } else {
    fallback();
  }
}

</script>
