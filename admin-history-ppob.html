<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Admin Kelola PPOB - Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght=400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── TOKENS SYNCHRONIZED 100% WITH DASHBOARD.HTML (PREMIUM LIGHT MODE) ── */
:root {
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #3D0F72;
  --purple-light: #9B4FDE;
  
  --purple-soft:  #E2E8F0; 
  --purple-mid:   #CBD5E1;
  --accent:       #FF6B2B;
  --accent2:      #FFD600;
  --green:        #12C28A;
  --green-bg:     #E2F7F1;
  --red:          #E84040;
  --red-bg:       #FEE2E2;
  
  --white:        #FFFFFF;
  --bg:           #F1F5F9; 
  --card:         #F8FAFC; 
  --gray-line:    #E2E8F0; 
  
  --text-dark:    #0F172A; 
  --text-mid:     #334155; 
  --text-light:   #64748B; 

  --shadow-sm:  0 4px 12px rgba(15, 23, 42, 0.03);
  --shadow-md:  0 6px 18px rgba(15, 23, 42, 0.05);
  --shadow-lg:  0 10px 25px rgba(15, 23, 42, 0.05);

  --r-card: 14px;
  --r-btn:  10px;
  
  --nav-bg:       #F8FAFC;
  --nav-shadow:   rgba(15, 23, 42, 0.08);
}

html[data-theme="dark"] {
  --purple-soft:  #202124;
  --purple-mid:   #2a2b2f;
  --green-bg:     #0c2a21;
  --red-bg:       #311111;
  --white:        #17181c;
  --bg:           #0a0b0d;
  --card:         #1c1d21;
  --gray-line:    #303135;
  --text-dark:    #E2E8F0; 
  --text-mid:     #94A3B8;  
  --text-light:   #64748B;
  --nav-bg:       #17181c;
  --nav-shadow:   rgba(0,0,0,0.4);
}

html[data-theme="dark"] body { background: var(--bg); color: var(--text-dark); }
html[data-theme="dark"] .search-box,
html[data-theme="dark"] .filter-btn,
html[data-theme="dark"] .status-box,
html[data-theme="dark"] .log-card,
html[data-theme="dark"] .bottom-nav { background: var(--card); border-color: var(--gray-line); }
html[data-theme="dark"] .log-body { background: var(--bg); }

html { background: var(--bg); }

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  color: var(--text-dark);
  padding-bottom: 90px;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  transition: background .25s ease, color .25s ease;
}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ─── HERO HEADER ─── */
.hero {
  background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple) 60%, var(--purple-light) 100%);
  padding: 24px 20px 48px;
  position: relative; overflow: hidden; z-index: 2;
  animation: fadeUp 0.4s ease both;
}
.hero::before {
  content:''; position:absolute; top:-40px; right:-20px;
  width:140px; height:140px;
  border:28px solid rgba(255,255,255,0.05); border-radius:50%;
}
.hero-dots {
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 200px 20px; pointer-events:none;
}

.hero-top {
  display:flex; align-items:center; gap:12px;
  max-width: 440px; margin: 0 auto; position:relative; z-index:2;
}

.back-btn {
  width:32px; height:32px; border-radius:50%;
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.15);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all .2s; backdrop-filter:blur(10px);
  text-decoration: none;
}
.back-btn:hover { background:rgba(255,255,255,.2); transform:translateY(-2px); }
.back-btn svg { width:15px; height:15px; fill:none; stroke:#fff; stroke-width:2.5; }

.hero-title { flex:1; min-width:0; }
.hero-title h1 {
  font-size:16px; font-weight:900; color:#fff; line-height:1.2; letter-spacing:-.2px;
  display: flex; align-items: center; gap: 6px;
}
.hero-title p {
  font-size:10.5px; font-weight:600; color: rgba(255,255,255,.75); margin-top:1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ─── THEME TOGGLE ─── */
.theme-toggle {
  width:32px; height:32px; border-radius:50%;
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.15);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .2s; backdrop-filter: blur(10px);
  flex-shrink: 0;
}
.theme-toggle:hover { background: rgba(255,255,255,.2); transform: translateY(-2px); }
.theme-toggle svg { width: 15px; height: 15px; fill: none; stroke: #fff; stroke-width: 2.2; }

html[data-theme="dark"] .theme-toggle .icon-sun { display: none; }
html[data-theme="dark"] .theme-toggle .icon-moon { display: flex; }
html:not([data-theme="dark"]) .theme-toggle .icon-sun { display: flex; }
html:not([data-theme="dark"]) .theme-toggle .icon-moon { display: none; }

.admin-badge {
  background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.15);
  border-radius:20px; padding:4px 10px;
  font-size:9px; font-weight:800; color:#fff;
  letter-spacing:0.5px; white-space:nowrap; flex-shrink:0;
  backdrop-filter:blur(10px);
}

/* ─── CONTAINER ─── */
.container {
  max-width: 440px; margin: 0 auto;
  padding: 0 16px; position: relative; z-index: 2;
}

/* ─── SEARCH BAR ─── */
.search-wrap {
  max-width: 440px; margin: -28px auto 0;
  padding: 0 16px; position: relative; z-index: 20;
  animation: fadeUp 0.4s 0.08s ease both;
}
.search-box {
  width: 100%; background: var(--white);
  border-radius: 16px; border: 1px solid var(--gray-line);
  box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
  display: flex; align-items: center; gap: 10px; padding: 14px;
  transition: all .25s ease;
}
.search-box svg { color: var(--text-light); flex-shrink: 0; width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.5; }
.search-input {
  flex: 1; border: none; outline: none;
  font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700;
  color: var(--text-dark); background: transparent;
}
.search-input::placeholder { color: var(--text-light); font-weight: 600; }

/* ─── FILTER TABS ─── */
.filter-container {
  display: flex; gap: 6px; margin: 16px 0 12px 0; overflow-x: auto;
  padding: 2px 2px 6px 2px; scrollbar-width: none;
}
.filter-container::-webkit-scrollbar { display: none; }

.filter-btn {
  background: var(--white); border: 1px solid var(--gray-line);
  padding: 6px 14px; border-radius: 20px; font-size: 11.5px; font-weight: 800;
  color: var(--text-light); cursor: pointer; white-space: nowrap; transition: all 0.2s ease;
  font-family: 'Nunito', sans-serif;
  display: inline-flex; align-items: center; gap: 5px;
  box-shadow: var(--shadow-sm);
}
.filter-btn svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2.5; }
.filter-btn:hover { border-color: var(--purple-light); color: var(--purple); }
.filter-btn.active {
  background: var(--purple); color: #FFFFFF; border-color: var(--purple);
  box-shadow: 0 4px 14px rgba(123, 47, 190, 0.15);
}
html[data-theme="dark"] .filter-btn.active { background: var(--purple-light); border-color: var(--purple-light); }

/* ─── LOADING & STATUS STATE ─── */
.status-box {
  background: var(--white); border-radius: var(--r-card); padding: 40px 20px;
  border: 1px solid var(--gray-line); text-align: center; color: var(--text-light);
  box-shadow: var(--shadow-sm); font-size: 12px; font-weight: 700;
}
.status-box svg { display: block; margin: 0 auto 10px; width: 22px; height: 22px; fill: none; stroke: var(--purple); stroke-width: 2.5; animation: spin 1s linear infinite; }
html[data-theme="dark"] .status-box svg { stroke: var(--purple-light); }
.hidden { display: none !important; }

/* ─── TRANSACTION LOG CARD ─── */
.logs-list { display: flex; flex-direction: column; gap: 10px; }
.log-card {
  background: var(--white); border-radius: var(--r-card); padding: 14px;
  border: 1px solid var(--gray-line); display: flex; flex-direction: column; gap: 10px;
  box-shadow: var(--shadow-sm); animation: fadeUp 0.4s ease both;
  transition: transform 0.2s ease, background 0.25s, border-color 0.25s;
}
.log-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }

.log-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed var(--gray-line); padding-bottom: 8px; }
.log-sku { font-size: 13.5px; font-weight: 900; color: var(--text-dark); letter-spacing: -0.1px; }
.log-date { font-size: 10.5px; font-weight: 600; color: var(--text-light); display: flex; align-items: center; gap: 4px; }
.log-date svg { width: 12px; height: 12px; stroke: currentColor; stroke-width: 2.2; }

.log-body { background: var(--bg); padding: 10px; border-radius: 10px; display: flex; flex-direction: column; gap: 6px; transition: background 0.25s; }
.row-item { display: flex; justify-content: space-between; align-items: flex-start; font-size: 11.5px; }
.row-lbl { color: var(--text-light); font-weight: 700; }
.row-val { color: var(--text-mid); font-weight: 800; text-align: right; display: inline-flex; align-items: center; gap: 4px; }
.row-val svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2.2; }

.log-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 2px; }
.log-price { font-size: 15px; font-weight: 900; color: var(--text-dark); }

/* Badges */
.badge { font-size: 8.5px; font-weight: 800; padding: 2px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.2px; display: inline-flex; align-items: center; gap: 4px; }
.badge svg { width: 10px; height: 10px; fill: none; stroke: currentColor; stroke-width: 2.5; }
.badge.sukses { background: var(--green-bg); color: var(--green); border: 1px solid rgba(18,194,138,0.1); }
html[data-theme="dark"] .badge.sukses { color: #12C28A; }
.badge.pending { background: #FFF3E0; color: #C05600; border: 1px solid rgba(192,86,0,0.1); }
.badge.gagal { background: var(--red-bg); color: var(--red); border: 1px solid rgba(232,64,64,0.1); }
html[data-theme="dark"] .badge.gagal { color: #E84040; }

/* Source Platform Badge */
.platform-badge { font-size: 8.5px; font-weight: 800; padding: 2px 6px; border-radius: 5px; display: inline-flex; align-items: center; letter-spacing: 0.2px; text-transform: uppercase; }
.platform-badge.web { background: #EEF4FF; color: #1D4ED8; border: 1px solid rgba(29,78,216,0.1); }
.platform-badge.telegram { background: #E1F5FE; color: #0288D1; border: 1px solid rgba(2,136,209,0.1); }

/* ─── BOTTOM NAV ─── */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 440px; background: var(--nav-bg);
  border-top: 1px solid var(--gray-line);
  box-shadow: var(--nav-shadow); z-index: 999;
  transition: background 0.25s ease, border-color 0.25s ease;
}
.bottom-nav-inner { display: flex; align-items: center; justify-content: space-around; padding: 10px 0 14px; }
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; text-decoration: none; color: var(--text-light); width: 70px; transition: all 0.2s; }
.nav-icon svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; transition: transform 0.2s; }
.nav-label { font-size: 9px; font-weight: 800; }
.nav-item:hover .nav-icon svg { transform: translateY(-2px); }
.nav-item.active { color: var(--purple); }
html[data-theme="dark"] .nav-item.active { color: var(--purple-light); }
.nav-item.active .nav-icon svg { stroke: var(--purple); }
html[data-theme="dark"] .nav-item.active .nav-icon svg { stroke: var(--purple-light); }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-dots"></div>
  <div class="hero-top">
    <a class="back-btn" href="admin.html" aria-label="Kembali ke Admin Panel">
      <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </a>
    <div class="hero-title">
      <h1>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="width:16px;height:16px;display:inline-block;vertical-align:middle;margin-right:2px;margin-top:-2px;"><rect x="3" y="3" width="18" height="18" rx="2" stroke-width="2"/><polyline points="7,17 10,13 13,15 17,9"/></svg>

          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>

</div>

<div class="search-wrap">

    <input class="search-input" id="search-bar" type="text" placeholder="Cari target, produk, atau email..." oninput="searchData()">
  </div>
</div>

<div class="container">

  <div class="filter-container">
    <button class="filter-btn active" onclick="filterStatus('ALL', this)">Semua</button>
    <button class="filter-btn" onclick="filterStatus('PENDING', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>

    </button>
  </div>

  <div id="content-area">

      <svg viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line></svg>

<script>
  // ─── THEME MANAGER SYSTEM (SINKRON 100% DENGAN DASHBOARD & LOCALSTORAGE) ───
  (function initTheme(){
    const saved = localStorage.getItem('theme');
    if (saved === 'dark' || saved === 'light') {
      document.documentElement.setAttribute('data-theme', saved);
    } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.setAttribute('data-theme', 'dark');
    } else {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  })();

  document.getElementById('themeToggle').addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  });

  // ─── DATA & LOGIC ───
  let rawData = [];
  let filterActive = 'ALL';

  const localUser = JSON.parse(localStorage.getItem('user'));
  const token = localStorage.getItem('token');

  // Proteksi Autentikasi Admin
  if (!localUser || !token || localUser.role !== 'admin') {
    window.location.replace('dashboard.html');
  }

  const getHeaders = () => ({
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${token}`
  });

  async function fetchAllPPOBHistory() {
    try {
      const res = await fetch('/api/admin/ppob-history', { headers: getHeaders() });
      const resJson = await res.json();

      if (resJson.success) {
        rawData = resJson.transactions || [];
        document.getElementById('logCountLabel').innerText = rawData.length + ' transaksi terdaftar';
        document.getElementById('logCountBadge').innerText = rawData.length + ' Log';
        renderLogs();
      } else {
        showEmptyState(resJson.message || "Gagal memuat log.");
      }
    } catch (err) {
      console.error(err);
      showEmptyState("Koneksi gagal tersambung ke server API.");
    }
  }

  function renderLogs() {
    const grid = document.getElementById('logs-grid');
    const loadingBox = document.getElementById('status-loading');
    const searchVal = document.getElementById('search-bar').value.toLowerCase();
    
    grid.innerHTML = '';

    const filtered = rawData.filter(item => {
      const stat = (item.status || 'PENDING').toUpperCase();
      let matchStatus = false;
      if (filterActive === 'ALL') matchStatus = true;
      else if (filterActive === 'SUKSES') matchStatus = (stat === 'SUKSES' || stat === 'SUCCESS');
      else if (filterActive === 'GAGAL') matchStatus = (stat === 'GAGAL' || stat === 'FAILED' || stat === 'FAILURE');
      else if (filterActive === 'PENDING') matchStatus = (stat === 'PENDING');

      if (!matchStatus) return false;

      const target = (item.target || '').toLowerCase();
      const sku = (item.sku || '').toLowerCase();
      const email = (item.web_user_email || '').toLowerCase();
      const ref = (item.ref_id || '').toLowerCase();
      const uid = String(item.user_id || '').toLowerCase();

      return target.includes(searchVal) || sku.includes(searchVal) || email.includes(searchVal) || ref.includes(searchVal) || uid.includes(searchVal);
    });

    if (filtered.length === 0) {
      showEmptyState("Tidak ditemukan riwayat log transaksi.");
      return;
    }

    loadingBox.classList.add('hidden');

    filtered.forEach((item, index) => {
      const card = document.createElement('div');
      card.className = 'log-card';
      card.style.animationDelay = `${index * 0.045}s`;

      const stat = (item.status || 'PENDING').toUpperCase();
      let statusClass = 'pending';
      let displayStatus = 'PENDING';
      let statusIcon = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';

      if (stat === 'SUKSES' || stat === 'SUCCESS') { 
        statusClass = 'sukses'; 
        displayStatus = 'SUKSES'; 
        statusIcon = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';
      }
      if (stat === 'GAGAL' || stat === 'FAILED' || stat === 'FAILURE') { 
        statusClass = 'gagal'; 
        displayStatus = 'GAGAL'; 
        statusIcon = '<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
      }

      let buyerInfo = '';
      if (item.web_user_email) {
        buyerInfo = `
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
          <span>${item.web_user_email}</span>
        `;
      } else {
        buyerInfo = `
          <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
          <span>TG ID: ${item.user_id || 'Unknown'}</span>
        `;
      }

      let sourceClass = item.source === 'web' ? 'web' : 'telegram';
      let sourceLabel = item.source === 'web' ? 'WEBSITE' : 'TELEGRAM';

      let dateStr = '—';
      if (item.created_at) {
        let d = new Date(item.created_at);
        if (typeof item.created_at === 'string' && !item.created_at.includes('Z') && !item.created_at.includes('+')) {
          d = new Date(item.created_at.replace(' ', 'T') + 'Z'); 
        }
        if (!isNaN(d.getTime())) {
          dateStr = d.toLocaleDateString('id-ID', {
            day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit', hour12: false
          });
        }
      }

      card.innerHTML = `
        <div class="log-header">
          <span class="log-sku">${item.sku}</span>
          <span class="log-date">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
            ${dateStr}
          </span>
        </div>
        <div class="log-body">
          <div class="row-item">
            <span class="row-lbl">Pembeli</span>
            <span class="row-val" style="color:var(--purple-light);">${buyerInfo}</span>
          </div>
          <div class="row-item">
            <span class="row-lbl">Target / No</span>
            <span class="row-val" style="color:var(--text-dark);">${item.target}</span>
          </div>
          <div class="row-item">
            <span class="row-lbl">Ref ID</span>
            <span class="row-val" style="font-family:monospace; font-size:11px;">${item.ref_id}</span>
          </div>
          <div class="row-item">
            <span class="row-lbl">SN</span>
            <span class="row-val" style="color:var(--text-dark); max-width:220px; word-break:break-all;">${item.sn || '-'}</span>
          </div>
        </div>
        <div class="log-footer">
          <div style="display:flex; align-items:center; gap:6px;">
            <span class="log-price">Rp ${(item.price || 0).toLocaleString('id-ID')}</span>
            <span class="platform-badge ${sourceClass}">${sourceLabel}</span>
          </div>
          <span class="badge ${statusClass}">
            ${statusIcon}
            ${displayStatus}
          </span>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function filterStatus(status, element) {
    filterActive = status;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    element.classList.add('active');
    renderLogs();
  }

  function searchData() {
    renderLogs();
  }

  function showEmptyState(msg) {
    const grid = document.getElementById('logs-grid');
    const loadingBox = document.getElementById('status-loading');
    grid.innerHTML = '';
    loadingBox.classList.remove('hidden');
    loadingBox.innerHTML = `
      <svg viewBox="0 0 24 24" style="animation:none; stroke:var(--text-light);"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
      <p style="margin-top:8px;">${msg}</p>
    `;
  }

  fetchAllPPOBHistory();
</script>
</body>
</html>
