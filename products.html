<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produk VPN - Xtrimer Tunnel</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b132b;
    color:white;
    min-height:100vh;
}

.header{
    background:#1c2541;
    padding:20px;
    text-align:center;
    border-bottom:2px solid #facc15;
}

.logo{
    color:#facc15;
    font-size:28px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.product{
    background:#1f2937;
    border-radius:15px;
    padding:20px;
    margin-bottom:15px;
}

.product h3{
    color:#facc15;
    margin-bottom:10px;
}

.product p{
    margin-bottom:8px;
}

.btn{
    width:100%;
    border:none;
    padding:12px;
    border-radius:10px;
    background:#facc15;
    color:black;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

.back-btn{
    margin-top:20px;
    width:100%;
    border:none;
    padding:12px;
    border-radius:10px;
    background:#374151;
    color:white;
    cursor:pointer;
}

</style>
</head>
<body>

<div class="header">
    <div class="logo">
        PRODUK VPN
    </div>
</div>

<div class="container">

    <div id="products"></div>

    <button
        class="back-btn"
        onclick="window.location.href='dashboard.html'">
        Kembali ke Dashboard
    </button>

</div>
<script>

loadProducts();

async function loadProducts(){

    try{

        const res =
        await fetch('/api/products');

        const data =
        await res.json();

        if(!data.success){

            alert('Gagal memuat produk');
            return;

        }

        let html = '';

        data.products.forEach(server => {

            const harga30Hari =
            Number(server.harga || 0) * 30;

            const quota30Hari =
            Number(server.quota || 0) * 30;

            html += `
<div class="product">

    <h3>
        ${server.nama_server}
    </h3>

    <div style="
        display:inline-block;
        background:#facc15;
        color:black;
        padding:5px 10px;
        border-radius:8px;
        font-weight:bold;
        margin-bottom:10px;
    ">
        🚀 ${server.protocol || 'SSH'}
    </div>
`

                <p>
                    📍 ${server.lokasi || '-'}
                </p>

                <p>
                    🌐 ${server.domain || '-'}
                </p>

                <p>
                    💰 Rp ${harga30Hari
                    .toLocaleString('id-ID')}
                </p>

                <p>
                    📦 ${quota30Hari} GB
                </p>

                <p>
                    📱 ${server.iplimit || 0} Device
                </p>

                <p>
                    🗓 30 Hari
                </p>

                <p>
                    ✅ READY
                    (${server.total_create_akun || 0}
                    /
                    ${server.batas_create_akun || 0})
                </p>

                <button
                    class="btn"
                    onclick="buyServer(${server.id})">

                    Beli Server

                </button>

            </div>
            `;

        });

        document.getElementById('products')
        .innerHTML = html;

    }catch(err){

        console.error(err);

        alert(
            'Server tidak dapat dihubungi'
        );

    }

}
    

function buyServer(id){

    window.location.href =
    'checkout.html?id=' + id;

}

</script>
    </body>
</html>
