<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produk VPN - Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>

:root {
  --purple:    #6B21D6;
  --purple2:   #8B3FF5;
  --pink:      #E8007A;
  --pink2:     #FF3D9A;
  --orange:    #FF6B2C;
  --yellow:    #FFD600;
  --green:     #00C853;
  --red:       #EF4444;
  --blue:      #1ABCFE;
  --white:     #FFFFFF;
  --text-dark: #1a0033;
  --text-mid:  #5B3A8C;
  --bg-light:  #F6F0FF;
  --border:    #EDE0FF;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg-light);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  color: var(--text-dark);
  padding-bottom: 40px;
  overflow-x: hidden;
}

.blob1 {
  position:fixed; top:-80px; left:-60px;
  width:300px; height:300px;
  background:radial-gradient(circle,rgba(107,33,214,0.12) 0%,transparent 70%);
  pointer-events:none; z-index:0;
}
.blob2 {
  position:fixed; bottom:-60px; right:-60px;
  width:260px; height:260px;
  background:radial-gradient(circle,rgba(232,0,122,0.10) 0%,transparent 70%);
  pointer-events:none; z-index:0;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(145deg, var(--purple) 0%, var(--purple2) 60%, #A855F7 100%);
  padding: 22px 20px 36px;
  position: relative;
  overflow: hidden;
  z-index: 2;
}
.header::before {
  content:''; position:absolute; top:-40px; right:-30px;
  width:180px; height:180px; background:rgba(255,255,255,0.07); border-radius:50%;
}
.header::after {
  content:''; position:absolute; bottom:-50px; left:-20px;
  width:130px; height:130px; background:rgba(255,255,255,0.05); border-radius:50%;
}
.header-inner {
  display:flex; align-items:center; gap:14px;
  position:relative; z-index:2;
}
.back-btn-hdr {
  width:40px; height:40px; border-radius:12px;
  background:rgba(255,255,255,0.15); border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:#fff; flex-shrink:0; transition:background 0.15s;
  text-decoration:none;
}
.back-btn-hdr:hover { background:rgba(255,255,255,0.25); }
.back-btn-hdr svg {
  width:20px; height:20px;
  fill:none; stroke:#fff;
  stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round;
}
.header-title { flex:1; }
.header-title h1 {
  font-family:'Fredoka One',cursive;
  font-size:22px; color:#fff; line-height:1;
  display:flex; align-items:center; gap:8px;
}
.header-title h1 svg {
  width:22px; height:22px;
  fill:none; stroke:#fff;
  stroke-width:2; stroke-linecap:round; stroke-linejoin:round;
}
.header-title p { font-size:12px; color:rgba(255,255,255,0.7); font-weight:600; margin-top:4px; }
.header-count {
  background:rgba(255,255,255,0.2);
  border:1px solid rgba(255,255,255,0.3);
  border-radius:20px; padding:5px 14px;
  font-size:11px; font-weight:800; color:#fff; white-space:nowrap;
}

/* ── SEARCH ── */
.search-wrap {
  max-width:480px; margin:-18px auto 0;
  padding:0 18px;
  position:relative; z-index:5;
  margin-bottom:16px;
}
.search-box {
  width:100%; background:#fff;
  border-radius:16px; border:1.5px solid var(--border);
  box-shadow:0 4px 16px rgba(107,33,214,0.12);
  display:flex; align-items:center; gap:10px; padding:12px 16px;
}
.search-box svg {
  width:18px; height:18px;
  fill:none; stroke:#C4B0D8;
  stroke-width:2; stroke-linecap:round; stroke-linejoin:round;
  flex-shrink:0;
}
.search-input {
  flex:1; border:none; outline:none;
  font-family:'Nunito',sans-serif;
  font-size:14px; font-weight:700; color:var(--text-dark); background:transparent;
}
.search-input::placeholder { color:#C4B0D8; font-weight:600; }

/* ── CONTAINER ── */
.container {
  max-width:480px; margin:0 auto;
  padding:0 18px;
  position:relative; z-index:2;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── LOADING ── */
.loading-state {
  text-align:center; padding:50px 20px;
  color:var(--text-mid); font-weight:700; font-size:14px;
  display:flex; flex-direction:column; align-items:center; gap:12px;
}
.loading-state svg {
  width:36px; height:36px;
  fill:none; stroke:var(--purple);
  stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round;
  animation: spin 1s linear infinite;
}

/* ── EMPTY ── */
.empty-state {
  text-align:center; padding:50px 20px;
}
.empty-state svg {
  width:52px; height:52px;
  fill:none; stroke:#C4B0D8;
  stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round;
}
.empty-title {
  font-family:'Fredoka One',cursive;
  font-size:20px; color:var(--text-dark); margin:12px 0 6px;
}
.empty-sub { font-size:13px; color:var(--text-mid); font-weight:600; }

/* ── PRODUCT CARD ── */
.product-card {
  background:var(--white);
  border-radius:22px;
  margin-bottom:14px;
  overflow:hidden;
  border:1.5px solid var(--border);
  box-shadow:0 4px 16px rgba(107,33,214,0.09);
  animation: fadeUp 0.35s ease both;
  transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
}
.product-card:hover {
  transform:translateY(-3px);
  box-shadow:0 10px 28px rgba(107,33,214,0.15);
  border-color:rgba(107,33,214,0.3);
}
.product-card.is-full { opacity:0.72; }
.product-card.is-full:hover { transform:none; }

/* card top banner */
.card-banner {
  background:linear-gradient(135deg,var(--purple),var(--purple2));
  padding:16px 18px;
  display:flex; align-items:center; gap:12px;
  position:relative; overflow:hidden;
}
.card-banner::after {
  content:''; position:absolute; top:-20px; right:-20px;
  width:90px; height:90px;
  background:rgba(255,255,255,0.07); border-radius:50%;
}
.server-icon {
  width:44px; height:44px; border-radius:14px;
  background:rgba(255,255,255,0.18);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.server-icon svg {
  width:22px; height:22px;
  fill:none; stroke:#fff;
  stroke-width:2; stroke-linecap:round; stroke-linejoin:round;
}
.server-name-wrap { flex:1; min-width:0; }
.server-name {
  font-family:'Fredoka One',cursive;
  font-size:16px; color:#fff; line-height:1.1;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.server-loc {
  font-size:11px; color:rgba(255,255,255,0.7);
  font-weight:600; margin-top:3px;
  display:flex; align-items:center; gap:4px;
}
.server-loc svg {
  width:11px; height:11px;
  fill:none; stroke:rgba(255,255,255,0.7);
  stroke-width:2; stroke-linecap:round; stroke-linejoin:round;
  flex-shrink:0;
}

.slot-badge {
  padding:5px 12px; border-radius:20px;
  font-size:11px; font-weight:800; flex-shrink:0;
  display:flex; align-items:center; gap:4px;
}
.slot-badge svg {
  width:12px; height:12px;
  fill:none; stroke-width:2;
  stroke-linecap:round; stroke-linejoin:round;
}
.slot-ok   { background:rgba(0,200,83,0.2); border:1px solid rgba(0,200,83,0.4); color:#00E676; }
.slot-ok svg { stroke:#00E676; }
.slot-full { background:rgba(239,68,68,0.2); border:1px solid rgba(239,68,68,0.4); color:#F87171; }
.slot-full svg { stroke:#F87171; }

/* proto row */
.proto-row {
  padding:12px 18px;
  display:flex; flex-wrap:wrap; gap:7px;
  border-bottom:1.5px dashed var(--border);
}
.proto-badge {
  padding:4px 12px; border-radius:20px;
  font-size:11px; font-weight:800; letter-spacing:0.3px;
  display:flex; align-items:center; gap:4px;
}
.proto-badge svg {
  width:11px; height:11px;
  fill:none; stroke-width:2;
  stroke-linecap:round; stroke-linejoin:round;
}
.pb-ssh    { background:#FFF0E0; color:var(--orange); }
.pb-ssh svg { stroke:var(--orange); }
.pb-vmess  { background:#E0F7FF; color:#0077AA; }
.pb-vmess svg { stroke:#0077AA; }
.pb-vless  { background:#EDE0FF; color:var(--purple); }
.pb-vless svg { stroke:var(--purple); }
.pb-trojan { background:#FFE0E0; color:var(--red); }
.pb-trojan svg { stroke:var(--red); }
.pb-ss     { background:#FFE0F5; color:var(--pink); }
.pb-ss svg { stroke:var(--pink); }

/* bottom row */
.card-bottom {
  padding:14px 18px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.price-label {
  font-size:10px; font-weight:800; color:#B0A0C0;
  text-transform:uppercase; letter-spacing:0.8px; margin-bottom:2px;
}
.price-val {
  font-family:'Fredoka One',cursive;
  font-size:22px; color:var(--purple); line-height:1;
}
.price-period { font-size:11px; color:#B0A0C0; font-weight:600; margin-top:2px; }

.buy-btn {
  padding:12px 22px;
  border:none; border-radius:14px;
  background:linear-gradient(135deg,var(--purple),var(--purple2));
  color:#fff; font-family:'Nunito',sans-serif;
  font-weight:900; font-size:14px;
  cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; gap:6px;
  box-shadow:0 4px 14px rgba(107,33,214,0.30);
  transition:transform 0.15s, box-shadow 0.15s;
}
.buy-btn svg {
  width:16px; height:16px;
  fill:none; stroke:#fff;
  stroke-width:2; stroke-linecap:round; stroke-linejoin:round;
}
.buy-btn:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(107,33,214,0.40); }
.buy-btn:active { transform:translateY(0); }
.buy-btn:disabled {
  background:linear-gradient(135deg,#9CA3AF,#6B7280);
  cursor:not-allowed; box-shadow:none; transform:none;
}

/* ── BACK BTN ── */
.back-btn-bottom {
  width:100%; padding:14px;
  border:2px solid var(--border); border-radius:16px;
  background:var(--white); color:var(--text-mid);
  font-family:'Nunito',sans-serif;
  font-weight:800; font-size:14px;
  cursor:pointer; margin-top:6px;
  display:flex; align-items:center; justify-content:center; gap:6px;
  transition:border-color 0.15s, color 0.15s;
}
.back-btn-bottom svg {
  width:16px; height:16px;
  fill:none; stroke:currentColor;
  stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round;
}
.back-btn-bottom:hover { border-color:var(--purple2); color:var(--purple); }

</style>
</head>
<body>

<div class="blob1"></div>
<div class="blob2"></div>

<!-- Header -->
<div class="header">
  <div class="header-inner">
    <a class="back-btn-hdr" href="dashboard.html">
      <!-- arrow-left -->
      <svg viewBox="0 0 24 24">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
    </a>
    <div class="header-title">
      <h1>
        <!-- package/box icon -->
        <svg viewBox="0 0 24 24">
          <path d="M21 8l-9-5-9 5v8l9 5 9-5V8z"/>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
          <line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
        Produk VPN
      </h1>
      <p id="subtitle">Memuat produk...</p>
    </div>
    <div class="header-count" id="countBadge">—</div>
  </div>
</div>

<!-- Search -->
<div class="search-wrap">
  <div class="search-box">
    <!-- search icon -->
    <svg viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input class="search-input" id="searchInput" type="text"
      placeholder="Cari server atau lokasi..."
      oninput="filterProducts()">
  </div>
</div>

<div class="container">
  <div id="products">
    <div class="loading-state">
      <!-- spinner: circle with gap -->
      <svg viewBox="0 0 24 24">
        <path d="M12 2a10 10 0 0 1 10 10"/>
      </svg>
      Memuat daftar produk...
    </div>
  </div>

  <button class="back-btn-bottom" onclick="window.location.href='dashboard.html'">
    <svg viewBox="0 0 24 24">
      <line x1="19" y1="12" x2="5" y2="12"/>
      <polyline points="12 19 5 12 12 5"/>
    </svg>
    Kembali ke Dashboard
  </button>
</div>

<script>

let allProducts = [];

loadProducts();

async function loadProducts() {
  try {
    const res  = await fetch('/api/products');
    const data = await res.json();

    if (!data.success) {
      document.getElementById('products').innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16" stroke-width="3"/>
          </svg>
          <div class="empty-title">Gagal Memuat</div>
          <div class="empty-sub">Tidak dapat terhubung ke server</div>
        </div>`;
      return;
    }

    allProducts = data.products || [];
    document.getElementById('subtitle').textContent   = allProducts.length + ' server tersedia';
    document.getElementById('countBadge').textContent = allProducts.length + ' Server';
    renderProducts(allProducts);

  } catch (err) {
    console.error(err);
    document.getElementById('products').innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24">
          <line x1="1" y1="1" x2="23" y2="23"/>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <line x1="12" y1="20" x2="12.01" y2="20" stroke-width="3"/>
        </svg>
        <div class="empty-title">Koneksi Gagal</div>
        <div class="empty-sub">Periksa koneksi internet kamu</div>
      </div>`;
  }
}

function filterProducts() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allProducts.filter(s =>
    (s.nama_server||'').toLowerCase().includes(q) ||
    (s.lokasi||'').toLowerCase().includes(q)
  );
  renderProducts(filtered);
}

function renderProducts(products) {
  if (!products.length) {
    document.getElementById('products').innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <div class="empty-title">Tidak Ditemukan</div>
        <div class="empty-sub">Coba kata kunci lain</div>
      </div>`;
    return;
  }

  let html = '';
  products.forEach((server, i) => {
    const hargaMulai = Number(server.harga || 0) * 7;
    const slotUsed   = server.total_create_akun || 0;
    const slotMax    = server.batas_create_akun  || 0;
    const isFull     = slotMax > 0 && slotUsed >= slotMax;

    // slot badge SVG: check-circle or x-circle
    const slotIconOk   = `<svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;
    const slotIconFull = `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`;

    html += `
    <div class="product-card ${isFull ? 'is-full' : ''}" style="animation-delay:${i * 0.06}s">
      <div class="card-banner">
        <div class="server-icon">
          <!-- globe icon -->
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </div>
        <div class="server-name-wrap">
          <div class="server-name">${server.nama_server}</div>
          <div class="server-loc">
            <!-- map-pin -->
            <svg viewBox="0 0 24 24">
              <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            ${server.lokasi || '—'}
          </div>
        </div>
        <div class="slot-badge ${isFull ? 'slot-full' : 'slot-ok'}">
          ${isFull ? slotIconFull : slotIconOk}
          ${isFull ? 'FULL' : slotUsed + '/' + slotMax}
        </div>
      </div>

      <div class="proto-row">
        <span class="proto-badge pb-ssh">
          <!-- terminal -->
          <svg viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          SSH
        </span>
        <span class="proto-badge pb-vmess">
          <!-- globe small -->
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          VMESS
        </span>
        <span class="proto-badge pb-vless">
          <!-- lightning / zap -->
          <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          VLESS
        </span>
        <span class="proto-badge pb-trojan">
          <!-- shield -->
          <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          TROJAN
        </span>
        <span class="proto-badge pb-ss">
          <!-- eye-off -->
          <svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          SS
        </span>
      </div>

      <div class="card-bottom">
        <div class="price-box">
          <div class="price-label">Mulai dari</div>
          <div class="price-val">Rp ${hargaMulai.toLocaleString('id-ID')}</div>
          <div class="price-period">/ 7 hari</div>
        </div>
        <button class="buy-btn" ${isFull ? 'disabled' : ''} onclick="buyServer(${server.id})">
          <!-- rocket -->
          <svg viewBox="0 0 24 24"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2"/><path d="M12 8L8 12l1.5 4L15.5 9.5z"/><path d="M22 2L15.5 9.5"/><path d="M22 2s-4 0-9 5c-2 2-3 4-3 4"/></svg>
          ${isFull ? 'Penuh' : 'Beli'}
        </button>
      </div>
    </div>`;
  });

  document.getElementById('products').innerHTML = html;
}

function buyServer(id) {
  window.location.href = 'checkout.html?id=' + id;
}

</script>
</body>
</html>
