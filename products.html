<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Produk VPN — Xtrimer</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── TOKENS SYNCHRONIZED WITH DASHBOARD.HTML (PREMIUM LIGHT MODE) ── */
:root {
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #3D0F72;
  --purple-light: #9B4FDE;
  
  --purple-soft:  #E2E8F0; 
  --purple-mid:   #CBD5E1;
  --accent:       #FF6B2B;
  --accent2:      #FFD600;
  --green:        #12C28A;
  --green-bg:     #E2F7F1;
  --red:          #E84040;
  --red-bg:       #FEE2E2;
  
  --white:        #FFFFFF;
  --bg:           #F1F5F9; 
  --card:         #F8FAFC; 
  --gray-line:    #E2E8F0; 
  
  --text-dark:    #0F172A; 
  --text-mid:     #334155; 
  --text-light:   #64748B; 

  --shadow-sm:  0 4px 12px rgba(15, 23, 42, 0.03);
  --shadow-md:  0 6px 18px rgba(15, 23, 42, 0.05);
  --shadow-lg:  0 10px 25px rgba(15, 23, 42, 0.05);

  --r-card: 14px;
  --r-btn:  10px;
  
  --nav-bg:       #F8FAFC;
  --nav-shadow:   rgba(15, 23, 42, 0.08);
}

html[data-theme="dark"] {
  --purple-soft:  #202124;
  --purple-mid:   #2a2b2f;
  --green-bg:     #0c2a21;
  --red-bg:       #311111;
  --white:        #17181c;
  --bg:           #0a0b0d;
  --card:         #1c1d21;
  --gray-line:    #303135;
  --text-dark:    #E2E8F0; 
  --text-mid:     #94A3B8;  
  --text-light:   #64748B;
  --nav-bg:       #17181c;
  --nav-shadow:   rgba(0,0,0,0.4);
}

html[data-theme="dark"] body { background: var(--bg); color: var(--text-dark); }
html[data-theme="dark"] .search-box,
html[data-theme="dark"] .product-card,
html[data-theme="dark"] .bottom-nav { background: var(--card); border-color: var(--gray-line); }
html[data-theme="dark"] .server-badge { background: var(--bg); border-color: var(--gray-line); }
html[data-theme="dark"] .hdr-btn.theme-toggle .icon-sun { display: none; }
html[data-theme="dark"] .hdr-btn.theme-toggle .icon-moon { display: flex; }
html:not([data-theme="dark"]) .hdr-btn.theme-toggle .icon-sun { display: flex; }
html:not([data-theme="dark"]) .hdr-btn.theme-toggle .icon-moon { display: none; }

html { background: var(--bg); }

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text-dark);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: 90px; 
  -webkit-tap-highlight-color: transparent;
  transition: background .25s ease, color .25s ease;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── MULTI-THEME CARD BORDER/GLOW TRICK ── */
.theme-purple { --theme-color: #7B2FBE; }
.theme-blue   { --theme-color: #1D4ED8; }
.theme-cyan   { --theme-color: #0D9488; }
.theme-orange { --theme-color: #FF6B2B; }

/* ── HEADER (Sama Persis Dashboard) ── */
.header {
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple) 60%, var(--purple-light) 100%);
  padding: 24px 20px 48px;
  animation: fadeUp 0.4s ease both;
}
.header::before {
  content:''; position:absolute; top:-40px; right:-20px;
  width:140px; height:140px;
  border:28px solid rgba(255,255,255,0.05); border-radius:50%;
}
.header-inner {
  max-width: 440px; margin: 0 auto;
  display: flex; align-items:center; justify-content:space-between;
  position: relative; z-index:2;
}
.header-left { display:flex; align-items:center; gap:12px; }

.back-btn-hdr {
  width:32px; height:32px; border-radius:50%;
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.15);
  display: flex; align-items:center; justify-content:center;
  transition: all .2s; backdrop-filter:blur(10px);
}
.back-btn-hdr:hover { background:rgba(255,255,255,.2); transform:translateX(-2px); }
.back-btn-hdr svg { width:15px; height:15px; fill:none; stroke:#fff; stroke-width:2.5; }

.header-greeting { display: flex; flex-direction:column; gap:0px; }
.header-title h1 { font-size: 16px; font-weight:900; color: #fff; letter-spacing:-.2px; line-height:1.2; }
.header-title p { font-size: 10.5px; font-weight:600; color: rgba(255,255,255,.75); letter-spacing: .3px; }

.hdr-actions { display:flex; gap:8px; align-items:center; }
.hdr-btn {
  width:32px; height:32px; border-radius:50%;
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.15);
  display: flex; align-items:center; justify-content:center;
  transition: all .2s; backdrop-filter:blur(10px);
}
.hdr-btn:hover { background:rgba(255,255,255,.2); transform:translateY(-2px); }
.hdr-btn svg { width:15px; height:15px; stroke:#fff; stroke-width:2.2; fill:none; }
.hdr-btn.theme-toggle { position: relative; }
.hdr-btn.theme-toggle .icon-sun,
.hdr-btn.theme-toggle .icon-moon { position: absolute; align-items:center; justify-content:center; }

.header-count {
  font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 5px; letter-spacing: .3px;
  background: rgba(255,255,255,0.2); color: #fff; border: 1px solid rgba(255,255,255,0.1); text-transform: uppercase;
}

/* ── SEARCH BOX ── */
.search-wrap {
  max-width:440px; margin:-24px auto 12px; padding: 0 16px;
  position: relative; z-index:10;
  animation: fadeUp 0.4s 0.08s ease both;
}
.search-box {
  background: var(--white); border-radius: 14px; padding: 10px 14px;
  border: 1px solid var(--gray-line); box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
  display: flex; align-items: center; gap: 10px;
  transition: all .25s ease;
}
.search-box svg { width:16px; height:16px; fill:none; stroke:var(--text-light); stroke-width:2.5; }
.search-input {
  flex:1; border:none; outline:none; font-family:'Nunito',sans-serif;
  font-size:13px; font-weight:700; color:var(--text-dark); background:transparent;
}

/* ── CONTAINER ── */
.container { max-width:440px; margin:0 auto; padding:0 16px; }

/* ── PRODUCT CARD ── */
.product-card {
  background: var(--white); border-radius: var(--r-card); margin-bottom: 8px; padding: 12px;
  border: 1px solid var(--gray-line); box-shadow: var(--shadow-sm);
  display: flex; align-items: center; gap: 12px; position: relative;
  animation: fadeUp 0.4s ease both;
  transition: background .25s ease, border-color .25s ease, box-shadow .25s ease;
}
.product-card:hover {
  border-color: var(--theme-color);
  box-shadow: var(--shadow-md);
}

.card-indicator {
  position: absolute; left: 0; top: 12px; bottom: 12px;
  width: 3.5px; border-radius: 0 4px 4px 0; background: var(--theme-color);
}

.server-badge {
  width: 38px; height: 38px; border-radius: 10px;
  background: rgba(123, 47, 190, 0.06);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: background 0.25s ease;
}
.server-badge svg { width: 18px; height: 18px; fill: none; stroke: var(--theme-color); stroke-width: 2.3; }

.server-info { flex: 1; min-width: 0; }
.server-meta-top { display: flex; align-items: center; gap: 6px; }
.server-name {
  font-size: 13.5px; font-weight: 800; color: var(--text-dark);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.slot-text {
  font-size: 8.5px; font-weight: 800; color: var(--green);
  background: var(--green-bg); padding: 1px 5px; border-radius: 5px; text-transform: uppercase;
}
.slot-text.is-full { color: var(--red); background: var(--red-bg); }

.server-sub { display: flex; align-items: center; gap: 6px; margin-top: 1px; }
.loc-text { font-size: 10.5px; color: var(--text-light); font-weight: 600; }

.mini-protos { display: flex; gap: 4px; font-size: 8.5px; font-weight: 800; color: var(--purple); opacity: 0.8; }
.mini-protos span { position: relative; }
.mini-protos span:not(:last-child)::after { content: '•'; margin-left: 4px; color: var(--text-light); opacity: 0.5; }

/* Action Right Side */
.action-side { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
.price-tag { display: flex; flex-direction: column; line-height: 1.1; }
.price-val { font-size: 14.5px; font-weight: 900; color: var(--text-dark); letter-spacing: -0.2px; }

/* Buy Button (Sleek Orange/Purple Sync) */
.buy-btn-sleek {
  padding: 5px 12px; border: none; border-radius: 8px;
  background: var(--purple); color: #fff;
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 11px;
  cursor: pointer; transition: all 0.2s;
}
.buy-btn-sleek:hover { background: var(--accent); transform: translateY(-1px); }
.buy-btn-sleek:disabled { background: var(--purple-soft) !important; color: var(--text-light) !important; cursor: not-allowed; transform: none; }

/* Elegant Full State */
.product-card.is-full { opacity: 0.65; }
html[data-theme="dark"] .product-card.is-full { opacity: 0.45; }
.product-card.is-full .card-indicator { background: var(--text-light); }
.product-card.is-full .server-badge { background: var(--purple-soft); }
.product-card.is-full .server-badge svg { stroke: var(--text-light); }

/* ── LOADING / EMPTY ── */
.loading-state { text-align:center; padding:40px 0; color:var(--text-mid); font-weight:800; font-size:12.5px; }
.loading-state svg { width:24px; height:24px; fill:none; stroke:var(--purple); stroke-width:2.5; animation: spin 1s linear infinite; margin-bottom: 8px;}
.empty-state { text-align:center; padding:40px 0; color:var(--text-light); font-weight:800; font-size:12.5px; }

/* ── BOTTOM NAV (Sama Persis Dashboard) ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 440px; background: var(--nav-bg);
  border-top: 1px solid var(--gray-line);
  box-shadow: var(--nav-shadow); z-index: 999;
  transition: background 0.25s ease, border-color 0.25s ease;
}
.bottom-nav-inner { display: flex; align-items: center; justify-content: space-around; padding: 10px 0 14px; }
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  text-decoration: none; color: var(--text-light); width: 70px; transition: all 0.2s;
}
.nav-icon svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; transition: transform 0.2s; }
.nav-label { font-size: 9px; font-weight: 800; }
.nav-item:hover .nav-icon svg { transform: translateY(-2px); }
.nav-item.active { color: var(--purple); }
html[data-theme="dark"] .nav-item.active { color: var(--purple-light); }
.nav-item.active .nav-icon svg { stroke: var(--purple); }
html[data-theme="dark"] .nav-item.active .nav-icon svg { stroke: var(--purple-light); }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <a class="back-btn-hdr" href="dashboard.html" aria-label="Kembali">
        <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </a>
      <div class="header-greeting">
        <div class="header-title">
          <h1>Produk VPN</h1>
          <p id="subtitle">Memuat server...</p>
        </div>
      </div>
    </div>
    <div class="hdr-actions">
      <div class="header-count" id="countBadge">—</div>
      <button class="hdr-btn theme-toggle" id="themeToggle" aria-label="Ganti tema">
        <span class="icon-sun">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
          </svg>
        </span>
        <span class="icon-moon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
        </span>
      </button>
    </div>
  </div>
</header>

<div class="search-wrap">
  <div class="search-box">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" id="searchInput" type="text" placeholder="Cari nama server atau lokasi..." oninput="filterProducts()">
  </div>
</div>

<div class="container">
  <div id="products">
    <div class="loading-state">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 0 1 10 10"/></svg>
      <div>Memuat daftar produk...</div>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a class="nav-item active" href="dashboard.html">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg></div>
      <div class="nav-label">Home</div>
    </a>
    <a class="nav-item" href="riwayat-ppob.html">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" stroke-width="1.5"/><polyline points="7,17 10,13 13,15 17,9"/></svg></div>
      <div class="nav-label">Riwayat</div>
    </a>
    <a class="nav-item" href="profile.html">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>
      <div class="nav-label">Profile</div>
    </a>
  </div>
</nav>

<script>
let allProducts = [];
const cardThemes = ['theme-purple', 'theme-blue', 'theme-cyan', 'theme-orange'];

/* ── THEME MANAGER (Sama Persis Dashboard) ── */
(function initTheme(){
  const saved = localStorage.getItem('theme');
  if (saved === 'dark' || saved === 'light') {
    document.documentElement.setAttribute('data-theme', saved);
  } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  } else {
    document.documentElement.setAttribute('data-theme', 'light');
  }
})();

document.getElementById('themeToggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
});

loadProducts();

async function loadProducts() {
  try {
    const res  = await fetch('/api/products');
    const data = await res.json();

    if (!data.success) {
      document.getElementById('products').innerHTML = '<div class="empty-state">Gagal memuat daftar produk.</div>';
      return;
    }

    allProducts = data.products || [];
    document.getElementById('subtitle').textContent   = allProducts.length + ' server aktif';
    document.getElementById('countBadge').textContent = allProducts.length + ' Server';
    renderProducts(allProducts);

  } catch (err) {
    console.error(err);
    document.getElementById('products').innerHTML = '<div class="empty-state">Koneksi gagal terhubung.</div>';
  }
}

function filterProducts() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allProducts.filter(s =>
    (s.nama_server||'').toLowerCase().includes(q) ||
    (s.lokasi||'').toLowerCase().includes(q)
  );
  renderProducts(filtered);
}

function renderProducts(products) {
  if (!products.length) {
    document.getElementById('products').innerHTML = '<div class="empty-state">Server tidak ditemukan.</div>';
    return;
  }

  let html = '';
  products.forEach((server, i) => {
    const hargaMulai = Number(server.harga || 0) * 7;
    const slotUsed   = server.total_create_akun || 0;
    const slotMax    = server.batas_create_akun  || 0;
    const isFull     = slotMax > 0 && slotUsed >= slotMax;

    const assignedTheme = cardThemes[i % cardThemes.length];
    const hargaFormatted = hargaMulai.toLocaleString('id-ID');

    html += `
    <div class="product-card ${assignedTheme} ${isFull ? 'is-full' : ''}" style="animation-delay:${i * 0.04}s">
      <div class="card-indicator"></div>

      <div class="server-badge">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      </div>

      <div class="server-info">
        <div class="server-meta-top">
          <div class="server-name">${server.nama_server}</div>
          <div class="slot-text ${isFull ? 'is-full' : ''}">
            ${isFull ? 'FULL' : slotUsed + '/' + slotMax + ' Slot'}
          </div>
        </div>
        <div class="server-sub">
          <div class="loc-text">${server.lokasi || 'Global'}</div>
          <div class="mini-protos">
            <span>SSH</span>
            <span>VMESS</span>
            <span>VLESS</span>
            <span>TROJAN</span>
          </div>
        </div>
      </div>

      <div class="action-side">
        <div class="price-tag">
          <span class="price-val">Rp ${hargaFormatted}</span>
        </div>
        <button class="buy-btn-sleek" ${isFull ? 'disabled' : ''} onclick="buyServer(${server.id})">
          ${isFull ? 'Penuh' : 'Beli'}
        </button>
      </div>

    </div>`;
  });

  document.getElementById('products').innerHTML = html;
}

function buyServer(id) {
  window.location.href = 'checkout.html?id=' + id;
}
</script>
</body>
</html>
