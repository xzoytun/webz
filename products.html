<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produk VPN - Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>

:root {
  /* === PALETTE WARNA CORE COCOK DENGAN DASHBOARD === */
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #3D0F72;
  --purple-light: #9B4FDE;
  --purple-soft:  #F3EAFD;
  --purple-mid:   #EAD5FA;
  --accent:       #FF6B2B;
  --accent2:      #FFD600;
  --green:        #12C28A;
  --green-bg:     #E6FAF4;
  --red:          #E84040;
  --red-bg:       #FFECEC;
  --white:        #FFFFFF;
  --bg:           #F7F0FD;
  --gray-line:    #E8D8F8;
  --text-dark:    #1A0533;
  --text-mid:     #6B3FA0;
  --text-light:   #A882CC;
  --border:       #E8D8F8;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  color: var(--text-dark);
  padding-bottom: 40px;
  overflow-x: hidden;
}

/* ── VARIATION THEMES FOR CARDS ── */
.theme-purple {
  --card-gradient: linear-gradient(135deg, #3D0F72 0%, #7B2FBE 60%, #9B4FDE 100%);
  --card-btn-grad: linear-gradient(135deg, #FF6B2B, #FF8E53);
  --card-shadow: rgba(123, 47, 190, 0.15);
}
.theme-blue {
  --card-gradient: linear-gradient(135deg, #0A2540 0%, #0066FF 60%, #00A3FF 100%);
  --card-btn-grad: linear-gradient(135deg, #7B2FBE, #9B4FDE);
  --card-shadow: rgba(0, 102, 255, 0.15);
}
.theme-cyan {
  --card-gradient: linear-gradient(135deg, #004B49 0%, #00A896 60%, #02C39A 100%);
  --card-btn-grad: linear-gradient(135deg, #1A0533, #5A1A9A);
  --card-shadow: rgba(0, 168, 150, 0.15);
}
.theme-orange {
  --card-gradient: linear-gradient(135deg, #580000 0%, #D9381E 60%, #FF6B2B 100%);
  --card-btn-grad: linear-gradient(135deg, #7B2FBE, #3D0F72);
  --card-shadow: rgba(217, 56, 30, 0.15);
}

/* ── BLOBS ── */
.blob1 {
  position:fixed; top:-80px; left:-60px;
  width:300px; height:300px;
  background:radial-gradient(circle,rgba(123,47,190,0.12) 0%,transparent 70%);
  pointer-events:none; z-index:0;
}
.blob2 {
  position:fixed; bottom:-60px; right:-60px;
  width:260px; height:260px;
  background:radial-gradient(circle,rgba(155,79,222,0.10) 0%,transparent 70%);
  pointer-events:none; z-index:0;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes shimmer {
  100% { transform: translateX(100%); }
}

/* ── HEADER ── */
.header {
  background: linear-gradient(150deg, var(--purple-deep) 0%, var(--purple) 55%, var(--purple-light) 100%);
  padding: 24px 20px 40px;
  position: relative;
  overflow: hidden;
  z-index: 2;
}
.header::before {
  content:''; position:absolute; top:-50px; right:-30px;
  width:200px; height:200px;
  border:48px solid rgba(255,255,255,0.06);
  border-radius:50%;
}
.header::after {
  content:''; position:absolute; bottom:-60px; left:-30px;
  width:170px; height:170px;
  border:36px solid rgba(255,214,0,0.10);
  border-radius:50%;
}
.hero-dots {
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size: 22px 22px;
  pointer-events:none;
}
.header-inner {
  display:flex; align-items:center; gap:14px;
  position:relative; z-index:2;
}
.back-btn-hdr {
  width:42px; height:42px; border-radius:14px;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.18);
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all 0.2s;
  text-decoration:none;
  backdrop-filter:blur(8px);
}
.back-btn-hdr:hover { background:rgba(255,255,255,0.22); transform: scale(1.05); }
.back-btn-hdr svg {
  width:20px; height:20px;
  fill:none; stroke:#fff;
  stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round;
}
.header-title { flex:1; }
.header-title h1 {
  font-size:22px; font-weight:900;
  color:#fff; line-height:1.1; letter-spacing:-0.4px;
  display:flex; align-items:center; gap:8px;
}
.header-title h1 svg {
  width:24px; height:24px;
  fill:none; stroke:#fff;
  stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round;
}
.header-title p { font-size:12px; color:rgba(255,255,255,0.65); font-weight:700; margin-top:4px; }
.header-count {
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:20px; padding:6px 14px;
  font-size:12px; font-weight:800; color:#fff; white-space:nowrap;
  backdrop-filter:blur(8px);
}

/* ── SEARCH ── */
.search-wrap {
  max-width:480px; margin:-20px auto 20px;
  padding:0 18px;
  position:relative; z-index:5;
}
.search-box {
  width:100%; background:#fff;
  border-radius:18px; border:1.5px solid var(--border);
  box-shadow:0 8px 24px rgba(90,26,154,0.12);
  display:flex; align-items:center; gap:12px; padding:14px 18px;
  transition: all 0.2s ease;
}
.search-box:focus-within {
  border-color: var(--purple);
  box-shadow: 0 8px 26px rgba(123, 47, 190, 0.2);
  transform: translateY(-1px);
}
.search-box svg {
  width:20px; height:20px;
  fill:none; stroke:var(--text-light);
  stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round;
  flex-shrink:0;
}
.search-input {
  flex:1; border:none; outline:none;
  font-family:'Nunito',sans-serif;
  font-size:14px; font-weight:700; color:var(--text-dark); background:transparent;
}
.search-input::placeholder { color:var(--text-light); font-weight:600; }

/* ── CONTAINER ── */
.container {
  max-width:480px; margin:0 auto;
  padding:0 18px;
  position:relative; z-index:2;
}

/* ── LOADING / EMPTY ── */
.loading-state {
  text-align:center; padding:60px 20px;
  color:var(--text-mid); font-weight:700; font-size:14px;
  display:flex; flex-direction:column; align-items:center; gap:12px;
}
.loading-state svg {
  width:38px; height:38px;
  fill:none; stroke:var(--purple);
  stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round;
  animation: spin 1s linear infinite;
}
.empty-state { text-align:center; padding:60px 20px; }
.empty-state svg {
  width:56px; height:56px;
  fill:none; stroke:var(--text-light);
  stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round;
}
.empty-title {
  font-size:18px; font-weight:900;
  color:var(--text-dark); margin:14px 0 6px;
}
.empty-sub { font-size:14px; color:var(--text-mid); font-weight:600; }

/* ── PRODUCT CARD PREMIUM ── */
.product-card {
  background:var(--white);
  border-radius:24px;
  margin-bottom:18px;
  overflow:hidden;
  border:1.5px solid var(--gray-line);
  box-shadow:0 6px 18px var(--card-shadow, rgba(90,26,154,0.08));
  animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
  transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s, border-color 0.2s;
}
.product-card:hover {
  transform:translateY(-5px);
  box-shadow:0 12px 30px var(--card-shadow, rgba(90,26,154,0.18));
  border-color:rgba(123,47,190,0.25);
}

/* Card banner modern premium */
.card-banner {
  background: var(--card-gradient);
  padding:18px 20px;
  display:flex; align-items:center; gap:14px;
  position:relative; overflow:hidden;
}
.card-banner::before {
  content:''; position:absolute; top:-35px; right:-25px;
  width:110px; height:110px;
  border:26px solid rgba(255,255,255,0.06);
  border-radius:50%;
}
.server-icon {
  width:46px; height:46px; border-radius:15px;
  background:rgba(255,255,255,0.15);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; backdrop-filter: blur(4px);
  border: 1px solid rgba(255, 255, 255, 0.1);
}
.server-icon svg {
  width:22px; height:22px;
  fill:none; stroke:#fff;
  stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round;
}
.server-name-wrap { flex:1; min-width:0; }
.server-name {
  font-size:17px; font-weight:900;
  color:#fff; line-height:1.2; letter-spacing:-0.2px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.server-loc {
  font-size:12px; color:rgba(255,255,255,0.7);
  font-weight:700; margin-top:3px;
  display:flex; align-items:center; gap:4px;
}
.server-loc svg {
  width:12px; height:12px;
  fill:none; stroke:rgba(255,255,255,0.7);
  stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round;
  flex-shrink:0;
}
.slot-badge {
  padding:5px 12px; border-radius:20px;
  font-size:11px; font-weight:800; flex-shrink:0;
  display:flex; align-items:center; gap:4px;
  backdrop-filter: blur(4px);
}
.slot-badge svg {
  width:13px; height:13px; fill:none;
  stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round;
}
.slot-ok   { background:rgba(18,194,138,0.22); border:1px solid rgba(18,194,138,0.35); color:#12C28A; }
.slot-ok   svg { stroke:#12C28A; }
.slot-full { background:rgba(255,255,255,0.2);  border:1px solid rgba(255,255,255,0.35);  color:#fff; }
.slot-full svg { stroke:#fff; }

/* Protocol Row Glassmorphism Touch */
.proto-row {
  padding:14px 20px;
  display:flex; flex-wrap:wrap; gap:8px;
  border-bottom:1.5px dashed var(--gray-line);
  background: #FCFAFF;
}
.proto-badge {
  padding:5px 12px; border-radius:12px;
  font-size:11px; font-weight:800; letter-spacing:0.3px;
  display:flex; align-items:center; gap:5px;
  border: 1px solid rgba(0,0,0,0.03);
}
.proto-badge svg {
  width:12px; height:12px; fill:none;
  stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round;
}
.pb-ssh    { background:#FFF2E6; color:var(--accent); }
.pb-ssh    svg { stroke:var(--accent); }
.pb-vmess  { background:#E1F5FE; color:#0288D1; }
.pb-vmess  svg { stroke:#0288D1; }
.pb-vless  { background:var(--purple-soft); color:var(--purple); }
.pb-vless  svg { stroke:var(--purple); }
.pb-trojan { background:var(--red-bg); color:var(--red); }
.pb-trojan svg { stroke:var(--red); }
.pb-ss     { background:#FCE4EC; color:#C2185B; }
.pb-ss     svg { stroke:#C2185B; }

/* ── CARD BOTTOM ── */
.card-bottom {
  padding:16px 20px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.price-box {
  display:flex; flex-direction:column;
}
.price-label {
  font-size:10px; font-weight:800; color:var(--text-light);
  text-transform:uppercase; letter-spacing:0.8px;
}
.price-row {
  display:flex; align-items:baseline; gap:3px; margin-top:2px;
}
.price-currency {
  font-size:14px; font-weight:900; color:var(--text-dark);
  line-height:1; margin-bottom:2px;
}
.price-number {
  font-size:26px; font-weight:900; color:var(--text-dark);
  line-height:1; letter-spacing:-0.5px;
}
.price-period-wrap {
  display:inline-flex; align-items:center; gap:4px;
  background:var(--purple-soft);
  border-radius:8px; padding:3px 8px;
  margin-top:6px; width:fit-content;
}
.price-period-wrap svg {
  width:12px; height:12px;
  fill:none; stroke:var(--text-mid);
  stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round;
}
.price-period-txt {
  font-size:10px; font-weight:800; color:var(--text-mid);
}

/* Premium Buy Button with Shimmer */
.buy-btn {
  padding:12px 24px;
  border:none; border-radius:16px;
  background: var(--card-btn-grad, linear-gradient(135deg, var(--purple-dark), var(--purple)));
  color:#fff; font-family:'Nunito',sans-serif;
  font-weight:900; font-size:14px;
  cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; gap:8px;
  box-shadow:0 6px 16px rgba(0, 0, 0, 0.12);
  transition:all 0.2s ease;
  position: relative;
  overflow: hidden;
}
.buy-btn::after {
  content: '';
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  transform: translateX(-100%);
}
.buy-btn:hover::after {
  animation: shimmer 1.2s infinite;
}
.buy-btn svg {
  width:16px; height:16px;
  fill:none; stroke:#fff;
  stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round;
}
.buy-btn:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(0, 0, 0, 0.18); }
.buy-btn:active { transform:translateY(0); }

/* Elegant Full Design State */
.product-card.is-full {
  opacity:0.85;
  background: #F4EFF9;
  border-color: rgba(0,0,0,0.06);
}
.product-card.is-full:hover { transform:none; box-shadow:0 6px 18px rgba(0,0,0,0.05); }
.product-card.is-full .card-banner {
  background: linear-gradient(135deg, #70667A 0%, #A399A8 100%) !important;
}
.product-card.is-full .buy-btn {
  background:#A399A8 !important;
  cursor:not-allowed; box-shadow:none; transform:none;
}
.product-card.is-full .buy-btn::after { display: none; }

/* ── BACK BTN BOTTOM ── */
.back-btn-bottom {
  width:100%; padding:15px;
  border:1.5px solid var(--gray-line);
  border-radius:16px;
  background:var(--white); color:var(--text-mid);
  font-family:'Nunito',sans-serif;
  font-weight:800; font-size:14px;
  cursor:pointer; margin-top:10px;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:all 0.2s ease;
}
.back-btn-bottom svg {
  width:16px; height:16px;
  fill:none; stroke:currentColor;
  stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round;
}
.back-btn-bottom:hover {
  border-color:var(--purple);
  color:var(--purple);
  background:var(--purple-soft);
  transform: translateY(-2px);
}

</style>
</head>
<body>

<div class="blob1"></div>
<div class="blob2"></div>

<div class="header">
  <div class="hero-dots"></div>
  <div class="header-inner">
    <a class="back-btn-hdr" href="dashboard.html">
      <svg viewBox="0 0 24 24">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
    </a>
    <div class="header-title">
      <h1>
        <svg viewBox="0 0 24 24">
          <path d="M21 8l-9-5-9 5v8l9 5 9-5V8z"/>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
          <line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
        Produk VPN
      </h1>
      <p id="subtitle">Memuat produk...</p>
    </div>
    <div class="header-count" id="countBadge">—</div>
  </div>
</div>

<div class="search-wrap">
  <div class="search-box">
    <svg viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input class="search-input" id="searchInput" type="text"
      placeholder="Cari server atau lokasi..."
      oninput="filterProducts()">
  </div>
</div>

<div class="container">
  <div id="products">
    <div class="loading-state">
      <svg viewBox="0 0 24 24">
        <path d="M12 2a10 10 0 0 1 10 10"/>
      </svg>
      Memuat daftar produk...
    </div>
  </div>

  <button class="back-btn-bottom" onclick="window.location.href='dashboard.html'">
    <svg viewBox="0 0 24 24">
      <line x1="19" y1="12" x2="5" y2="12"/>
      <polyline points="12 19 5 12 12 5"/>
    </svg>
    Kembali ke Dashboard
  </button>
</div>

<script>

let allProducts = [];
// Daftar variasi tema class CSS yang akan bergiliran di-render
const cardThemes = ['theme-purple', 'theme-blue', 'theme-cyan', 'theme-orange'];

loadProducts();

async function loadProducts() {
  try {
    const res  = await fetch('/api/products');
    const data = await res.json();

    if (!data.success) {
      document.getElementById('products').innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16" stroke-width="3"/>
          </svg>
          <div class="empty-title">Gagal Memuat</div>
          <div class="empty-sub">Tidak dapat terhubung ke server</div>
        </div>`;
      return;
    }

    allProducts = data.products || [];
    document.getElementById('subtitle').textContent   = allProducts.length + ' server tersedia';
    document.getElementById('countBadge').textContent = allProducts.length + ' Server';
    renderProducts(allProducts);

  } catch (err) {
    console.error(err);
    document.getElementById('products').innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24">
          <line x1="1" y1="1" x2="23" y2="23"/>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <line x1="12" y1="20" x2="12.01" y2="20" stroke-width="3"/>
        </svg>
        <div class="empty-title">Koneksi Gagal</div>
        <div class="empty-sub">Periksa koneksi internet kamu</div>
      </div>`;
  }
}

function filterProducts() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allProducts.filter(s =>
    (s.nama_server||'').toLowerCase().includes(q) ||
    (s.lokasi||'').toLowerCase().includes(q)
  );
  renderProducts(filtered);
}

function renderProducts(products) {
  if (!products.length) {
    document.getElementById('products').innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <div class="empty-title">Tidak Ditemukan</div>
        <div class="empty-sub">Coba kata kunci lain</div>
      </div>`;
    return;
  }

  const slotIconOk   = `<svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;
  const slotIconFull = `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`;

  let html = '';
  products.forEach((server, i) => {
    const hargaMulai = Number(server.harga || 0) * 7;
    const slotUsed   = server.total_create_akun || 0;
    const slotMax    = server.batas_create_akun  || 0;
    const isFull     = slotMax > 0 && slotUsed >= slotMax;

    // Pilih tema warna berurutan dari array cardThemes
    const assignedTheme = cardThemes[i % cardThemes.length];

    const hargaFormatted = hargaMulai.toLocaleString('id-ID');

    html += `
    <div class="product-card ${assignedTheme} ${isFull ? 'is-full' : ''}" style="animation-delay:${i * 0.05}s">

      <div class="card-banner">
        <div class="server-icon">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </div>
        <div class="server-name-wrap">
          <div class="server-name">${server.nama_server}</div>
          <div class="server-loc">
            <svg viewBox="0 0 24 24">
              <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            ${server.lokasi || '—'}
          </div>
        </div>
        <div class="slot-badge ${isFull ? 'slot-full' : 'slot-ok'}">
          ${isFull ? slotIconFull : slotIconOk}
          ${isFull ? 'FULL' : slotUsed + '/' + slotMax}
        </div>
      </div>

      <div class="proto-row">
        <span class="proto-badge pb-ssh">
          <svg viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          SSH
        </span>
        <span class="proto-badge pb-vmess">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          VMESS
        </span>
        <span class="proto-badge pb-vless">
          <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          VLESS
        </span>
        <span class="proto-badge pb-trojan">
          <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          TROJAN
        </span>
        <span class="proto-badge pb-ss">
          <svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          SS
        </span>
      </div>

      <div class="card-bottom">
        <div class="price-box">
          <div class="price-label">Mulai dari</div>
          <div class="price-row">
            <span class="price-currency">Rp</span>
            <span class="price-number">${hargaFormatted}</span>
          </div>
          <div class="price-period-wrap">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            <span class="price-period-txt">per 7 hari</span>
          </div>
        </div>
        <button class="buy-btn" ${isFull ? 'disabled' : ''} onclick="buyServer(${server.id})">
          <svg viewBox="0 0 24 24">
            <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2"/>
            <path d="M12 8L8 12l1.5 4L15.5 9.5z"/>
            <path d="M22 2L15.5 9.5"/>
            <path d="M22 2s-4 0-9 5c-2 2-3 4-3 4"/>
          </svg>
          ${isFull ? 'Penuh' : 'Beli'}
        </button>
      </div>

    </div>`;
  });

  document.getElementById('products').innerHTML = html;
}

function buyServer(id) {
  window.location.href = 'checkout.html?id=' + id;
}

</script>
