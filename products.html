<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produk VPN - Xtrimer Tunnel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b132b;
    color:white;
    min-height:100vh;
}

.header{
    background:#1c2541;
    padding:20px;
    text-align:center;
    border-bottom:2px solid #facc15;
}

.logo{
    color:#facc15;
    font-size:28px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.product{
    background:#1f2937;
    border-radius:15px;
    padding:20px;
    margin-bottom:15px;
}

.product h3{
    color:#facc15;
    margin-bottom:10px;
}

.product p{
    margin-bottom:15px;
}

.btn{
    width:100%;
    border:none;
    padding:12px;
    border-radius:10px;
    background:#facc15;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

.back-btn{
    margin-top:20px;
    width:100%;
    border:none;
    padding:12px;
    border-radius:10px;
    background:#374151;
    color:white;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="header">
    <div class="logo">
        PRODUK VPN
    </div>
</div>

<div class="container">

    <div class="product">
        <h3>SSH Premium</h3>
        <p>Akun SSH Premium untuk tunneling.</p>
        <button class="btn">Pilih Produk</button>
    </div>

    <div class="product">
        <h3>VMESS Premium</h3>
        <p>Akun VMESS Premium Anti Limit.</p>
        <button class="btn">Pilih Produk</button>
    </div>

    <div class="product">
        <h3>VLESS Premium</h3>
        <p>Akun VLESS Premium Kecepatan Tinggi.</p>
        <button class="btn">Pilih Produk</button>
    </div>

    <div class="product">
        <h3>TROJAN Premium</h3>
        <p>Akun Trojan Premium Stabil.</p>
        <button class="btn">Pilih Produk</button>
    </div>

    <div class="product">
        <h3>SHADOWSOCKS Premium</h3>
        <p>Akun Shadowsocks Premium.</p>
        <button class="btn">Pilih Produk</button>
    </div>

    <button
        class="back-btn"
        onclick="window.location.href='dashboard.html'">
        Kembali ke Dashboard
    </button>

</div>

</body>
</html>
