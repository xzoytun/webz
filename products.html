<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produk VPN - Xtrimer Tunnel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b132b;
    color:white;
    min-height:100vh;
}

.header{
    background:#1c2541;
    padding:20px;
    text-align:center;
    border-bottom:2px solid #facc15;
}

.logo{
    color:#facc15;
    font-size:28px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.product{
    background:#1f2937;
    border-radius:15px;
    padding:20px;
    margin-bottom:15px;
}

.product h3{
    color:#facc15;
    margin-bottom:10px;
}

.product p{
    margin-bottom:10px;
}

.btn{
    width:100%;
    border:none;
    padding:12px;
    border-radius:10px;
    background:#facc15;
    color:black;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

.back-btn{
    margin-top:20px;
    width:100%;
    border:none;
    padding:12px;
    border-radius:10px;
    background:#374151;
    color:white;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="header">
    <div class="logo">
        PRODUK VPN
    </div>
</div>

<div class="container">

    <div id="products"></div>

    <button
        class="back-btn"
        onclick="window.location.href='dashboard.html'">
        Kembali ke Dashboard
    </button>

</div>

<script>

loadProducts();

async function loadProducts() {

    try {

        const response =
            await fetch('/api/products');

        const result =
            await response.json();

        if (!result.success) {

            alert('Gagal memuat produk');

            return;

        }

        const container =
            document.getElementById('products');

        container.innerHTML = '';

        result.products.forEach(product => {

            container.innerHTML += `
                <div class="product">

                    <h3>${product.name}</h3>

                    <p>
                        Kategori:
                        ${product.category}
                    </p>

                    <p>
                        Masa Aktif:
                        ${product.duration} Hari
                    </p>

                    <p>
                        Harga:
                        Rp ${Number(product.price).toLocaleString('id-ID')}
                    </p>

                    <button
                        class="btn"
                        onclick="selectProduct(${product.id})">

                        Pilih Produk

                    </button>

                </div>
            `;

        });

    } catch (err) {

        console.error(err);

        alert('Server tidak dapat dihubungi');

    }

}

function selectProduct(id) {

    localStorage.setItem(
        'selected_product',
        id
    );

    window.location.href =
        'checkout.html';

}

</script>

</body>
</html>
