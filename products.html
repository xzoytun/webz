<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produk VPN - Xtrimer Tunnel</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #0b132b;
    color: white;
    min-height: 100vh;
    padding-bottom: 30px;
}

/* ── Header ── */
.header {
    background: #1c2541;
    padding: 18px 20px;
    text-align: center;
    border-bottom: 2px solid #facc15;
}

.logo {
    color: #facc15;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 1px;
}

/* ── Container ── */
.container {
    padding: 20px;
    max-width: 480px;
    margin: 0 auto;
}

/* ── Subtitle ── */
.subtitle {
    color: #9ca3af;
    font-size: 13px;
    margin-bottom: 16px;
    text-align: center;
}

/* ── Product Card ── */
.product {
    background: #1f2937;
    border: 1px solid #2d3a55;
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 14px;
    transition: border-color 0.2s;
}

.product:hover {
    border-color: #facc15;
}

/* Top row: name + status */
.product-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
    gap: 10px;
}

.product-name {
    color: #facc15;
    font-size: 16px;
    font-weight: bold;
}

.product-location {
    color: #9ca3af;
    font-size: 12px;
    margin-top: 3px;
}

.status-badge {
    background: #065f46;
    color: #6ee7b7;
    font-size: 11px;
    font-weight: bold;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
}

/* Protocol badges */
.proto-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
}

.proto-badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: bold;
}

/* Divider */
.divider {
    border: none;
    border-top: 1px solid #374151;
    margin-bottom: 14px;
}

/* Price + button row */
.product-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
}

.price-box {}

.price-label {
    font-size: 11px;
    color: #9ca3af;
    margin-bottom: 2px;
}

.price-value {
    font-size: 22px;
    font-weight: bold;
    color: #facc15;
    line-height: 1;
}

.price-period {
    font-size: 11px;
    color: #6b7280;
    margin-top: 2px;
}

.btn {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #facc15;
    color: #0b132b;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
    flex-shrink: 0;
}

.btn:hover { opacity: 0.9; }

/* ── Empty / Loading ── */
.loading-text {
    text-align: center;
    color: #9ca3af;
    padding: 40px 0;
    font-size: 14px;
}

/* ── Back button ── */
.back-btn {
    width: 100%;
    border: none;
    padding: 13px;
    border-radius: 12px;
    background: #374151;
    color: #d1d5db;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.15s;
}

.back-btn:hover { background: #4b5563; }

</style>
</head>
<body>

<div class="header">
    <div class="logo">⚡ PRODUK VPN</div>
</div>

<div class="container">

    <div class="subtitle" id="subtitle">Memuat produk...</div>

    <div id="products">
        <div class="loading-text">⏳ Memuat daftar produk...</div>
    </div>

    <button
        class="back-btn"
        onclick="window.location.href='dashboard.html'">
        ← Kembali ke Dashboard
    </button>

</div>

<script>

loadProducts();

async function loadProducts() {
    try {
        const res  = await fetch('/api/products');
        const data = await res.json();

        if (!data.success) {
            alert('Gagal memuat produk');
            return;
        }

        const products = data.products;

        document.getElementById('subtitle').textContent =
            `${products.length} server tersedia`;

        if (products.length === 0) {
            document.getElementById('products').innerHTML =
                '<div class="loading-text">Belum ada produk tersedia</div>';
            return;
        }

        let html = '';

        products.forEach(server => {
            const harga30Hari = Number(server.harga || 0) * 30;
            const slotUsed    = server.total_create_akun || 0;
            const slotMax     = server.batas_create_akun || 0;
            const isFull      = slotMax > 0 && slotUsed >= slotMax;

            html += `
<div class="product">

    <div class="product-top">
        <div>
            <div class="product-name">🌐 ${server.nama_server}</div>
            <div class="product-location">📍 ${server.lokasi || '-'}</div>
        </div>
        <div class="status-badge">
            ${isFull ? '🔴 FULL' : `✅ ${slotUsed}/${slotMax}`}
        </div>
    </div>

    <div class="proto-row">
        <span class="proto-badge" style="background:#78350f;color:#fde68a">SSH</span>
        <span class="proto-badge" style="background:#065f46;color:#6ee7b7">VMESS</span>
        <span class="proto-badge" style="background:#1e3a5f;color:#93c5fd">VLESS</span>
        <span class="proto-badge" style="background:#7f1d1d;color:#fca5a5">TROJAN</span>
        <span class="proto-badge" style="background:#4c1d95;color:#c4b5fd">SS</span>
    </div>

    <hr class="divider">

    <div class="product-bottom">
        <div class="price-box">
            <div class="price-label">Mulai dari</div>
            <div class="price-value">Rp ${harga30Hari.toLocaleString('id-ID')}</div>
            <div class="price-period">/ 30 hari</div>
        </div>
        <button
            class="btn"
            ${isFull ? 'disabled style="opacity:0.4;cursor:not-allowed"' : ''}
            onclick="buyServer(${server.id})">
            🚀 Beli
        </button>
    </div>

</div>
`;
        });

        document.getElementById('products').innerHTML = html;

    } catch (err) {
        console.error(err);
        document.getElementById('products').innerHTML =
            '<div class="loading-text" style="color:#f87171">❌ Server tidak dapat dihubungi</div>';
    }
}

function buyServer(id) {
    window.location.href = 'checkout.html?id=' + id;
}

</script>
</body>
</html>
