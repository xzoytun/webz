<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produk VPN - Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>

:root {
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #3D0F72;
  --purple-light: #9B4FDE;
  --purple-soft:  #F3EAFD;
  --green:        #12C28A;
  --red:          #E84040;
  --white:        #FFFFFF;
  --bg:           #F8F6FC;
  --gray-line:    #EEF0F6;
  --text-dark:    #1A0533;
  --text-mid:     #6B3FA0;
  --text-light:   #A882CC;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  color: var(--text-dark);
  padding-bottom: 40px;
}

.theme-purple { --theme-color: #7B2FBE; --theme-bg: #F3EAFD; }
.theme-blue   { --theme-color: #0066FF; --theme-bg: #E6F0FF; }
.theme-cyan   { --theme-color: #00A896; --theme-bg: #E6F6F5; }
.theme-orange { --theme-color: #FF6B2B; --theme-bg: #FFF0E6; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple) 100%);
  padding: 20px 16px 28px;
}
.header-inner {
  display:flex; align-items:center; gap:12px;
  max-width:480px; margin:0 auto;
}
.back-btn-hdr {
  width:36px; height:36px; border-radius:12px;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.15);
  display:flex; align-items:center; justify-content:center;
  text-decoration:none; transition:all 0.2s; flex-shrink:0;
}
.back-btn-hdr:hover { background:rgba(255,255,255,0.2); }
.back-btn-hdr svg { width:18px; height:18px; fill:none; stroke:#fff; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
.header-title { flex:1; }
.header-title h1 { font-size:18px; font-weight:900; color:#fff; }
.header-title p { font-size:11px; color:rgba(255,255,255,0.6); font-weight:700; margin-top:1px; }
.header-count {
  background:rgba(255,255,255,0.12); padding:4px 12px; border-radius:12px;
  font-size:11px; font-weight:800; color:#fff; white-space:nowrap;
}

/* ── SEARCH ── */
.search-wrap { max-width:480px; margin:-15px auto 14px; padding:0 14px; }
.search-box {
  background:#fff; border-radius:14px; border:1px solid var(--gray-line);
  box-shadow:0 6px 20px rgba(90,26,154,0.07);
  display:flex; align-items:center; gap:10px; padding:11px 14px;
  transition:all 0.15s;
}
.search-box:focus-within { border-color:rgba(123,47,190,0.3); box-shadow:0 6px 20px rgba(90,26,154,0.12); }
.search-box svg { width:16px; height:16px; fill:none; stroke:var(--text-light); stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }
.search-input {
  flex:1; border:none; outline:none; font-family:'Nunito',sans-serif;
  font-size:13px; font-weight:700; color:var(--text-dark); background:transparent;
}
.search-input::placeholder { color:var(--text-light); font-weight:600; }

/* ── CONTAINER ── */
.container { max-width:480px; margin:0 auto; padding:0 14px; }

/* ── CARD ── */
.product-card {
  background: var(--white);
  border-radius: 16px;
  margin-bottom: 8px;
  padding: 11px 14px 11px 18px;
  border: 1px solid var(--gray-line);
  box-shadow: 0 2px 8px rgba(0,0,0,0.025);
  display: flex;
  align-items: center;
  gap: 11px;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
  transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
}
.product-card:hover {
  border-color: rgba(123,47,190,0.2);
  box-shadow: 0 4px 14px rgba(90,26,154,0.07);
  transform: translateY(-1px);
}

.card-indicator {
  position:absolute; left:0; top:10px; bottom:10px;
  width:3px; border-radius:0 3px 3px 0;
  background: var(--theme-color);
}

.server-badge {
  width:38px; height:38px; border-radius:11px;
  background: var(--theme-bg);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.server-badge svg { width:18px; height:18px; fill:none; stroke:var(--theme-color); stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }

.server-info { flex:1; min-width:0; }
.server-meta-top { display:flex; align-items:center; gap:7px; }
.server-name {
  font-size:13.5px; font-weight:800; color:var(--text-dark);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.slot-chip {
  font-size:9.5px; font-weight:800; padding:2px 7px; border-radius:6px;
  flex-shrink:0; white-space:nowrap;
}
.slot-chip.ok   { color:var(--green); background:#EDFAF5; }
.slot-chip.full { color:var(--red);   background:#FFEEEE; }

.server-sub {
  display:flex; align-items:center; gap:6px; margin-top:3px; flex-wrap:wrap;
}
.loc-text {
  font-size:11px; color:var(--text-light); font-weight:600;
  display:flex; align-items:center; gap:3px;
}
.loc-text svg { width:10px; height:10px; fill:none; stroke:currentColor; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
.divider-dot { width:3px; height:3px; border-radius:50%; background:var(--gray-line); flex-shrink:0; }
.mini-protos { display:flex; gap:4px; }
.mini-protos span {
  font-size:9px; font-weight:800; color:var(--text-mid);
  background:#F5F0FB; padding:1px 5px; border-radius:4px;
}

.action-side {
  display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex-shrink:0;
}
.price-tag { text-align:right; line-height:1.2; }
.price-from { font-size:9px; font-weight:700; color:var(--text-light); text-transform:uppercase; letter-spacing:0.4px; }
.price-val  { font-size:15px; font-weight:900; color:var(--text-dark); }
.price-val small { font-size:10px; font-weight:700; color:var(--text-mid); }

.buy-btn {
  padding:5px 13px; border:none; border-radius:9px;
  font-family:'Nunito',sans-serif; font-weight:800; font-size:11.5px;
  cursor:pointer; transition:all 0.15s;
  display:flex; align-items:center; gap:4px;
}
.buy-btn.active {
  background: var(--purple-deep);
  color:#fff;
}
.buy-btn.active:hover { background:var(--theme-color); transform:translateY(-1px); }
.buy-btn.disabled { background:#DDD8E6; color:#A09AB5; cursor:not-allowed; }

/* Full state */
.product-card.is-full { opacity:0.7; }
.product-card.is-full .card-indicator { background:#C0BBD0; }
.product-card.is-full .server-badge { background:#F0EEF5; }
.product-card.is-full .server-badge svg { stroke:#A8A3BB; }

/* ── STATES ── */
.loading-state {
  text-align:center; padding:48px 0; color:var(--text-mid);
  font-weight:700; font-size:13px;
  display:flex; flex-direction:column; align-items:center; gap:10px;
}
.loading-state svg { width:26px; height:26px; fill:none; stroke:var(--purple); stroke-width:2.5; stroke-linecap:round; animation:spin 0.9s linear infinite; }
.empty-state {
  text-align:center; padding:48px 0; color:var(--text-light);
  font-weight:700; font-size:13px;
}

/* ── BACK BTN ── */
.back-btn-bottom {
  width:100%; padding:12px; border:1px solid var(--gray-line); border-radius:12px;
  background:var(--white); color:var(--text-mid); font-family:'Nunito',sans-serif;
  font-weight:800; font-size:13px; cursor:pointer; margin-top:12px;
  display:flex; align-items:center; justify-content:center; gap:6px; transition:all 0.15s;
}
.back-btn-bottom svg { width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
.back-btn-bottom:hover { background:var(--purple-soft); border-color:var(--purple); color:var(--purple); }

/* ── SECTION LABEL ── */
.section-lbl {
  font-size:11px; font-weight:700; color:var(--text-light);
  text-transform:uppercase; letter-spacing:0.6px;
  margin-bottom:10px;
}

</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <a class="back-btn-hdr" href="dashboard.html">
      <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </a>
    <div class="header-title">
      <h1>Produk VPN</h1>
      <p id="subtitle">Memuat server...</p>
    </div>
    <div class="header-count" id="countBadge">—</div>
  </div>
</div>

<div class="search-wrap">
  <div class="search-box">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" id="searchInput" type="text"
      placeholder="Cari nama server atau lokasi..."
      oninput="filterProducts()">
  </div>
</div>

<div class="container">
  <div class="section-lbl" id="sectionLbl"></div>
  <div id="products">
    <div class="loading-state">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 0 1 10 10"/></svg>
      Memuat daftar produk...
    </div>
  </div>

  <button class="back-btn-bottom" onclick="window.location.href='dashboard.html'">
    <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Kembali ke Dashboard
  </button>
</div>

<script>
let allProducts = [];
const cardThemes = ['theme-purple','theme-blue','theme-cyan','theme-orange'];

loadProducts();

async function loadProducts() {
  try {
    const res  = await fetch('/api/products');
    const data = await res.json();
    if (!data.success) {
      document.getElementById('products').innerHTML = '<div class="empty-state">Gagal memuat daftar produk.</div>';
      return;
    }
    allProducts = data.products || [];
    document.getElementById('subtitle').textContent   = allProducts.length + ' server aktif';
    document.getElementById('countBadge').textContent = allProducts.length + ' Server';
    renderProducts(allProducts);
  } catch (err) {
    document.getElementById('products').innerHTML = '<div class="empty-state">Koneksi gagal terhubung.</div>';
  }
}

function filterProducts() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allProducts.filter(s =>
    (s.nama_server||'').toLowerCase().includes(q) ||
    (s.lokasi||'').toLowerCase().includes(q)
  );
  renderProducts(filtered);
}

function renderProducts(products) {
  const lbl = document.getElementById('sectionLbl');
  lbl.textContent = products.length ? products.length + ' server tersedia' : '';

  if (!products.length) {
    document.getElementById('products').innerHTML = '<div class="empty-state">Server tidak ditemukan.</div>';
    return;
  }

  const pinSvg = `<svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
  const globeSvg = `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`;

  let html = '';
  products.forEach((server, i) => {
    const hargaMulai     = Number(server.harga || 0) * 7;
    const slotUsed       = server.total_create_akun || 0;
    const slotMax        = server.batas_create_akun  || 0;
    const isFull         = slotMax > 0 && slotUsed >= slotMax;
    const assignedTheme  = cardThemes[i % cardThemes.length];
    const hargaFormatted = hargaMulai.toLocaleString('id-ID');

    html += `
    <div class="product-card ${assignedTheme}${isFull ? ' is-full' : ''}" style="animation-delay:${i * 0.04}s">
      <div class="card-indicator"></div>

      <div class="server-badge">${globeSvg}</div>

      <div class="server-info">
        <div class="server-meta-top">
          <div class="server-name">${server.nama_server}</div>
          <div class="slot-chip ${isFull ? 'full' : 'ok'}">${isFull ? 'FULL' : slotUsed + '/' + slotMax}</div>
        </div>
        <div class="server-sub">
          <div class="loc-text">${pinSvg} ${server.lokasi || 'Global'}</div>
          <div class="divider-dot"></div>
          <div class="mini-protos">
            <span>SSH</span><span>VMESS</span><span>VLESS</span><span>TROJAN</span>
          </div>
        </div>
      </div>

      <div class="action-side">
        <div class="price-tag">
          <div class="price-from">Mulai dari</div>
          <div class="price-val"><small>Rp</small>${hargaFormatted}</div>
        </div>
        <button class="buy-btn ${isFull ? 'disabled' : 'active'}" ${isFull ? 'disabled' : ''} onclick="buyServer(${server.id})">
          ${isFull ? 'Penuh' : 'Beli'}
        </button>
      </div>
    </div>`;
  });

  document.getElementById('products').innerHTML = html;
}

function buyServer(id) {
  window.location.href = 'checkout.html?id=' + id;
}
</script>
</body>
</html>
