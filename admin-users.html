<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kelola User - Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── TOKENS SYNCHRONIZED WITH DASHBOARD.HTML (PREMIUM LIGHT & DARK MODE) ── */
:root {
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #3D0F72;
  --purple-light: #9B4FDE;
  
  --purple-soft:  #E2E8F0; 
  --purple-mid:   #CBD5E1;
  --accent:       #FF6B2B;
  --accent2:      #FFD600;
  --green:        #12C28A;
  --green-bg:     #E2F7F1;
  --red:          #E84040;
  --red-bg:       #FEE2E2;
  
  --white:        #FFFFFF;
  --bg:           #F1F5F9; 
  --card-bg:      #F8FAFC; 
  --gray-line:    #E2E8F0; 
  
  --text-dark:    #0F172A; 
  --text-mid:     #334155; 
  --text-light:   #64748B; 

  --shadow-sm:  0 4px 12px rgba(15, 23, 42, 0.03);
  --shadow-md:  0 6px 18px rgba(15, 23, 42, 0.05);
  --shadow-lg:  0 10px 25px rgba(15, 23, 42, 0.05);

  --r-card: 14px;
  --r-btn:  10px;
  
  --nav-bg:       #F8FAFC;
  --nav-shadow:   rgba(15, 23, 42, 0.08);

  --btn-topup-grad: linear-gradient(135deg, #FF6B2B 0%, #FF8E53 100%);
  --btn-topup-shdw: rgba(255, 107, 43, 0.25);
  --btn-green-grad: linear-gradient(135deg, #12C28A 0%, #34D399 100%);
  --btn-green-shdw: rgba(18, 194, 138, 0.25);
}

html[data-theme="dark"] {
  --purple-soft:  #202124;
  --purple-mid:   #2a2b2f;
  --green-bg:     #0c2a21;
  --red-bg:       #311111;
  --white:        #17181c;
  --bg:           #0a0b0d;
  --card-bg:      #1c1d21;
  --gray-line:    #303135;
  --text-dark:    #E2E8F0; 
  --text-mid:     #94A3B8;  
  --text-light:   #64748B;
  --nav-bg:       #17181c;
  --nav-shadow:   rgba(0,0,0,0.4);

  --btn-topup-grad: linear-gradient(135deg, #FF6B2B 0%, #FF5100 100%);
  --btn-topup-shdw: rgba(255, 107, 43, 0.4);
  --btn-green-grad: linear-gradient(135deg, #12C28A 0%, #0A9E70 100%);
  --btn-green-shdw: rgba(18, 194, 138, 0.4);
}

html { background: var(--bg); }
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  color: var(--text-dark);
  padding-bottom: 90px;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.25s ease, color 0.25s ease;
}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ─── HERO HEADER ─── */
.hero {
  background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple) 60%, var(--purple-light) 100%);
  padding: 24px 20px 64px;
  position: relative; overflow: hidden; z-index: 2;
}
.hero::before {
  content:''; position:absolute; top:-40px; right:-20px;
  width:140px; height:140px;
  border:28px solid rgba(255,255,255,0.05); border-radius:50%;
}
.hero-dots {
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 200px 20px; pointer-events:none;
}

.hero-top {
  display:flex; align-items:center; gap:12px;
  max-width: 440px; margin: 0 auto; position:relative; z-index:2;
  animation: fadeUp 0.35s ease both;
}

.back-btn {
  width:32px; height:32px; border-radius:50%;
  background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.15);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all 0.2s; backdrop-filter:blur(10px);
  text-decoration: none;
}
.back-btn:hover { background:rgba(255,255,255,0.2); transform:translateY(-2px); }
.back-btn svg { width:15px; height:15px; fill:none; stroke:#fff; stroke-width:2.5; }

.hero-title { flex:1; min-width:0; }
.hero-title h1 {
  font-size:16px; font-weight:900; color:#fff; line-height:1.2; letter-spacing:-0.2px;
  display: flex; align-items: center; gap: 6px;
}
.hero-title p {
  font-size:10.5px; color:rgba(255,255,255,0.75); font-weight:600; margin-top:1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ─── THEME TOGGLE ─── */
.theme-toggle {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s; backdrop-filter: blur(10px);
  flex-shrink: 0;
}
.theme-toggle:hover { background: rgba(255,255,255,0.25); transform: translateY(-2px); }
.theme-toggle svg { width: 15px; height: 15px; fill: none; stroke: #fff; stroke-width: 2.2; }
.icon-sun  { display: none; }
.icon-moon { display: block; }
html:not([data-theme="dark"]) .icon-sun  { display: block; }
html:not([data-theme="dark"]) .icon-moon { display: none; }

.admin-badge {
  background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.15);
  border-radius:12px; padding:4px 10px;
  font-size:9.5px; font-weight:800; color:#fff;
  letter-spacing:0.3px; white-space:nowrap; flex-shrink:0;
  backdrop-filter:blur(10px);
}

/* ─── CONTAINER ─── */
.container {
  max-width: 440px; margin: 0 auto;
  padding: 0 16px; position: relative; z-index: 2;
}

/* ─── SEARCH BAR ─── */
.search-wrap {
  max-width: 440px; margin: -28px auto 14px;
  padding: 0 16px; position: relative; z-index: 20;
  animation: fadeUp 0.38s 0.06s ease both;
}
.search-box {
  width: 100%; background: var(--white);
  border-radius: 16px; border: 1px solid var(--gray-line);
  box-shadow: var(--shadow-md);
  display: flex; align-items: center; gap: 10px; padding: 12px 14px;
  transition: background 0.25s, border-color 0.25s;
}
.search-box svg { color: var(--text-light); flex-shrink: 0; width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.5; }
.search-input {
  flex: 1; border: none; outline: none;
  font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700;
  color: var(--text-dark); background: transparent;
}
.search-input::placeholder { color: var(--text-light); font-weight: 600; }

/* ─── LOADING ─── */
.loading-state {
  text-align: center; padding: 40px 20px;
  color: var(--text-mid); font-weight: 800; font-size: 13px;
}
.loading-icon { display: flex; justify-content: center; margin-bottom: 10px; }
.loading-icon svg { width: 22px; height: 22px; fill: none; stroke: var(--purple-light); stroke-width: 2.5; animation: spin 1s linear infinite; }

/* ─── USER CARD ─── */
.user-card {
  background: var(--card-bg); border-radius: var(--r-card);
  margin-bottom: 10px; overflow: hidden;
  border: 1px solid var(--gray-line);
  box-shadow: var(--shadow-sm);
  animation: fadeUp 0.38s ease both;
  transition: background 0.25s, border-color 0.25s;
}

.user-card-head {
  padding: 12px 14px; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--gray-line);
}
.user-avatar {
  width: 38px; height: 38px; border-radius: 10px;
  background: var(--bg); border: 1px solid var(--gray-line);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 15px; font-weight: 900; color: var(--purple-light); overflow: hidden;
}
.user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.user-avatar svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.2; }

.user-head-info { flex: 1; min-width: 0; }
.user-name {
  font-size: 13.5px; font-weight: 800; color: var(--text-dark);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 1px; line-height: 1.2;
}
.user-email {
  font-size: 10.5px; font-weight: 600; color: var(--text-light);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.role-badge {
  padding: 2px 8px; border-radius: 5px;
  font-size: 8.5px; font-weight: 800; text-transform: uppercase; flex-shrink: 0;
  letter-spacing: 0.3px; border: 1px solid rgba(0,0,0,0.05);
}
.role-admin { background: var(--red-bg); color: var(--red); border-color: rgba(232,64,64,0.1); }
.role-user  { background: var(--purple-soft); color: var(--text-mid); border-color: var(--gray-line); }

.user-info-grid {
  padding: 12px 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  border-bottom: 1px solid var(--gray-line);
}
.info-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.info-lbl {
  font-size: 9px; font-weight: 800; color: var(--text-light);
  text-transform: uppercase; letter-spacing: 0.5px;
  display: flex; align-items: center; gap: 4px;
}
.info-lbl svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 2.2; }
.info-val { font-size: 12.5px; font-weight: 800; color: var(--text-dark); }
.info-val.balance-val { color: var(--text-dark); font-size: 13.5px; font-weight: 900; }

.user-actions {
  padding: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
  background: var(--bg); transition: background 0.25s;
}
.act-btn {
  padding: 9px 6px; border: none; border-radius: 10px;
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 11.5px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  gap: 4px; transition: all 0.2s ease;
  color: #fff;
}
.act-btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2.5; }
.act-btn:hover { transform: translateY(-1px); filter: brightness(1.08); }
.act-btn:active { transform: scale(0.97); }

.btn-add-bal { 
  background: var(--btn-green-grad); 
  box-shadow: 0 4px 10px var(--btn-green-shdw);
}
.btn-reduce-bal { 
  background: var(--btn-topup-grad); 
  box-shadow: 0 4px 10px var(--btn-topup-shdw);
}

/* ─── EMPTY STATE ─── */
.empty-state { text-align: center; padding: 50px 20px; }
.empty-icon { margin: 0 auto 12px; display: flex; justify-content: center; }
.empty-icon svg { width: 44px; height: 44px; fill: none; stroke: var(--text-light); stroke-width: 2; }
.empty-title { font-size: 15px; font-weight: 800; color: var(--text-dark); margin-bottom: 2px; }
.empty-sub { font-size: 11.5px; color: var(--text-light); font-weight: 600; }

/* ─── MODAL BOTTOM SHEET ─── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4);
  backdrop-filter: blur(4px); z-index: 1000;
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
}
html[data-theme="dark"] .modal-overlay { background: rgba(0,0,0,0.6); }
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--white); border-radius: 16px 16px 0 0;
  width: 100%; max-width: 440px; padding: 20px 20px 32px;
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.16,1,0.3,1), background 0.25s;
  border: 1px solid var(--gray-line);
}
.modal-overlay.open .modal { transform: translateY(0); }

@media (max-height: 600px), screen and (max-width: 480px) {
  .modal-overlay.open { align-items: center; }
  .modal { border-radius: 16px; width: 92%; margin-bottom: 20px; box-shadow: var(--shadow-lg); }
}

.modal-handle { width: 36px; height: 4px; background: var(--purple-soft); border-radius: 4px; margin: 0 auto 16px; }
.modal-title { font-size: 15px; font-weight: 900; color: var(--text-dark); margin-bottom: 2px; display: flex; align-items: center; }
.modal-title svg { width: 16px; height: 16px; margin-right: 6px; fill: none; stroke: currentColor; stroke-width: 2.2; }
.modal-sub { font-size: 11.5px; font-weight: 600; color: var(--text-light); margin-bottom: 16px; }

.field-label { font-size: 9px; font-weight: 800; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
.field-input {
  width: 100%; padding: 10px 12px; border: 1px solid var(--gray-line); border-radius: 10px;
  font-family: 'Nunito', sans-serif; font-size: 13.5px; font-weight: 700;
  color: var(--text-dark); background: var(--bg); outline: none; margin-bottom: 16px; transition: all 0.15s;
}
.field-input:focus { border-color: var(--purple-light); background: var(--white); box-shadow: 0 0 0 3px rgba(123,47,190,0.08); }

.modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-cancel {
  padding: 10px; border: 1px solid var(--gray-line); border-radius: 10px;
  background: var(--white); color: var(--text-mid); font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 12.5px; cursor: pointer;
  transition: background 0.2s;
}
.modal-submit {
  padding: 10px; border: none; border-radius: 10px; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 12.5px; color: #fff; cursor: pointer;
  transition: all 0.2s; text-align: center;
}
.modal-submit:active { transform: scale(0.97); }
.submit-green  { background: var(--btn-green-grad); box-shadow: var(--btn-green-shdw); }
.submit-orange { background: var(--btn-topup-grad); box-shadow: var(--btn-topup-shdw); }

/* ─── BOTTOM NAV ─── */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 440px; background: var(--nav-bg);
  border-top: 1px solid var(--gray-line);
  box-shadow: var(--nav-shadow); z-index: 999;
  transition: background 0.25s ease, border-color 0.25s ease;
}
.bottom-nav-inner { display: flex; align-items: center; justify-content: space-around; padding: 10px 0 14px; }
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  text-decoration: none; color: var(--text-light); width: 70px; transition: all 0.2s;
}
.nav-icon svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; transition: transform 0.2s; }
.nav-label { font-size: 9px; font-weight: 800; }
.nav-item:hover .nav-icon svg { transform: translateY(-2px); }
.nav-item.active { color: var(--purple); }
html[data-theme="dark"] .nav-item.active { color: var(--purple-light); }
.nav-item.active .nav-icon svg { stroke: var(--purple); }
html[data-theme="dark"] .nav-item.active .nav-icon svg { stroke: var(--purple-light); }

/* ─── TOAST ─── */
.toast {
  position:fixed; top:20px; left:50%;
  transform:translateX(-50%) translateY(-80px); z-index:9999;
  background:var(--text-dark); color:var(--white);
  padding:10px 20px; border-radius:12px;
  font-weight:800; font-size:12.5px;
  display:flex; align-items:center; gap:8px;
  box-shadow: 0 8px 24px rgba(15, 23, 42, 0.15);
  transition:transform 0.3s cubic-bezier(0.34,1.2,0.64,1), opacity 0.3s;
  opacity:0; white-space:nowrap;
}
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
.toast.error { background: var(--red); color: #fff; }
.toast.success { background: var(--green); color: #fff; }
.toast.warn { background: var(--accent); color: #fff; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-dots"></div>
  <div class="hero-top">
    <a class="back-btn" href="admin.html" aria-label="Kembali ke Admin Panel">
      <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </a>
    <div class="hero-title">
      <h1>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="width:16px;height:16px;display:inline-block;vertical-align:middle;margin-right:2px;margin-top:-2px;"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>

<script>
// ─── THEME MANAGER SYSTEM (SYNCHRONIZED WITH DASHBOARD) ───
document.getElementById('themeToggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
});

(function initTheme(){
  const saved = localStorage.getItem('theme');
  if (saved === 'dark' || saved === 'light') {
    document.documentElement.setAttribute('data-theme', saved);
  } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  } else {
    document.documentElement.setAttribute('data-theme', 'light');
  }
})();

// ─── APP & AUTH CONFIG ───
const svgUserTemplate   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>`;
const svgUsersTemplate  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>`;
const svgWalletTemplate = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"></path><path d="M4 6v12a2 2 0 0 0 2 2h14v-4"></path><path d="M18 12a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h4v-6z"></path></svg>`;
const svgCalendarTemplate = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>`;
const svgPlusTemplate   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
const svgMinusTemplate  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg>`;

const localUser = JSON.parse(localStorage.getItem('user'));
const token = localStorage.getItem('token');

if (!localUser || !token) {
  window.location.replace('dashboard.html');
} else if (localUser.role !== 'admin') {
  window.location.replace('dashboard.html');
}

let allUsers = [];
let modalMode = '';
let modalUserId = null;

document.addEventListener("DOMContentLoaded", () => {
    loadUsers();
});

async function loadUsers() {
  try {
    const res  = await fetch('/api/admin/users', {
      method: 'GET',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      }
    });
    const data = await res.json();

    if (!data.success) { showToast('⚠️ Gagal memuat user: ' + data.message, 'error'); return; }

    allUsers = data.users || [];
    document.getElementById('userCountLabel').innerText = allUsers.length + ' user terdaftar';
    document.getElementById('userCountBadge').innerText = allUsers.length + ' User';
    renderUsers(allUsers);

  } catch(err) {
    console.error(err);
    showToast('❌ Gagal memuat data dari server', 'error');
  }
}

function filterUsers() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allUsers.filter(u =>
    (u.username||'').toLowerCase().includes(q) ||
    (u.email||'').toLowerCase().includes(q)
  );
  renderUsers(filtered);
}

function renderUsers(users) {
  if (!users.length) {
    document.getElementById('users').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${svgUsersTemplate}</div>
        <div class="empty-title">Tidak Ada User</div>
        <div class="empty-sub">Belum ada user yang cocok ditemukan</div>
      </div>`;
    return;
  }

  let html = '';
  users.forEach((u, i) => {
    const isAdmin = u.role === 'admin';
    const avatarContent = u.avatar ? `<img src="${u.avatar}" alt="">` : svgUserTemplate;

    html += `
    <div class="user-card" style="animation-delay:${i * 0.045}s">
      <div class="user-card-head">
        <div class="user-avatar">${avatarContent}</div>
        <div class="user-head-info">
          <div class="user-name">${u.username || '—'}</div>
          <div class="user-email">${u.email}</div>
        </div>
        <span class="role-badge ${isAdmin ? 'role-admin' : 'role-user'}">
          ${isAdmin ? 'Admin' : 'User'}
        </span>
      </div>

      <div class="user-info-grid">
        <div class="info-item">
          <div class="info-lbl">${svgWalletTemplate} Saldo</div>
          <div class="info-val balance-val">Rp ${Number(u.balance||0).toLocaleString('id-ID')}</div>
        </div>
        <div class="info-item">
          <div class="info-lbl">${svgCalendarTemplate} Bergabung</div>
          <div class="info-val">
            ${u.created_at ? u.created_at.split('T')[0] : '—'}
          </div>
        </div>
      </div>

      <div class="user-actions">
        <button class="act-btn btn-add-bal" onclick="openBalanceModal(${u.id}, 'add', '${(u.username||'User').replace(/'/g,"\\'")}')">
          ${svgPlusTemplate} Tambah
        </button>
        <button class="act-btn btn-reduce-bal" onclick="openBalanceModal(${u.id}, 'reduce', '${(u.username||'User').replace(/'/g,"\\'")}')">
          ${svgMinusTemplate} Kurangi
        </button>
      </div>
    </div>`;
  });

  document.getElementById('users').innerHTML = html;
}

function openBalanceModal(userId, mode, name) {
  modalUserId = userId;
  modalMode   = mode;
  document.getElementById('fAmount').value = '';

  if (mode === 'add') {
    document.getElementById('modalTitle').innerHTML = `${svgPlusTemplate} Tambah Saldo`;
    document.getElementById('modalSub').innerText  = 'Tambah saldo untuk ' + name;
    document.getElementById('modalSubmit').className = 'modal-submit submit-green';
    document.getElementById('modalSubmit').innerText  = 'Tambah ✓';
  } else {
    document.getElementById('modalTitle').innerHTML = `${svgMinusTemplate} Kurangi Saldo`;
    document.getElementById('modalSub').innerText  = 'Kurangi saldo dari ' + name;
    document.getElementById('modalSubmit').className = 'modal-submit submit-orange';
    document.getElementById('modalSubmit').innerText  = 'Kurangi ✓';
  }

  document.getElementById('modalOverlay').classList.add('open');
  
  setTimeout(() => {
    const inputField = document.getElementById('fAmount');
    inputField.focus();
    inputField.scrollIntoView({ block: "center", behavior: "smooth" });
  }, 350);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

async function submitBalance() {
  const amount = Number(document.getElementById('fAmount').value);
  if (!amount || amount <= 0) { showToast('⚠️ Masukkan nominal yang valid', 'warn'); return; }

  const endpoint = modalMode === 'add' ? '/api/admin/add-balance' : '/api/admin/reduce-balance';

  try {
    const res  = await fetch(endpoint, {
      method:'POST',
      headers:{
        'Authorization': `Bearer ${token}`,
        'Content-Type':'application/json'
      },
      body: JSON.stringify({ user_id: modalUserId, amount })
    });
    const data = await res.json();
    showToast((data.success ? '✓ ' : '✗ ') + (data.message || 'Selesai'), data.success ? 'success' : 'error');
    closeModal();
    loadUsers();
  } catch(err) {
    console.error(err);
    showToast('❌ Terjadi kesalahan server', 'error');
  }
}

function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type + ' show';
    setTimeout(() => { t.className = 'toast ' + type; }, 2600);
}
</script>
</body>
</html>
