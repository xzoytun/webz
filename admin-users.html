<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelola User - Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>

:root {
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #3D0F72;
  --purple-light: #9B4FDE;
  --purple-soft:  #F3EAFD;
  --purple-mid:   #EAD5FA;
  --accent:       #FF6B2B;
  --accent-light: #FFEFEA;
  --green:        #12C28A;
  --green-bg:     #E6FAF4;
  --red:          #E84040;
  --red-bg:       #FFECEC;
  --white:        #FFFFFF;
  --bg:           #F8F6FC;
  --gray-line:    #EEF0F6;
  --text-dark:    #1A0533;
  --text-mid:     #6B3FA0;
  --text-light:   #A882CC;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  color: var(--text-dark);
  padding-bottom: 40px;
  overflow-x: hidden;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple) 60%, var(--purple-light) 100%);
  padding: 28px 20px 48px;
  position: relative;
  overflow: hidden;
  z-index: 2;
}
.header::before {
  content:''; position:absolute; top:-40px; right:-20px;
  width:160px; height:160px;
  border:32px solid rgba(255,255,255,0.05); border-radius:50%;
}
.hero-dots {
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 20px 20px;
  pointer-events:none;
}
.header-inner {
  display:flex; align-items:center; gap:12px;
  position:relative; z-index:2;
}
.back-btn-hdr {
  width:36px; height:36px; border-radius:11px;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.18);
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:#fff; transition:background 0.15s;
  backdrop-filter:blur(8px); text-decoration:none;
}
.back-btn-hdr:hover { background:rgba(255,255,255,0.2); }
.back-btn-hdr svg { width:18px; height:18px; fill:none; stroke:#fff; stroke-width:2.5; }

.header-title { flex:1; }
.header-title h1 {
  font-size:18px; font-weight:900;
  color:#fff; line-height:1.1; letter-spacing:-0.2px;
  display:flex; align-items:center; gap:6px;
}
.header-title h1 svg { width:20px; height:20px; fill:none; stroke:#fff; stroke-width:2.2; }
.header-title p { font-size:11px; color:rgba(255,255,255,0.6); font-weight:700; margin-top:3px; }

.header-count {
  background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:12px; padding:6px 12px;
  font-size:11px; font-weight:800; color:#fff;
  white-space:nowrap;
}

/* ── SEARCH BAR ── */
.search-wrap {
  max-width:440px; margin: -24px auto 0;
  padding: 0 16px;
  position:relative; z-index:5;
  margin-bottom: 16px;
}
.search-box {
  width:100%; background:#fff;
  border-radius:14px;
  border:1px solid var(--gray-line);
  box-shadow:0 8px 24px rgba(90,26,154,0.04);
  display:flex; align-items:center; gap:10px;
  padding:12px 14px;
}
.search-box svg { color:var(--text-light); flex-shrink:0; width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.5; }
.search-input {
  flex:1; border:none; outline:none;
  font-family:'Nunito',sans-serif; font-size:13px; font-weight:700;
  color:var(--text-dark); background:transparent;
}
.search-input::placeholder { color:var(--text-light); font-weight:600; }

/* ── CONTAINER ── */
.container {
  max-width:440px; margin:0 auto;
  padding:0 16px; position:relative; z-index:2;
}

/* ── LOADING ── */
.loading-state {
  text-align:center; padding:40px 20px;
  color:var(--text-mid); font-weight:700; font-size:13px;
}
.loading-icon { display:flex; justify-content:center; margin-bottom:10px; }
.loading-icon svg { width: 24px; height: 24px; fill: none; stroke: var(--purple); stroke-width: 2.5; animation:spin 1s linear infinite; }

/* ── USER CARD ── */
.user-card {
  background:var(--white); border-radius:16px;
  margin-bottom:12px; overflow:hidden;
  border:1px solid var(--gray-line);
  box-shadow:0 4px 14px rgba(90,26,154,0.02);
  animation: fadeUp 0.35s ease both;
}
.user-card-head {
  padding:14px 16px; display:flex; align-items:center; gap:12px;
  border-bottom:1px solid var(--gray-line);
}
.user-avatar {
  width:40px; height:40px; border-radius:12px;
  background:var(--purple-soft);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; font-size:16px; color:var(--purple); overflow:hidden;
}
.user-avatar img { width:100%; height:100%; object-fit:cover; }
.user-avatar svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2.2; }

.user-head-info { flex:1; min-width:0; }
.user-name {
  font-size:15px; font-weight:800; color:var(--text-dark);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-bottom:2px;
}
.user-email {
  font-size:11px; font-weight:600; color:var(--text-light);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.role-badge {
  padding:4px 10px; border-radius:10px;
  font-size:10px; font-weight:800; text-transform:uppercase; flex-shrink:0;
}
.role-admin { background:var(--red-bg); color:var(--red); }
.role-user  { background:var(--purple-soft); color:var(--purple); }

.user-info-grid {
  padding:14px 16px; display:grid; grid-template-columns:1fr 1fr; gap:14px;
  border-bottom:1px solid var(--gray-line);
}
.info-lbl {
  font-size:10px; font-weight:800; color:var(--text-light);
  text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px;
  display:flex; align-items:center; gap:4px;
}
.info-lbl svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 2.2; }
.info-val { font-size:13px; font-weight:800; color:var(--text-dark); }
.info-val.balance-val { color:var(--purple); font-size:14px; }

.user-actions {
  padding:10px 12px; display:grid; grid-template-columns:1fr 1fr; gap:8px;
  background: #FAFAFD;
}
.act-btn {
  padding:11px 6px; border:none; border-radius:11px;
  font-family:'Nunito',sans-serif; font-weight:800; font-size:12px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  gap:6px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.act-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.3; }
.act-btn:active { transform: scale(0.97); opacity: 0.9; }

.btn-add-bal { background:var(--green-bg); color:var(--green); }
.btn-reduce-bal { background:var(--accent-light); color:var(--accent); }

/* ── EMPTY ── */
.empty-state { text-align:center; padding:50px 20px; }
.empty-icon { margin:0 auto 12px; display:flex; justify-content:center; }
.empty-icon svg { width: 48px; height: 48px; fill: none; stroke: var(--text-light); stroke-width: 2; }
.empty-title { font-size:16px; font-weight:800; color:var(--text-dark); margin-bottom:4px; }
.empty-sub { font-size:12px; color:var(--text-mid); font-weight:600; }

/* ── MODAL ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(26,5,51,0.4);
  backdrop-filter:blur(4px); z-index:100;
  display:flex; align-items:flex-end; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity 0.25s ease;
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--white); border-radius:20px 20px 0 0;
  width:100%; max-width:440px; padding:24px 20px 32px;
  transform:translateY(100%); transition:transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
}
.modal-overlay.open .modal { transform:translateY(0); }
.modal-handle { width:36px; height:4px; background:#E2E8F0; border-radius:4px; margin:0 auto 18px; }
.modal-title { font-size:16px; font-weight:900; color:var(--text-dark); margin-bottom:4px; display: flex; align-items: center; }
.modal-title svg { width: 18px; height: 18px; margin-right: 6px; fill: none; stroke: currentColor; stroke-width: 2.2; }
.modal-sub { font-size:12px; font-weight:600; color:var(--text-mid); margin-bottom:18px; }

.field-label { font-size:10px; font-weight:800; color:var(--text-mid); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; display:block; }
.field-input {
  width:100%; padding:12px 14px; border:1px solid var(--gray-line); border-radius:12px;
  font-family:'Nunito',sans-serif; font-size:14px; font-weight:700;
  color:var(--text-dark); background:var(--bg); outline:none; margin-bottom:18px; transition:all 0.15s;
}
.field-input:focus { border-color:var(--purple); background:#fff; box-shadow:0 0 0 3px rgba(123,47,190,0.06); }

.modal-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.modal-cancel {
  padding:12px; border:1px solid var(--gray-line); border-radius:12px;
  background:#fff; color:var(--text-mid); font-family:'Nunito',sans-serif; font-weight:800; font-size:13px; cursor:pointer;
}
.modal-submit {
  padding:12px; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-weight:900; font-size:13px; color:#fff; cursor:pointer;
  transition: all 0.2s;
}
.modal-submit:active { transform: scale(0.97); }
.submit-green  { background:linear-gradient(135deg, var(--green), #00E676); box-shadow:0 4px 12px rgba(18,194,138,0.2); }
.submit-orange { background:linear-gradient(135deg, var(--accent), #FF8A50); box-shadow:0 4px 12px rgba(255,107,43,0.2); }

/* ── TOAST ── */
.toast {
  position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-80px);
  z-index:999; padding:12px 20px; border-radius:12px; font-weight:800; font-size:12px;
  display:flex; align-items:center; gap:6px; box-shadow:0 8px 24px rgba(90,26,154,0.12);
  transition:all 0.3s cubic-bezier(0.34,1.2,0.64,1); opacity:0; white-space:nowrap;
  color:#fff; background:var(--text-dark);
}
.toast.show   { transform:translateX(-50%) translateY(0); opacity:1; }
.toast.success{ background:linear-gradient(135deg, var(--green), #00E676); }
.toast.error  { background:linear-gradient(135deg, var(--red), #FF7A7A); }
.toast.warn   { background:linear-gradient(135deg, var(--accent), #FF8A50); }

</style>
</head>
<body>

<div class="header">
  <div class="hero-dots"></div>
  <div class="header-inner">
    <a class="back-btn-hdr" href="admin.html">
      <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    </a>
    <div class="header-title">
      <h1>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        Kelola User
      </h1>
      <p id="userCountLabel">Memuat data...</p>
    </div>
    <div class="header-count" id="userCountBadge">—</div>
  </div>
</div>

<div class="search-wrap">
  <div class="search-box">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <input class="search-input" id="searchInput" type="text" placeholder="Cari nama atau email..." oninput="filterUsers()">
  </div>
</div>

<div class="container">
  <div id="users">
    <div class="loading-state">
      <div class="loading-icon">
        <svg viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>
      </div>
      Memuat data user...
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">Tambah Saldo</div>
    <div class="modal-sub" id="modalSub">Masukkan nominal saldo</div>
    <label class="field-label">Nominal (Rp)</label>
    <input class="field-input" id="fAmount" type="number" placeholder="Contoh: 50000" min="1">
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Batal</button>
      <button class="modal-submit" id="modalSubmit" onclick="submitBalance()">Simpan</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

const svgUserTemplate   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>`;
const svgUsersTemplate  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>`;
const svgWalletTemplate = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"></path><path d="M4 6v12a2 2 0 0 0 2 2h14v-4"></path><path d="M18 12a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h4v-6z"></path></svg>`;
const svgCalendarTemplate = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>`;
const svgPlusTemplate   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></svg>`;
const svgMinusTemplate  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="8" y1="12" x2="16" y2="12"></svg>`;

const localUser = JSON.parse(localStorage.getItem('user'));
const token = localStorage.getItem('token');

if (!localUser || !token) {
  location.href = 'index.html';
} else if (localUser.role !== 'admin') {
  alert('Akses ditolak: Anda bukan admin!');
  location.href = 'dashboard.html';
}

let allUsers = [];
let modalMode = '';
let modalUserId = null;

loadUsers();

async function loadUsers() {
  try {
    const res  = await fetch('/api/admin/users', {
      method: 'GET',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      }
    });
    const data = await res.json();

    if (!data.success) { showToast('Gagal memuat user: ' + data.message, 'error'); return; }

    allUsers = data.users || [];
    document.getElementById('userCountLabel').innerText = allUsers.length + ' user terdaftar';
    document.getElementById('userCountBadge').innerText = allUsers.length + ' User';
    renderUsers(allUsers);

  } catch(err) {
    console.error(err);
    showToast('Server error', 'error');
  }
}

function filterUsers() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allUsers.filter(u =>
    (u.username||'').toLowerCase().includes(q) ||
    (u.email||'').toLowerCase().includes(q)
  );
  renderUsers(filtered);
}

function renderUsers(users) {
  if (!users.length) {
    document.getElementById('users').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${svgUsersTemplate}</div>
        <div class="empty-title">Tidak Ada User</div>
        <div class="empty-sub">Belum ada user yang terdaftar</div>
      </div>`;
    return;
  }

  let html = '';
  users.forEach((u, i) => {
    const isAdmin = u.role === 'admin';
    const avatarContent = u.avatar ? `<img src="${u.avatar}" alt="">` : svgUserTemplate;

    html += `
    <div class="user-card" style="animation-delay:${i * 0.045}s">
      <div class="user-card-head">
        <div class="user-avatar">${avatarContent}</div>
        <div class="user-head-info">
          <div class="user-name">${u.username || '—'}</div>
          <div class="user-email">${u.email}</div>
        </div>
        <span class="role-badge ${isAdmin ? 'role-admin' : 'role-user'}">
          ${isAdmin ? 'Admin' : 'User'}
        </span>
      </div>

      <div class="user-info-grid">
        <div class="info-item">
          <div class="info-lbl">${svgWalletTemplate} Saldo</div>
          <div class="info-val balance-val">Rp ${Number(u.balance||0).toLocaleString('id-ID')}</div>
        </div>
        <div class="info-item">
          <div class="info-lbl">${svgCalendarTemplate} Bergabung</div>
          <div class="info-val">
            ${u.created_at ? u.created_at.split('T')[0] : '—'}
          </div>
        </div>
      </div>

      <div class="user-actions">
        <button class="act-btn btn-add-bal" onclick="openBalanceModal(${u.id}, 'add', '${(u.username||'User').replace(/'/g,"\\'")}')">
          ${svgPlusTemplate} Tambah
        </button>
        <button class="act-btn btn-reduce-bal" onclick="openBalanceModal(${u.id}, 'reduce', '${(u.username||'User').replace(/'/g,"\\'")}')">
          ${svgMinusTemplate} Kurangi
        </button>
      </div>
    </div>`;
  });

  document.getElementById('users').innerHTML = html;
}

function openBalanceModal(userId, mode, name) {
  modalUserId = userId;
  modalMode   = mode;
  document.getElementById('fAmount').value = '';

  if (mode === 'add') {
    document.getElementById('modalTitle').innerHTML = `${svgPlusTemplate} Tambah Saldo`;
    document.getElementById('modalSub').innerText  = 'Tambah saldo untuk ' + name;
    document.getElementById('modalSubmit').className = 'modal-submit submit-green';
    document.getElementById('modalSubmit').innerText  = 'Tambah ✓';
  } else {
    document.getElementById('modalTitle').innerHTML = `${svgMinusTemplate} Kurangi Saldo`;
    document.getElementById('modalSub').innerText  = 'Kurangi saldo dari ' + name;
    document.getElementById('modalSubmit').className = 'modal-submit submit-orange';
    document.getElementById('modalSubmit').innerText  = 'Kurangi ✓';
  }

  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fAmount').focus(), 350);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

async function submitBalance() {
  const amount = Number(document.getElementById('fAmount').value);
  if (!amount || amount <= 0) { showToast('Masukkan nominal yang valid', 'warn'); return; }

  const endpoint = modalMode === 'add' ? '/api/admin/add-balance' : '/api/admin/reduce-balance';

  try {
    const res  = await fetch(endpoint, {
      method:'POST',
      headers:{
        'Authorization': `Bearer ${token}`,
        'Content-Type':'application/json'
      },
      body: JSON.stringify({ user_id: modalUserId, amount })
    });
    const data = await res.json();
    showToast((data.success ? '✓ ' : '✗ ') + (data.message || 'Selesai'), data.success ? 'success' : 'error');
    closeModal();
    loadUsers();
  } catch(err) {
    console.error(err);
    showToast('Server error', 'error');
  }
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.className = 'toast ' + type, 2600);
}

</script>
</body>
</html>
