<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My VPN - Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>

:root {
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #3D0F72;
  --purple-light: #9B4FDE;
  --purple-soft:  #F3EAFD;
  --purple-mid:   #EAD5FA;
  --accent:       #FF6B2B;
  --accent2:      #FFD600;
  --green:        #12C28A;
  --green-bg:     #E6FAF4;
  --red:          #E84040;
  --red-bg:       #FFECEC;
  --blue:         #0077AA;
  --blue-bg:      #E0F7FF;
  --white:        #FFFFFF;
  --bg:           #F7F0FD;
  --gray-line:    #E8D8F8;
  --text-dark:    #1A0533;
  --text-mid:     #6B3FA0;
  --text-light:   #A882CC;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  color: var(--text-dark);
  padding-bottom: 40px;
  overflow-x: hidden;
}

/* ── BLOBS ── */
.blob1 {
  position:fixed; top:-80px; left:-60px;
  width:300px; height:300px;
  background:radial-gradient(circle,rgba(123,47,190,0.10) 0%,transparent 70%);
  pointer-events:none; z-index:0;
}
.blob2 {
  position:fixed; bottom:-60px; right:-60px;
  width:260px; height:260px;
  background:radial-gradient(circle,rgba(155,79,222,0.08) 0%,transparent 70%);
  pointer-events:none; z-index:0;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── HEADER ── */
.header {
  background: linear-gradient(150deg, var(--purple-deep) 0%, var(--purple) 55%, var(--purple-light) 100%);
  padding: 22px 20px 36px;
  position: relative;
  overflow: hidden;
  z-index: 2;
}
.header::before {
  content:''; position:absolute; top:-50px; right:-30px;
  width:200px; height:200px;
  border:48px solid rgba(255,255,255,0.07); border-radius:50%;
}
.header::after {
  content:''; position:absolute; bottom:-60px; left:-30px;
  width:170px; height:170px;
  border:36px solid rgba(255,214,0,0.12); border-radius:50%;
}
.hero-dots {
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size: 22px 22px;
  pointer-events:none;
}
.header-inner {
  display:flex; align-items:center; gap:14px;
  position:relative; z-index:2;
}
.back-btn-hdr {
  width:40px; height:40px; border-radius:13px;
  background:rgba(255,255,255,0.14);
  border:1px solid rgba(255,255,255,0.2);
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:background 0.15s;
  backdrop-filter:blur(8px);
  text-decoration:none;
}
.back-btn-hdr:hover { background:rgba(255,255,255,0.24); }
.back-btn-hdr svg {
  width:20px; height:20px;
  fill:none; stroke:#fff;
  stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round;
}
.header-title { flex:1; }
.header-title h1 {
  font-size:21px; font-weight:900;
  color:#fff; line-height:1.1; letter-spacing:-0.3px;
  display:flex; align-items:center; gap:8px;
}
.header-title h1 svg {
  width:22px; height:22px;
  fill:none; stroke:#fff;
  stroke-width:2; stroke-linecap:round; stroke-linejoin:round;
}
.header-title p { font-size:11px; color:rgba(255,255,255,0.6); font-weight:700; margin-top:3px; }
.header-count {
  background:rgba(255,255,255,0.14);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:20px; padding:5px 14px;
  font-size:11px; font-weight:800; color:#fff; white-space:nowrap;
  backdrop-filter:blur(8px);
}

/* ── CONTAINER ── */
.container {
  max-width:480px; margin:0 auto;
  padding:16px 18px 0;
  position:relative; z-index:2;
}

/* ── LOADING / EMPTY ── */
.loading-state {
  text-align:center; padding:50px 20px;
  color:var(--text-mid); font-weight:700; font-size:14px;
  display:flex; flex-direction:column; align-items:center; gap:12px;
}
.loading-state svg {
  width:36px; height:36px;
  fill:none; stroke:var(--purple);
  stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round;
  animation: spin 1s linear infinite;
}
.empty-state { text-align:center; padding:50px 20px; }
.empty-state svg {
  width:52px; height:52px;
  fill:none; stroke:var(--text-light);
  stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round;
}
.empty-title { font-size:18px; font-weight:900; color:var(--text-dark); margin:12px 0 6px; }
.empty-sub   { font-size:13px; color:var(--text-mid); font-weight:600; }

/* ── ACCOUNT CARD ── */
.account-card {
  background:var(--white);
  border-radius:22px;
  margin-bottom:14px;
  overflow:hidden;
  border:1.5px solid var(--gray-line);
  box-shadow:0 4px 16px rgba(90,26,154,0.09);
  animation: fadeUp 0.35s ease both;
}

/* card banner */
.card-banner {
  background:linear-gradient(150deg, var(--purple-deep) 0%, var(--purple) 55%, var(--purple-light) 100%);
  padding:14px 18px;
  display:flex; align-items:center; gap:12px;
  position:relative; overflow:hidden;
}
.card-banner::before {
  content:''; position:absolute; top:-30px; right:-20px;
  width:100px; height:100px;
  border:24px solid rgba(255,255,255,0.07); border-radius:50%;
}
.card-avatar {
  width:42px; height:42px; border-radius:13px;
  background:rgba(255,255,255,0.18);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.card-avatar svg {
  width:22px; height:22px;
  fill:none; stroke:#fff;
  stroke-width:2; stroke-linecap:round; stroke-linejoin:round;
}
.card-banner-text { flex:1; min-width:0; }
.card-username {
  font-size:16px; font-weight:900; color:#fff;
  letter-spacing:-0.2px; line-height:1.1;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.card-server {
  font-size:11px; color:rgba(255,255,255,0.65);
  font-weight:700; margin-top:2px;
  display:flex; align-items:center; gap:4px;
}
.card-server svg {
  width:11px; height:11px;
  fill:none; stroke:rgba(255,255,255,0.65);
  stroke-width:2; stroke-linecap:round; stroke-linejoin:round;
}

/* proto badge on banner */
.proto-badge {
  padding:5px 12px; border-radius:20px;
  font-size:11px; font-weight:800; flex-shrink:0;
  display:flex; align-items:center; gap:4px;
}
.proto-badge svg {
  width:11px; height:11px; fill:none;
  stroke-width:2; stroke-linecap:round; stroke-linejoin:round;
}
.pb-ssh        { background:rgba(255,107,43,0.25);  border:1px solid rgba(255,107,43,0.4);  color:#FF6B2B; }
.pb-ssh svg    { stroke:#FF6B2B; }
.pb-vmess      { background:rgba(0,119,170,0.25);   border:1px solid rgba(0,119,170,0.4);   color:#1ABCFE; }
.pb-vmess svg  { stroke:#1ABCFE; }
.pb-vless      { background:rgba(123,47,190,0.3);   border:1px solid rgba(123,47,190,0.45); color:#D4A8FF; }
.pb-vless svg  { stroke:#D4A8FF; }
.pb-trojan     { background:rgba(232,64,64,0.25);   border:1px solid rgba(232,64,64,0.4);   color:#FF7A7A; }
.pb-trojan svg { stroke:#FF7A7A; }
.pb-ss         { background:rgba(194,0,106,0.25);   border:1px solid rgba(194,0,106,0.4);   color:#FF79C6; }
.pb-ss svg     { stroke:#FF79C6; }

/* card meta row */
.card-meta {
  padding:12px 18px;
  display:flex; align-items:center; gap:10px;
  border-bottom:1.5px dashed var(--gray-line);
  flex-wrap:wrap;
}
.meta-chip {
  display:flex; align-items:center; gap:5px;
  background:var(--purple-soft);
  border:1px solid var(--gray-line);
  border-radius:10px; padding:5px 10px;
  font-size:11px; font-weight:800; color:var(--text-mid);
}
.meta-chip svg {
  width:12px; height:12px;
  fill:none; stroke:var(--text-mid);
  stroke-width:2; stroke-linecap:round; stroke-linejoin:round;
}

/* result area */
.card-result {
  padding:14px 18px;
}
.result-toggle {
  width:100%; padding:10px 14px;
  border:1.5px solid var(--gray-line); border-radius:12px;
  background:var(--purple-soft); color:var(--text-mid);
  font-family:'Nunito',sans-serif; font-weight:800; font-size:13px;
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
  transition:all 0.15s;
}
.result-toggle:hover { border-color:var(--purple); color:var(--purple); background:#fff; }
.result-toggle svg {
  width:16px; height:16px;
  fill:none; stroke:currentColor;
  stroke-width:2; stroke-linecap:round; stroke-linejoin:round;
  transition:transform 0.2s;
}
.result-toggle.open svg { transform:rotate(180deg); }
.result-body {
  margin-top:12px;
  display:none;
}
.result-body.open { display:block; }

/* ── BACK BTN ── */
.back-btn-bottom {
  width:100%; padding:14px;
  border:1.5px solid var(--gray-line); border-radius:14px;
  background:var(--white); color:var(--text-mid);
  font-family:'Nunito',sans-serif; font-weight:800; font-size:14px;
  cursor:pointer; margin-top:6px;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:border-color 0.2s, color 0.2s, background 0.2s;
}
.back-btn-bottom svg {
  width:16px; height:16px;
  fill:none; stroke:currentColor;
  stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round;
}
.back-btn-bottom:hover { border-color:var(--purple); color:var(--purple); background:var(--purple-soft); }

</style>
</head>
<body>

<div class="blob1"></div>
<div class="blob2"></div>

<!-- Header -->
<div class="header">
  <div class="hero-dots"></div>
  <div class="header-inner">
    <a class="back-btn-hdr" href="dashboard.html">
      <svg viewBox="0 0 24 24">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
    </a>
    <div class="header-title">
      <h1>
        <!-- grid/dashboard icon -->
        <svg viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        My VPN
      </h1>
      <p id="subtitle">Memuat akun...</p>
    </div>
    <div class="header-count" id="countBadge">—</div>
  </div>
</div>

<div class="container">
  <div id="accounts">
    <div class="loading-state">
      <svg viewBox="0 0 24 24">
        <path d="M12 2a10 10 0 0 1 10 10"/>
      </svg>
      Memuat akun VPN kamu...
    </div>
  </div>

  <button class="back-btn-bottom" onclick="location.href='dashboard.html'">
    <svg viewBox="0 0 24 24">
      <line x1="19" y1="12" x2="5" y2="12"/>
      <polyline points="12 19 5 12 12 5"/>
    </svg>
    Kembali ke Dashboard
  </button>
</div>

<script>

const localUser = JSON.parse(localStorage.getItem('user'));
if (!localUser) location.href = 'index.html';

loadAccounts();

// proto config: badge class + SVG icon
const protoConfig = {
  ssh:         { cls: 'pb-ssh',    icon: `<svg viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>` },
  vmess:       { cls: 'pb-vmess',  icon: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>` },
  vless:       { cls: 'pb-vless',  icon: `<svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>` },
  trojan:      { cls: 'pb-trojan', icon: `<svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>` },
  shadowsocks: { cls: 'pb-ss',     icon: `<svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>` },
};

function getProto(type) {
  const key = (type || '').toLowerCase();
  return protoConfig[key] || { cls: 'pb-vless', icon: '' };
}

function toggleResult(btn) {
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
  btn.querySelector('.toggle-label').textContent =
    btn.classList.contains('open') ? 'Sembunyikan Detail' : 'Lihat Detail Akun';
}

async function loadAccounts() {
  try {
    const res  = await fetch('/api/my-vpn?email=' + encodeURIComponent(localUser.email));
    const data = await res.json();

    if (!data.success) {
      document.getElementById('accounts').innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16" stroke-width="3"/>
          </svg>
          <div class="empty-title">Gagal Memuat</div>
          <div class="empty-sub">${data.message || 'Terjadi kesalahan'}</div>
        </div>`;
      return;
    }

    const accounts = data.accounts || [];
    document.getElementById('subtitle').textContent   = accounts.length + ' akun aktif';
    document.getElementById('countBadge').textContent = accounts.length + ' Akun';

    if (!accounts.length) {
      document.getElementById('accounts').innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          <div class="empty-title">Belum Ada Akun</div>
          <div class="empty-sub">Kamu belum punya akun VPN aktif</div>
        </div>`;
      return;
    }

    let html = '';
    accounts.forEach((acc, i) => {
      const proto = getProto(acc.product_type);
      const label = (acc.product_type || 'VPN').toUpperCase();

      html += `
      <div class="account-card" style="animation-delay:${i * 0.06}s">
        <div class="card-banner">
          <div class="card-avatar">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </div>
          <div class="card-banner-text">
            <div class="card-username">${acc.username}</div>
            <div class="card-server">
              <svg viewBox="0 0 24 24">
                <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
              ${acc.product_name || '—'}
            </div>
          </div>
          <div class="proto-badge ${proto.cls}">
            ${proto.icon} ${label}
          </div>
        </div>

        <div class="card-meta">
          <div class="meta-chip">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8"  y1="2" x2="8"  y2="6"/>
              <line x1="3"  y1="10" x2="21" y2="10"/>
            </svg>
            ${acc.created_at || '—'}
          </div>
        </div>

        <div class="card-result">
          <button class="result-toggle" onclick="toggleResult(this)">
            <svg viewBox="0 0 24 24">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
            <span class="toggle-label">Lihat Detail Akun</span>
          </button>
          <div class="result-body">
            ${acc.result || '<div style="color:var(--text-light);font-size:13px;font-weight:700;padding:8px 0;">Tidak ada detail tersedia.</div>'}
          </div>
        </div>
      </div>`;
    });

    document.getElementById('accounts').innerHTML = html;

  } catch (err) {
    console.error(err);
    document.getElementById('accounts').innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24">
          <line x1="1" y1="1" x2="23" y2="23"/>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <line x1="12" y1="20" x2="12.01" y2="20" stroke-width="3"/>
        </svg>
        <div class="empty-title">Koneksi Gagal</div>
        <div class="empty-sub">Periksa koneksi internet kamu</div>
      </div>`;
  }
}

</script>
</body>
</html>
