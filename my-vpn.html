<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght=400;600;700;800;900&display=swap" rel="stylesheet">
<style>

:root {
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #3D0F72;
  --purple-light: #9B4FDE;
  --purple-soft:  #F3EAFD;
  --purple-mid:   #EAD5FA;
  --accent:       #FF6B2B;
  --accent-light: #FFEFEA;
  --green:        #12C28A;
  --green-bg:     #E6FAF4;
  --green-dark:   #0A9E70;
  --red:          #E84040;
  --red-bg:       #FFECEC;
  --white:        #FFFFFF;
  --bg:           #F8F6FC;
  --gray-line:    #EEF0F6;
  --text-dark:    #1A0533;
  --text-mid:     #6B3FA0;
  --text-light:   #A882CC;
  --card-bg:      #FFFFFF;
  --input-bg:     #F8F6FC;
  --nav-bg:       #FFFFFF;
  --nav-shadow:   rgba(90,26,154,0.06);
}

/* ── SINKRONISASI TOTAL WARNA KONTRAS TAJAM DENGAN DASHBOARD (DARK THEME) ── */
html[data-theme="dark"] {
  --purple-soft:  #1e142a; /* Ungu gelap pekat untuk background soft */
  --purple-mid:   #34224d;
  --green-bg:     #052e21;
  --red-bg:       #3d1414;
  --white:        #000000; /* Hitam pekat solid sesuai dashboard */
  --bg:           #000000; /* Hitam pekat solid agar konsisten */
  --card-bg:      #0b0c0e; /* Background card dibuat sangat gelap mendekati hitam */
  --gray-line:    #26272b; /* Garis pembatas lebih tegas */
  --text-dark:    #ffffff; /* Teks utama putih murni kontras tinggi */
  --text-mid:     #cfd2d6; /* Teks sekunder abu terang netral */
  --text-light:   #9aa0a6; /* Teks pelengkap */
  --input-bg:     #121316; /* Background tombol detail/input */
  --accent-light: #3d1b0c;
  --nav-bg:       #0b0c0e;
  --nav-shadow:   rgba(0,0,0,0.6);
}

/* prevent flash sebelum JS jalan */
html { background: var(--bg); }

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  color: var(--text-dark);
  padding-bottom: 90px;
  overflow-x: hidden;
  transition: background 0.25s ease, color 0.25s ease;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── HEADER (SINKRON DENGAN TRIAL) ── */
.header {
  background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple) 60%, var(--purple-light) 100%);
  padding: 28px 20px 48px;
  position: relative; overflow: hidden; z-index: 2;
}
.header::before {
  content:''; position:absolute; top:-40px; right:-20px;
  width:160px; height:160px;
  border:32px solid rgba(255,255,255,0.05); border-radius:50%;
}
.hero-dots {
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 20px 20px; pointer-events:none;
}
.header-inner {
  display:flex; align-items:center; gap:12px;
  max-width: 440px; margin: 0 auto; position:relative; z-index:2;
}
.back-btn-hdr {
  width:36px; height:36px; border-radius:11px;
  background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.18);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:background 0.15s; backdrop-filter:blur(8px);
}
.back-btn-hdr:hover { background:rgba(255,255,255,0.2); }
.back-btn-hdr svg { width:18px; height:18px; fill:none; stroke:#fff; stroke-width:2.5; }
.header-title { flex:1; }
.header-title h1 {
  font-size:18px; font-weight:900; color:#fff; line-height:1.1; letter-spacing:-0.2px;
  display:flex; align-items:center; gap:6px;
}
.header-title h1 svg { width:20px; height:20px; fill:none; stroke:#fff; stroke-width:2.2; }
.header-title p { font-size:11px; color:rgba(255,255,255,0.65); font-weight:700; margin-top:3px; }

.header-count {
  background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.18);
  border-radius:20px; padding:5px 12px;
  font-size:11px; font-weight:800; color:#fff; white-space:nowrap;
  backdrop-filter:blur(8px);
}

.theme-toggle {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s; backdrop-filter: blur(6px);
}
.theme-toggle:hover { background: rgba(255,255,255,0.25); transform: scale(1.08); }
.theme-toggle svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2.2; }
.icon-sun  { display: none; }
.icon-moon { display: block; }
html:not([data-theme="dark"]) .icon-sun  { display: block; }
html:not([data-theme="dark"]) .icon-moon { display: none; }

/* ── CONTAINER (MATCH 440px) ── */
.container {
  max-width:440px; margin:0 auto; padding:0 16px;
  position:relative; z-index:2;
}

/* ── LOADING / EMPTY STATE ── */
.loading-state {
  background:var(--card-bg); border-radius:16px; padding:30px 16px; margin-top:-28px;
  border:1px solid var(--gray-line); box-shadow:0 8px 24px rgba(90,26,154,0.04);
  text-align:center; color:var(--text-mid); font-weight:700; font-size:13px;
  display:flex; flex-direction:column; align-items:center; gap:8px;
  animation: fadeUp 0.4s ease both;
}
.loading-state svg {
  width:24px; height:24px; fill:none; stroke:var(--purple);
  stroke-width:2.5; animation:spin 1s linear infinite;
}
html[data-theme="dark"] .loading-state svg { stroke: var(--purple-light); }

.empty-state { 
  background:var(--card-bg); border-radius:16px; padding:40px 16px; margin-top:-28px;
  border:1px solid var(--gray-line); box-shadow:0 8px 24px rgba(90,26,154,0.04);
  text-align:center; animation: fadeUp 0.4s ease both;
}
.empty-state svg { width:44px; height:44px; fill:none; stroke:var(--text-light); stroke-width:1.8; }
.empty-title { font-size:16px; font-weight:900; color:var(--text-dark); margin:10px 0 4px; }
.empty-sub   { font-size:12px; color:var(--text-mid); font-weight:600; }

/* ── ACCOUNT CARD ── */
.account-card {
  background:var(--card-bg); border-radius:16px; overflow:hidden;
  border:1px solid var(--gray-line); box-shadow:0 8px 24px rgba(90,26,154,0.04);
  margin-top:-28px; margin-bottom:14px;
  animation: fadeUp 0.4s ease both;
  transition: background 0.25s, border-color 0.25s;
}
.account-card ~ .account-card {
  margin-top: 0px;
}
html[data-theme="dark"] .account-card { box-shadow: 0 8px 24px rgba(0,0,0,0.4); }

.card-banner {
  background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple) 60%, var(--purple-light) 100%);
  padding: 14px 16px; display: flex; align-items: center; gap: 10px; position: relative; overflow: hidden;
}
.card-avatar {
  width:36px; height:36px; border-radius:11px; background:rgba(255,255,255,0.15);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.card-avatar svg { width:18px; height:18px; fill:none; stroke:#fff; stroke-width:2.2; }
.card-banner-text { flex:1; min-width:0; }
.card-username {
  font-size:15px; font-weight:900; color:#fff; line-height:1.1;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.card-server {
  font-size:11px; color:rgba(255,255,255,0.7); font-weight:700; margin-top:3px;
  display:flex; align-items:center; gap:4px;
}
.card-server svg { width:12px; height:12px; fill:none; stroke:rgba(255,255,255,0.7); stroke-width:2; }

/* Protocol Badges */
.proto-badge { padding:4px 10px; border-radius:20px; font-size:10px; font-weight:800; flex-shrink:0; display:flex; align-items:center; gap:4px; border: 1px solid transparent; }
.proto-badge svg { width:12px; height:12px; fill:none; stroke-width:2.2; }

.pb-ssh    { border-color:var(--accent); background:var(--accent-light); color:var(--accent); }
.pb-ssh svg { stroke: var(--accent); }
.pb-vmess  { border-color:#0077AA; background:rgba(0,119,170,0.1); color:#0077AA; }
html[data-theme="dark"] .pb-vmess { background:rgba(0,119,170,0.2); color:#33a1fd; border-color:#33a1fd; }
.pb-vmess svg { stroke: currentColor; }
.pb-vless  { border-color:var(--purple); background:var(--purple-soft); color:var(--purple); }
html[data-theme="dark"] .pb-vless { border-color:var(--purple-light); color:var(--purple-light); background:rgba(155,79,222,0.15); }
.pb-vless svg { stroke: currentColor; }
.pb-trojan { border-color:var(--red); background:var(--red-bg); color:var(--red); }
.pb-trojan svg { stroke: var(--red); }

/* Card Meta Data */
.card-meta {
  padding:10px 16px; display:flex; align-items:center; gap:8px;
  border-bottom:1px dashed var(--gray-line); flex-wrap:wrap;
}
.meta-chip {
  display:flex; align-items:center; gap:4px; background:var(--input-bg);
  border:1px solid var(--gray-line); border-radius:10px; padding:4px 8px;
  font-size:11px; font-weight:800; color:var(--text-mid);
}
.meta-chip svg { width:12px; height:12px; fill:none; stroke:var(--text-mid); stroke-width:2; }

/* Details Area */
.card-result { padding:12px 16px; }
.result-toggle {
  width:100%; padding:9px 14px; border:1px solid var(--gray-line); border-radius:12px;
  background:var(--input-bg); color:var(--text-mid); font-family:'Nunito',sans-serif;
  font-weight:800; font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
  transition:all 0.15s;
}
.result-toggle:hover { border-color:var(--purple); color:var(--purple); background:var(--card-bg); }
html[data-theme="dark"] .result-toggle:hover { border-color: var(--purple-light); color: var(--purple-light); background:transparent; }
.result-toggle svg { width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:2.5; transition:transform 0.2s; }
.result-toggle.open svg { transform:rotate(180deg); }
.result-body { margin-top:10px; display:none; }
.result-body.open { display:block; }

/* Config Code Block Contrast Styling */
html[data-theme="dark"] .result-body pre, 
html[data-theme="dark"] .result-body code {
  color: #ffffff !important;
  background-color: #121316 !important;
  border-color: var(--gray-line) !important;
}

/* ── BOTTOM NAV (SAMA DENGAN TRIAL) ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 440px; background: var(--nav-bg);
  border-top: 1px solid var(--gray-line);
  box-shadow: 0 -4px 20px var(--nav-shadow); z-index: 999;
  transition: background 0.25s ease, border-color 0.25s ease;
}
.bottom-nav-inner { display: flex; align-items: center; justify-content: space-around; padding: 10px 0 14px; }
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  text-decoration: none; color: var(--text-light); width: 70px; transition: all 0.2s;
}
.nav-icon svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; transition: transform 0.2s; }
.nav-label { font-size: 9.5px; font-weight: 800; }
.nav-item:hover .nav-icon svg { transform: translateY(-2px); }
.nav-item.active { color: var(--purple); }
html[data-theme="dark"] .nav-item.active { color: var(--purple-light); }
.nav-item.active .nav-icon svg { stroke: var(--purple); }
html[data-theme="dark"] .nav-item.active .nav-icon svg { stroke: var(--purple-light); }

</style>
</head>

<script>

// ─── COPY CONFIG FUNCTION (SAMA DENGAN TRIAL) ───
function copyDirectLink(btnEl, encodedText) {
  if (btnEl && btnEl.target) btnEl = btnEl.currentTarget || btnEl.target;
  if (btnEl && btnEl.tagName !== 'BUTTON') btnEl = btnEl.closest('button');

  var rowEl = btnEl.closest('.link-row');
  var text = decodeURIComponent(encodedText);
  var originalHTML = btnEl.innerHTML;

  function onSuccess() {
    if (rowEl) rowEl.classList.add('copied-active');
    btnEl.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="display:inline-block;vertical-align:middle;margin-right:4px"><polyline points="20 6 9 17 4 12"></polyline></svg> Berhasil!';
    setTimeout(function() {
      if (rowEl) rowEl.classList.remove('copied-active');
      btnEl.innerHTML = originalHTML;
    }, 2000);
  }

  function fallback() {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;font-size:16px';
    document.body.appendChild(ta);
    ta.focus(); ta.select(); ta.setSelectionRange(0, 99999);
    try { if (document.execCommand('copy')) onSuccess(); } catch(e) {}
    document.body.removeChild(ta);
  }

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(onSuccess).catch(fallback);
  } else {
    fallback();
  }
}

// ─── THEME MANAGER (SINKRON DENGAN LOCALSTORAGE TRIAL 'theme') ───
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}
(function() {
  const saved = localStorage.getItem('theme');
  if (saved === 'dark' || saved === 'light') {
    document.documentElement.setAttribute('data-theme', saved);
  } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  } else {
    document.documentElement.setAttribute('data-theme', 'light');
  }
})();

const token = localStorage.getItem('token');

if (!token) {
  location.href = 'index.html';
} else {
  loadAccounts();
}

const protoConfig = {
  ssh:    { cls: 'pb-ssh',   icon: `<svg viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>` },
  vmess:  { cls: 'pb-vmess', icon: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>` },
  vless:  { cls: 'pb-vless', icon: `<svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>` },
  trojan: { cls: 'pb-trojan',icon: `<svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>` },
};

function getProto(type) {
  const key = (type || '').toLowerCase();
  return protoConfig[key] || { cls: 'pb-vless', icon: '' };
}

function toggleResult(btn) {
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
  btn.querySelector('.toggle-label').textContent =
    btn.classList.contains('open') ? 'Sembunyikan Detail' : 'Lihat Detail Akun';
}

// ─── HELPER FORMAT TANGGAL UTC KE WAKTU LOKAL (DD-MM-YYYY HH:mm) ───
function formatLocalDate(isoString) {
  if (!isoString) return '—';
  try {
    const d = new Date(isoString);
    const tgl = d.toLocaleDateString('id-ID', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '-');
    const jam = d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false });
    return `${tgl} ${jam}`;
  } catch (e) {
    return isoString;
  }
}

async function loadAccounts() {
  try {
    const res  = await fetch('/api/my-vpn', {
      method: 'GET',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();

    if (!data.success) {
      document.getElementById('accounts').innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16" stroke-width="3"/></svg>
          <div class="empty-title">Gagal Memuat</div>
          <div class="empty-sub">${data.message || 'Terjadi kesalahan'}</div>
        </div>`;
      return;
    }

    const accounts = data.accounts || [];
    document.getElementById('subtitle').textContent   = accounts.length + ' akun aktif';
    document.getElementById('countBadge').textContent = accounts.length + ' Akun';

    if (!accounts.length) {
      document.getElementById('accounts').innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <div class="empty-title">Belum Ada Akun</div>
          <div class="empty-sub">Kamu belum punya akun VPN aktif</div>
        </div>`;
      return;
    }

    let html = '';
    accounts.forEach((acc, i) => {
      const proto = getProto(acc.product_type);
      const label = (acc.product_type || 'VPN').toUpperCase();
      
      const dateRaw = acc.expired_at || acc.created_at;
      const dateDisplay = formatLocalDate(dateRaw);

      html += `
      <div class="account-card" style="animation-delay:${i * 0.05}s">
        <div class="card-banner">
          <div class="card-avatar">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          </div>
          <div class="card-banner-text">
            <div class="card-username">${acc.username}</div>
            <div class="card-server">
              <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              ${acc.product_name || '—'}
            </div>
          </div>
          <div class="proto-badge ${proto.cls}">
            ${proto.icon} ${label}
          </div>
        </div>

        <div class="card-meta">
          <div class="meta-chip">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8"  y1="2" x2="8"  y2="6"/><line x1="3"  y1="10" x2="21" y2="10"/></svg>
            Exp: ${dateDisplay}
          </div>
        </div>

        <div class="card-result">
          <button class="result-toggle" onclick="toggleResult(this)">
            <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            <span class="toggle-label">Lihat Detail Akun</span>
          </button>
          <div class="result-body">
            ${acc.result || '<div style="color:var(--text-light);font-size:12px;font-weight:700;padding:8px 0;">Tidak ada detail tersedia.</div>'}
          </div>
        </div>
      </div>`;
    });

    document.getElementById('accounts').innerHTML = html;

  } catch (err) {
    console.error(err);
    document.getElementById('accounts').innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20" stroke-width="3"/></svg>
        <div class="empty-title">Koneksi Gagal</div>
        <div class="empty-sub">Periksa koneksi internet kamu</div>
      </div>`;
  }
}

</script>
</body>
</html>
