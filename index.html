<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>

:root {
  --purple:    #6B21D6;
  --purple2:   #8B3FF5;
  --pink:      #E8007A;
  --pink2:     #FF3D9A;
  --orange:    #FF6B2C;
  --yellow:    #FFD600;
  --green:     #00C853;
  --white:     #FFFFFF;
  --text-dark: #1a0033;
  --text-mid:  #5B3A8C;
  --bg-light:  #F6F0FF;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg-light);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 20px;
  position: relative;
  overflow: hidden;
}

/* ── Decorative background blobs ── */
.blob1 {
  position: fixed;
  top: -80px; left: -60px;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(107,33,214,0.18) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
.blob2 {
  position: fixed;
  bottom: -60px; right: -60px;
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(232,0,122,0.15) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
.blob3 {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(139,63,245,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── Floating shapes ── */
.shape {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  animation: floatShape 6s ease-in-out infinite;
}
.shape1 {
  width: 18px; height: 18px;
  background: var(--yellow);
  top: 18%; left: 10%;
  opacity: 0.5;
  animation-delay: 0s;
}
.shape2 {
  width: 12px; height: 12px;
  background: var(--pink2);
  top: 70%; left: 8%;
  opacity: 0.4;
  animation-delay: 1.5s;
}
.shape3 {
  width: 22px; height: 22px;
  background: var(--purple2);
  top: 25%; right: 10%;
  opacity: 0.35;
  animation-delay: 0.8s;
}
.shape4 {
  width: 10px; height: 10px;
  background: var(--orange);
  top: 75%; right: 12%;
  opacity: 0.45;
  animation-delay: 2.2s;
}

@keyframes floatShape {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50%      { transform: translateY(-14px) rotate(20deg); }
}

/* ── Card ── */
.login-card {
  width: 100%;
  max-width: 380px;
  border-radius: 28px;
  overflow: hidden;
  position: relative;
  z-index: 2;
  box-shadow:
    0 20px 60px rgba(107,33,214,0.18),
    0 4px 16px rgba(0,0,0,0.08);
  animation: cardPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes cardPop {
  from { opacity:0; transform: translateY(30px) scale(0.95); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

/* ── Hero top ── */
.card-hero {
  background: linear-gradient(145deg, var(--purple) 0%, var(--purple2) 55%, #B06EFF 100%);
  padding: 40px 28px 36px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.card-hero::before {
  content: '';
  position: absolute;
  top: -40px; right: -30px;
  width: 160px; height: 160px;
  background: rgba(255,255,255,0.08);
  border-radius: 50%;
}
.card-hero::after {
  content: '';
  position: absolute;
  bottom: -50px; left: -20px;
  width: 120px; height: 120px;
  background: rgba(255,255,255,0.06);
  border-radius: 50%;
}

.logo-icon-wrap {
  width: 76px; height: 76px;
  border-radius: 24px;
  background: rgba(255,255,255,0.15);
  border: 2px solid rgba(255,255,255,0.25);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 38px;
  margin-bottom: 16px;
  position: relative;
  z-index: 2;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  animation: iconBounce 3s ease-in-out infinite;
}

@keyframes iconBounce {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}

.logo-text {
  font-family: 'Fredoka One', cursive;
  font-size: 26px;
  color: #fff;
  letter-spacing: 1px;
  margin-bottom: 6px;
  position: relative; z-index:2;
  text-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.logo-sub {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 11px;
  font-weight: 700;
  color: rgba(255,255,255,0.9);
  letter-spacing: 1px;
  text-transform: uppercase;
  position: relative; z-index:2;
}

/* ── Feature pills ── */
.feature-pills {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 18px;
  position: relative; z-index:2;
  flex-wrap: wrap;
}

.feature-pill {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 11px;
  font-weight: 700;
  color: rgba(255,255,255,0.85);
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ── Card body ── */
.card-body {
  background: var(--white);
  padding: 28px 24px 32px;
}

.welcome-title {
  font-family: 'Fredoka One', cursive;
  font-size: 22px;
  color: var(--text-dark);
  text-align: center;
  margin-bottom: 6px;
}

.welcome-sub {
  text-align: center;
  font-size: 13px;
  color: var(--text-mid);
  font-weight: 600;
  margin-bottom: 26px;
  line-height: 1.5;
}

/* ── Divider ── */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 22px;
}
.divider-line {
  flex: 1;
  height: 1.5px;
  background: linear-gradient(90deg, transparent, #EDE0FF, transparent);
}
.divider-badge {
  background: linear-gradient(135deg, var(--purple), var(--purple2));
  color: #fff;
  font-size: 10px;
  font-weight: 800;
  border-radius: 20px;
  padding: 4px 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  white-space: nowrap;
}

/* ── Google btn wrap ── */
.google-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 20px;
  min-height: 44px;
}

/* ── Message ── */
#message {
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  color: var(--purple);
  min-height: 20px;
  padding: 10px 14px;
  border-radius: 12px;
  background: transparent;
  transition: background 0.2s, color 0.2s;
}
#message.error {
  color: #E8007A;
  background: rgba(232,0,122,0.08);
}
#message.loading {
  color: var(--text-mid);
  background: #F6F0FF;
}
#message.success {
  color: #00C853;
  background: rgba(0,200,83,0.08);
}

/* ── Footer ── */
.card-footer {
  margin-top: 22px;
  padding-top: 18px;
  border-top: 1.5px dashed #EDE0FF;
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  color: #B0A0C0;
  line-height: 1.6;
}

/* ── Bottom tagline ── */
.bottom-tag {
  position: relative; z-index: 2;
  margin-top: 20px;
  text-align: center;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-mid);
  display: flex;
  align-items: center;
  gap: 6px;
  animation: cardPop 0.5s 0.2s ease both;
  opacity: 0;
}

.bottom-tag::before,
.bottom-tag::after {
  content: '';
  flex: 1;
  height: 1.5px;
  background: linear-gradient(90deg, transparent, rgba(107,33,214,0.3), transparent);
}

</style>
</head>
<body>

<!-- Blobs & shapes -->
<div class="blob1"></div>
<div class="blob2"></div>
<div class="blob3"></div>
<div class="shape shape1"></div>
<div class="shape shape2"></div>
<div class="shape shape3"></div>
<div class="shape shape4"></div>

<!-- Card -->
<div class="login-card">

  <!-- Hero -->
  <div class="card-hero">
    <div class="logo-icon-wrap">⚡</div>
    <div class="logo-text">Xtrimer Tunnel</div>
    <div class="logo-sub">🔒 Fast & Secure VPN</div>
    <div class="feature-pills">
      <div class="feature-pill">⚡ Kenceng</div>
      <div class="feature-pill">🛡 Aman</div>
      <div class="feature-pill">🌐 Stabil</div>
    </div>
  </div>

  <!-- Body -->
  <div class="card-body">
    <div class="welcome-title">Halo, Selamat Datang! 👋</div>
    <div class="welcome-sub">Masuk dengan akun Google kamu<br>untuk mulai menikmati layanan</div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-badge">Login dengan Google</div>
      <div class="divider-line"></div>
    </div>

    <div class="google-wrap">
      <div
        id="g_id_onload"
        data-client_id="480091956294-njvigllpnbqmh6p11nij99eavv101u3e.apps.googleusercontent.com"
        data-callback="handleCredentialResponse"
        data-auto_select="true">
      </div>
      <div
        class="g_id_signin"
        data-type="standard"
        data-size="large"
        data-theme="filled_blue"
        data-text="signin_with"
        data-shape="pill"
        data-width="300">
      </div>
    </div>

    <div id="message"></div>

    <div class="card-footer">
      🔐 Dengan login, kamu menyetujui<br>syarat &amp; ketentuan layanan kami
    </div>
  </div>

</div>

<!-- Bottom tag -->
<div class="bottom-tag">Xtrimer Tunnel © 2025</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>

// Auto redirect jika sudah login
const user = JSON.parse(localStorage.getItem('user'));
if (user) window.location.href = 'dashboard.html';

async function handleCredentialResponse(response) {
  const message = document.getElementById('message');

  message.className = 'loading';
  message.innerText = '⏳ Memproses login...';

  try {
    const res = await fetch('/api/google-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ credential: response.credential })
    });

    const result = await res.json();

    if (result.success) {
      message.className = 'success';
      message.innerText = '✅ Login berhasil, mengalihkan...';
      localStorage.setItem('user', JSON.stringify(result.user));
      setTimeout(() => window.location.href = 'dashboard.html', 600);
    } else {
      message.className = 'error';
      message.innerText = '❌ ' + (result.message || 'Login gagal');
    }

  } catch (err) {
    console.error(err);
    message.className = 'error';
    message.innerText = '❌ Server tidak dapat dihubungi';
  }
}

</script>
</body>
</html>
