<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght=400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #3D0F72;
  --purple-light: #9B4FDE;
  --white:        #FFFFFF;
  --bg:           #F8F6FC;
  --gray-line:    #EEF0F6;
  --text-dark:    #1A0533;
  --text-mid:     #6B3FA0;
  --text-light:   #A882CC;
  --success:      #00C853;
  --error:        #E8007A;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow-x: hidden;
  position: relative;
}

/* ── Minimal Grid Background ── */
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(123,47,190,0.04) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none; z-index: 0;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Card ── */
.login-card {
  width: 100%;
  max-width: 380px;
  background: var(--white);
  border-radius: 20px;
  border: 1px solid var(--gray-line);
  box-shadow: 0 10px 30px rgba(90,26,154,0.03);
  overflow: hidden;
  position: relative; z-index: 2;
  animation: fadeUp 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}

/* ── Hero Top ── */
.card-hero {
  background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple) 60%, var(--purple-light) 100%);
  padding: 36px 24px;
  text-align: center;
  position: relative; overflow: hidden;
}
.card-hero::before {
  content: ''; position: absolute; top: -30px; right: -20px;
  width: 120px; height: 120px; background: rgba(255,255,255,0.04); border-radius: 50%;
}

.logo-icon-wrap {
  width: 64px; height: 64px;
  border-radius: 16px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.18);
  display: inline-flex; align-items: center; justify-content: center;
  margin-bottom: 14px; backdrop-filter: blur(8px);
}
.logo-icon-wrap svg { width: 28px; height: 28px; fill: none; stroke: #fff; stroke-width: 2.5; }

.logo-text {
  font-size: 22px; font-weight: 900;
  color: #fff; letter-spacing: -0.3px;
  margin-bottom: 4px;
}

.logo-sub {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 12px; padding: 4px 12px;
  font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.85);
}
.logo-sub svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2.5; }

/* ── Card Body ── */
.card-body {
  padding: 28px 24px 32px;
}

/* ── Divider ── */
.divider {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 24px;
}
.divider-line {
  flex: 1; height: 1px; background: var(--gray-line);
}
.divider-badge {
  color: var(--text-mid); font-size: 12px; font-weight: 800;
}

/* ── Google Button Container ── */
.google-wrap {
  display: flex; justify-content: center;
  margin-bottom: 20px; min-height: 44px;
}

/* ── Message Status ── */
#message {
  display: none; align-items: center; justify-content: center; gap: 8px;
  text-align: center; font-size: 12px; font-weight: 800;
  padding: 10px 14px; border-radius: 12px; border: 1px solid transparent;
  transition: all 0.2s; margin-bottom: 8px;
}
#message svg { width: 16px; height: 16px; flex-shrink: 0; }
#message.loading { display: flex; color: var(--text-mid); background: var(--bg); border-color: var(--gray-line); }
#message.loading svg { animation: spin 1s linear infinite; stroke: var(--purple); }
#message.success { display: flex; color: var(--success); background: rgba(0,200,83,0.04); border-color: rgba(0,200,83,0.15); }
#message.error { display: flex; color: var(--error); background: rgba(232,0,122,0.04); border-color: rgba(232,0,122,0.15); }

/* ── Footer ── */
.card-footer {
  margin-top: 24px; padding-top: 16px;
  border-top: 1px dashed var(--gray-line);
  text-align: center; font-size: 11px; font-weight: 700;
  color: var(--text-light); line-height: 1.5;
}

/* ── Bottom Tagline ── */
.bottom-tag {
  position: relative; z-index: 2; margin-top: 20px;
  text-align: center; font-size: 11px; font-weight: 800;
  color: var(--text-light); letter-spacing: 0.5px;
}
</style>
</head>
<body>

<div class="login-card">
  <div class="card-hero">
    <div class="logo-icon-wrap">
      <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
    </div>
    <div class="logo-text">Xtrimer Tunnel</div>
    <div class="logo-sub">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      Fast & Secure VPN
    </div>
  </div>

  <div class="card-body">
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-badge">Login dengan Google</div>
      <div class="divider-line"></div>
    </div>

    <div class="google-wrap">
      <div
        id="g_id_onload"
        data-client_id="480091956294-njvigllpnbqmh6p11nij99eavv101u3e.apps.googleusercontent.com"
        data-callback="handleCredentialResponse"
        data-auto_select="true">
      </div>
      <div
        class="g_id_signin"
        data-type="standard"
        data-size="large"
        data-theme="filled_blue"
        data-text="signin_with"
        data-shape="pill"
        data-width="300">
      </div>
    </div>

    <div id="message"></div>

    <div class="card-footer">
      Dengan login, kamu menyetujui<br>syarat &amp; ketentuan layanan kami
    </div>
  </div>
</div>

<div class="bottom-tag">XTRIMER TUNNEL © 2026</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
// Auto redirect jika sudah login
const user = JSON.parse(localStorage.getItem('user'));
const token = localStorage.getItem('token');

if (user && token) {
  window.location.href = 'dashboard.html';
}

// Template SVG Pengganti Emoji
const svgLoading = `<svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap: round;"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>`;
const svgSuccess = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
const svgError   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;

async function handleCredentialResponse(response) {
  const message = document.getElementById('message');
  message.className = 'loading';
  message.innerHTML = `${svgLoading} <span>Memproses login...</span>`;

  try {
    const res = await fetch('/api/google-login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        credential: response.credential
      })
    });

    const result = await res.json();

    if (result.success) {
      message.className = 'success';
      message.innerHTML = `${svgSuccess} <span>Login berhasil, mengalihkan...</span>`;

      localStorage.setItem('user', JSON.stringify(result.user));
      localStorage.setItem('token', result.token);

      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 600);

    } else {
      message.className = 'error';
      message.innerHTML = `${svgError} <span>${result.message || 'Login gagal'}</span>`;
    }

  } catch (err) {
    console.error(err);
    message.className = 'error';
    message.innerHTML = `${svgError} <span>Server tidak dapat dihubungi</span>`;
  }
}
</script>
</body>
</html>
