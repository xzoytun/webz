<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Xtrimer Tunnel</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #0b132b;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

/* ── Card ── */
.login-box {
    width: 100%;
    max-width: 380px;
    background: #1f2937;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    border: 1px solid #2d3a55;
}

/* ── Top banner ── */
.login-banner {
    background: linear-gradient(135deg, #1c2541 0%, #0b132b 100%);
    padding: 36px 30px 28px;
    text-align: center;
    border-bottom: 2px solid #facc15;
}

.logo-icon {
    font-size: 48px;
    margin-bottom: 10px;
}

.logo-text {
    color: #facc15;
    font-size: 24px;
    font-weight: bold;
    letter-spacing: 2px;
    margin-bottom: 6px;
}

.logo-sub {
    color: #9ca3af;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
}

/* ── Body ── */
.login-body {
    padding: 28px 24px 32px;
}

.login-title {
    text-align: center;
    color: white;
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 6px;
}

.login-desc {
    text-align: center;
    color: #9ca3af;
    font-size: 13px;
    margin-bottom: 24px;
    line-height: 1.5;
}

/* ── Divider ── */
.divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
}

.divider-line {
    flex: 1;
    height: 1px;
    background: #374151;
}

.divider-text {
    color: #6b7280;
    font-size: 11px;
    white-space: nowrap;
}

/* ── Google button wrapper ── */
.google-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
}

/* ── Message ── */
#message {
    text-align: center;
    font-size: 13px;
    color: #facc15;
    min-height: 20px;
    padding: 8px 12px;
    border-radius: 8px;
    background: transparent;
    transition: background 0.2s;
}

#message.error {
    color: #f87171;
    background: rgba(239, 68, 68, 0.1);
}

#message.loading {
    color: #9ca3af;
}

/* ── Footer ── */
.login-footer {
    text-align: center;
    color: #4b5563;
    font-size: 11px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid #374151;
}

</style>
</head>
<body>

<div class="login-box">

    <div class="login-banner">
        <div class="logo-icon">⚡</div>
        <div class="logo-text">XTRIMER TUNNEL</div>
        <div class="logo-sub">Fast & Secure VPN Service</div>
    </div>

    <div class="login-body">

        <div class="login-title">Selamat Datang</div>
        <div class="login-desc">Masuk dengan akun Google Anda untuk melanjutkan</div>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">LOGIN DENGAN GOOGLE</div>
            <div class="divider-line"></div>
        </div>

        <div class="google-wrap">
            <div
                id="g_id_onload"
                data-client_id="480091956294-njvigllpnbqmh6p11nij99eavv101u3e.apps.googleusercontent.com"
                data-callback="handleCredentialResponse"
                data-auto_select="true">
            </div>
            <div
                class="g_id_signin"
                data-type="standard"
                data-size="large"
                data-theme="filled_black"
                data-text="signin_with"
                data-shape="rectangular"
                data-width="300">
            </div>
        </div>

        <div id="message"></div>

        <div class="login-footer">
            Dengan login, Anda menyetujui syarat &amp; ketentuan layanan kami
        </div>

    </div>

</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>

// Auto redirect jika sudah login
const user = JSON.parse(localStorage.getItem('user'));
if (user) window.location.href = 'dashboard.html';

async function handleCredentialResponse(response) {
    const message = document.getElementById('message');

    message.className = 'loading';
    message.innerText = '⏳ Memproses login...';

    try {
        const res = await fetch('/api/google-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ credential: response.credential })
        });

        const result = await res.json();

        if (result.success) {
            message.className = '';
            message.innerText = '✅ Login berhasil, mengalihkan...';
            localStorage.setItem('user', JSON.stringify(result.user));
            setTimeout(() => window.location.href = 'dashboard.html', 600);
        } else {
            message.className = 'error';
            message.innerText = '❌ ' + (result.message || 'Login gagal');
        }

    } catch (err) {
        console.error(err);
        message.className = 'error';
        message.innerText = '❌ Server tidak dapat dihubungi';
    }
}

</script>

</body>
</html>
