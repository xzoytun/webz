<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — GabutStore</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <div class="container">
    <div class="logo-wrap">
      <div class="logo">GABUT<span>STORE</span></div>
      <div class="scan-line"></div>
    </div>
    <div class="tagline">SECURE ACCESS PORTAL</div>

    <div class="card">
      <div id="alert-box"></div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="user@example.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn btn-primary" id="btn-login" onclick="doLogin()">
        LOGIN
      </button>

      <div class="divider">OR</div>

      <div class="text-center">
        <span style="font-size:0.8rem;color:var(--text3)">Belum punya akun? </span>
        <a href="register.html" class="link">Register di sini</a>
      </div>

      <div class="text-center mt-4">
        <a href="index.html" class="link" style="color:var(--text3);font-size:0.75rem">← Kembali ke Home</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // Redirect kalau sudah login
    if (localStorage.getItem('gs_token')) {
      window.location.href = 'panel.html';
    }

    async function doLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('btn-login');

      clearAlert();

      if (!email || !password) {
        showAlert('Email dan password wajib diisi.', 'error');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Authenticating...';

      try {
        const res = await apiFetch('/api/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });

        if (res.success) {
          localStorage.setItem('gs_token', res.token);
          localStorage.setItem('gs_email', email);
          showAlert('Login berhasil! Mengalihkan...', 'success');
          setTimeout(() => window.location.href = 'panel.html', 800);
        } else {
          showAlert(res.message || 'Login gagal.', 'error');
          btn.disabled = false;
          btn.innerHTML = 'LOGIN';
        }
      } catch (e) {
        showAlert('Gagal menghubungi server.', 'error');
        btn.disabled = false;
        btn.innerHTML = 'LOGIN';
      }
    }

    // Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
