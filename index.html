<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Xtrimer Tunnel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111827;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.login-box{
    width:100%;
    max-width:400px;
    background:#1f2937;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
}

.logo{
    text-align:center;
    color:#facc15;
    font-size:28px;
    font-weight:bold;
    margin-bottom:15px;
}

.info{
    text-align:center;
    color:white;
    margin-bottom:20px;
    font-size:14px;
}

.google-login{
    display:flex;
    justify-content:center;
    margin-top:20px;
}

#message{
    text-align:center;
    color:white;
    margin-top:15px;
}
</style>
</head>
<body>

<div class="login-box">

    <div class="logo">
        XTRIMER TUNNEL
    </div>

    <div class="info">
        Login menggunakan akun Google Anda
    </div>

    <div id="message"></div>

    <div class="google-login">

        <div
            id="g_id_onload"
            data-client_id="480091956294-njvigllpnbqmh6p11nij99eavv101u3e.apps.googleusercontent.com"
            data-callback="handleCredentialResponse"
            data-auto_select="true">
        </div>

        <div
            class="g_id_signin"
            data-type="standard"
            data-size="large"
            data-theme="filled_black"
            data-text="signin_with"
            data-shape="rectangular"
            data-width="300">
        </div>

    </div>

</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>

// Auto Login
const user =
JSON.parse(
    localStorage.getItem('user')
);

if (user) {
    window.location.href =
        'dashboard.html';
}

// Google Login Callback
async function handleCredentialResponse(response) {
    const message =
        document.getElementById('message');
    try {
        message.innerText =
            'Memproses login...';
        const res =
        await fetch(
            '/api/google-login',
            {
                method:'POST',
                headers:{
                    'Content-Type':
                    'application/json'
                },
                body:JSON.stringify({
                    credential:
                    response.credential
                })
            }
        );
        const result =
        await res.json();
        if(result.success){
            localStorage.setItem(
                'user',
                JSON.stringify(
                    result.user
                )
            );
            window.location.href =
                'dashboard.html';
        }else{
            message.innerText =
                result.message ||
                'Login gagal';
        }
    } catch(err){
        console.error(err);
        message.innerText =
            'Server tidak dapat dihubungi';
    }
}

</script>

</body>
</html>
