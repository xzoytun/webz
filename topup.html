<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topup Saldo - Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>

:root {
  /* ── KONSISTEN DENGAN DASHBOARD ── */
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #3D0F72;
  --purple-light: #9B4FDE;
  --purple-soft:  #F3EAFD;
  --purple-mid:   #EAD5FA;
  --accent:       #FF6B2B;
  --accent2:      #FFD600;
  --green:        #12C28A;
  --green-bg:     #E6FAF4;
  --green-border: rgba(18,194,138,0.3);
  --amber:        #FF6B2B;      /* Diselaraskan dengan --accent */
  --amber-bg:     #FFF5F0;
  --amber-border: rgba(255,107,43,0.3);
  --red:          #E84040;
  --red-bg:       #FFECEC;
  --red-border:   rgba(232,64,64,0.2.5);
  --white:        #FFFFFF;
  --bg:           #F7F0FD;
  --border:       #EAD5FA;
  --border-soft:  #E8D8F8;

  /* ── Text ── */
  --text-dark:    #1A0533;
  --text-mid:     #6B3FA0;
  --text-light:   #A882CC;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  color: var(--text-dark);
  padding-bottom: 40px;
  overflow-x: hidden;
}

.blob1 {
  position:fixed; top:-80px; left:-60px;
  width:300px; height:300px;
  background:radial-gradient(circle, rgba(123,47,190,0.1) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}
.blob2 {
  position:fixed; bottom:-60px; right:-60px;
  width:260px; height:260px;
  background:radial-gradient(circle, rgba(155,79,222,0.08) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(150deg, var(--purple-deep) 0%, var(--purple) 55%, var(--purple-light) 100%);
  padding: 24px 20px 48px;
  position: relative; overflow: hidden; z-index: 2;
}
.header::before {
  content:''; position:absolute; top:-40px; right:-30px;
  width:180px; height:180px;
  background:rgba(255,255,255,0.07); border-radius:50%;
}
.header::after {
  content:''; position:absolute; bottom:-50px; left:-20px;
  width:130px; height:130px;
  background:rgba(255,214,0,0.12); border-radius:50%;
}
.header-dots {
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size: 22px 22px; pointer-events:none;
}
.header-inner {
  display:flex; align-items:center; gap:14px; position:relative; z-index:2;
}
.back-btn-hdr {
  width:40px; height:40px; border-radius:13px;
  background:rgba(255,255,255,0.14);
  border:1px solid rgba(255,255,255,0.2);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  color:#fff; text-decoration:none; flex-shrink:0; transition:background 0.15s;
  backdrop-filter:blur(8px);
}
.back-btn-hdr:hover { background:rgba(255,255,255,0.24); }
.back-btn-hdr svg {
  width:20px; height:20px; fill:none;
  stroke:#fff; stroke-width:2.5;
  stroke-linecap:round; stroke-linejoin:round;
}
.header-title { flex:1; }
.header-title h1 {
  font-size:22px; font-weight:900; color:#fff; line-height:1;
  display:flex; align-items:center; gap:8px; letter-spacing:-0.3px;
}
.header-title h1 svg {
  width:22px; height:22px; fill:none; stroke:#fff; stroke-width:2; flex-shrink:0;
}
.header-title p {
  font-size:12px; color:rgba(255,255,255,0.6);
  font-weight:700; margin-top:4px; letter-spacing:0.2px;
}
.balance-hdr-chip {
  background:rgba(255,255,255,0.14);
  border:1px solid rgba(255,255,255,0.25);
  border-radius:20px; padding:6px 14px;
  font-size:11px; font-weight:800; color:#fff;
  white-space:nowrap; display:flex; align-items:center; gap:5px;
  backdrop-filter:blur(8px);
}
.balance-hdr-chip svg {
  width:13px; height:13px; fill:none;
  stroke:#fff; stroke-width:2.2;
  stroke-linecap:round; stroke-linejoin:round;
}

/* ── CONTAINER ── */
.container {
  max-width:480px; margin:0 auto;
  padding:0 18px; position:relative; z-index:2;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(22px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes pulse-ring {
  0%   { box-shadow:0 0 0 0 rgba(123,47,190,0.4); }
  70%  { box-shadow:0 0 0 10px rgba(123,47,190,0); }
  100% { box-shadow:0 0 0 0 rgba(123,47,190,0); }
}
@keyframes pulse-text {
  0%,100% { opacity:1; } 50% { opacity:0.45; }
}
@keyframes bounce-in {
  0%   { transform:scale(0.8); opacity:0; }
  60%  { transform:scale(1.05); opacity:1; }
  100% { transform:scale(1); }
}

/* ── FIELD LABEL ── */
.field-label {
  font-size:11px; font-weight:800; color:var(--text-light);
  text-transform:uppercase; letter-spacing:1.2px;
  margin-bottom:8px; display:flex; align-items:center; gap:6px;
}
.field-label svg {
  width:14px; height:14px; fill:none;
  stroke:var(--text-light); stroke-width:2.2;
  stroke-linecap:round; stroke-linejoin:round;
  flex-shrink:0;
}

/* ── INPUT CARD ── */
.input-card {
  background:var(--white);
  border-radius:22px; padding:20px 18px;
  border:1.5px solid var(--border-soft);
  box-shadow: 0 10px 36px rgba(90,26,154,0.15);
  margin-top:-26px; margin-bottom:14px;
  position:relative; z-index:3;
  animation: fadeUp 0.45s ease both;
}

.amount-wrap {
  display:flex; align-items:center;
  background:var(--purple-soft);
  border:2px solid var(--border-soft);
  border-radius:14px; padding:12px 16px; gap:10px;
  transition:border-color 0.2s, box-shadow 0.2s;
}
.amount-wrap:focus-within {
  border-color:var(--purple-light);
  box-shadow:0 0 0 3px rgba(155,79,222,0.15);
}
.amount-prefix {
  font-size:18px; font-weight:900; color:var(--text-mid); white-space:nowrap;
}
.amount-input {
  flex:1; border:none; outline:none;
  font-size:22px; font-weight:900; color:var(--text-dark); background:transparent;
  min-width:0;
}
.amount-input::placeholder { color:var(--text-light); opacity:0.5; font-size:18px; }

/* ── NOMINAL GRID ── */
.nominal-label {
  font-size:11px; font-weight:800; color:var(--text-light);
  text-transform:uppercase; letter-spacing:1.2px;
  margin:16px 0 10px; display:flex; align-items:center; gap:6px;
}
.nominal-label svg {
  width:13px; height:13px;
  fill:none; stroke:var(--text-light); stroke-width:2.2; flex-shrink:0;
}
.nominal-grid {
  display:grid; grid-template-columns:repeat(2,1fr); gap:8px;
}
.nominal-btn {
  padding:12px 10px;
  border:2px solid var(--border-soft); border-radius:14px;
  background:var(--purple-soft); color:var(--text-mid);
  font-family:'Nunito', sans-serif; font-weight:800; font-size:13px;
  cursor:pointer; text-align:center;
  transition:all 0.15s;
  display:flex; flex-direction:column; align-items:center; gap:2px;
}
.nominal-btn:hover {
  border-color:var(--purple-light);
  color:var(--purple-dark);
  background:var(--purple-mid);
}
.nominal-btn:active { transform:scale(0.96); }
.nominal-btn.selected {
  border-color:var(--purple);
  background:linear-gradient(135deg, var(--purple-dark), var(--purple));
  color:#fff;
  box-shadow:0 4px 16px rgba(123,47,190,0.4);
}
.nominal-btn .nom-label { font-size:11px; font-weight:700; opacity:0.8; }
.nominal-btn .nom-val   { font-size:14px; font-weight:900; }

/* ── PROMO CHIPS ── */
.promo-chips {
  display:flex; gap:8px; margin-top:14px; flex-wrap:wrap;
}
.promo-chip {
  background:var(--purple-soft);
  border:1px solid var(--border);
  border-radius:20px; padding:5px 12px;
  font-size:11px; font-weight:800; color:var(--text-mid);
  display:flex; align-items:center; gap:5px;
}
.promo-chip svg {
  width:12px; height:12px; fill:none;
  stroke:var(--purple); stroke-width:2.2;
  stroke-linecap:round; stroke-linejoin:round;
  flex-shrink:0;
}

/* ── SUBMIT BTN ── */
.submit-btn {
  width:100%; padding:16px; margin-top:18px;
  border:none; border-radius:18px;
  background:linear-gradient(135deg, var(--purple-dark), var(--purple));
  color:#fff; font-family:'Nunito', sans-serif;
  font-weight:900; font-size:15px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:8px;
  box-shadow:0 4px 16px rgba(123,47,190,0.4);
  transition:transform 0.15s, box-shadow 0.15s, opacity 0.15s;
  animation: pulse-ring 2.5s ease-in-out infinite;
}
.submit-btn svg {
  width:18px; height:18px; fill:none;
  stroke:#fff; stroke-width:2;
  stroke-linecap:round; stroke-linejoin:round;
  flex-shrink:0;
}
.submit-btn:hover {
  transform:translateY(-2px);
  box-shadow:0 8px 22px rgba(123,47,190,0.5);
}
.submit-btn:active  { transform:translateY(0); }
.submit-btn:disabled {
  opacity:0.55; cursor:not-allowed; transform:none; animation:none;
}

/* ── QRIS CARD ── */
.qris-card {
  background:var(--white);
  border-radius:22px; overflow:hidden;
  border:1.5px solid var(--border-soft);
  box-shadow:0 4px 20px rgba(90,26,154,0.1);
  margin-bottom:14px;
  animation: fadeUp 0.45s ease both;
}

.qris-card-head {
  background:linear-gradient(135deg, var(--purple-dark), var(--purple));
  padding:16px 18px;
  display:flex; align-items:center; gap:12px;
}
.qris-head-icon {
  width:44px; height:44px; border-radius:14px;
  background:rgba(255,255,255,0.18);
  border:1px solid rgba(255,255,255,0.2);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.qris-head-icon svg {
  width:22px; height:22px; fill:none;
  stroke:#fff; stroke-width:2;
  stroke-linecap:round; stroke-linejoin:round;
}
.qris-head-title {
  font-size:17px; font-weight:900; color:#fff; letter-spacing:-0.2px;
}
.qris-head-sub {
  font-size:11px; color:rgba(255,255,255,0.7);
  font-weight:600; margin-top:2px;
}

.qris-body { padding:20px 18px; }

.qris-amount-row {
  text-align:center; margin-bottom:18px;
}
.qris-amount-label {
  font-size:11px; font-weight:800; color:var(--text-light);
  text-transform:uppercase; letter-spacing:1.2px; margin-bottom:4px;
  display:flex; align-items:center; justify-content:center; gap:4px;
}
.qris-amount-label svg {
  width:12px; height:12px;
  fill:none; stroke:var(--text-light); stroke-width:2; flex-shrink:0;
}
.qris-amount-val {
  font-size:32px; font-weight:900; color:var(--text-dark); line-height:1; letter-spacing:-0.5px;
}

.qris-fee-row {
  display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px;
}
.fee-item {
  background:var(--purple-soft);
  border:1.5px solid var(--border-soft);
  border-radius:12px; padding:12px; text-align:center;
}
.fee-label {
  font-size:10px; font-weight:800; color:var(--text-light);
  text-transform:uppercase; letter-spacing:0.8px; margin-bottom:3px;
}
.fee-val {
  font-size:15px; font-weight:900; color:var(--text-dark);
}

/* ── QR IMAGE ── */
.qr-img-wrap {
  display:flex; flex-direction:column;
  align-items:center; gap:12px; margin-bottom:16px;
}
.qr-img-box {
  position:relative;
}
.qr-img-box img {
  width:240px; height:240px;
  border-radius:16px; padding:10px;
  background:var(--white);
  border:2px solid var(--border);
  box-shadow:0 4px 16px rgba(90,26,154,0.08);
  object-fit:contain; display:block;
}

/* ── DOWNLOAD BTN ── */
.download-btn {
  display:flex; align-items:center; gap:8px;
  background:var(--purple-soft);
  border:1.5px solid var(--border);
  border-radius:12px; padding:10px 18px;
  font-family:'Nunito', sans-serif;
  font-size:13px; font-weight:800; color:var(--text-mid);
  cursor:pointer; text-decoration:none;
  transition:all 0.15s;
}
.download-btn:hover {
  background:var(--purple-mid);
  border-color:var(--purple-light);
  color:var(--purple-dark);
  transform:translateY(-1px);
  box-shadow:0 4px 12px rgba(123,47,190,0.15);
}
.download-btn:active { transform:translateY(0); }
.download-btn svg {
  width:16px; height:16px; fill:none;
  stroke:var(--purple); stroke-width:2.2;
  stroke-linecap:round; stroke-linejoin:round;
  flex-shrink:0;
}

/* ── TIMER ── */
.timer-row {
  display:flex; align-items:center; justify-content:center; gap:8px;
  background:var(--amber-bg);
  border:1px solid var(--amber-border);
  border-radius:12px; padding:10px 14px; margin-bottom:14px;
  font-size:13px; font-weight:800; color:var(--amber);
}
.timer-row svg {
  width:16px; height:16px;
  fill:none; stroke:var(--amber); stroke-width:2; flex-shrink:0;
}

/* ── STATUS AREA ── */
#statusArea {
  text-align:center; padding:12px;
  font-size:13px; font-weight:700; color:var(--text-mid);
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.status-waiting {
  display:flex; align-items:center; gap:8px;
  color:var(--text-mid);
  animation: pulse-text 2s ease-in-out infinite;
}
.status-waiting svg {
  width:16px; height:16px; fill:none;
  stroke:var(--purple); stroke-width:2.2;
  stroke-linecap:round;
  animation:spin 1.5s linear infinite;
  flex-shrink:0;
}

.status-paid {
  width:100%;
  background:var(--green-bg);
  border:1.5px solid var(--green-border);
  border-radius:14px; padding:16px 18px;
  text-align:center;
  animation: bounce-in 0.5s ease both;
}
.status-paid-title {
  font-size:20px; font-weight:900; color:var(--green);
  display:flex; align-items:center; justify-content:center; gap:8px;
  margin-bottom:4px;
}
.status-paid-title svg {
  width:24px; height:24px;
  fill:none; stroke:var(--green); stroke-width:2.5; flex-shrink:0;
}
.status-paid-sub {
  font-size:12px; font-weight:800; color:var(--green);
}

.status-expired {
  width:100%;
  background:var(--red-bg);
  border:1.5px solid var(--red-border);
  border-radius:14px; padding:12px 16px;
  color:var(--red); font-weight:800;
  display:flex; align-items:center; gap:8px; justify-content:center;
}
.status-expired svg {
  width:18px; height:18px;
  fill:none; stroke:var(--red); stroke-width:2.2; flex-shrink:0;
}

/* ── BACK BTN ── */
.back-btn {
  width:100%; padding:14px;
  border:1.5px solid var(--border-soft); border-radius:16px;
  background:var(--white); color:var(--text-mid);
  font-family:'Nunito', sans-serif; font-weight:800; font-size:14px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:6px;
  transition:border-color 0.15s, color 0.15s, background 0.15s;
  box-shadow: 0 4px 12px rgba(90,26,154,0.05);
}
.back-btn svg {
  width:18px; height:18px; fill:none;
  stroke:currentColor; stroke-width:2.5;
  stroke-linecap:round; stroke-linejoin:round;
}
.back-btn:hover {
  border-color:var(--purple-light);
  color:var(--purple-dark);
  background:var(--purple-soft);
}

/* ── SPINNER inline ── */
.spin-icon {
  width:18px; height:18px; fill:none;
  stroke:#fff; stroke-width:2.2; stroke-linecap:round;
  animation:spin 1s linear infinite;
  flex-shrink:0;
}

/* ── TOAST ── */
.toast {
  position:fixed; top:20px; left:50%;
  transform:translateX(-50%) translateY(-80px);
  z-index:999; padding:12px 22px;
  border-radius:16px; font-weight:800; font-size:13px;
  display:flex; align-items:center; gap:8px;
  box-shadow:0 8px 24px rgba(90,26,154,0.25);
  transition:transform 0.3s cubic-bezier(0.34,1.2,0.64,1), opacity 0.3s;
  opacity:0; white-space:nowrap; color:#fff;
  background:var(--purple-dark);
}
.toast svg {
  width:15px; height:15px; fill:none; stroke:#fff; stroke-width:2; flex-shrink:0;
}
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
.toast.error { background:linear-gradient(135deg, var(--red), #F87171); box-shadow:0 8px 24px rgba(232,64,64,0.25); }
.toast.warn  { background:linear-gradient(135deg, var(--accent), #FF9E74); color:#fff; box-shadow:0 8px 24px rgba(255,107,43,0.25); }
.toast.success { background:linear-gradient(135deg, var(--green), #34D399); box-shadow:0 8px 24px rgba(18,194,138,0.25); }

</style>
</head>
<body>

<div class="blob1"></div>
<div class="blob2"></div>

<div class="header">
  <div class="header-dots"></div>
  <div class="header-inner">
    <a class="back-btn-hdr" href="dashboard.html">
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </a>
    <div class="header-title">
      <h1>
        <svg viewBox="0 0 24 24">
          <rect x="2" y="5" width="20" height="14" rx="2"/>
          <line x1="2" y1="10" x2="22" y2="10"/>
        </svg>
        Topup Saldo
      </h1>
      <p>Isi saldo via QRIS, instan &amp; aman</p>
    </div>
    <div class="balance-hdr-chip">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      QRIS
    </div>
  </div>
</div>

<div class="container">

  <div class="input-card">
    <div class="field-label">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 8v8M9 10.5h6M9 13.5h6"/>
      </svg>
      Nominal Topup
    </div>
    <div class="amount-wrap">
      <span class="amount-prefix">Rp</span>
      <input class="amount-input" type="number" id="amount"
        placeholder="0" min="100" oninput="clearSelected()">
    </div>

    <div class="nominal-label">
      <svg viewBox="0 0 24 24">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      Pilih Cepat
    </div>
    <div class="nominal-grid">
      <button class="nominal-btn" onclick="setNominal(5000, this)">
        <span class="nom-label">Lima Ribu</span>
        <span class="nom-val">Rp 5.000</span>
      </button>
      <button class="nominal-btn" onclick="setNominal(10000, this)">
        <span class="nom-label">Sepuluh Ribu</span>
        <span class="nom-val">Rp 10.000</span>
      </button>
      <button class="nominal-btn" onclick="setNominal(20000, this)">
        <span class="nom-label">Dua Puluh Ribu</span>
        <span class="nom-val">Rp 20.000</span>
      </button>
      <button class="nominal-btn" onclick="setNominal(50000, this)">
        <span class="nom-label">Lima Puluh Ribu</span>
        <span class="nom-val">Rp 50.000</span>
      </button>
    </div>

    <div class="promo-chips">
      <div class="promo-chip">
        <svg viewBox="0 0 24 24">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22,4 12,14.01 9,11.01"/>
        </svg>
        Instan masuk
      </div>
      <div class="promo-chip">
        <svg viewBox="0 0 24 24">
          <rect x="5" y="11" width="14" height="10" rx="2"/>
          <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
        </svg>
        Transaksi aman
      </div>
      <div class="promo-chip">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12,6 12,12 16,14"/>
        </svg>
        Berlaku 5 menit
      </div>
    </div>

    <button class="submit-btn" id="topupBtn" onclick="createDeposit()">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Buat QRIS Sekarang
    </button>
  </div>

  <div id="result"></div>

  <button class="back-btn" onclick="window.location.href='dashboard.html'">
    <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    Kembali ke Dashboard
  </button>

</div>

<div class="toast" id="toast"></div>

<script>

let depositCode = null;

function setNominal(value, el) {
  document.getElementById('amount').value = value;
  document.querySelectorAll('.nominal-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
}

function clearSelected() {
  document.querySelectorAll('.nominal-btn').forEach(b => b.classList.remove('selected'));
}

/* ── Download QRIS as image ── */
function downloadQris(url, amount) {
  fetch(url)
    .then(r => r.blob())
    .then(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'QRIS-Topup-Rp' + amount + '.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
      showToast('QRIS berhasil diunduh!', 'success');
    })
    .catch(() => {
      window.open(url, '_blank');
      showToast('Membuka QRIS di tab baru...', '');
    });
}

async function createDeposit() {
  const user = JSON.parse(localStorage.getItem('user'));
  if (!user) { showToast('Silakan login terlebih dahulu', 'error'); return; }

  const amount = document.getElementById('amount').value;
  if (!amount || amount < 100) {
    showToast('Minimal topup Rp 100', 'warn'); return;
  }

  const btn = document.getElementById('topupBtn');
  btn.disabled = true;
  btn.innerHTML = `
    <svg class="spin-icon" viewBox="0 0 24 24">
      <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
    </svg>
    Membuat QRIS...`;

  try {
    const res  = await fetch('/api/deposit', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email: user.email, amount })
    });
    const data = await res.json();

    btn.disabled = false;
    btn.innerHTML = `
      <svg viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Buat QRIS Sekarang`;

    if (!data.success) { showToast(data.message || 'Gagal membuat QRIS', 'error'); return; }

    depositCode = data.uniqueCode;
    const amtFormatted = Number(data.amount).toLocaleString('id-ID');
    const amtRaw       = Number(data.amount);

    document.getElementById('result').innerHTML = `
      <div class="qris-card">
        <div class="qris-card-head">
          <div class="qris-head-icon">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="3" width="7" height="7" rx="1"/>
              <rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="3" y="14" width="7" height="7" rx="1"/>
              <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
          </div>
          <div>
            <div class="qris-head-title">Scan &amp; Bayar</div>
            <div class="qris-head-sub">Gunakan aplikasi e-wallet apapun</div>
          </div>
        </div>
        <div class="qris-body">

          <div class="qris-amount-row">
            <div class="qris-amount-label">
              <svg viewBox="0 0 24 24">
                <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
              </svg>
              Total Pembayaran
            </div>
            <div class="qris-amount-val">Rp ${amtFormatted}</div>
          </div>

          <div class="qris-fee-row">
            <div class="fee-item">
              <div class="fee-label">Topup</div>
              <div class="fee-val">Rp ${Number(data.originalAmount).toLocaleString('id-ID')}</div>
            </div>
            <div class="fee-item">
              <div class="fee-label">Admin</div>
              <div class="fee-val">Rp ${Number(data.adminFee).toLocaleString('id-ID')}</div>
            </div>
          </div>

          <div class="qr-img-wrap">
            <div class="qr-img-box">
              <img id="qrisImage" src="${data.qrUrl}" alt="QRIS Code" crossorigin="anonymous">
            </div>
            <button class="download-btn" onclick="downloadQris('${data.qrUrl}', '${amtRaw}')">
              <svg viewBox="0 0 24 24">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7,10 12,15 17,10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              Unduh QRIS
            </button>
          </div>

          <div class="timer-row">
            <svg viewBox="0 0 24 24">
              <path d="M5 22h14M5 2h14M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/>
            </svg>
            QRIS berlaku selama <strong>5 menit</strong>
          </div>

          <div id="statusArea">
            <div class="status-waiting">
              <svg viewBox="0 0 24 24">
                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
              </svg>
              Menunggu pembayaran...
            </div>
          </div>

        </div>
      </div>`;

    document.getElementById('result').scrollIntoView({ behavior:'smooth' });
    startChecker();

  } catch(err) {
    console.error(err);
    btn.disabled = false;
    btn.innerHTML = `
      <svg viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Buat QRIS Sekarang`;
    showToast('Gagal membuat QRIS', 'error');
  }
}

function startChecker() {
  const interval = setInterval(async () => {
    if (!depositCode) { clearInterval(interval); return; }
    try {
      const res  = await fetch('/api/deposit-status/' + depositCode);
      const data = await res.json();

      if (data.success && data.status === 'expired') {
        document.getElementById('statusArea').innerHTML = `
          <div class="status-expired">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"/>
              <line x1="15" y1="9" x2="9" y2="15" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
              <line x1="9" y1="9" x2="15" y2="15" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            </svg>
            QRIS sudah expired. Buat ulang untuk melanjutkan.
          </div>`;
        clearInterval(interval);
      }

      if (data.success && data.status === 'paid') {
        document.getElementById('statusArea').innerHTML = `
          <div class="status-paid">
            <div class="status-paid-title">
              <svg viewBox="0 0 24 24">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22,4 12,14.01 9,11.01"/>
              </svg>
              Pembayaran Berhasil!
            </div>
            <div class="status-paid-sub">Saldo sudah masuk ke akun kamu</div>
          </div>`;
        clearInterval(interval);
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 3000);
      }
    } catch(e) {}
  }, 5000);
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  const icons = {
    error:   `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12" stroke="#fff" stroke-width="2"/><line x1="12" y1="16" x2="12.01" y2="16" stroke="#fff" stroke-width="3"/></svg>`,
    warn:    `<svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13" stroke="#fff" stroke-width="2"/><line x1="12" y1="17" x2="12.01" y2="17" stroke="#fff" stroke-width="3"/></svg>`,
    success: `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`,
    '':      `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12" stroke="#fff" stroke-width="2"/></svg>`
  };
  t.innerHTML = (icons[type] || icons['']) + msg;
  t.className = 'toast ' + (type || '') + ' show';
  setTimeout(() => t.className = 'toast ' + (type || ''), 2600);
}

</script>
</body>
</html>
