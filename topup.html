<!DOCTYPE html>  
<html lang="id">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">  
<title>Topup Saldo — Xtrimer</title>  
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght=400;500;600;700;800;900&display=swap" rel="stylesheet">  
<style>  
  
:root {  
  /* ── KONSISTEN DENGAN PROFILE & DASHBOARD LIGHT MODE ── */  
  --purple:       #7B2FBE;  
  --purple-dark:  #5A1A9A;  
  --purple-deep:  #3D0F72;  
  --purple-light: #9B4FDE;  
  
  --purple-soft:  #E2E8F0; 
  --purple-mid:   #CBD5E1;  
  --accent:       #FF6B2B;  
  --accent2:      #FFD600;  
  --green:        #12C28A;  
  --green-bg:     #E2F7F1;  
  --green-border: rgba(18,194,138,0.2);  
  --amber:        #FF6B2B;  
  --amber-bg:     #FFF5F0;  
  --amber-border: rgba(255,107,43,0.2);  
  --red:          #E84040;  
  --red-bg:       #FEE2E2;  
  --red-border:   rgba(232,64,64,0.15);  
  
  --white:        #FFFFFF;  
  --bg:           #F1F5F9;  
  --card:         #F8FAFC;
  --border:       #E2E8F0;  
  --border-soft:  #E2E8F0;  
  --gray-line:    #E2E8F0;
  
  /* ── Text Light Mode ── */  
  --text-dark:    #0F172A;  
  --text-mid:     #334155;  
  --text-light:   #64748B;  

  --shadow-sm:  0 4px 12px rgba(15, 23, 42, 0.03);
  --shadow-md:  0 6px 18px rgba(15, 23, 42, 0.05);
}  
  
/* ── KONSISTEN DENGAN PROFILE DARK MODE ── */
html[data-theme="dark"] {
  --purple-soft:  #202124; 
  --purple-mid:   #2a2b2f; 
  --green-bg:     #0c2a21; 
  --green-border: rgba(18,194,138,0.1);
  --red-bg:       #311111; 
  --red-border:   rgba(232,64,64,0.1);
  --amber-bg:     #2c1a10; 
  --amber-border: rgba(255,107,43,0.1);
  --white:        #17181c; 
  --bg:           #0a0b0d; 
  --card:         #1c1d21; 
  --border:       #303135;
  --border-soft:  #303135;
  --gray-line:    #303135; 
  --text-dark:    #E2E8F0; 
  --text-mid:     #94A3B8; 
  --text-light:   #64748B; 
}

html[data-theme="dark"] body { background: var(--bg); color: var(--text-dark); }
html[data-theme="dark"] .input-card,
html[data-theme="dark"] .qris-card,
html[data-theme="dark"] .back-btn { background: var(--card); border-color: var(--gray-line); }
html[data-theme="dark"] .amount-wrap { background: var(--bg); border-color: var(--border); }
html[data-theme="dark"] .nominal-btn { background: var(--bg); border-color: var(--gray-line); color: var(--text-mid); }
html[data-theme="dark"] .nominal-btn:hover { background: var(--purple-soft); color: var(--text-dark); }
html[data-theme="dark"] .nominal-btn.selected { background: linear-gradient(135deg, var(--purple-dark), var(--purple)); color: #fff; border-color: var(--purple); }
html[data-theme="dark"] .promo-chip { background: var(--card); border-color: var(--gray-line); color: var(--text-mid); }
html[data-theme="dark"] .fee-item { background: var(--bg); border-color: var(--gray-line); }
html[data-theme="dark"] .qr-img-box { background: var(--purple-soft); border-color: var(--gray-line); }
html[data-theme="dark"] .qr-img-box img { background: #fff; border-color: #fff; } 

html { background: var(--bg); }
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }  
  
body {  
  background: var(--bg);  
  min-height: 100vh;  
  font-family: 'Nunito', sans-serif;  
  color: var(--text-dark);  
  padding-bottom: 50px;  
  overflow-x: hidden;  
  -webkit-tap-highlight-color: transparent;
  transition: background .25s ease, color .25s ease;
}  
  
/* ── HERO HEADER (SYNCHRONIZED WITH PROFILE) ── */  
.header {  
  position: relative; overflow: hidden;
  background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple) 60%, var(--purple-light) 100%);  
  padding: 24px 20px 48px;  
  z-index: 2;  
}  
.header::before {  
  content:''; position:absolute; top:-40px; right:-20px;  
  width:140px; height:140px;  
  border:28px solid rgba(255,255,255,0.05); border-radius:50%;  
}  
.header-dots {  
  position:absolute; inset:0;  
  background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);  
  background-size: 200px 20px; pointer-events:none;  
}  
.header-inner {  
  max-width:440px; margin:0 auto;
  display:flex; align-items:center; justify-content:space-between; gap:12px; position:relative; z-index:2;  
}  
.back-btn-hdr {  
  width:32px; height:32px; border-radius:50%;  
  background:rgba(255,255,255,0.12);  
  border:1px solid rgba(255,255,255,0.15);  
  cursor:pointer; display:flex; align-items:center; justify-content:center;  
  color:#fff; text-decoration:none; flex-shrink:0; transition: all .2s;  
  backdrop-filter:blur(10px);  
}  
.back-btn-hdr:hover { background:rgba(255,255,255,0.2); transform:translateY(-2px); }  
.back-btn-hdr svg {  
  width:16px; height:16px; fill:none;  
  stroke:#fff; stroke-width:2.5;  
}  
.header-title { flex:1; min-width: 0; }  
.header-title h1 {  
  font-size:16px; font-weight:900; color:#fff; line-height:1.2;  
  display:flex; align-items:center; gap:6px; letter-spacing:-0.2px;  
}  
.header-title h1 svg {  
  width:18px; height:18px; fill:none; stroke:#fff; stroke-width:2.2; flex-shrink:0;  
}  
.header-title p {  
  font-size:10.5px; color:rgba(255,255,255,0.75);  
  font-weight:600; margin-top:2px;  
}  
.balance-hdr-chip {  
  background:rgba(255,255,255,0.15);  
  border:1px solid rgba(255,255,255,0.2);  
  border-radius:6px; padding:3px 8px;  
  font-size:9px; font-weight:800; color:#fff;  
  text-transform: uppercase; letter-spacing: 0.3px;
  white-space:nowrap; display:flex; align-items:center; gap:4px;  
  backdrop-filter:blur(10px);  
}  
.balance-hdr-chip svg {  
  width:12px; height:12px; fill:none;  
  stroke:#fff; stroke-width:2.2;  
}  
  
/* ── CONTAINER ── */  
.container {  
  max-width:440px; margin:-28px auto 0;  
  padding:0 16px; position:relative; z-index:10;  
}  
  
/* ── ANIMATIONS ── */  
@keyframes fadeUp {  
  from { opacity:0; transform:translateY(12px); }  
  to   { opacity:1; transform:translateY(0); }  
}  
@keyframes spin { to { transform:rotate(360deg); } }  
@keyframes pulse-ring {  
  0%   { box-shadow:0 0 0 0 rgba(123,47,190,0.2); }  
  70%  { box-shadow:0 0 0 8px rgba(123,47,190,0); }  
  100% { box-shadow:0 0 0 0 rgba(123,47,190,0); }  
}  
@keyframes pulse-text {  
  0%,100% { opacity:1; } 50% { opacity:0.5; }  
}  
@keyframes bounce-in {  
  0%   { transform:scale(0.95); opacity:0; }  
  100% { transform:scale(1); opacity:1; }  
}  
  
/* ── FIELD LABEL ── */  
.field-label {  
  font-size:11px; font-weight:900; color:var(--text-light);  
  text-transform:uppercase; letter-spacing:0.5px;  
  margin-bottom:8px; display:flex; align-items:center; gap:6px;  
}  
.field-label svg {  
  width:14px; height:14px; fill:none;  
  stroke:var(--text-light); stroke-width:2.2;  
}  
  
/* ── INPUT CARD ── */  
.input-card {  
  background:var(--white);  
  border-radius:16px; padding:16px;  
  border:1px solid var(--gray-line);  
  box-shadow: var(--shadow-md);  
  margin-bottom:12px;  
  animation: fadeUp 0.4s ease both;  
  transition: background .25s ease, border-color .25s ease;
}  
  
.amount-wrap {  
  display:flex; align-items:center;  
  background:var(--bg);  
  border:1px solid var(--gray-line);  
  border-radius:10px; padding:10px 14px; gap:8px;  
  transition:border-color 0.2s, background .25s ease;  
}  
.amount-wrap:focus-within {  
  border-color:var(--purple-light);  
}  
.amount-prefix {  
  font-size:16px; font-weight:900; color:var(--text-dark); white-space:nowrap;  
}  
.amount-input {  
  flex:1; border:none; outline:none;  
  font-size:18px; font-weight:900; color:var(--text-dark); background:transparent;  
  min-width:0;  
}  
.amount-input::placeholder { color:var(--text-light); opacity:0.4; font-size:16px; }  
  
/* ── NOMINAL GRID ── */  
.nominal-label {  
  font-size:11px; font-weight:900; color:var(--text-light);  
  text-transform:uppercase; letter-spacing:0.5px;  
  margin:16px 0 8px; display:flex; align-items:center; gap:6px;  
}  
.nominal-label svg {  
  width:13px; height:13px; fill:none; stroke:var(--text-light); stroke-width:2.2;  
}  
.nominal-grid {  
  display:grid; grid-template-columns:repeat(2,1fr); gap:8px;  
}  
.nominal-btn {  
  padding:10px;  
  border:1px solid var(--gray-line); border-radius:10px;  
  background:var(--bg); color:var(--text-mid);  
  font-family:'Nunito', sans-serif; font-weight:800; font-size:12px;  
  cursor:pointer; text-align:center;  
  transition:all 0.15s;  
  display:flex; flex-direction:column; align-items:center; gap:1px;  
}  
.nominal-btn:hover {  
  border-color:var(--purple-light);  
  color:var(--purple);  
  background:var(--purple-soft);  
}  
.nominal-btn:active { transform:scale(0.97); }  
.nominal-btn.selected {  
  border-color:var(--purple);  
  background:linear-gradient(135deg, var(--purple-dark), var(--purple));  
  color:#fff;  
}  
.nominal-btn .nom-label { font-size:10px; font-weight:700; opacity:0.75; }  
.nominal-btn .nom-val   { font-size:13px; font-weight:900; }  
  
/* ── PROMO CHIPS ── */  
.promo-chips {  
  display:flex; gap:6px; margin-top:12px; flex-wrap:wrap;  
}  
.promo-chip {  
  background:var(--bg);  
  border:1px solid var(--gray-line);  
  border-radius:20px; padding:4px 10px;  
  font-size:10.5px; font-weight:800; color:var(--text-mid);  
  display:flex; align-items:center; gap:4px;  
  transition: background .25s ease, border-color .25s ease;
}  
.promo-chip svg {  
  width:12px; height:12px; fill:none;  
  stroke:var(--purple-light); stroke-width:2.2;  
  flex-shrink:0;  
}  
  
/* ── SUBMIT BTN ── */  
.submit-btn {  
  width:100%; padding:12px; margin-top:16px;  
  border:none; border-radius:12px;  
  background:linear-gradient(135deg, var(--purple-dark), var(--purple));  
  color:#fff; font-family:'Nunito', sans-serif;  
  font-weight:800; font-size:13px; cursor:pointer;  
  display:flex; align-items:center; justify-content:center; gap:6px;  
  transition:transform 0.15s, opacity 0.15s;  
  animation: pulse-ring 3s ease-in-out infinite;  
}  
.submit-btn svg {  
  width:16px; height:16px; fill:none;  
  stroke:#fff; stroke-width:2.2;  
  flex-shrink:0;  
}  
.submit-btn:hover {  
  transform:translateY(-1px);  
}  
.submit-btn:active  { transform:translateY(0); }  
.submit-btn:disabled {  
  opacity:0.5; cursor:not-allowed; transform:none; animation:none;  
}  
  
/* ── QRIS CARD ── */  
.qris-card {  
  background:var(--white);  
  border-radius:16px; overflow:hidden;  
  border:1px solid var(--gray-line);  
  box-shadow: var(--shadow-md);  
  margin-bottom:12px;  
  animation: fadeUp 0.4s ease both;  
  transition: background .25s ease, border-color .25s ease;
}  
  
.qris-card-head {  
  background:linear-gradient(135deg, var(--purple-dark), var(--purple));  
  padding:14px 16px;  
  display:flex; align-items:center; gap:10px;  
}  
.qris-head-icon {  
  width:36px; height:36px; border-radius:10px;  
  background:rgba(255,255,255,0.15);  
  border:1px solid rgba(255,255,255,0.2);  
  display:flex; align-items:center; justify-content:center;  
  flex-shrink:0;  
}  
.qris-head-icon svg {  
  width:18px; height:18px; fill:none;  
  stroke:#fff; stroke-width:2.2;  
}  
.qris-head-title {  
  font-size:14px; font-weight:900; color:#fff; letter-spacing:-0.2px;  
}  
.qris-head-sub {  
  font-size:10.5px; color:rgba(255,255,255,0.7);  
  font-weight:600; margin-top:1px;  
}  
  
.qris-body { padding:16px; }  
  
.qris-amount-row {  
  text-align:center; margin-bottom:14px;  
}  
.qris-amount-label {  
  font-size:11px; font-weight:900; color:var(--text-light);  
  text-transform:uppercase; letter-spacing:0.5px; margin-bottom:2px;  
  display:flex; align-items:center; justify-content:center; gap:4px;  
}  
.qris-amount-label svg {  
  width:12px; height:12px;  
  fill:none; stroke:var(--text-light); stroke-width:2;  
}  
.qris-amount-val {  
  font-size:26px; font-weight:900; color:var(--text-dark); line-height:1; letter-spacing:-0.4px;  
}  
  
.qris-fee-row {  
  display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;  
}  
.fee-item {  
  background:var(--bg);  
  border:1px solid var(--gray-line);  
  border-radius:10px; padding:10px; text-align:center;  
  transition: background .25s ease, border-color .25s ease;
}  
.fee-label {  
  font-size:9px; font-weight:800; color:var(--text-light);  
  text-transform:uppercase; letter-spacing:0.3px; margin-bottom:2px;  
}  
.fee-val {  
  font-size:13px; font-weight:900; color:var(--text-dark);  
}  
  
/* ── QR IMAGE ── */  
.qr-img-wrap {  
  display:flex; flex-direction:column;  
  align-items:center; gap:10px; margin-bottom:14px;  
}  
.qr-img-box {  
  position:relative;  
  width:100%;  
  display:flex;  
  justify-content:center;  
  align-items:center;  
  background:var(--bg);  
  border-radius:16px;  
  padding:14px;  
  border:1px dashed var(--purple-light);  
  cursor: pointer;
  transition: all 0.2s ease;
}  
.qr-img-box:hover {
  transform: scale(1.01);
  border-color: var(--purple);
}
.qr-img-box img {  
  width:100%;  
  max-width:210px;  
  aspect-ratio:1/1;  
  object-fit:contain;  
  display:block;  
  border-radius:12px;  
  padding:8px;  
  background:#fff;  
  border:1px solid var(--gray-line);  
  box-shadow: var(--shadow-sm);
}  
  
/* ── NOTICE CHIP ── */  
.ss-notice-chip {  
  display:flex; align-items:center; gap:6px;  
  background:var(--green-bg);  
  border:1px solid var(--green-border);  
  border-radius:10px; padding:10px;  
  font-size:11px; font-weight:800; color:var(--green);  
  text-align:center; justify-content:center;  
  width:100%;  
  transition: background .25s ease, border-color .25s ease;
}  
.ss-notice-chip svg {  
  width:14px; height:14px; fill:none;  
  stroke:var(--green); stroke-width:2.2;  
  flex-shrink:0;  
}  
  
/* ── TIMER ── */  
.timer-row {  
  display:flex; align-items:center; justify-content:center; gap:6px;  
  background:var(--amber-bg);  
  border:1px solid var(--amber-border);  
  border-radius:10px; padding:10px; margin-bottom:12px;  
  font-size:12px; font-weight:800; color:var(--amber);  
  transition: background .25s ease, border-color .25s ease;
}  
.timer-row svg {  
  width:14px; height:14px;  
  fill:none; stroke:var(--amber); stroke-width:22; flex-shrink:0;  
}  
  
/* ── STATUS AREA ── */  
#statusArea {  
  text-align:center; padding:8px;  
  font-size:12px; font-weight:700; color:var(--text-mid);  
  display:flex; align-items:center; justify-content:center; gap:6px;  
}  
.status-waiting {  
  display:flex; align-items:center; gap:6px;  
  color:var(--text-mid);  
  animation: pulse-text 2s ease-in-out infinite;  
}  
.status-waiting svg {  
  width:14px; height:14px; fill:none;  
  stroke:var(--purple-light); stroke-width:2.5;  
  animation:spin 1.5s linear infinite;  
  flex-shrink:0;  
}  
  
.status-paid {  
  width:100%;  
  background:var(--green-bg);  
  border:1px solid var(--green-border);  
  border-radius:12px; padding:12px;  
  text-align:center;  
  animation: bounce-in 0.4s ease both;  
}  
.status-paid-title {  
  font-size:15px; font-weight:900; color:var(--green);  
  display:flex; align-items:center; justify-content:center; gap:6px;  
  margin-bottom:2px;  
}  
.status-paid-title svg {  
  width:18px; height:18px;  
  fill:none; stroke:var(--green); stroke-width:2.5; flex-shrink:0;  
}  
.status-paid-sub {  
  font-size:11px; font-weight:800; color:var(--green);  
}  
  
.status-expired {  
  width:100%;  
  background:var(--red-bg);  
  border:1px solid var(--red-border);  
  border-radius:12px; padding:10px;  
  color:var(--red); font-weight:800;  
  display:flex; align-items:center; gap:6px; justify-content:center;  
}  
.status-expired svg {  
  width:16px; height:16px;  
  fill:none; stroke:var(--red); stroke-width:2.2; flex-shrink:0;  
}  
  
/* ── BACK BTN ── */  
.back-btn {  
  width:100%; padding:12px;  
  border:1.5px solid var(--gray-line); border-radius:14px;  
  background:var(--white); color:var(--text-mid);  
  font-family:'Nunito', sans-serif; font-weight:800; font-size:13px;  
  cursor:pointer;  
  display:flex; align-items:center; justify-content:center; gap:6px;  
  transition: all 0.2s;  
  box-shadow: var(--shadow-sm);  
}  
.back-btn svg {  
  width:16px; height:16px; fill:none;  
  stroke:currentColor; stroke-width:2.2;  
}  
.back-btn:hover {  
  border-color:var(--purple);  
  color:var(--purple);  
  background:var(--purple-soft);  
}  
  
/* ── SPINNER inline ── */  
.spin-icon {  
  width:16px; height:16px; fill:none;  
  stroke:#fff; stroke-width:2.5;  
  animation:spin 1s linear infinite;  
  flex-shrink:0;  
}  
  
/* ── TOAST ── */  
.toast {  
  position:fixed; top:20px; left:50%;  
  transform:translateX(-50%) translateY(-80px);  
  z-index:999; padding:10px 20px;  
  border-radius:12px; font-weight:800; font-size:12px;  
  display:flex; align-items:center; gap:6px;  
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);  
  transition:transform 0.3s cubic-bezier(0.34,1.2,0.64,1), opacity 0.3s;  
  opacity:0; white-space:nowrap; color:#fff;  
  background:var(--purple-dark);  
}  
.toast svg {  
  width:14px; height:14px; fill:none; stroke:#fff; stroke-width:2.2; flex-shrink:0;  
}  
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
  
</style>  
</head>  
<body>  
  
<div class="header">  
  <div class="header-dots"></div>  
  <div class="header-inner">  
    <a class="back-btn-hdr" href="dashboard.html">  
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>  
    </a>  
    <div class="header-title">  
      <h1>  
        <svg viewBox="0 0 24 24">  
          <rect x="2" y="5" width="20" height="14" rx="2"/>  
          <line x1="2" y1="10" x2="22" y2="10"/>  
        </svg>  
        Topup Saldo  
      </h1>  
      <p>Isi saldo via QRIS, instan &amp; aman</p>  
    </div>  
    <div class="balance-hdr-chip">  
      <svg viewBox="0 0 24 24">  
        <rect x="3" y="3" width="7" height="7" rx="1"/>  
        <rect x="14" y="3" width="7" height="7" rx="1"/>  
        <rect x="3" y="14" width="7" height="7" rx="1"/>  
        <rect x="14" y="14" width="7" height="7" rx="1"/>  
      </svg>  
      QRIS  
    </div>  
  </div>  
</div>  
  
<div class="container">  
  
  <div class="input-card">  
    <div class="field-label">  
      <svg viewBox="0 0 24 24">  
        <circle cx="12" cy="12" r="10"/>  
        <path d="M12 8v8M9 10.5h6M9 13.5h6"/>  
      </svg>  
      Nominal Topup  
    </div>  
    <div class="amount-wrap">  
      <span class="amount-prefix">Rp</span>  
      <input class="amount-input" type="number" id="amount"  
        placeholder="0" min="100" oninput="clearSelected()">  
    </div>  
  
    <div class="nominal-label">  
      <svg viewBox="0 0 24 24">  
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>  
      </svg>  
      Pilih Cepat  
    </div>  
    <div class="nominal-grid">  
      <button class="nominal-btn" onclick="setNominal(5000, this)">  
        <span class="nom-label">Lima Ribu</span>  
        <span class="nom-val">Rp 5.000</span>  
      </button>  
      <button class="nominal-btn" onclick="setNominal(10000, this)">  
        <span class="nom-label">Sepuluh Ribu</span>  
        <span class="nom-val">Rp 10.000</span>  
      </button>  
      <button class="nominal-btn" onclick="setNominal(20000, this)">  
        <span class="nom-label">Dua Puluh Ribu</span>  
        <span class="nom-val">Rp 20.000</span>  
      </button>  
      <button class="nominal-btn" onclick="setNominal(50000, this)">  
        <span class="nom-label">Lima Puluh Ribu</span>  
        <span class="nom-val">Rp 50.000</span>  
      </button>  
    </div>  
  
    <div class="promo-chips">  
      <div class="promo-chip">  
        <svg viewBox="0 0 24 24">  
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>  
          <polyline points="22,4 12,14.01 9,11.01"/>  
        </svg>  
        Instan masuk  
      </div>  
      <div class="promo-chip">  
        <svg viewBox="0 0 24 24">  
          <rect x="5" y="11" width="14" height="10" rx="2"/>  
          <path d="M8 11V7a4 4 0 0 1 8 0v4"/>  
        </svg>  
        Transaksi aman  
      </div>  
      <div class="promo-chip">  
        <svg viewBox="0 0 24 24">  
          <circle cx="12" cy="12" r="10"/>  
          <polyline points="12,6 12,12 16,14"/>  
        </svg>  
        Berlaku 60 menit
      </div>  
    </div>  
  
    <button class="submit-btn" id="topupBtn" onclick="createDeposit()">  
      <svg viewBox="0 0 24 24">  
        <rect x="3" y="3" width="7" height="7" rx="1"/>  
        <rect x="14" y="3" width="7" height="7" rx="1"/>  
        <rect x="3" y="14" width="7" height="7" rx="1"/>  
        <rect x="14" y="14" width="7" height="7" rx="1"/>  
      </svg>  
      Buat QRIS Sekarang  
    </button>  
  </div>  
  
  <div id="result"></div>  
  
  <button class="back-btn" onclick="window.location.href='dashboard.html'">  
    <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>  
    Kembali ke Dashboard  
  </button>  
  
</div>  
  
<div class="toast" id="toast"></div>  
  
<script>  
  
(function initTheme(){
  const saved = localStorage.getItem('theme');
  if (saved === 'dark' || saved === 'light') {
    document.documentElement.setAttribute('data-theme', saved);
  } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  } else {
    document.documentElement.setAttribute('data-theme', 'light');
  }
})();

const token = localStorage.getItem('token');

if (!token) {
  location.href = 'index.html';
}

function setNominal(value, el) {  
  document.getElementById('amount').value = value;  
  document.querySelectorAll('.nominal-btn').forEach(b => b.classList.remove('selected'));  
  el.classList.add('selected');  
}  
  
function clearSelected() {  
  document.querySelectorAll('.nominal-btn').forEach(b => b.classList.remove('selected'));  
}  
  
async function createDeposit() {

  const amount =
    Number(
      document.getElementById('amount').value
    );

  if (!amount || amount < 1000) {

    showToast(
      'Minimal topup Rp 1.000',
      'warn'
    );

    return;

  }

  const btn =
    document.getElementById('topupBtn');

  btn.disabled = true;

  btn.innerHTML = `
    <svg class="spin-icon" viewBox="0 0 24 24">
      <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"/>
    </svg>
    Membuat QRIS...
  `;

  try {

    const res =
      await fetch('/api/create-topup', {

        method: 'POST',

        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },

        body: JSON.stringify({
          amount
        })

      });

    const data =
      await res.json();
      if (res.status === 401) {

  localStorage.removeItem('token');

  showToast(
    'Session expired',
    'warn'
  );

  setTimeout(() => {

    location.href = 'index.html';

  }, 1000);

  return;
}

    btn.disabled = false;

    btn.innerHTML = `
      <svg viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Buat QRIS Sekarang
    `;

    if (!data.success) {

      showToast(
        data.message || 'Gagal membuat pembayaran',
        'error'
      );

      return;

    }
    
    if (!data.payment_url) {

  showToast(
    'Payment URL tidak tersedia',
    'error'
  );

  return;

}
showToast(
  'Mengalihkan ke pembayaran...',
  'success'
);

    // LANGSUNG REDIRECT KE PAKASIR
    window.location.href =
      data.payment_url;

  } catch (err) {

    console.error(err);

    btn.disabled = false;

    showToast(
      'Server error',
      'error'
    );

  }

}
function showToast(msg, type) {  
  const t = document.getElementById('toast');  
  const icons = {  
    error:   `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12" stroke="#fff" stroke-width="2"/><line x1="12" y1="16" x2="12.01" y2="16" stroke="#fff" stroke-width="3"/></svg>`,  
    warn:    `<svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13" stroke="#fff" stroke-width="2"/><line x1="12" y1="17" x2="12.01" y2="17" stroke="#fff" stroke-width="3"/></svg>`,  
    success: `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`,  
    '':      `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12" stroke="#fff" stroke-width="2"/></svg>`  
  };  
  t.innerHTML = (icons[type] || icons['']) + msg;  
  t.className = 'toast ' + (type || '') + ' show';  
  setTimeout(() => t.className = 'toast ' + (type || ''), 2600);  
}  
  
</script>  
</body>  
</html>
