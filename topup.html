<!DOCTYPE html>  
<html lang="id">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">  
<title>Topup Saldo — Xtrimer</title>  
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">  
<style>  
/* ── TOKENS SYNCHRONIZED WITH DASHBOARD.HTML (PREMIUM ULTRA LIGHT) ── */
:root {
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #3D0F72;
  --purple-light: #9B4FDE;
  
  --purple-soft:  #E2E8F0; 
  --purple-mid:   #CBD5E1;
  --accent:       #FF6B2B;
  --accent2:      #FF8E53;
  --accent-deep:  #E05313;
  --green:        #12C28A;
  --green-bg:     #E2F7F1;
  --red:          #E84040;
  --red-bg:       #FEE2E2;
  
  --white:        #FFFFFF;
  --bg:           #F1F5F9; 
  --card:         #F8FAFC; 
  --gray-line:    #E2E8F0; 
  
  --text-dark:    #0F172A; 
  --text-mid:     #334155; 
  --text-light:   #64748B; 

  --shadow-sm:  0 4px 12px rgba(15, 23, 42, 0.03);
  --shadow-md:  0 6px 18px rgba(15, 23, 42, 0.05);
  --shadow-lg:  0 10px 25px rgba(15, 23, 42, 0.05);
  --shadow-purple: 0 4px 14px rgba(123, 47, 190, 0.12);

  --r-card: 14px;
  --r-btn:  10px;
  
  --amber:        #FF6B2B;
  --amber-bg:     #FFF3E0;

  --btn-topup-shdw: rgba(255, 107, 43, 0.25);
}  
  
/* ── TOKENS SYNCHRONIZED WITH DASHBOARD.HTML (PREMIUM DARK) ── */
html[data-theme="dark"] {
  --purple-soft:  #202124;
  --purple-mid:   #2a2b2f;
  --green-bg:     #0c2a21;
  --red-bg:       #311111;
  --amber-bg:     #3A2A14;
  --white:        #17181c;
  --bg:           #0a0b0d;
  --card:         #1c1d21;
  --gray-line:    #303135;
  --text-dark:    #E2E8F0; 
  --text-mid:     #94A3B8;  
  --text-light:   #64748B;
  --accent-deep:  #FF5100;
  --btn-topup-shdw: rgba(255, 107, 43, 0.4);
}

html[data-theme="dark"] body { background: var(--bg); color: var(--text-dark); }
html[data-theme="dark"] .input-card,
html[data-theme="dark"] .qris-card,
html[data-theme="dark"] .back-btn { background: var(--card); border-color: var(--gray-line); }
html[data-theme="dark"] .amount-wrap { background: var(--bg); border-color: var(--gray-line); }
html[data-theme="dark"] .nominal-btn { background: var(--bg); border-color: var(--gray-line); color: var(--text-mid); }
html[data-theme="dark"] .nominal-btn:hover { background: var(--purple-soft); color: var(--text-dark); }
html[data-theme="dark"] .nominal-btn.selected { background: linear-gradient(135deg, var(--accent), var(--accent-deep)); color: #fff; border-color: var(--accent); }
html[data-theme="dark"] .promo-chip { background: var(--purple-soft); border-color: var(--gray-line); color: var(--text-mid); }
html[data-theme="dark"] .fee-item { background: var(--bg); border-color: var(--gray-line); }
html[data-theme="dark"] .qr-img-box { background: var(--bg); border-color: var(--gray-line); }
html[data-theme="dark"] .qr-img-box img { background: #fff; border-color: #fff; } 

html { background: var(--bg); }
* { margin:0; padding:0; box-sizing:border-box; }  
  
body {  
  background: var(--bg);  
  min-height: 100vh;  
  font-family: 'Nunito', sans-serif;  
  color: var(--text-dark);  
  padding-bottom: 50px;  
  overflow-x: hidden;  
  transition: background .25s ease, color .25s ease;
}  
  
/* ── HEADER (MATCH WITH DASHBOARD) ── */  
.header {  
  background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple) 60%, var(--purple-light) 100%);  
  padding: 24px 20px 48px;  
  position: relative; overflow: hidden; z-index: 2;  
}  
.header::before {  
  content:''; position:absolute; top:-40px; right:-20px;  
  width:140px; height:140px;  
  border:28px solid rgba(255,255,255,0.05); border-radius:50%;  
}  
.header-dots {  
  position:absolute; inset:0;  
  background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);  
  background-size: 200px 20px; pointer-events:none;  
}  
.header-inner {  
  max-width:440px; margin:0 auto;
  display:flex; align-items:center; gap:14px; position:relative; z-index:2;  
}  
.back-btn-hdr {  
  width:32px; height:32px; border-radius:50%;  
  background: rgba(255,255,255,.12);  
  border: 1px solid rgba(255,255,255,.15);  
  cursor:pointer; display:flex; align-items:center; justify-content:center;  
  color:#fff; text-decoration:none; flex-shrink:0; transition:all 0.2s;  
  backdrop-filter:blur(10px);  
}  
.back-btn-hdr:hover { background:rgba(255,255,255,.2); transform:translateX(-2px); }  
.back-btn-hdr svg {  
  width:16px; height:16px; fill:none;  
  stroke:#fff; stroke-width:2.5;  
  stroke-linecap:round; stroke-linejoin:round;  
}  
.header-title { flex:1; }  
.header-title h1 {  
  font-size:18px; font-weight:900; color:#fff; line-height:1.2;  
  display:flex; align-items:center; gap:8px; letter-spacing:-0.2px;  
}  
.header-title p {  
  font-size:11px; color:rgba(255,255,255,0.75);  
  font-weight:600; margin-top:2px; letter-spacing:0.2px;  
}  
.balance-hdr-chip {  
  background:rgba(255,255,255,0.12);  
  border:1px solid rgba(255,255,255,0.15);  
  border-radius:20px; padding:5px 12px;  
  font-size:10px; font-weight:800; color:#fff;  
  white-space:nowrap; display:flex; align-items:center; gap:5px;  
  backdrop-filter:blur(10px);  
}  
.balance-hdr-chip svg {  
  width:12px; height:12px; fill:none;  
  stroke:#fff; stroke-width:2.2;  
}  
  
/* ── CONTAINER ── */  
.container {  
  max-width:440px; margin:0 auto;  
  padding:0 16px; position:relative; z-index:2;  
}  
  
/* ── ANIMATIONS ── */  
@keyframes fadeUp {  
  from { opacity:0; transform:translateY(12px); }  
  to   { opacity:1; transform:translateY(0); }  
}  
@keyframes spin { to { transform:rotate(360deg); } }  
@keyframes pulse-ring {  
  0%   { box-shadow:0 0 0 0 rgba(255, 107, 43, 0.25); }  
  70%  { box-shadow:0 0 0 8px rgba(255, 107, 43, 0); }  
  100% { box-shadow:0 0 0 0 rgba(255, 107, 43, 0); }  
}  
@keyframes blink { 50% { opacity: 0.4; } }
@keyframes bounce-in {  
  0%   { transform:scale(0.95); opacity:0; }  
  100% { transform:scale(1); opacity:1; }  
}  
  
/* ── INPUT CARD ── */  
.input-card {  
  background:var(--white);  
  border-radius:16px; padding:16px;  
  border:1px solid var(--gray-line);  
  box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);  
  margin-top:-28px; margin-bottom:14px;  
  position:relative; z-index:3;  
  animation: fadeUp 0.4s ease both;  
}  

.field-label {  
  font-size:10.5px; font-weight:800; color:var(--text-light);  
  text-transform:uppercase; letter-spacing:.8px;  
  margin-bottom:8px; display:flex; align-items:center; gap:6px;  
}  
.field-label svg {  
  width:14px; height:14px; fill:none;  
  stroke:var(--text-light); stroke-width:2.2;  
  flex-shrink:0;  
}  
  
.amount-wrap {  
  display:flex; align-items:center;  
  background: var(--bg);  
  border:1px solid var(--gray-line);  
  border-radius:10px; padding:10px 14px; gap:8px;  
  transition: all .2s ease;  
}  
.amount-wrap:focus-within {  
  border-color:var(--accent);  
  background: var(--white);
  box-shadow: 0 0 0 3px rgba(255,107,43,0.12);  
}  
.amount-prefix {  
  font-size:16px; font-weight:900; color:var(--text-dark); white-space:nowrap;  
}  
.amount-input {  
  flex:1; border:none; outline:none;  
  font-size:18px; font-weight:900; color:var(--text-dark); background:transparent;  
  min-width:0;  
}  
.amount-input::placeholder { color:var(--text-light); opacity:0.4; font-size:16px; }  
  
/* ── NOMINAL GRID ── */  
.nominal-label {  
  font-size:10.5px; font-weight:800; color:var(--text-light);  
  text-transform:uppercase; letter-spacing:.8px;  
  margin:14px 0 8px; display:flex; align-items:center; gap:6px;  
}  
.nominal-label svg {  
  width:13px; height:13px; fill:none; stroke:var(--text-light); stroke-width:2.2; flex-shrink:0;  
}  
.nominal-grid {  
  display:grid; grid-template-columns:repeat(2,1fr); gap:6px;  
}  
.nominal-btn {  
  padding:10px;  
  border:1px solid var(--gray-line); border-radius:10px;  
  background:var(--bg); color:var(--text-mid);  
  font-family:'Nunito', sans-serif; font-weight:800; font-size:12px;  
  cursor:pointer; text-align:center;  
  transition:all 0.15s ease;  
  display:flex; flex-direction:column; align-items:center; gap:2px;  
}  
.nominal-btn:hover {  
  border-color:var(--accent);  
  color:var(--accent);  
  background:var(--white);  
}  
.nominal-btn:active { transform:scale(0.97); }  
.nominal-btn.selected {  
  border-color:var(--accent);  
  background:linear-gradient(135deg, var(--accent), var(--accent2));  
  color:#fff;  
  box-shadow: 0 4px 12px var(--btn-topup-shdw);  
}  
.nominal-btn .nom-label { font-size:10px; font-weight:700; opacity:0.8; }  
.nominal-btn .nom-val   { font-size:13.5px; font-weight:900; }  
  
/* ── PROMO CHIPS ── */  
.promo-chips {  
  display:flex; gap:6px; margin-top:12px; flex-wrap:wrap;  
}  
.promo-chip {  
  background:var(--bg);  
  border:1px solid var(--gray-line);  
  border-radius:6px; padding:4px 8px;  
  font-size:10px; font-weight:800; color:var(--text-mid);  
  display:flex; align-items:center; gap:4px;  
  transition: background .25s ease, border-color .25s ease;
}  
.promo-chip svg {  
  width:12px; height:12px; fill:none;  
  stroke:var(--accent); stroke-width:2.2;  
  flex-shrink:0;  
}  
  
/* ── SUBMIT BTN ── */  
.submit-btn {  
  width:100%; padding:14px; margin-top:16px;  
  border:none; border-radius:10px;  
  background:linear-gradient(135deg, var(--accent), var(--accent2));  
  color:#fff; font-family:'Nunito', sans-serif;  
  font-weight:900; font-size:14px; cursor:pointer;  
  display:flex; align-items:center; justify-content:center; gap:8px;  
  box-shadow: 0 4px 12px var(--btn-topup-shdw);  
  transition:all 0.2s;  
  animation: pulse-ring 2.5s ease-in-out infinite;  
}  
.submit-btn svg {  
  width:16px; height:16px; fill:none;  
  stroke:#fff; stroke-width:2.2;  
  flex-shrink:0;  
}  
.submit-btn:hover {  
  transform:translateY(-2px);  
  box-shadow: 0 6px 16px var(--btn-topup-shdw);
  filter: brightness(1.08);
}  
.submit-btn:active  { transform:translateY(0); }  
.submit-btn:disabled {  
  opacity:0.55; cursor:not-allowed; transform:none; animation:none;  
}  
  
/* ── QRIS CARD ── */  
.qris-card {  
  background:var(--white);  
  border-radius:16px; overflow:hidden;  
  border:1px solid var(--gray-line);  
  box-shadow:var(--shadow-md);  
  margin-bottom:14px;  
  animation: fadeUp 0.4s ease both;  
  transition: background .25s ease, border-color .25s ease;
}  
  
.qris-card-head {  
  background:linear-gradient(135deg, var(--accent), var(--accent-deep));  
  padding:14px 16px;  
  display:flex; align-items:center; gap:12px;  
}  
.qris-head-icon {  
  width:36px; height:36px; border-radius:10px;  
  background:rgba(255,255,255,0.15);  
  border:1px solid rgba(255,255,255,0.2);  
  display:flex; align-items:center; justify-content:center;  
  flex-shrink:0;  
}  
.qris-head-icon svg {  
  width:18px; height:18px; fill:none;  
  stroke:#fff; stroke-width:2.2;  
}  
.qris-head-title {  
  font-size:14.5px; font-weight:900; color:#fff; letter-spacing:-0.1px;  
}  
.qris-head-sub {  
  font-size:10.5px; color:rgba(255,255,255,0.75);  
  font-weight:600; margin-top:1px;  
}  
  
.qris-body { padding:16px; }  
  
.qris-amount-row {  
  text-align:center; margin-bottom:14px;  
}  
.qris-amount-label {  
  font-size:10.5px; font-weight:800; color:var(--text-light);  
  text-transform:uppercase; letter-spacing:.8px; margin-bottom:4px;  
  display:flex; align-items:center; justify-content:center; gap:4px;  
}  
.qris-amount-label svg {  
  width:13px; height:13px;  
  fill:none; stroke:var(--text-light); stroke-width:2; flex-shrink:0;  
}  
.qris-amount-val {  
  font-size:26px; font-weight:900; color:var(--text-dark); line-height:1; letter-spacing:-0.4px;  
}  
  
.qris-fee-row {  
  display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px;  
}  
.fee-item {  
  background:var(--bg);  
  border:1px solid var(--gray-line);  
  border-radius:10px; padding:10px; text-align:center;  
  transition: background .25s ease, border-color .25s ease;
}  
.fee-label {  
  font-size:9.5px; font-weight:800; color:var(--text-light);  
  text-transform:uppercase; letter-spacing:0.5px; margin-bottom:2px;  
}  
.fee-val {  
  font-size:13.5px; font-weight:900; color:var(--text-dark);  
}  
  
/* ── QR IMAGE ── */  
.qr-img-wrap {  
  display:flex; flex-direction:column;  
  align-items:center; gap:10px; margin-bottom:14px;  
}  
.qr-img-box {  
  position:relative;  
  width:100%;  
  display:flex;  
  justify-content:center;  
  align-items:center;  
  background:var(--bg);  
  border-radius:14px;  
  padding:14px;  
  border:1px dashed var(--gray-line);  
  cursor: pointer;
  transition: all 0.2s ease;
}  
.qr-img-box:hover {
  transform: scale(1.01);
  border-color: var(--accent);
}
.qr-img-box img {  
  width:100%;  
  max-width:210px;  
  aspect-ratio:1/1;  
  object-fit:contain;  
  display:block;  
  border-radius:10px;  
  padding:10px;  
  background:#fff;  
  border:1px solid var(--gray-line);  
  box-shadow:var(--shadow-sm);  
}  
  
.ss-notice-chip {  
  display:flex; align-items:center; gap:6px;  
  background:var(--green-bg);  
  border:1px solid rgba(18,194,138,0.15);  
  border-radius:8px; padding:8px 12px;  
  font-size:11px; font-weight:800; color:var(--green);  
  text-align:center; justify-content:center;  
  width:100%;  
}  
.ss-notice-chip svg {  
  width:14px; height:14px; fill:none;  
  stroke:var(--green); stroke-width:2.2;  
  flex-shrink:0;  
}  
  
/* ── TIMER ── */  
.timer-row {  
  display:flex; align-items:center; justify-content:center; gap:6px;  
  background:var(--amber-bg);  
  border:1px solid rgba(255,107,43,0.15);  
  border-radius:8px; padding:8px 12px; margin-bottom:12px;  
  font-size:11.5px; font-weight:800; color:var(--amber);  
}  
.timer-row svg {  
  width:14px; height:14px;  
  fill:none; stroke:var(--amber); stroke-width:2.2; flex-shrink:0;  
}  
  
/* ── STATUS AREA ── */  
#statusArea {  
  text-align:center; padding:8px;  
  font-size:12px; font-weight:700; color:var(--text-mid);  
  display:flex; align-items:center; justify-content:center; gap:8px;  
}  
.status-waiting {  
  display:flex; align-items:center; gap:6px;  
  color:var(--text-light);  
}  
.status-waiting svg {  
  width:14px; height:14px; fill:none;  
  stroke:var(--accent); stroke-width:2.2;  
  animation:spin 1.5s linear infinite;  
  flex-shrink:0;  
}  
  
.status-paid {  
  width:100%;  
  background:var(--green-bg);  
  border:1px solid rgba(18,194,138,0.15);  
  border-radius:10px; padding:12px;  
  text-align:center;  
  animation: bounce-in 0.4s ease both;  
}  
.status-paid-title {  
  font-size:16px; font-weight:900; color:var(--green);  
  display:flex; align-items:center; justify-content:center; gap:6px;  
  margin-bottom:2px;  
}  
.status-paid-title svg {  
  width:18px; height:18px;  
  fill:none; stroke:var(--green); stroke-width:2.5; flex-shrink:0;  
}  
.status-paid-sub {  
  font-size:11px; font-weight:800; color:var(--green);  
}  
  
.status-expired {  
  width:100%;  
  background:var(--red-bg);  
  border:1px solid rgba(232,64,64,0.15);  
  border-radius:10px; padding:10px;  
  color:var(--red); font-weight:800; font-size:12px; 
  display:flex; align-items:center; gap:6px; justify-content:center;  
}  
.status-expired svg {  
  width:16px; height:16px;  
  fill:none; stroke:var(--red); stroke-width:2.2; flex-shrink:0;  
}  
  
/* ── BACK BTN ── */  
.back-btn {  
  width:100%; padding:12px;  
  border:1px solid var(--gray-line); border-radius:10px;  
  background:var(--white); color:var(--text-mid);  
  font-family:'Nunito', sans-serif; font-weight:800; font-size:13.5px;  
  cursor:pointer;  
  display:flex; align-items:center; justify-content:center; gap:6px;  
  transition:all 0.2s ease;  
  box-shadow: var(--shadow-sm);
}  
.back-btn svg {  
  width:16px; height:16px; fill:none;  
  stroke:currentColor; stroke-width:2.5;  
}  
.back-btn:hover {  
  border-color:var(--accent);  
  color:var(--accent);  
  background:var(--bg);  
}  
  
/* ── SPINNER ── */  
.spin-icon {  
  width:16px; height:16px; fill:none;  
  stroke:#fff; stroke-width:2.2;  
  animation:spin 1s linear infinite;  
  flex-shrink:0;  
}  
  
/* ── TOAST ── */  
.toast {  
  position:fixed; top:20px; left:50%;  
  transform:translateX(-50%) translateY(-80px);  
  z-index:999; padding:10px 20px;  
  border-radius:10px; font-weight:800; font-size:12px;  
  display:flex; align-items:center; gap:6px;  
  box-shadow: 0 8px 24px rgba(15, 23, 42, 0.15);  
  transition:transform 0.3s cubic-bezier(0.34,1.2,0.64,1), opacity 0.3s;  
  opacity:0; white-space:nowrap; color:#fff;  
  background:var(--text-dark);  
}  
.toast.success { background: var(--green); }
.toast.warn { background: var(--accent); }
.toast.error { background: var(--red); }
.toast svg {  
  width:14px; height:14px; fill:none; stroke:#fff; stroke-width:2.2; flex-shrink:0;  
}  
  
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
</style>  
</head>  
<body>  
  
<div class="header">  
  <div class="header-dots"></div>  
  <div class="header-inner">  
    <a class="back-btn-hdr" href="dashboard.html" aria-label="Kembali">  
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>  
    </a>  
    <div class="header-title">  
      <h1>  
        <svg viewBox="0 0 24 24">  
          <rect x="2" y="5" width="20" height="14" rx="2"/>  
          <line x1="2" y1="10" x2="22" y2="10"/>  
        </svg>  
        Topup Saldo  
      </h1>  
      <p>Isi saldo via QRIS, instan &amp; aman</p>  
    </div>  
    <div class="balance-hdr-chip">  
      <svg viewBox="0 0 24 24">  
        <rect x="3" y="3" width="7" height="7" rx="1"/>  
        <rect x="14" y="3" width="7" height="7" rx="1"/>  
        <rect x="3" y="14" width="7" height="7" rx="1"/>  
        <rect x="14" y="14" width="7" height="7" rx="1"/>  
      </svg>  
      QRIS  
    </div>  
  </div>  
</div>  
  
<div class="container">  
  
  <div class="input-card">  
    <div class="field-label">  
      <svg viewBox="0 0 24 24">  
        <circle cx="12" cy="12" r="10"/>  
        <path d="M12 8v8M9 10.5h6M9 13.5h6"/>  
      </svg>  
      Nominal Topup  
    </div>  
    <div class="amount-wrap">  
      <span class="amount-prefix">Rp</span>  
      <input class="amount-input" type="number" id="amount"  
        placeholder="0" min="100" oninput="clearSelected()">  
    </div>  
  
    <div class="nominal-label">  
      <svg viewBox="0 0 24 24">  
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>  
      </svg>  
      Pilih Cepat  
    </div>  
    <div class="nominal-grid">  
      <button class="nominal-btn" onclick="setNominal(5000, this)">  
        <span class="nom-label">Lima Ribu</span>  
        <span class="nom-val">Rp 5.000</span>  
      </button>  
      <button class="nominal-btn" onclick="setNominal(10000, this)">  
        <span class="nom-label">Sepuluh Ribu</span>  
        <span class="nom-val">Rp 10.000</span>  
      </button>  
      <button class="nominal-btn" onclick="setNominal(20000, this)">  
        <span class="nom-label">Dua Puluh Ribu</span>  
        <span class="nom-val">Rp 20.000</span>  
      </button>  
      <button class="nominal-btn" onclick="setNominal(50000, this)">  
        <span class="nom-label">Lima Puluh Ribu</span>  
        <span class="nom-val">Rp 50.000</span>  
      </button>  
    </div>  
  
    <div class="promo-chips">  
      <div class="promo-chip">  
        <svg viewBox="0 0 24 24">  
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>  
          <polyline points="22,4 12,14.01 9,11.01"/>  
        </svg>  
        Instan masuk  
      </div>  
      <div class="promo-chip">  
        <svg viewBox="0 0 24 24">  
          <rect x="5" y="11" width="14" height="10" rx="2"/>  
          <path d="M8 11V7a4 4 0 0 1 8 0v4"/>  
        </svg>  
        Transaksi aman  
      </div>  
      <div class="promo-chip">  
        <svg viewBox="0 0 24 24">  
          <circle cx="12" cy="12" r="10"/>  
          <polyline points="12,6 12,12 16,14"/>  
        </svg>  
        Berlaku 5 menit  
      </div>  
    </div>  
  
    <button class="submit-btn" id="topupBtn" onclick="createDeposit()">  
      <svg viewBox="0 0 24 24">  
        <rect x="3" y="3" width="7" height="7" rx="1"/>  
        <rect x="14" y="3" width="7" height="7" rx="1"/>  
        <rect x="3" y="14" width="7" height="7" rx="1"/>  
        <rect x="14" y="14" width="7" height="7" rx="1"/>  
      </svg>  
      Buat QRIS Sekarang  
    </button>  
  </div>  
  
  <div id="result"></div>  
  
  <button class="back-btn" onclick="window.location.href='dashboard.html'">  
    <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>  
    Kembali ke Dashboard  
  </button>  
  
</div>  
  
<div class="toast" id="toast"></div>  
  
<script>  
let depositCode = null;  
let timerInterval = null; 

(function initTheme(){
  const saved = localStorage.getItem('theme');
  if (saved === 'dark' || saved === 'light') {
    document.documentElement.setAttribute('data-theme', saved);
  } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  } else {
    document.documentElement.setAttribute('data-theme', 'light');
  }
})();

const token = localStorage.getItem('token');
if (!token) { location.href = 'index.html'; }

function setNominal(value, el) {  
  document.getElementById('amount').value = value;  
  document.querySelectorAll('.nominal-btn').forEach(b => b.classList.remove('selected'));  
  el.classList.add('selected');  
}  
  
function clearSelected() {  
  document.querySelectorAll('.nominal-btn').forEach(b => b.classList.remove('selected'));  
}  
  
function downloadQris(url) {
  const a = document.createElement('a');
  a.href = url;
  a.download = `QRIS_Xtrimer_${Date.now()}.png`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showToast('QRIS berhasil diunduh!', 'success');
}

async function createDeposit() {  
  const amount = document.getElementById('amount').value;  
  if (!amount || amount < 100) {  
    showToast('Minimal topup Rp 100', 'warn'); return;  
  }  
  
  const btn = document.getElementById('topupBtn');  
  btn.disabled = true;  
  btn.innerHTML = `  
    <svg class="spin-icon" viewBox="0 0 24 24">  
      <circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.2)" stroke-width="2.5" fill="none"/>
      <path d="M12 2a10 10 0 0 1 10 10" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    </svg>  
    Membuat QRIS...`;  
  
  try {  
    if (timerInterval) clearInterval(timerInterval);

    const res  = await fetch('/api/deposit', {  
      method: 'POST',  
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },  
      body: JSON.stringify({ amount })
    });  
    const data = await res.json();  
  
    btn.disabled = false;  
    btn.innerHTML = `  
      <svg viewBox="0 0 24 24">  
        <rect x="3" y="3" width="7" height="7" rx="1"/>  
        <rect x="14" y="3" width="7" height="7" rx="1"/>  
        <rect x="3" y="14" width="7" height="7" rx="1"/>  
        <rect x="14" y="14" width="7" height="7" rx="1"/>  
      </svg>  
      Buat QRIS Sekarang`;  
  
    if (!data.success) { showToast(data.message || 'Gagal membuat QRIS', 'error'); return; }  
  
    depositCode = data.uniqueCode;  
    const amtFormatted = Number(data.amount).toLocaleString('id-ID');  
    const finalQrUrl = `${data.qrUrl}&t=${Date.now()}`;
  
    document.getElementById('result').innerHTML = `  
      <div class="qris-card">  
        <div class="qris-card-head">  
          <div class="qris-head-icon">  
            <svg viewBox="0 0 24 24">  
              <rect x="3" y="3" width="7" height="7" rx="1"/>  
              <rect x="14" y="3" width="7" height="7" rx="1"/>  
              <rect x="3" y="14" width="7" height="7" rx="1"/>  
              <rect x="14" y="14" width="7" height="7" rx="1"/>  
            </svg>  
          </div>  
          <div>  
            <div class="qris-head-title">Scan &amp; Bayar</div>  
            <div class="qris-head-sub">Gunakan e-wallet atau m-banking apa saja</div>  
          </div>  
        </div>  
        <div class="qris-body">  
  
          <div class="qris-amount-row">  
            <div class="qris-amount-label">  
              <svg viewBox="0 0 24 24">  
                <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>  
              </svg>  
              Total Pembayaran  
            </div>  
            <div class="qris-amount-val">Rp ${amtFormatted}</div>  
          </div>  
  
          <div class="qris-fee-row">  
            <div class="fee-item">  
              <div class="fee-label">Topup</div>  
              <div class="fee-val">Rp ${Number(data.originalAmount).toLocaleString('id-ID')}</div>  
            </div>  
            <div class="fee-item">  
              <div class="fee-label">Biaya Admin</div>  
              <div class="fee-val">Rp ${Number(data.adminFee).toLocaleString('id-ID')}</div>  
            </div>  
          </div>  
  
          <div class="qr-img-wrap">  
            <div class="qr-img-box" onclick="downloadQris('${finalQrUrl}')" title="Klik untuk unduh gambar QRIS">  
              <img  
                id="qrisImage"  
                src="${finalQrUrl}"  
                alt="QRIS Code"  
                loading="lazy"  
                referrerpolicy="no-referrer"  
                onload="this.style.opacity='1'"  
                style="opacity:0;transition:0.3s;"  
              >   
            </div>  
            <div class="ss-notice-chip">  
              <svg viewBox="0 0 24 24">  
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
              </svg>  
              Tekan/klik gambar QRIS di atas untuk mengunduh kodenya.  
            </div>  
          </div>  
  
          <div class="timer-row">  
            <svg viewBox="0 0 24 24">  
              <path d="M5 22h14M5 2h14M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/>  
            </svg>  
            Batas waktu pembayaran: &nbsp;<strong id="countdown">05:00</strong>  
          </div>  
  
          <div id="statusArea">  
            <div class="status-waiting">  
              <svg viewBox="0 0 24 24">  
                <circle cx="12" cy="12" r="10" stroke="rgba(255,107,43,0.2)" stroke-width="2" fill="none"/>
                <path d="M12 2a10 10 0 0 1 10 10" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
              </svg>  
              Menunggu pembayaran terdeteksi sistem...  
            </div>  
          </div>  
  
        </div>  
      </div>`;  
  
    document.getElementById('result').scrollIntoView({ behavior:'smooth' });  
    startCountdown(300); 
    startChecker();  
  
  } catch(err) {  
    console.error(err);  
    btn.disabled = false;  
    btn.innerHTML = `  
      <svg viewBox="0 0 24 24">  
        <rect x="3" y="3" width="7" height="7" rx="1"/>  
        <rect x="14" y="3" width="7" height="7" rx="1"/>  
        <rect x="3" y="14" width="7" height="7" rx="1"/>  
        <rect x="14" y="14" width="7" height="7" rx="1"/>  
      </svg>  
      Buat QRIS Sekarang`;  
    showToast('Gagal membuat QRIS', 'error');  
  }  
}  

function startCountdown(durationInSeconds) {
  let timeRemaining = durationInSeconds;
  const countdownEl = document.getElementById('countdown');

  timerInterval = setInterval(() => {
    let minutes = Math.floor(timeRemaining / 60);
    let seconds = timeRemaining % 60;

    minutes = minutes < 10 ? '0' + minutes : minutes;
    seconds = seconds < 10 ? '0' + seconds : seconds;

    if (countdownEl) {
      countdownEl.innerText = `${minutes}:${seconds}`;
    }

    if (--timeRemaining < 0) {
      clearInterval(timerInterval);
      setQrisExpiredView(); 
    }
  }, 1000);
}

function setQrisExpiredView() {
  const statusArea = document.getElementById('statusArea');
  if (statusArea) {
    statusArea.innerHTML = `  
      <div class="status-expired">  
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">  
          <circle cx="12" cy="12" r="10"/>  
          <line x1="15" y1="9" x2="9" y2="15" stroke-linecap="round"/>  
          <line x1="9" y1="9" x2="15" y2="15" stroke-linecap="round"/>  
        </svg>  
        Masa berlaku QRIS habis. Silakan buat ulang.  
      </div>`;
  }
  depositCode = null; 
}  
  
function startChecker() {  
  const interval = setInterval(async () => {  
    if (!depositCode) { clearInterval(interval); return; }  
    try {  
      const res  = await fetch('/api/deposit-status/' + depositCode, {
        method: 'GET',
        headers: { 'Authorization': `Bearer ${token}` }
      });  
      const data = await res.json();  
  
      if (data.success && data.status === 'expired') {  
        if (timerInterval) clearInterval(timerInterval);
        setQrisExpiredView();
        clearInterval(interval);  
      }  
  
      if (data.success && data.status === 'paid') {  
        if (timerInterval) clearInterval(timerInterval);
        document.getElementById('statusArea').innerHTML = `  
          <div class="status-paid">  
            <div class="status-paid-title">  
              <svg viewBox="0 0 24 24">  
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>  
                <polyline points="22,4 12,14.01 9,11.01"/>  
              </svg>  
              Pembayaran Sukses!  
            </div>  
            <div class="status-paid-sub">Saldo otomatis ditambahkan ke akun Anda</div>  
          </div>`;  
        clearInterval(interval);  
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 3000);  
      }  
    } catch(e) {}  
  }, 5000);  
}  
  
function showToast(msg, type) {  
  const t = document.getElementById('toast');  
  const icons = {  
    error:   `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12" stroke="#fff" stroke-width="2"/><line x1="12" y1="16" x2="12.01" y2="16" stroke="#fff" stroke-width="3"/></svg>`,  
    warn:    `<svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13" stroke="#fff" stroke-width="2"/><line x1="12" y1="17" x2="12.01" y2="17" stroke="#fff" stroke-width="3"/></svg>`,  
    success: `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`,  
    '':      `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12" stroke="#fff" stroke-width="2"/></svg>`  
  };  
  t.innerHTML = (icons[type] || icons['']) + msg;  
  t.className = 'toast ' + (type || '') + ' show';  
  setTimeout(() => t.className = 'toast ' + (type || ''), 2600);  
}  
</script>  
</body>  
</html>
