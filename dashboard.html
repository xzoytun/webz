<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Xtrimer — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── TOKENS SYNCHRONIZED WITH PROFILE.HTML ── */
:root {
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #3D0F72;
  --purple-light: #9B4FDE;
  --purple-soft:  #F3EAFD;
  --purple-mid:   #EAD5FA;
  --accent:       #FF6B2B;
  --accent2:      #FFD600;
  --green:        #12C28A;
  --green-bg:     #E6FAF4;
  --red:          #E84040;
  --red-bg:       #FFECEC;
  --white:        #FFFFFF;
  --bg:           #F8F6FC;
  --card:         #FFFFFF;
  --gray-line:    #EEF0F6;
  --text-dark:    #1A0533;
  --text-mid:     #6B3FA0;
  --text-light:   #A882CC;

  /* Shadow & Radius Alignment */
  --shadow-sm:  0 4px 12px rgba(90,26,154,0.02);
  --shadow-md:  0 6px 18px rgba(90,26,154,0.04);
  --shadow-lg:  0 6px 18px rgba(90,26,154,0.04); /* Aligned with profile chip shadow */
  --shadow-purple: 0 4px 12px rgba(123,47,190,0.15);

  --r-card: 16px;
  --r-btn:  12px;
}

/* ── RESET & BASE ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text-dark);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: 100px;
  -webkit-tap-highlight-color: transparent;
}
a { text-decoration:none; color:inherit; }
button { font-family:inherit; cursor:pointer; border:none; background:none; }
img { display:block; }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
@keyframes pulse {
  0%,100% { transform:scale(1); }
  50%      { transform:scale(1.1); }
}

/* ── HERO HEADER MODERN ── */
.header {
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple) 60%, var(--purple-light) 100%);
  padding: 32px 20px 64px;
  animation: fadeUp 0.4s ease both;
}
.header::before {
  content:''; position:absolute; top:-40px; right:-20px;
  width:160px; height:160px;
  border:32px solid rgba(255,255,255,0.05); border-radius:50%;
}
.hero-dots {
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 20px 20px; pointer-events:none;
}
.header-inner {
  max-width: 440px; margin: 0 auto;
  display: flex; align-items:center; justify-content:space-between;
  position: relative; z-index:2;
}
.header-left { display:flex; align-items:center; gap:12px; }

/* ── AVATAR COMPONENT ── */
.avatar-wrap {
  position: relative;
  width: 46px;
  height: 46px;
  flex-shrink: 0;
}
.avatar-dashboard {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.4);
  object-fit: cover;
  background: rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 900;
  color: #fff;
  overflow: hidden;
}
.avatar-online-indicator {
  position: absolute;
  bottom: 1px;
  right: 1px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--green);
  border: 2px solid var(--purple-deep);
  animation: pulse 2s infinite;
  z-index: 3;
}

.header-greeting {
  display: flex; flex-direction:column; gap:1px;
}
.header-sub {
  font-size: 11px; font-weight:600;
  color: rgba(255,255,255,.55);
  letter-spacing: .3px;
}
.header-name {
  font-size: 18px; font-weight:900;
  color: #fff; letter-spacing:-.2px; line-height:1.2;
}

.hdr-actions { display:flex; gap:8px; align-items:center; }
.hdr-btn {
  width:34px; height:34px; border-radius:50%;
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.2);
  display: flex; align-items:center; justify-content:center;
  transition: all .2s; backdrop-filter:blur(10px);
}
.hdr-btn:hover { background:rgba(255,255,255,.2); transform:translateY(-2px); }
.hdr-btn svg {
  width:16px; height:16px;
  stroke:#fff; stroke-width:2.2; fill:none;
}

/* ── BALANCE CARD FINTECH ── */
.balance-wrap {
  max-width:440px; margin:-40px auto 0;
  padding: 0 16px;
  position: relative; z-index:10;
  animation: fadeUp 0.4s 0.08s ease both;
}
.balance-card {
  background: var(--card);
  border-radius: var(--r-card);
  padding: 16px 18px;
  border: 1px solid rgba(234, 213, 250, 0.6);
  box-shadow: 0 6px 18px rgba(90,26,154,0.04);
}
.balance-top {
  display: flex; align-items:center; justify-content:space-between;
  margin-bottom: 14px;
}
.balance-top-left { display:flex; align-items:center; gap:10px; }
.balance-icon-wrap {
  width:36px; height:36px; border-radius:12px;
  background: var(--purple-soft);
  display: flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.balance-icon-wrap svg {
  width:20px; height:20px;
  stroke: var(--purple); stroke-width:2.2; fill:none;
}
.balance-lbl {
  font-size:10px; font-weight:800; color:var(--text-light);
  text-transform:uppercase; letter-spacing:.8px; margin-bottom:1px;
}
.balance-amount {
  font-size:22px; font-weight:900; color:var(--text-dark);
  letter-spacing:-.4px; line-height:1;
}

/* TOP UP BUTTON ALIGNED TO PROFILE STYLE */
.topup-btn {
  background: var(--white);
  color: var(--text-mid);
  border: 1.5px solid var(--gray-line);
  border-radius: var(--r-btn); 
  padding: 8px 14px;
  font-size:12.5px; font-weight:800;
  display: flex; align-items:center; gap:6px;
  transition: all .2s ease;
  white-space: nowrap;
}
.topup-btn:hover { 
  border-color: var(--purple); 
  color: var(--purple); 
  background: var(--purple-soft); 
  box-shadow: 0 4px 12px rgba(123,47,190,0.06); 
}
.topup-btn svg { width:12px; height:12px; stroke:currentColor; stroke-width:2.5; fill:none; }

.balance-divider { height:1px; background:var(--gray-line); margin-bottom:12px; }

.balance-stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.bstat {
  background: var(--white);
  border-radius:12px; padding:10px 12px;
  border: 1px solid #F6F4FA;
  display: flex; align-items:center; gap:8px;
}
.bstat-icon {
  width:26px; height:26px; border-radius:8px;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.bstat-icon.in  { background: var(--green-bg); }
.bstat-icon.out { background: var(--red-bg); }
.bstat-icon svg { width:12px; height:12px; fill:none; stroke-width:2.8; }
.bstat-icon.in  svg { stroke: var(--green); }
.bstat-icon.out svg { stroke: var(--red); }
.bstat-lbl { font-size:10px; font-weight:800; color:var(--text-light); letter-spacing:.3px; margin-bottom:1px; }
.bstat-val { font-size:13px; font-weight:900; color:var(--text-dark); }

/* ── SECTION WRAPPER ── */
.main { max-width:440px; margin:0 auto; padding:16px 16px 0; }

.sec-head {
  display:flex; align-items:center; justify-content:space-between;
  margin: 20px 0 10px 4px;
}
.sec-title { font-size:13px; font-weight:900; color:var(--text-dark); letter-spacing: -0.1px; }
.sec-badge {
  font-size:9px; font-weight:800;
  padding:2px 8px; border-radius:6px; letter-spacing:.4px;
  text-transform: uppercase;
}
.sec-badge.purple  { background:var(--purple-soft); color:var(--purple); border: 1px solid rgba(123,47,190,0.1); }
.sec-badge.orange  { background:#FFF3E0; color:#C05600; border: 1px solid rgba(192,86,0,0.1); }
.sec-badge.blue    { background:#EEF4FF; color:#1D4ED8; border: 1px solid rgba(29,78,216,0.1); }
.sec-badge.teal    { background:var(--green-bg); color:var(--green); border: 1px solid rgba(18,194,138,0.1); }

/* ── VPN MENU GRID ── */
.vpn-grid {
  display: grid; grid-template-columns: repeat(4,1fr); gap:8px;
  background: var(--card);
  border-radius: var(--r-card);
  padding: 12px 8px;
  border: 1px solid var(--gray-line);
  box-shadow: 0 4px 16px rgba(90,26,154,0.04);
  animation: fadeUp .4s .12s ease both;
}
.vm-item {
  display:flex; flex-direction:column; align-items:center; gap:6px;
  padding:6px 4px; border-radius:12px; transition:background .2s;
}
.vm-item:hover  { background:var(--purple-soft); }
.vm-item:active { transform:scale(.93); }

.vm-icon {
  width:42px; height:42px; border-radius:12px;
  overflow:hidden; background:var(--bg);
  border: 1px solid var(--gray-line);
  display:flex; align-items:center; justify-content:center;
  transition:all .2s;
  position:relative; flex-shrink:0;
}
.vm-icon img { width:100%; height:100%; object-fit:cover; }
.vm-item:hover .vm-icon {
  transform:translateY(-3px);
  box-shadow:0 5px 12px rgba(123,47,190,.12);
}
.vm-label {
  font-size:10px; font-weight:800; color:var(--text-mid);
  text-align:center; line-height:1.25;
}

/* ── CATEGORY SCROLL ── */
.cat-card {
  background:var(--card); border-radius:var(--r-card);
  padding:14px 12px; border:1px solid var(--gray-line);
  box-shadow:0 4px 16px rgba(90,26,154,0.04);
  animation:fadeUp .4s .16s ease both;
}
.cat-scroll {
  display:flex; gap:12px; overflow-x:auto; padding-bottom:2px;
  scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.cat-scroll::-webkit-scrollbar { display:none; }
.cat-item {
  display:flex; flex-direction:column; align-items:center; gap:7px;
  flex-shrink:0; scroll-snap-align:start; cursor:pointer;
}
.cat-img {
  width:52px; height:52px; border-radius:14px; overflow:hidden;
  background:var(--bg); border:1px solid var(--gray-line);
  display:flex; align-items:center; justify-content:center;
  transition:all .2s;
}
.cat-img img { width:100%; height:100%; object-fit:cover; }
.cat-item:hover .cat-img {
  transform:translateY(-3px);
  box-shadow:0 6px 14px rgba(123,47,190,.12);
}
.cat-item:active .cat-img { transform:scale(.92); }
.cat-name {
  font-size:10px; font-weight:800; color:var(--text-mid); text-align:center;
  width:60px; line-height:1.3; overflow:hidden;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
}

/* SKEL SHIMMER */
.skel {
  border-radius:14px; height:52px; width:52px; flex-shrink:0;
  background:linear-gradient(90deg, var(--gray-line) 25%, var(--purple-soft) 50%, var(--gray-line) 75%);
  background-size:200% 100%; animation:shimmer 1.4s infinite;
}
.skel-lbl {
  height:9px; width:44px; border-radius:6px; margin:6px auto 0;
  background:linear-gradient(90deg, var(--gray-line) 25%, var(--purple-soft) 50%, var(--gray-line) 75%);
  background-size:200% 100%; animation:shimmer 1.4s infinite;
}

/* ── PROMO BANNERS ── */
.banner-wrap { animation:fadeUp .4s .2s ease both; }
.banner-scroll {
  display:flex; gap:11px; overflow-x:auto;
  scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch;
  scrollbar-width:none; padding:3px 1px 8px;
}
.banner-scroll::-webkit-scrollbar { display:none; }
.banner-card {
  flex:0 0 76vw; max-width:280px;
  aspect-ratio:18/8; border-radius:16px; overflow:hidden;
  background-size:cover; background-position:center;
  scroll-snap-align:start;
  border:1px solid var(--gray-line);
  background-color:var(--card);
  box-shadow:0 4px 16px rgba(90,26,154,0.04);
  transition:transform .2s;
  position:relative;
}
.banner-card:hover { transform:scale(1.015); }
.banner-card::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.15), transparent);
}
.b1 { background-image: url('https://app.isdarprem.net/images/akun2.png'); }
.b2 { background-image: url('https://app.isdarprem.net/images/trial2.png'); }
.b3 { background-image: url('https://app.isdarprem.net/images/ppo.png'); }

/* ── UTILITY SEAMLESS CARDS ── */
.util-section { animation:fadeUp .4s .24s ease both; }
.util-card {
  background:var(--card); border-radius:16px; padding:12px 14px;
  display:flex; align-items:center; gap:12px;
  border:1px solid var(--gray-line); margin-bottom:9px;
  box-shadow:0 4px 16px rgba(90,26,154,0.04);
  transition:all .2s;
}
.util-card:last-child { margin-bottom:0; }
.util-card:hover {
  transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(90,26,154,0.06);
  border-color: rgba(123,47,190,0.3);
}

.util-img {
  width:38px; height:38px; border-radius:12px;
  overflow:hidden; flex-shrink:0; background:var(--bg);
  border:1px solid var(--gray-line);
}
.util-img img { width:100%; height:100%; object-fit:cover; }

.util-body { flex:1; min-width:0; }
.util-title {
  font-size:13.5px; font-weight:800; color:var(--text-dark); margin-bottom:1px;
}
.util-title.admin { color:var(--red); }
.util-sub { font-size:11px; font-weight:600; color:var(--text-light); }
.util-arrow svg {
  width:14px; height:14px; stroke:var(--text-light); stroke-width:2.5; fill:none;
}

/* ─── BOTTOM NAV HARMONIZED ─── */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; background:#fff;
  border-top:1px solid var(--gray-line); display:flex; padding:10px 0 14px;
  box-shadow:0 -4px 20px rgba(90,26,154,0.04); z-index:100; max-width:440px; margin:0 auto;
}
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; text-decoration:none; }
.nav-icon svg { width:20px; height:20px; fill:none; stroke: var(--text-light); stroke-width:2.2; transition: stroke 0.2s; }
.nav-label { font-size:10px; font-weight:800; color:var(--text-light); transition: color 0.2s; }
.nav-item.active .nav-label { color:var(--purple); }
.nav-item.active .nav-icon svg { stroke: var(--purple); }

/* ONLINE DOT */
.online-dot {
  width:8px; height:8px; border-radius:50%; background:var(--green);
  display:inline-block; margin-right:5px; animation:pulse 2s infinite;
}
</style>
</head>

<script>
function getAvatarColor(name){
  const palettes = [
    ['#4285F4','#1A73E8'],
    ['#EA4335','#C5221F'],
    ['#34A853','#188038'],
    ['#FBBC05','#F9AB00'],
    ['#7B2FBE','#5A1A9A'],
    ['#EC4899','#BE185D'],
    ['#06B6D4','#0E7490'],
    ['#F97316','#C2410C'],
    ['#10B981','#047857'],
    ['#6366F1','#4338CA']
  ];
  let hash = 0;
  for(let i = 0; i < name.length; i++){
    hash = name.charCodeAt(i) + ((hash << 5) - hash);
  }
  return palettes[Math.abs(hash) % palettes.length];
}

function renderUserAvatar(userObj) {
  const container = document.getElementById('avatarContainer');
  if (!container) return;

  const name = userObj.username || 'Xtrimer User';

  if (userObj.avatar && userObj.avatar !== '' && !userObj.avatar.includes('via.placeholder.com')) {
    container.innerHTML = `<img src="${userObj.avatar}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;" alt="Profile">`;
    container.style.background = 'none';
  } else {
    container.textContent = name.charAt(0).toUpperCase();
    const colors = getAvatarColor(name);
    container.style.background = `linear-gradient(135deg, ${colors[0]}, ${colors[1]})`;
  }
}

/* ── AUTH CHECK & INITIAL SYNC ── */
const localUser = JSON.parse(localStorage.getItem('user') || 'null');
const token = localStorage.getItem('token') || '';

if (!localUser || !token) {
  localStorage.clear();
  window.location.href = 'index.html';
} else {
  document.getElementById('headerName').textContent = localUser.username || '—';
  renderUserAvatar(localUser);
}

const hdrs = {
  headers: {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${token}`
  }
};

function rupiah(val) {
  return 'Rp ' + Number(val || 0).toLocaleString('id-ID');
}

/* ── PROFILE DATA LOADING ── */
async function loadProfile() {
  try {
    const r = await fetch('/api/profile', hdrs);
    if (!r.ok) throw new Error('Request gagal');
    const d = await r.json();

    if (!d.success || !d.user) {
      localStorage.clear();
      window.location.href = 'index.html';
      return;
    }

    const u = d.user;
    localStorage.setItem('user', JSON.stringify(u));

    document.getElementById('headerName').textContent = u.username || '—';
    renderUserAvatar(u);

    document.getElementById('balanceAmt').textContent = rupiah(u.balance);
    document.getElementById('totalIn').textContent = rupiah(u.total_in || 0);
    document.getElementById('totalOut').textContent = rupiah(u.total_out || 0);

    if (u.role === 'admin') {
      document.getElementById('adminSlot').innerHTML = `
        <a class="util-card" href="admin.html">
          <div class="util-img">
            <img src="https://app.isdarprem.net/images/paneladmin.jpeg" alt="Admin" onerror="this.src='https://placehold.co/40/E84040/fff?text=ADM'">
          </div>
          <div class="util-body">
            <div class="util-title admin">Admin Panel</div>
            <div class="util-sub">Kelola user, produk & transaksi</div>
          </div>
          <div class="util-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="#A882CC" stroke-width="2.5">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
        </a>`;
    }
  } catch (e) {
    console.error('Gagal load profile:', e);
    localStorage.clear();
    window.location.href = 'index.html';
  }
}

/* ── CATEGORIES LOADING ── */
const HIDDEN = ['gas','tv','tv kabel','gas pln','gas elpiji','tagihan gas'];
const IMG_MAP = [
  { keys:['pulsa','sms','telp'],       img:'https://app.isdarprem.net/images/smsdantelpon.jpeg' },
  { keys:['data'],                     img:'https://app.isdarprem.net/images/data.png' },
  { keys:['pln','listrik','token'],    img:'https://app.isdarprem.net/images/pln.png' },
  { keys:['e-wallet','ewallet','e-money','emoney'], img:'https://app.isdarprem.net/images/ewallet.jpg' },
  { keys:['game','gaming'],            img:'https://app.isdarprem.net/images/games.jpg' },
  { keys:['voucher'],                  img:'https://app.isdarprem.net/images/voucher.png' },
  { keys:['perdana','esim','e-sim'],   img:'https://app.isdarprem.net/images/aktivasiperdana.jpg' },
  { keys:['masa aktif','masa'],        img:'https://app.isdarprem.net/images/masaaktif.jpg' },
];
function getImg(name) {
  const k = name.toLowerCase();
  for (const { keys, img } of IMG_MAP) {
    if (keys.some(x => k.includes(x))) return img;
  }
  return 'https://app.isdarprem.net/images/images.png';
}

async function loadCategories() {
  try {
    const r = await fetch('/api/ppob/categories', hdrs);
    if (!r.ok) throw new Error('not ok');
    const d = await r.json();
    const grid  = document.getElementById('catGrid');
    const badge = document.getElementById('catCount');
    if (d.success && d.categories?.length) {
      const visible = d.categories.filter(
        c => !HIDDEN.some(h => c.toLowerCase().includes(h))
      );
      badge.textContent = visible.length + ' Kategori';
      grid.innerHTML = '';
      visible.forEach(cat => {
        const el = document.createElement('a');
        el.className = 'cat-item';
        el.href = `ppob.html?cat=${encodeURIComponent(cat)}`;
        const initial = encodeURIComponent(cat[0] || '?');
        el.innerHTML = `
          <div class="cat-img">
            <img src="${getImg(cat)}" alt="${cat}"
              onerror="this.src='https://placehold.co/54/7B2FBE/fff?text=${initial}'">
          </div>
          <div class="cat-name">${cat}</div>`;
        grid.appendChild(el);
      });
    } else {
      showCatErr();
    }
  } catch (e) {
    const demo = ['Pulsa','Paket Data','Token PLN','E-Wallet','Games','Voucher','Perdana','Masa Active'];
    const grid  = document.getElementById('catGrid');
    const badge = document.getElementById('catCount');
    badge.textContent = demo.length + ' Kategori';
    grid.innerHTML = '';
    demo.forEach(cat => {
      const el = document.createElement('a');
      el.className = 'cat-item';
      el.href = '#';
      const initial = encodeURIComponent(cat[0] || '?');
      el.innerHTML = `
        <div class="cat-img">
          <img src="${getImg(cat)}" alt="${cat}"
            onerror="this.src='https://placehold.co/54/7B2FBE/fff?text=${initial}'">
        </div>
        <div class="cat-name">${cat}</div>`;
      grid.appendChild(el);
    });
  }
}

function showCatErr() {
  document.getElementById('catGrid').innerHTML =
    '<div style="padding:16px;font-size:12px;font-weight:700;color:var(--text-light);">Gagal memuat. Coba lagi nanti.</div>';
  const b = document.getElementById('catCount');
  b.textContent = 'Offline';
  b.style.cssText = 'background:var(--red-bg);color:var(--red);border:1px solid rgba(232,64,64,0.1);';
}

/* ── RUN OVERLOAD ── */
loadProfile();
loadCategories();
</script>
