<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h2>Dashboard User</h2>

<p id="welcome"></p>

<button onclick="logout()">
    Logout
</button>

<script>

const user =
    JSON.parse(localStorage.getItem('user'));

if (!user) {
    window.location.href = 'index.html';
}

document.getElementById('welcome').innerHTML =
    `Halo ${user.username}`;

function logout() {
    localStorage.removeItem('user');
    window.location.href = 'index.html';
}

</script>

</body>
</html>
