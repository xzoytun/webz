<style>
/* ── PREMIUM SYSTEM TOKENS ── */
:root {
  --purple:       #6366F1; /* Modern Indigo/Purple */
  --purple-dark:  #4F46E5;
  --purple-deep:  #1E1B4B;
  --purple-light: #818CF8;
  --purple-soft:  #F5F3FF;
  --purple-mid:   #E0E7FF;
  --accent:       #FF6B2B;
  --accent2:      #FBBF24;
  --green:        #10B981;
  --green-bg:     #ECFDF5;
  --red:          #EF4444;
  --red-bg:       #FEF2F2;
  --white:        #FFFFFF;
  --bg:           #FAFAFE;
  --card:         #FFFFFF;
  --gray-line:    #F1F5F9;
  --text-dark:    #0F172A;
  --text-mid:     #475569;
  --text-light:   #94A3B8;

  /* Soft Multi-layered Shadows */
  --shadow-sm:  0 2px 8px rgba(99, 102, 241, 0.04);
  --shadow-md:  0 12px 34px rgba(99, 102, 241, 0.06);
  --shadow-lg:  0 20px 40px rgba(15, 23, 42, 0.06);
  
  --r-card: 20px;
  --r-btn:  14px;
}

html[data-theme="dark"] {
  --purple:       #818CF8;
  --purple-dark:  #6366F1;
  --purple-deep:  #0F0E17;
  --purple-light: #A5B4FC;
  --purple-soft:  #1E1B4B;
  --purple-mid:   #312E81;
  --green-bg:     #064E3B;
  --red-bg:       #7F1D1D;
  --white:        #1E1E24;
  --bg:           #121214;
  --card:         #1A1A1E;
  --gray-line:    #2A2A32;
  --text-dark:    #F8FAFC;
  --text-mid:     #CBD5E1;
  --text-light:   #64748B;
  --shadow-md:    0 12px 34px rgba(0, 0, 0, 0.3);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text-dark);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: 100px;
  -webkit-tap-highlight-color: transparent;
  transition: background .3s cubic-bezier(0.4, 0, 0.2, 1), color .3s ease;
}

/* ── ANIMATIONS ── */
@keyframes premiumFadeUp {
  from { opacity: 0; transform: translateY(20px); filter: blur(4px); }
  to   { opacity: 1; transform: translateY(0); filter: blur(0); }
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ── HEADER & HERO ── */
.header {
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, var(--purple-deep) 0%, #312E81 50%, var(--purple-dark) 100%);
  padding: 40px 24px 70px;
}
.header::before {
  content:''; position:absolute; top:-50px; right:-30px;
  width:200px; height:200px;
  background: radial-gradient(circle, rgba(99,102,241,0.2) 0%, transparent 70%);
  border-radius: 50%;
}
.hero-dots {
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.04) 1.5px, transparent 1.5px);
  background-size: 16px 16px; pointer-events:none;
}
.header-inner {
  max-width: 440px; margin: 0 auto;
  display: flex; align-items:center; justify-content:space-between;
}
.header-left { display:flex; align-items:center; gap:14px; }

.avatar-wrap { position: relative; width: 48px; height: 48px; }
.avatar-dashboard {
  width: 100%; height: 100%; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2);
  object-fit: cover; display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; color: #fff; overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.avatar-online-indicator {
  position: absolute; bottom: 2px; right: 2px; width: 11px; height: 11px;
  border-radius: 50%; background: var(--green); border: 2.5px solid var(--purple-deep);
}

.header-greeting { display: flex; flex-direction:column; gap:2px; }
.header-sub { font-size: 12px; font-weight:500; color: rgba(255,255,255,.6); }
.header-name { font-size: 18px; font-weight:700; color: #fff; letter-spacing:-.3px; }

.hdr-actions { display:flex; gap:10px; align-items:center; }
.hdr-btn {
  width:38px; height:38px; border-radius:50%;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.12);
  display: flex; align-items:center; justify-content:center;
  transition: all .2s cubic-bezier(0.4, 0, 0.2, 1); backdrop-filter:blur(8px);
}
.hdr-btn:active { transform: scale(0.92); background:rgba(255,255,255,.15); }
.hdr-btn svg { width:18px; height:18px; stroke:#fff; stroke-width:2; fill:none; }

/* ── WALLET / BALANCE CARD ── */
.balance-wrap {
  max-width:440px; margin:-45px auto 0; padding: 0 20px;
  position: relative; z-index:10;
  animation: premiumFadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
}
.balance-card {
  background: var(--card); border-radius: var(--r-card); padding: 20px;
  border: 1px solid var(--gray-line); box-shadow: var(--shadow-lg);
}
.balance-top { display: flex; align-items:center; justify-content:space-between; margin-bottom: 18px; }
.balance-top-left { display:flex; align-items:center; gap:12px; }
.balance-icon-wrap {
  width:40px; height:40px; border-radius:14px; background: var(--purple-soft);
  display: flex; align-items:center; justify-content:center;
}
.balance-icon-wrap svg { width:22px; height:22px; stroke: var(--purple); stroke-width:2; fill:none; }
.balance-lbl { font-size:11px; font-weight:600; color:var(--text-light); text-transform:uppercase; letter-spacing:.8px; }
.balance-amount { font-size:24px; font-weight:800; color:var(--text-dark); letter-spacing:-0.5px; margin-top:2px; }

.topup-btn {
  background: var(--purple); color: #FFF; border-radius: var(--r-btn); 
  padding: 10px 16px; font-size:13px; font-weight:700;
  display: flex; align-items:center; gap:6px; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
  transition: all .2s; white-space: nowrap;
}
.topup-btn:active { transform: scale(0.95); box-shadow: none; background: var(--purple-dark); }
.topup-btn svg { width:14px; height:14px; stroke:currentColor; stroke-width:2.5; fill:none; }

.balance-divider { height:1px; background:var(--gray-line); margin-bottom:16px; }
.balance-stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.bstat {
  background: var(--bg); border-radius:14px; padding:12px;
  border: 1px solid transparent; display: flex; align-items:center; gap:10px;
}
.bstat-icon { width:28px; height:28px; border-radius:10px; display:flex; align-items:center; justify-content:center; }
.bstat-icon.in  { background: var(--green-bg); }
.bstat-icon.out { background: var(--red-bg); }
.bstat-icon svg { width:14px; height:14px; fill:none; stroke-width:2.5; }
.bstat-icon.in  svg { stroke: var(--green); }
.bstat-icon.out svg { stroke: var(--red); }
.bstat-lbl { font-size:11px; font-weight:500; color:var(--text-light); }
.bstat-val { font-size:14px; font-weight:700; color:var(--text-dark); margin-top:1px; }

/* ── GRID SYSTEM & CARDS ── */
.main { max-width:440px; margin:0 auto; padding:20px 20px 0; }
.sec-head { display:flex; align-items:center; justify-content:space-between; margin: 24px 0 12px 2px; }
.sec-title { font-size:15px; font-weight:800; color:var(--text-dark); letter-spacing:-0.2px; }
.sec-badge { font-size:10px; font-weight:700; padding:4px 10px; border-radius:8px; text-transform: uppercase; }
.sec-badge.purple  { background:var(--purple-soft); color:var(--purple); }
.sec-badge.orange  { background:#FFF7ED; color:#EA580C; }
.sec-badge.blue    { background:#EFF6FF; color:#2563EB; }
.sec-badge.teal    { background:var(--green-bg); color:var(--green); }

/* 4 Column App-Style Layout */
.cat-card, .vpn-grid {
  background:var(--card); border-radius:var(--r-card); padding: 16px 12px;
  border:1px solid var(--gray-line); box-shadow: var(--shadow-sm);
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px 8px;
  animation: premiumFadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
}
.cat-item, .vm-item { display:flex; flex-direction:column; align-items:center; gap:8px; text-align:center; }
.cat-item:active, .vm-item:active { transform:scale(0.9); }

.cat-img, .vm-icon {

  background:var(--bg); border:1px solid var(--gray-line);
  display:flex; align-items:center; justify-content:center;
  transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.cat-img img, .vm-icon img { width:100%; height:100%; object-fit:cover; }
.cat-name, .vm-label {
  font-size:11px; font-weight:600; color:var(--text-mid);
  line-height:1.3; width: 100%; max-width: 72px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

/* ── BANNERS / CAROUSEL ── */
.banner-wrap { animation: premiumFadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
.banner-scroll {
  display:flex; gap:14px; overflow-x:auto; scroll-snap-type:x mandatory;
  padding-bottom: 6px; -webkit-overflow-scrolling:touch; scrollbar-width:none;
}
.banner-scroll::-webkit-scrollbar { display:none; }
.banner-card {
  flex:0 0 80vw; max-width:300px; aspect-ratio:21/9; border-radius:18px;
  overflow:hidden; background-size:cover; background-position:center;
  scroll-snap-align:start; border:1px solid var(--gray-line); box-shadow: var(--shadow-sm);
}

/* ── UTILITY LISTS (HELP & ADMIN) ── */
.util-card {
  background:var(--card); border-radius:18px; padding:14px 16px;
  display:flex; align-items:center; gap:14px; border:1px solid var(--gray-line);
  margin-bottom:12px; box-shadow: var(--shadow-sm); transition: all 0.2s ease;
}
.util-card:active { transform: scale(0.98); background: var(--purple-soft); }
.util-img { width:42px; height:42px; border-radius:14px; overflow:hidden; border:1px solid var(--gray-line); }
.util-img img { width:100%; height:100%; object-fit:cover; }
.util-body { flex:1; }
.util-title { font-size:14px; font-weight:700; color:var(--text-dark); margin-bottom:2px; }
.util-title.admin { color:var(--red); }
.util-sub { font-size:11.5px; font-weight:500; color:var(--text-light); }
.util-arrow svg { width:16px; height:16px; stroke:var(--text-light); stroke-width:2.5; fill:none; }

/* ── SKELETON LOADING ── */
.skel {
  border-radius:16px; height:48px; width:48px;
  background: linear-gradient(90deg, var(--gray-line) 25%, var(--purple-soft) 50%, var(--gray-line) 75%);
  background-size:200% 100%; animation:shimmer 1.4s infinite linear;
}
.skel-lbl {
  height:10px; width:42px; border-radius:6px; margin-top:4px;
  background: linear-gradient(90deg, var(--gray-line) 25%, var(--purple-soft) 50%, var(--gray-line) 75%);
  background-size:200% 100%; animation:shimmer 1.4s infinite linear;
}

/* ── BOTTOM NAVIGATION ── */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; background: var(--card);
  border-top:1px solid var(--gray-line); display:flex; padding:12px 0 calc(12px + env(safe-area-inset-bottom, 0px));
  box-shadow: 0 -10px 30px rgba(15, 23, 42, 0.04); z-index:100; max-width:440px; margin:0 auto;
}
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
.nav-icon svg { width:22px; height:22px; fill:none; stroke: var(--text-light); stroke-width:2.2; transition: all 0.2s; }
.nav-label { font-size:11px; font-weight:600; color:var(--text-light); }
.nav-item.active .nav-label { color:var(--purple); font-weight: 700; }
.nav-item.active .nav-icon svg { stroke: var(--purple); transform: translateY(-1px); }

.online-dot { width:7px; height:7px; border-radius:50%; background:var(--green); display:inline-block; margin-right:6px; }
</style>
</head>

<script>
/* JavaScript logic bawaan Anda tetap utuh agar fungsionalitas API tidak rusak */
(function initTheme(){
  const saved = localStorage.getItem('theme');
  if (saved === 'dark' || saved === 'light') {
    document.documentElement.setAttribute('data-theme', saved);
  } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  } else {
    document.documentElement.setAttribute('data-theme', 'light');
  }
})();

document.getElementById('themeToggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
});

function getAvatarColor(name){
  const palettes = [['#4F46E5','#6366F1'],['#EF4444','#DC2626'],['#10B981','#059669'],['#F59E0B','#D97706']];
  let hash = 0; for(let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  return palettes[Math.abs(hash) % palettes.length];
}

function renderUserAvatar(userObj) {
  const container = document.getElementById('avatarContainer'); if (!container) return;
  const name = userObj.username || 'Xtrimer User';
  if (userObj.avatar && userObj.avatar !== '' && !userObj.avatar.includes('via.placeholder.com')) {
    container.innerHTML = `<img src="${userObj.avatar}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;" alt="Profile">`;
    container.style.background = 'none';
  } else {
    container.textContent = name.charAt(0).toUpperCase();
    const colors = getAvatarColor(name);
    container.style.background = `linear-gradient(135deg, ${colors[0]}, ${colors[1]})`;
  }
}

const localUser = JSON.parse(localStorage.getItem('user') || 'null');
const token = localStorage.getItem('token') || '';

if (!localUser || !token) {
  localStorage.clear();
  window.location.href = 'index.html';
} else {
  document.getElementById('headerName').textContent = localUser.username || '—';
  renderUserAvatar(localUser);
}

const hdrs = { headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` } };
function rupiah(val) { return 'Rp ' + Number(val || 0).toLocaleString('id-ID'); }

async function loadProfile() {
  try {
    const r = await fetch('/api/profile', hdrs);
    if (!r.ok) throw new Error('fail');
    const d = await r.json();
    if (!d.success || !d.user) { localStorage.clear(); window.location.href = 'index.html'; return; }
    const u = d.user;
    localStorage.setItem('user', JSON.stringify(u));
    document.getElementById('headerName').textContent = u.username || '—';
    renderUserAvatar(u);
    document.getElementById('balanceAmt').textContent = rupiah(u.balance);
    document.getElementById('totalIn').textContent = rupiah(u.total_in || 0);
    document.getElementById('totalOut').textContent = rupiah(u.total_out || 0);
    if (u.role === 'admin') {
      document.getElementById('adminSlot').innerHTML = `
        <a class="util-card" href="admin.html">
          <div class="util-img"><img src="https://app.isdarprem.net/images/paneladmin.jpeg" alt="Admin" onerror="this.src='https://placehold.co/40/EF4444/fff?text=ADM'"></div>
          <div class="util-body">
            <div class="util-title admin">Admin Panel</div>
            <div class="util-sub">Kelola user, produk & transaksi dashboard</div>
          </div>
          <div class="util-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
        </a>`;
    }
  } catch (e) { console.error(e); }
}

const HIDDEN = ['gas','tv','tv kabel','gas pln','gas elpiji','tagihan gas'];
const IMG_MAP = [
  { keys:['aktivasi voucher'], img:'https://app.isdarprem.net/images/aktisivasivoucher.jpg' },
  { keys:['masa aktif','masa'], img:'https://app.isdarprem.net/images/masa-aktif.jpg' },
  { keys:['e-wallet','ewallet','e-money','emoney'], img:'https://app.isdarprem.net/images/ewallet.jpg' },
  { keys:['perdana','esim','e-sim'], img:'https://app.isdarprem.net/images/aktivasiperdana.jpg' },
  { keys:['pln','listrik','token'], img:'https://app.isdarprem.net/images/lampu1.png' },
  { keys:['sms','telp'], img:'https://app.isdarprem.net/images/sms1.png' },
  { keys:['pulsa'], img:'https://app.isdarprem.net/images/pulsa1.png' },
  { keys:['data'], img:'https://app.isdarprem.net/images/internet1.png' },
  { keys:['game','gaming'], img:'https://app.isdarprem.net/images/games.jpg' },
  { keys:['voucher'], img:'https://app.isdarprem.net/images/voucher.png' },
];
function getImg(name) {
  const k = name.toLowerCase();
  for (const { keys, img } of IMG_MAP) { if (keys.some(x => k.includes(x))) return img; }
  return 'https://app.isdarprem.net/images/images.png';
}

async function loadCategories() {
  try {
    const r = await fetch('/api/ppob/categories', hdrs);
    const d = await r.json();
    const grid = document.getElementById('catGrid');
    const badge = document.getElementById('catCount');
    if (d.success && d.categories?.length) {
      const visible = d.categories.filter(c => !HIDDEN.some(h => c.toLowerCase().includes(h)));
      badge.textContent = visible.length + ' Kategori'; grid.innerHTML = '';
      visible.forEach(cat => {
        const el = document.createElement('a'); el.className = 'cat-item'; el.href = `ppob.html?cat=${encodeURIComponent(cat)}`;
        const initial = encodeURIComponent(cat[0] || '?');
        el.innerHTML = `<div class="cat-img"><img src="${getImg(cat)}" alt="${cat}" onerror="this.src='https://placehold.co/48/6366F1/fff?text=${initial}'"></div><div class="cat-name">${cat}</div>`;
        grid.appendChild(el);
      });
    } else { showCatErr(); }
  } catch (e) {
    const demo = ['Pulsa','Paket Data','Token PLN','E-Wallet','Games','Voucher','Perdana','Masa Aktif'];
    const grid = document.getElementById('catGrid'); const badge = document.getElementById('catCount');
    badge.textContent = demo.length + ' Kategori'; grid.innerHTML = '';
    demo.forEach(cat => {
      const el = document.createElement('a'); el.className = 'cat-item'; el.href = '#';
      const initial = encodeURIComponent(cat[0] || '?');
      el.innerHTML = `<div class="cat-img"><img src="${getImg(cat)}" alt="${cat}" onerror="this.src='https://placehold.co/48/6366F1/fff?text=${initial}'"></div><div class="cat-name">${cat}</div>`;
      grid.appendChild(el);
    });
  }
}
function showCatErr() {
  document.getElementById('catGrid').innerHTML = '<div style="padding:16px;font-size:12px;font-weight:600;color:var(--text-light);grid-column: span 4; text-align:center;">Gagal memuat.</div>';
}
loadProfile(); loadCategories();
</script>
</body>
</html>
