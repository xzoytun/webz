<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary:      #7B2FBE;
  --primary-dark: #5A1A9A;
  --primary-deep: #3D0F72;
  --primary-soft: #F3EAFD;
  --primary-mid:  #EAD5FA;
  --green:        #12C28A;
  --red:          #E84040;

  --bg:           #F5F6FA;
  --card-bg:      #FFFFFF;
  --text-dark:    #1A1A2E;
  --text-mid:     #555577;
  --text-light:   #9999BB;
  --border:       #EEEEF5;
  --nav-bg:       #FFFFFF;

  --icon-bg:      #EEF9F5;
  --icon-color:   #12C28A;
}

[data-theme="dark"] {
  --bg:           #0F0A1E;
  --card-bg:      #1A1030;
  --text-dark:    #F0EEFF;
  --text-mid:     #A090CC;
  --text-light:   #665588;
  --border:       #2A1D42;
  --nav-bg:       #150F28;
  --primary-soft: #2D1A50;
  --primary-mid:  #3D2265;
  --icon-bg:      #1A2E24;
  --icon-color:   #12C28A;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  overflow-x: hidden;
  padding-bottom: 90px;
  transition: background 0.3s, color 0.3s;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, var(--primary-deep) 0%, var(--primary) 60%, #A05DE0 100%);
  padding: 18px 20px 22px;
  position: relative; overflow: hidden;
}
.header-dots {
  position: absolute; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 20px 20px; pointer-events: none;
}
.header-circle1 {
  position: absolute; top: -40px; right: -40px;
  width: 140px; height: 140px; border-radius: 50%;
  background: rgba(255,255,255,0.06); pointer-events: none;
}
.header-circle2 {
  position: absolute; bottom: -20px; left: 30px;
  width: 80px; height: 80px; border-radius: 50%;
  background: rgba(255,255,255,0.04); pointer-events: none;
}
.header-inner {
  max-width: 440px; margin: 0 auto;
  display: flex; align-items: center; gap: 12px;
  position: relative; z-index: 2;
}
.header-avatar {
  width: 46px; height: 46px; border-radius: 14px;
  object-fit: cover; border: 2px solid rgba(255,255,255,0.3);
  flex-shrink: 0; background: rgba(255,255,255,0.1);
}
.header-text { flex: 1; }
.header-greeting { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.6); margin-bottom: 2px; }
.header-name { font-size: 17px; font-weight: 900; color: #fff; letter-spacing: -0.3px; }
.header-actions { display: flex; gap: 8px; }
.hdr-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  transition: all 0.2s; backdrop-filter: blur(6px);
}
.hdr-btn:hover { background: rgba(255,255,255,0.24); }
.hdr-btn svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2.2; }
.icon-sun { display: none; }
.icon-moon { display: block; }
[data-theme="dark"] .icon-sun  { display: block; }
[data-theme="dark"] .icon-moon { display: none; }

/* ── BALANCE ── */
.balance-section {
  max-width: 440px; margin: 0 auto;
  padding: 14px 16px 0;
  animation: fadeUp 0.35s 0.05s ease both;
}
.balance-card {
  background: var(--card-bg);
  border-radius: 18px;
  padding: 16px 18px;
  border: 1px solid var(--border);
  box-shadow: 0 4px 20px rgba(90,26,154,0.07);
  display: flex; align-items: center; gap: 14px;
  transition: background 0.3s, border-color 0.3s;
}
.balance-icon {
  width: 44px; height: 44px; border-radius: 13px;
  background: var(--primary-soft);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.balance-icon svg { width: 20px; height: 20px; fill: none; stroke: var(--primary); stroke-width: 2.2; }
.balance-body { flex: 1; }
.balance-lbl { font-size: 10px; font-weight: 800; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 2px; }
.balance-amt { font-size: 22px; font-weight: 900; color: var(--text-dark); letter-spacing: -0.5px; }
.balance-topup {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  color: #fff; border: none; border-radius: 12px; padding: 10px 16px;
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 12px;
  cursor: pointer; display: flex; align-items: center; gap: 5px; text-decoration: none;
  white-space: nowrap; transition: all 0.15s; flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(90,26,154,0.25);
}
.balance-topup:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(90,26,154,0.35); }
.balance-topup svg { width: 13px; height: 13px; fill: none; stroke: #fff; stroke-width: 2.5; }

/* ── CONTAINER ── */
.container { padding: 16px 16px 0; max-width: 440px; margin: 0 auto; }

.sec-label {
  font-size: 14px; font-weight: 900; color: var(--text-dark);
  margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between;
}
.sec-label-left { display: flex; align-items: center; gap: 8px; }
.sec-label-left span { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 20px; }
.sec-see-all { font-size: 11px; font-weight: 800; color: var(--primary); text-decoration: none; }

/* ── QUICK MENU ── */
.quick-menu {
  background: var(--card-bg); border-radius: 18px;
  padding: 16px 12px; margin-bottom: 16px;
  border: 1px solid var(--border);
  box-shadow: 0 2px 12px rgba(90,26,154,0.04);
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
  animation: fadeUp 0.35s 0.08s ease both;
  transition: background 0.3s, border-color 0.3s;
}
.qm-item { display: flex; flex-direction: column; align-items: center; gap: 7px; text-decoration: none; padding: 4px 2px; }
.qm-icon {
  width: 50px; height: 50px; border-radius: 15px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; transition: transform 0.2s, box-shadow 0.2s;
}
.qm-icon img { width: 50px; height: 50px; object-fit: cover; border-radius: 15px; display: block; }
.qm-item:hover .qm-icon { transform: translateY(-3px); box-shadow: 0 8px 18px rgba(90,26,154,0.2); }
.qm-item:active .qm-icon { transform: scale(0.93); }
.qm-label { font-size: 10px; font-weight: 800; color: var(--text-mid); text-align: center; line-height: 1.3; }

/* ── CATEGORIES ── */
.cat-section {
  background: var(--card-bg); border-radius: 18px;
  padding: 16px 14px; margin-bottom: 16px;
  border: 1px solid var(--border);
  box-shadow: 0 2px 12px rgba(90,26,154,0.04);
  animation: fadeUp 0.35s 0.11s ease both;
  transition: background 0.3s, border-color 0.3s;
}
.cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.cat-item { display: flex; flex-direction: column; align-items: center; gap: 6px; text-decoration: none; }
.cat-icon-wrap {
  width: 52px; height: 52px; border-radius: 16px;
  overflow: hidden; display: flex; align-items: center; justify-content: center;
  background: var(--icon-bg);
  transition: transform 0.18s, box-shadow 0.18s;
}
.cat-icon-wrap img { width: 52px; height: 52px; object-fit: cover; display: block; }
.cat-item:hover .cat-icon-wrap { transform: translateY(-2px); box-shadow: 0 6px 14px rgba(0,0,0,0.1); }
.cat-item:active .cat-icon-wrap { transform: scale(0.93); }
.cat-name { font-size: 10px; font-weight: 800; color: var(--text-mid); text-align: center; line-height: 1.3; max-width: 58px; word-break: break-word; }

.cat-skeleton {
  border-radius: 16px; height: 52px; width: 52px; margin: 0 auto;
  background: linear-gradient(90deg, var(--border) 25%, var(--primary-soft) 50%, var(--border) 75%);
  background-size: 200% 100%; animation: shimmer 1.4s infinite;
}
.cat-skeleton-label {
  width: 44px; height: 9px; border-radius: 5px; margin: 0 auto;
  background: linear-gradient(90deg, var(--border) 25%, var(--primary-soft) 50%, var(--border) 75%);
  background-size: 200% 100%; animation: shimmer 1.4s infinite;
}

/* ── BANNER ── */
.banner-section {
  margin-bottom: 16px;
  animation: fadeUp 0.35s 0.14s ease both;
}
.banner-scroll {
  display: flex; gap: 10px; overflow-x: auto;
  scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; padding-bottom: 4px;
}
.banner-scroll::-webkit-scrollbar { display: none; }
.banner-card {
  flex: 0 0 80vw; max-width: 300px;
  aspect-ratio: 16/9; border-radius: 14px; overflow: hidden;
  background-size: cover; background-position: center;
  scroll-snap-align: start;
  box-shadow: 0 4px 14px rgba(0,0,0,0.1);
  border: 1px solid var(--border);
  background-color: var(--card-bg);
  transition: border-color 0.3s;
}
.banner-1 { background-image: url('https://app.isdarprem.net/images/akun2.png'); }
.banner-2 { background-image: url('https://app.isdarprem.net/images/trial2.png'); }
.banner-3 { background-image: url('https://app.isdarprem.net/images/ppo.png'); }

/* ── UTILITY ── */
.util-section {
  margin-bottom: 16px;
  animation: fadeUp 0.35s 0.17s ease both;
}
.util-card {
  background: var(--card-bg); border-radius: 14px; padding: 13px 14px;
  display: flex; align-items: center; gap: 12px;
  border: 1px solid var(--border); text-decoration: none; margin-bottom: 10px;
  transition: all 0.18s;
}
.util-card:last-child { margin-bottom: 0; }
.util-card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.07); }
.util-icon-img {
  width: 40px; height: 40px; border-radius: 12px;
  overflow: hidden; flex-shrink: 0;
}
.util-icon-img img { width: 40px; height: 40px; object-fit: cover; display: block; }
.util-body { flex: 1; }
.util-title { font-size: 13px; font-weight: 800; color: var(--text-dark); }
.util-desc { font-size: 10.5px; color: var(--text-light); font-weight: 600; margin-top: 1px; }
.util-arrow { display: flex; align-items: center; }
.util-arrow svg { width: 14px; height: 14px; fill: none; stroke: var(--text-light); stroke-width: 2.5; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--nav-bg); border-top: 1px solid var(--border);
  display: flex; padding: 10px 0 16px;
  box-shadow: 0 -2px 16px rgba(0,0,0,0.06); z-index: 100;
  transition: background 0.3s, border-color 0.3s;
}
.bnav-inner { display: flex; width: 100%; max-width: 440px; margin: 0 auto; }
.bnav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; text-decoration: none; }
.bnav-icon { position: relative; }
.bnav-icon svg { width: 22px; height: 22px; fill: none; stroke: var(--text-light); stroke-width: 2; transition: stroke 0.2s; }
.bnav-label { font-size: 10px; font-weight: 800; color: var(--text-light); transition: color 0.2s; }
.bnav-item.active .bnav-label { color: var(--primary); }
.bnav-item.active .bnav-icon svg { stroke: var(--primary); }
.bnav-active-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--primary); margin: 1px auto 0;
}
</style>
</head>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('xt-theme', next);
}
(function() {
  const saved = localStorage.getItem('xt-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
})();

const localUser = JSON.parse(localStorage.getItem('user'));
if (!localUser) window.location.href = 'index.html';

const token = localStorage.getItem('token') || '';
const getHeaders = () => ({ 'Content-Type':'application/json', 'Authorization':`Bearer ${token}` });

const HIDDEN_CATEGORIES = ['gas','tv','tv kabel','gas pln','gas elpiji','tagihan gas'];

  // Aktivasi Voucher harus di atas 'voucher' biar gak salah match
  { keys: ['aktivasi voucher'], img: 'https://app.isdarprem.net/images/aktisivasivoucher.jpg' },
  { keys: ['voucher'],      img: 'https://app.isdarprem.net/images/voucher.png' },

  { keys: ['aktivasi perdana'], img: 'https://app.isdarprem.net/images/aktivasiperdana.jpg' },
  { keys: ['perdana'],      img: 'https://app.isdarprem.net/images/aktivasiperdana.jpg' },

  { keys: ['topup','top up','top-up','malaysia','china','vietnam','thailand','singapore','philippines','bundling'], img: 'https://app.isdarprem.net/images/ewallet.jpg' },
];

function getCatImg(catName) {
  const key = catName.toLowerCase();
  for (const { keys, img } of CAT_IMG_MAP) {
    if (keys.some(k => key.includes(k))) return img;
  }
  return 'https://app.isdarprem.net/images/images.png';
}

async function loadProfile() {
  try {
    const res = await fetch('/api/profile', { headers: { Authorization: 'Bearer ' + token } });
    const result = await res.json();
    if (!result.success) { localStorage.clear(); window.location.href = 'index.html'; return; }
    const u = result.user;
    document.getElementById('balance').innerText = 'Rp ' + Number(u.balance || 0).toLocaleString('id-ID');
    if (u.role === 'admin') {
      document.getElementById('adminSection').innerHTML = `
        <a class="util-card" href="admin.html">
          <div class="util-icon-img">
            <img src="https://app.isdarprem.net/images/paneladmin.jpeg" alt="Admin">
          </div>
          <div class="util-body">
            <div class="util-title" style="color:#E84040;">Admin Kontrol Panel</div>
            <div class="util-desc">Kelola user, produk &amp; transaksi</div>
          </div>
          <div class="util-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="#9999BB" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></div>
        </a>`;
    }
  } catch(e) { console.error(e); }
}

async function loadCategories() {
  try {
    const res = await fetch('/api/ppob/categories', { headers: getHeaders() });
    const data = await res.json();
    const grid = document.getElementById('categoryGrid');
    const pill = document.getElementById('categoryCount');
    grid.innerHTML = '';
    if (data.success) {
      const visible = data.categories.filter(c => !HIDDEN_CATEGORIES.some(h => c.toLowerCase().includes(h)));
      pill.textContent = visible.length + ' kategori';
      visible.forEach(cat => {
        const imgSrc = getCatImg(cat);
        const a = document.createElement('a');
        a.className = 'cat-item';
        a.href = `ppob.html?cat=${encodeURIComponent(cat)}`;
        a.innerHTML = `
          <div class="cat-icon-wrap">
            <img src="${imgSrc}" alt="${cat}">
          </div>
          <div class="cat-name">${cat}</div>`;
        grid.appendChild(a);
      });
    } else {
      pill.textContent = 'Error';
    }
  } catch(e) {
    document.getElementById('categoryCount').textContent = 'Error';
  }
}

loadProfile();
loadCategories();
</script>
</body>
</html>
