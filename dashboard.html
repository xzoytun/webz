<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Xtrimer — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── TOKENS UNGULIZED ── */
:root {
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #3D0F72;
  --purple-light: #9B4FDE;
  --purple-soft:  #F3EAFD;
  --purple-mid:   #EAD5FA;
  --accent:       #FF6B2B;
  --accent2:      #FFD600;
  --green:        #12C28A;
  --green-bg:     #E6FAF4;
  --red:          #E84040;
  --red-bg:       #FFECEC;
  --white:        #FFFFFF;
  --bg: #F3EEFA;
  --card:         #FFFFFF;
  --gray-line:    #EEF0F6;
  --text-dark:    #1A0533;
  --text-mid:     #6B3FA0;
  --text-light:   #A882CC;

  /* Adaptive Variables mapping */
  --c-bg:         var(--bg);
  --c-surface:    var(--white);
  --c-surface2:   var(--purple-soft);
  --c-border:     rgba(234, 213, 250, 0.6);
  --c-text:       var(--text-dark);
  --c-text2:     var(--text-mid);
  --c-text3:     var(--text-light);

  --c-primary:    var(--purple);
  --c-primary-d:  var(--purple-dark);
  --c-primary-l:  var(--purple-light);
  --c-primary-s:  var(--purple-soft);

  --shadow-sm:  0 4px 14px rgba(90,26,154,0.05);
  --shadow-md:  0 8px 22px rgba(90,26,154,0.07);
  --shadow-lg:  0 14px 36px rgba(90,26,154,0.10);
  --shadow-purple: 0 6px 18px rgba(123,47,190,0.25);

  --r-card: 18px;
  --r-btn:  13px;

  --ease: cubic-bezier(.22,.61,.36,1);
}

[data-theme="dark"] {
  --c-bg:        #0F081A;
  --c-surface:   #1A102F;
  --c-surface2:  #24173F;
  --c-border:    #322154;
  --c-text:      #F3EAFD;
  --c-text2:     #C9AEE9;
  --c-text3:     #8A6FB5;
  --c-primary-s: #2D144A;

  --gray-line:   #2B1D46;

  --shadow-sm:   0 4px 14px rgba(0,0,0,0.30);
  --shadow-md:   0 10px 28px rgba(0,0,0,0.40);
  --shadow-lg:   0 22px 54px rgba(0,0,0,0.50);
  --shadow-purple: 0 6px 20px rgba(155,79,222,0.28);
}

/* ── RESET & BASE ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--c-bg);
  color: var(--c-text);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: 100px;
  transition: background .35s var(--ease), color .35s var(--ease);
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}
a { text-decoration:none; color:inherit; }
button { font-family:inherit; cursor:pointer; border:none; background:none; }
img { display:block; }

/* Smooth scrollbars for horizontal lists on desktop */
*:focus-visible { outline: 2px solid var(--purple-light); outline-offset: 2px; }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
@keyframes meshMove {
  0%,100% { transform: translate(0,0) rotate(0deg) scale(1); }
  33%     { transform: translate(20px,-15px) rotate(120deg) scale(1.05); }
  66%     { transform: translate(-10px,20px) rotate(240deg) scale(.97); }
}
@keyframes pulse {
  0%,100% { transform:scale(1); opacity:.85; }
  50%     { transform:scale(1.15); opacity:1; }
}
@keyframes pulseRing {
  0%   { box-shadow: 0 0 0 0 rgba(18,194,138,.55); }
  70%  { box-shadow: 0 0 0 6px rgba(18,194,138,0); }
  100% { box-shadow: 0 0 0 0 rgba(18,194,138,0); }
}
@keyframes pulseAvatar {
  0%,100% { transform:scale(1); }
  50%      { transform:scale(1.06); }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: .01ms !important;
    scroll-behavior: auto !important;
  }
}

/* ── HEADER ── */
.header{
  position:relative;
  overflow:hidden;

  background:
    radial-gradient(circle at top right,
      rgba(255,255,255,.14),
      transparent 35%
    ),
    linear-gradient(
      135deg,
      #4C1D95 0%,
      #6D28D9 45%,
      #9333EA 100%
    );

  padding:38px 20px 96px;
}
.header::before{
  content:'';
  position:absolute;
  width:220px;
  height:220px;
  background:rgba(255,255,255,.10);
  filter:blur(60px);
  border-radius:50%;
  top:-80px;
  right:-60px;
  z-index:0;
}
.mesh { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
.mesh span {
  position: absolute; border-radius:50%;
  animation: meshMove 12s ease-in-out infinite;
  mix-blend-mode: screen; opacity:.16;
}
.mesh span:nth-child(1) {
  width:280px; height:280px;
  background: radial-gradient(circle, var(--purple-mid), transparent);
  top:-100px; right:-70px; animation-delay:0s;
}
.mesh span:nth-child(2) {
  width:180px; height:180px;
  background: radial-gradient(circle, #fff, transparent);
  bottom:-60px; left:-50px; animation-delay:-4s;
}

.header-inner {
  max-width: 440px; margin: 0 auto;
  display: flex; align-items:center; justify-content:space-between;
  position: relative; z-index:2;
  animation: fadeUp .5s var(--ease) both;
}
.header-left { display:flex; align-items:center; gap:11px; }

/* ── AVATAR COMPONENT ── */
.avatar-wrap{
  width:54px;
  height:54px;
  position:relative;
  flex-shrink:0;
  animation: pulseAvatar 4s ease-in-out infinite;
}
.avatar-dashboard {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.2);
  object-fit: cover;
  background: rgba(255,255,255,0.12);
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 900;
  color: #fff;
  overflow: hidden;
  position: relative;
  transition: box-shadow .25s var(--ease);
}
.avatar-dashboard::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.28), transparent 55%);
  border-radius: 50%;
  pointer-events: none;
}
.avatar-online-indicator {
  position: absolute;
  bottom: 1px;
  right: 1px;
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: var(--green);
  border: 2px solid var(--purple);
  z-index: 3;
  animation: pulseRing 2.4s ease-out infinite;
}

.header-greeting {
  display: flex; flex-direction:column; gap:2px;
}
.header-sub {
  font-size: 11px; font-weight:600;
  color: rgba(255,255,255,.7);
  letter-spacing: .3px;
}
.header-name{
  font-size:20px;
  font-weight:900;
  letter-spacing:-0.4px;
  color:#fff;
}

.hdr-actions { display:flex; gap:8px; align-items:center; }
.hdr-btn {
  width:38px; height:38px; border-radius:50%;
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.2);
  display: flex; align-items:center; justify-content:center;
  transition: all .25s var(--ease); backdrop-filter:blur(10px);
}
.hdr-btn:hover { background:rgba(255,255,255,.22); transform:translateY(-2px) scale(1.04); }
.hdr-btn:active { transform:scale(.94); }
.hdr-btn svg {
  width:17px; height:17px;
  stroke:#fff; stroke-width:2.2; fill:none;
  transition: transform .35s var(--ease);
}
.hdr-btn:hover svg { transform: rotate(15deg); }

/* Theme icon toggle */
.icon-sun  { display: none; }
.icon-moon { display: none; }
[data-theme="light"] .icon-sun  { display: block; }
[data-theme="dark"]  .icon-moon { display: block; }

/* ── BALANCE CARD ── */
.balance-wrap {
  max-width:440px; margin:-48px auto 0;
  padding: 0 16px;
  position: relative; z-index:10;
  animation: fadeUp .5s .08s var(--ease) both;
}
.balance-card {
  background: var(--c-surface);
  backdrop-filter: blur(14px);
  border-radius: var(--r-card);
  padding: 20px;
  border: 1px solid var(--c-border);
  box-shadow: var(--shadow-lg);
  transition: background .35s var(--ease), border-color .35s var(--ease), box-shadow .35s var(--ease);
}
.balance-top {
  display: flex; align-items:center; justify-content:space-between;
  margin-bottom: 16px;
  gap: 10px;
}
.balance-top-left { display:flex; align-items:center; gap:12px; min-width:0; }
.balance-icon-wrap {
  width:42px; height:42px; border-radius:13px;
  background: var(--c-primary-s);
  display: flex; align-items:center; justify-content:center;
  flex-shrink:0;
  transition: background .35s var(--ease);
}
.balance-icon-wrap svg {
  width:19px; height:19px;
  stroke: var(--c-primary); stroke-width:2.2; fill:none;
}
.balance-lbl {
  font-size:10px; font-weight:800; color:var(--c-text3);
  text-transform:uppercase; letter-spacing:.8px; margin-bottom:3px;
}
.balance-amount {
  font-size:25px; font-weight:900; color:var(--c-text);
  letter-spacing:-.5px; line-height:1.15;
  transition: color .35s var(--ease);
}
.topup-btn {
  background: linear-gradient(135deg, var(--purple-dark), var(--purple-light));
  color: #fff; border-radius:12px; padding:10px 16px;
  font-size:12.5px; font-weight:800;
  display: flex; align-items:center; gap:6px;
  box-shadow: var(--shadow-purple);
  transition: all .25s var(--ease);
  white-space: nowrap;
  flex-shrink: 0;
}
.topup-btn:hover { transform:translateY(-2px); box-shadow:0 8px 22px rgba(123,47,190,.35); }
.topup-btn:active { transform:translateY(0) scale(.97); }
.topup-btn svg { width:12px; height:12px; stroke:#fff; stroke-width:2.8; fill:none; }

.balance-divider { height:1px; background:var(--gray-line); margin-bottom:14px; transition: background .35s var(--ease); }

.balance-stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.bstat {
  background: var(--c-surface2);
  border-radius:13px; padding:11px 12px;
  border: 1px solid var(--gray-line);
  display: flex; align-items:center; gap:9px;
  transition: background .35s var(--ease), border-color .35s var(--ease), transform .2s var(--ease);
}
.bstat:hover { transform: translateY(-1px); }
.bstat-icon {
  width:30px; height:30px; border-radius:9px;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.bstat-icon.in  { background: var(--green-bg); }
.bstat-icon.out { background: var(--red-bg); }
.bstat-icon svg { width:13px; height:13px; fill:none; stroke-width:2.8; }
.bstat-icon.in  svg { stroke: var(--green); }
.bstat-icon.out svg { stroke: var(--red); }
.bstat-lbl { font-size:10px; font-weight:800; color:var(--c-text3); letter-spacing:.3px; margin-bottom:2px; }
.bstat-val { font-size:13.5px; font-weight:900; color:var(--c-text); transition: color .35s var(--ease); }

/* ── SECTION WRAPPER ── */
.main { max-width:440px; margin:0 auto; padding:18px 16px 0; }

.sec-head {
  display:flex; align-items:center; justify-content:space-between;
  margin: 22px 0 11px 2px;
}
.sec-title { font-size:14.5px; font-weight:900; color:var(--c-text); letter-spacing: -0.1px; transition: color .35s var(--ease); }
.sec-badge {
  font-size:9.5px; font-weight:800;
  padding:3px 9px; border-radius:7px; letter-spacing:.4px;
  text-transform: uppercase;
  transition: background .35s var(--ease), color .35s var(--ease);
}
.sec-badge.purple  { background:var(--purple-soft); color:var(--purple); border: 1px solid rgba(123,47,190,0.12); }
.sec-badge.orange  { background:#FFF3E0; color:#C05600; }
.sec-badge.blue    { background:#EEF4FF; color:#1D4ED8; }
.sec-badge.teal    { background:var(--green-bg); color:var(--green); }

[data-theme="dark"] .sec-badge.purple  { background:#2D144A; border-color: rgba(155,79,222,0.25); }
[data-theme="dark"] .sec-badge.orange { background:#2A1800; color:#FBA94C; }
[data-theme="dark"] .sec-badge.blue   { background:#0D1A3A; color:#60A5FA; }
[data-theme="dark"] .sec-badge.teal   { background:#0B2B22; color:#3EE0B0; }

/* ── VPN MENU GRID ── */
.vpn-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  background:var(--c-surface);
  border-radius:22px;
  padding:14px 8px;
  border:1px solid var(--c-border);
  box-shadow: var(--shadow-sm);
  animation: fadeUp .5s .1s var(--ease) both;
  transition: background .35s var(--ease), border-color .35s var(--ease);
}
.vm-item{
  display:flex; flex-direction:column; align-items:center;
  padding:10px 4px;
  border-radius:16px;
  gap:8px;
  transition: background .2s var(--ease), transform .2s var(--ease);
}
.vm-item:hover{
  background:var(--c-primary-s);
  transform:translateY(-3px);
}
.vm-item:active { transform:scale(.94); }

.vm-icon {
  width:38px;
  height:38px;
  border-radius:11px;
  overflow:hidden;
  background:var(--c-bg);
  border:1px solid var(--gray-line);
  display:flex;
  align-items:center;
  justify-content:center;
  transition: transform .25s var(--ease), box-shadow .25s var(--ease), border-color .35s var(--ease), background .35s var(--ease);
  position:relative;
  flex-shrink:0;
}
.vm-item:hover .vm-icon {
  transform: scale(1.08);
  box-shadow: var(--shadow-purple);
  border-color: transparent;
}

.vm-icon img{
  width:78%;
  height:78%;
  object-fit:contain;
}

.vm-label{
  font-size:9.5px;
  font-weight:800;
  color:var(--c-text2);
  text-align:center;
  line-height:1.25;
  transition: color .35s var(--ease);
}

/* ── CATEGORY SCROLL ── */
.cat-card {
  background:var(--c-surface); border-radius:var(--r-card);
  padding:14px 12px; border:1px solid var(--c-border);
  box-shadow:var(--shadow-sm);
  animation:fadeUp .5s .16s var(--ease) both;
  transition:background .35s var(--ease), border-color .35s var(--ease);
}
.cat-scroll {
  display:flex; gap:12px; overflow-x:auto; padding-bottom:2px;
  scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.cat-scroll::-webkit-scrollbar { display:none; }
.cat-item {
  display:flex; flex-direction:column; align-items:center; gap:7px;
  flex-shrink:0; scroll-snap-align:start; cursor:pointer;
}
.cat-img {
  width:54px; height:54px; border-radius:15px; overflow:hidden;
  background:var(--c-bg); border:1px solid var(--gray-line);
  display:flex; align-items:center; justify-content:center;
  transition:transform .25s var(--ease), box-shadow .25s var(--ease), border-color .35s var(--ease), background .35s var(--ease);
}
.cat-img img { width:100%; height:100%; object-fit:cover; }
.cat-item:hover .cat-img {
  transform:translateY(-4px) scale(1.03);
  box-shadow:var(--shadow-purple);
  border-color: transparent;
}
.cat-item:active .cat-img { transform:scale(.94); }
.cat-name {
  font-size:10px; font-weight:800; color:var(--c-text2); text-align:center;
  width:62px; line-height:1.3; overflow:hidden;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  transition: color .35s var(--ease);
}

.skel {
  border-radius:15px; height:54px; width:54px; flex-shrink:0;
  background:linear-gradient(90deg, var(--gray-line) 25%, var(--c-surface2) 50%, var(--gray-line) 75%);
  background-size:200% 100%; animation:shimmer 1.6s ease-in-out infinite;
}
.skel-lbl {
  height:9px; width:46px; border-radius:6px; margin:6px auto 0;
  background:linear-gradient(90deg, var(--gray-line) 25%, var(--c-surface2) 50%, var(--gray-line) 75%);
  background-size:200% 100%; animation:shimmer 1.6s ease-in-out infinite;
}

/* ── PROMO BANNERS ── */
.banner-wrap { animation:fadeUp .5s .2s var(--ease) both; }
.banner-scroll {
  display:flex; gap:11px; overflow-x:auto;
  scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch;
  scrollbar-width:none; padding:3px 1px 10px;
}
.banner-scroll::-webkit-scrollbar { display:none; }
.banner-card {
  flex:0 0 76vw; max-width:280px;
  aspect-ratio:18/8; border-radius:16px; overflow:hidden;
  background-size:cover; background-position:center;
  scroll-snap-align:start;
  border:1px solid var(--c-border);
  background-color:var(--c-surface);
  box-shadow:var(--shadow-sm);
  transition: transform .25s var(--ease), border-color .35s var(--ease), box-shadow .25s var(--ease);
  position:relative;
}
.banner-card:hover { transform:scale(1.02); box-shadow: var(--shadow-md); }
.banner-card::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.18), transparent);
}
.b1 { background-image: url('https://app.isdarprem.net/images/akun2.png'); }
.b2 { background-image: url('https://app.isdarprem.net/images/trial2.png'); }
.b3 { background-image: url('https://app.isdarprem.net/images/ppo.png'); }

.banner-dots {
  display:flex; justify-content:center; gap:6px; margin-top:2px;
}
.banner-dots span {
  width:6px; height:6px; border-radius:50%;
  background: var(--c-border);
  transition: background .25s var(--ease), width .25s var(--ease);
}
.banner-dots span.active {
  background: var(--purple);
  width:16px; border-radius:4px;
}

/* ── HELP / UTIL CARDS ── */
.util-section { animation:fadeUp .5s .24s var(--ease) both; }
.util-card {
  background:var(--c-surface); border-radius:16px; padding:13px 14px;
  display:flex; align-items:center; gap:12px;
  border:1px solid var(--c-border); margin-bottom:9px;
  box-shadow:var(--shadow-sm);
  transition: transform .25s var(--ease), box-shadow .25s var(--ease), border-color .25s var(--ease), background .35s var(--ease);
}
.util-card:last-child { margin-bottom:0; }
.util-card:hover {
  transform:translateY(-2px);
  box-shadow:var(--shadow-md);
  border-color: rgba(123,47,190,0.3);
}
.util-card:active { transform: translateY(0) scale(.99); }

.util-img {
  width:40px; height:40px; border-radius:12px;
  overflow:hidden; flex-shrink:0; background:var(--c-bg);
  border:1px solid var(--gray-line);
  transition: background .35s var(--ease), border-color .35s var(--ease);
}
.util-img img { width:100%; height:100%; object-fit:cover; }

.util-body { flex:1; min-width:0; }
.util-title {
  font-size:13.5px; font-weight:800; color:var(--c-text); margin-bottom:2px;
  transition: color .35s var(--ease);
}
.util-title.admin { color:var(--red); }
.util-sub { font-size:11px; font-weight:600; color:var(--c-text3); transition: color .35s var(--ease); }
.util-arrow svg {
  width:14px; height:14px; stroke:var(--c-text3); stroke-width:2.5; fill:none;
  transition: transform .25s var(--ease), stroke .35s var(--ease);
}
.util-card:hover .util-arrow svg { transform: translateX(3px); stroke: var(--purple); }

/* ─── BOTTOM NAV ─── */
.bottom-nav{
  position:fixed;
  bottom:0; left:0; right:0;
  max-width:440px; margin:0 auto;
  background:var(--c-surface);
  border-top:1px solid var(--gray-line);
  display:flex;
  padding:10px 0 calc(14px + env(safe-area-inset-bottom));
  box-shadow:0 -6px 24px rgba(90,26,154,0.06);
  z-index:100;
  transition: background .35s var(--ease), border-color .35s var(--ease);
}
.nav-item{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
  text-decoration:none; transition: transform .2s var(--ease);
  position: relative;
}
.nav-item:active { transform: scale(.92); }
.nav-icon{ display:flex; align-items:center; justify-content:center; }
.nav-icon svg{
  width:20px; height:20px; fill:none; stroke:var(--c-text3); stroke-width:2.2;
  transition: stroke .25s var(--ease), transform .25s var(--ease);
}
.nav-label{ font-size:10px; font-weight:800; color:var(--c-text3); transition: color .25s var(--ease); }
.nav-item.active .nav-label{ color:var(--purple); }
.nav-item.active .nav-icon svg{ stroke:var(--purple); transform: translateY(-1px); }
.nav-item.active::before{
  content:'';

<script>
/* ── THEME ── */
(function() {
  const saved = localStorage.getItem('xt-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
})();

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('xt-theme', next);
}

function getAvatarColor(name){
  const palettes = [
    ['#4285F4','#1A73E8'],
    ['#EA4335','#C5221F'],
    ['#34A853','#188038'],
    ['#FBBC05','#F9AB00'],
    ['#7B2FBE','#5A1A9A'],
    ['#EC4899','#BE185D'],
    ['#06B6D4','#0E7490'],
    ['#F97316','#C2410C'],
    ['#10B981','#047857'],
    ['#6366F1','#4338CA']
  ];
  let hash = 0;
  for(let i = 0; i < name.length; i++){
    hash = name.charCodeAt(i) + ((hash << 5) - hash);
  }
  return palettes[Math.abs(hash) % palettes.length];
}

// FIXED: Fungsi render avatar dimodifikasi untuk mendukung tag img custom atau inisial
function renderUserAvatar(userObj) {
  const container = document.getElementById('avatarContainer');
  if (!container) return;

  const name = userObj.username || 'Xtrimer User';

  if (userObj.avatar && userObj.avatar !== '' && !userObj.avatar.includes('via.placeholder.com')) {
    // Jika ada link avatar valid dari database, buat tag img
    container.innerHTML = `<img src="${userObj.avatar}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;" alt="Profile">`;
    container.style.background = 'none';
  } else {
    // Jika tidak ada foto, render inisial text bergradien (fallback)
    container.textContent = name.charAt(0).toUpperCase();
    const colors = getAvatarColor(name);
    container.style.background = `linear-gradient(135deg, ${colors[0]}, ${colors[1]})`;
  }
}

/* ── AUTH ── */
const localUser = JSON.parse(localStorage.getItem('user') || 'null');
if (localUser?.username) {
  document.getElementById('headerName').textContent = localUser.username;
  renderUserAvatar(localUser);
}

const token = localStorage.getItem('token') || '';
const hdrs = {
  headers: {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${token}`
  }
};

/* ── FORMAT RUPIAH ── */
function rupiah(val) {
  return 'Rp ' + Number(val || 0).toLocaleString('id-ID');
}

/* ── PROFILE ── */
async function loadProfile() {
  try {
    const r = await fetch('/api/profile', hdrs);
    if (!r.ok) throw new Error('Request gagal');
    const d = await r.json();

    if (!d.success || !d.user) {
      localStorage.clear();
      window.location.href = 'index.html';
      return;
    }

    const u = d.user;

    /* ── SIMPAN ULANG USER TERBARU ── */
    localStorage.setItem('user', JSON.stringify(u));

    /* ── USERNAME & AVATAR ── */
    const username = u.username || 'Xtrimer User';
    document.getElementById('headerName').textContent = username;
    renderUserAvatar(u);

    /* ── BALANCE ── */
    document.getElementById('balanceAmt').textContent = rupiah(u.balance);
    document.getElementById('totalIn').textContent = rupiah(u.total_in || 0);
    document.getElementById('totalOut').textContent = rupiah(u.total_out || 0);

    /* ── ADMIN PANEL ── */
    if (u.role === 'admin') {
      document.getElementById('adminSlot').innerHTML = `
        <a class="util-card" href="admin.html">
          <div class="util-img">
            <img src="https://app.isdarprem.net/images/paneladmin.jpeg" alt="Admin" onerror="this.src='https://placehold.co/40/E84040/fff?text=ADM'">
          </div>
          <div class="util-body">
            <div class="util-title admin">Admin Panel</div>
            <div class="util-sub">Kelola user, produk & transaksi</div>
          </div>
          <div class="util-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
        </a>`;
    }
  } catch (e) {
    console.error('Gagal load profile:', e);
    localStorage.clear();
    window.location.href = 'index.html';
  }
}

/* ── CATEGORIES ── */
const HIDDEN = ['gas','tv','tv kabel','gas pln','gas elpiji','tagihan gas'];
const IMG_MAP = [
  { keys:['pulsa','sms','telp'],       img:'https://app.isdarprem.net/images/smsdantelpon.jpeg' },
  { keys:['data'],                     img:'https://app.isdarprem.net/images/data.png' },
  { keys:['pln','listrik','token'],    img:'https://app.isdarprem.net/images/pln.png' },
  { keys:['e-wallet','ewallet','e-money','emoney'], img:'https://app.isdarprem.net/images/ewallet.jpg' },
  { keys:['game','gaming'],            img:'https://app.isdarprem.net/images/games.jpg' },
  { keys:['voucher'],                  img:'https://app.isdarprem.net/images/voucher.png' },
  { keys:['perdana','esim','e-sim'],   img:'https://app.isdarprem.net/images/aktivasiperdana.jpg' },
  { keys:['masa aktif','masa'],        img:'https://app.isdarprem.net/images/masaaktif.jpg' },
];
function getImg(name) {
  const k = name.toLowerCase();
  for (const { keys, img } of IMG_MAP) {
    if (keys.some(x => k.includes(x))) return img;
  }
  return 'https://app.isdarprem.net/images/images.png';
}

async function loadCategories() {
  try {
    const r = await fetch('/api/ppob/categories', hdrs);
    if (!r.ok) throw new Error('not ok');
    const d = await r.json();
    const grid  = document.getElementById('catGrid');
    const badge = document.getElementById('catCount');
    if (d.success && d.categories?.length) {
      const visible = d.categories.filter(
        c => !HIDDEN.some(h => c.toLowerCase().includes(h))
      );
      badge.textContent = visible.length + ' Kategori';
      grid.innerHTML = '';
      visible.forEach((cat, i) => {
        const el = document.createElement('a');
        el.className = 'cat-item';
        el.href = `ppob.html?cat=${encodeURIComponent(cat)}`;
        el.style.animation = `fadeUp .4s ${0.03 * i}s var(--ease) both`;
        const initial = encodeURIComponent(cat[0] || '?');
        el.innerHTML = `
          <div class="cat-img">
            <img src="${getImg(cat)}" alt="${cat}"
              onerror="this.src='https://placehold.co/54/7B2FBE/fff?text=${initial}'">
          </div>
          <div class="cat-name">${cat}</div>`;
        grid.appendChild(el);
      });
    } else {
      showCatErr();
    }
  } catch (e) {
    const demo = ['Pulsa','Paket Data','Token PLN','E-Wallet','Games','Voucher','Perdana','Masa Active'];
    const grid  = document.getElementById('catGrid');
    const badge = document.getElementById('catCount');
    badge.textContent = demo.length + ' Kategori';
    grid.innerHTML = '';
    demo.forEach((cat, i) => {
      const el = document.createElement('a');
      el.className = 'cat-item';
      el.href = '#';
      el.style.animation = `fadeUp .4s ${0.03 * i}s var(--ease) both`;
      const initial = encodeURIComponent(cat[0] || '?');
      el.innerHTML = `
        <div class="cat-img">
          <img src="${getImg(cat)}" alt="${cat}"
            onerror="this.src='https://placehold.co/54/7B2FBE/fff?text=${initial}'">
        </div>
        <div class="cat-name">${cat}</div>`;
      grid.appendChild(el);
    });
  }
}

function showCatErr() {
  document.getElementById('catGrid').innerHTML =
    '<div class="state-msg">Gagal memuat. Coba lagi nanti.</div>';
  const b = document.getElementById('catCount');
  b.textContent = 'Offline';
  b.style.cssText = 'background:var(--red-bg);color:var(--red);';
}

/* ── BANNER DOTS SYNC ── */
(function initBannerDots(){
  const scroller = document.getElementById('bannerScroll');
  const dots = document.querySelectorAll('#bannerDots span');
  if (!scroller || !dots.length) return;
  scroller.addEventListener('scroll', () => {
    const idx = Math.round(scroller.scrollLeft / (scroller.firstElementChild.offsetWidth + 11));
    dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  }, { passive: true });
})();

/* ── INIT ── */
loadProfile();
loadCategories();
</script>
