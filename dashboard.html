<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Xtrimer Tunnel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b132b;
    color:white;
    min-height:100vh;
}

.header{
    background:#1c2541;
    padding:20px;
    text-align:center;
    border-bottom:2px solid #facc15;
}

.logo{
    color:#facc15;
    font-size:32px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.card{
    background:#1f2937;
    border-radius:15px;
    padding:20px;
    margin-bottom:15px;
}

.card h3{
    color:#facc15;
    margin-bottom:15px;
}

.avatar-box{
    text-align:center;
    margin-bottom:20px;
}

.avatar-box img{
    width:90px;
    height:90px;
    border-radius:50%;
    border:3px solid #facc15;
}

.info{
    margin-bottom:10px;
}

.stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.stat-box{
    background:#1f2937;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

.stat-title{
    color:#facc15;
    margin-bottom:10px;
}

.stat-value{
    font-size:22px;
    font-weight:bold;
}

.logout-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#facc15;
    color:black;
    font-weight:bold;
    cursor:pointer;
    margin-top:20px;
}
</style>
</head>
<body>

<div class="header">
    <div class="logo">
        XTRIMER TUNNEL
    </div>
</div>

<div class="container">

    <div class="card">

        <div class="avatar-box">
            <img
                id="avatar"
                src=""
                alt="Avatar">
        </div>

        <h3>Informasi Akun</h3>

        <div class="info">
            Username:
            <span id="username">-</span>
        </div>

        <div class="info">
            Email:
            <span id="email">-</span>
        </div>

        <div class="info">
            Role:
            <span id="role">user</span>
        </div>

    </div>

    <div class="stats">

        <div class="stat-box">
            <div class="stat-title">
                Saldo
            </div>

            <div
                class="stat-value"
                id="balance">
                0
            </div>
        </div>

        <div class="stat-box">
            <div class="stat-title">
                Status
            </div>

            <div class="stat-value">
                Aktif
            </div>
        </div>

    </div>

    <button
        class="logout-btn"
        onclick="logout()">
        Logout
    </button>

</div>

<script>

const localUser =
    JSON.parse(
        localStorage.getItem('user')
    );

if (!localUser) {

    window.location.href =
        'index.html';

}

loadProfile();

async function loadProfile() {

    try {

        const response =
        await fetch(
            `/api/profile?email=${encodeURIComponent(localUser.email)}`
        );

        const result =
        await response.json();

        if (!result.success) {

            alert(result.message);

            localStorage.removeItem('user');

            window.location.href =
                'index.html';

            return;

        }

        const user =
            result.user;

        document.getElementById('username').innerText =
            user.username || '-';

        document.getElementById('email').innerText =
            user.email || '-';

        document.getElementById('role').innerText =
            user.role || 'user';

        document.getElementById('balance').innerText =
            user.balance || 0;

        document.getElementById('avatar').src =
            user.avatar ||
            'https://via.placeholder.com/90';

    } catch (err) {

        console.error(err);

        alert(
            'Gagal memuat data profile'
        );

    }

}

function logout() {

    localStorage.removeItem('user');

    window.location.href =
        'index.html';

}

</script>

</body>
</html>
