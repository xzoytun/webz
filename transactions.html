<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Riwayat Topup - Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght=400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── TOKENS UPGRADED & SYNCHRONIZED ACROSS SYSTEM ── */
:root {
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #210943;
  --purple-light: #9B4FDE;
  --purple-soft:  #F5EEFE;
  --purple-mid:   #EAD5FA;
  --accent:       #FF6B2B;
  --accent-light: #FFEFEA;
  --green:        #10B981;
  --green-bg:     #E6F4EA;
  --green-dark:   #059669;
  --red:          #EF4444;
  --red-bg:       #FCE8E6;
  --white:        #FFFFFF;
  --bg:           #F9FAFB;
  --gray-line:    #F3F4F6;
  --text-dark:    #111827;
  --text-mid:     #4B5563;
  --text-light:   #9CA3AF;
  --card-bg:      #FFFFFF;
  --input-bg:     #F3F4F6;

  --shadow-sm:  0 2px 8px rgba(123,47,190,0.04);
  --shadow-md:  0 8px 24px rgba(123,47,190,0.06);
  --glass:      rgba(255, 255, 255, 0.8);
  --glass-border: rgba(255, 255, 255, 0.5);

  --r-card: 20px;
  --r-btn:  14px;
}

html[data-theme="dark"] {
  --purple-soft:  #1F152E;
  --purple-mid:   #372254;
  --green-bg:     #062F24;
  --red-bg:       #3B1414;
  --white:        #18191E;
  --bg:           #0E0F12;
  --card-bg:      #18191E;
  --gray-line:    #262833;
  --text-dark:    #F9FAFB;
  --text-mid:     #9CA3AF;
  --text-light:   #6B7280;
  --input-bg:     #202124;
  --accent-light: #3A1F1F;
  --glass:        rgba(24, 25, 30, 0.8);
  --glass-border: rgba(255, 255, 255, 0.05);
}

/* prevent flash sebelum JS jalan */
html { background: var(--bg); transition: background .3s ease; }

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  color: var(--text-dark);
  padding-bottom: 110px;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.3s ease, color 0.3s ease;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── HERO HEADER ── */
.hero {
  background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple) 50%, var(--purple-light) 100%);
  padding: 32px 24px 64px;
  position: relative; overflow: hidden; z-index: 2;
  animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
}
.hero::before {
  content:''; position:absolute; top:-50px; right:-30px;
  width:200px; height:200px;
  background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
  border-radius:50%;
}
.hero-dots {
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.08) 1.2px, transparent 1.2px);
  background-size: 24px 24px; pointer-events:none;
  opacity: 0.7;
}

.hero-top {
  display:flex; align-items:center; justify-content:space-between; position:relative; z-index:2;
  max-width: 440px; margin: 0 auto; gap:12px;
}
.hero-left-area { display: flex; align-items: center; gap: 12px; flex: 1; }

.back-btn {
  width:38px; height:38px; border-radius:12px;
  background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.15);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.back-btn:hover { background:rgba(255,255,255,0.2); transform: translateX(-2px); }
.back-btn:active { transform: scale(0.95) translateX(-2px); }
.back-btn svg { width:18px; height:18px; fill:none; stroke:#fff; stroke-width:2.5; }

.hero-title { flex:1; }
.hero-title h1 { font-size:19px; font-weight:900; color:#fff; line-height:1.1; letter-spacing:-0.3px; }
.hero-title p { font-size:12px; color:rgba(255,255,255,0.7); font-weight:600; margin-top:4px; }

.hero-right-area { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

.hero-badge {
  background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.15);
  border-radius:20px; padding:6px 14px;
  font-size:11px; font-weight:800; color:#fff; white-space:nowrap;
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
}

/* ─── THEME TOGGLE ─── */
.theme-toggle {
  width: 38px; height: 38px; border-radius: 50%;
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.theme-toggle:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
.theme-toggle:active { transform: scale(0.95); }
.theme-toggle svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2.2; }

/* ─── CONTAINER ─── */
.container { max-width:440px; margin:0 auto; padding:0 16px; position: relative; z-index: 2; }

/* ─── SUMMARY CARD ─── */
.summary-card {
  background:var(--card-bg); border-radius:var(--r-card); padding:16px;
  margin: -40px 0 16px; position:relative; z-index:10;
  box-shadow: var(--shadow-md); border: 1px solid var(--gray-line);
  display:none; gap:12px;
  animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
  transition: background 0.3s, border-color 0.3s;
}
.summary-card.visible { display:grid; grid-template-columns:1fr 1fr; }

.summary-item { border-radius:14px; padding:12px 14px; transition: background 0.3s, border-color 0.3s; }
.summary-item.green-item { background:var(--green-bg); border:1px solid rgba(16,185,129,0.08); }
.summary-item.purple-item { background:var(--purple-soft); border:1px solid rgba(123,47,190,0.05); }

.summary-label {
  font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.6px;
  color:var(--text-light); margin-bottom:4px; display:flex; align-items:center; gap:6px;
}
.summary-label svg { width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:2.2; flex-shrink:0; }
.summary-label.green-label svg { stroke:var(--green); }
.summary-label.purple-label svg { stroke:var(--purple); }
html[data-theme="dark"] .summary-label.purple-label svg { stroke: var(--text-mid); }

.summary-val { font-size:17px; font-weight:800; color:var(--text-dark); letter-spacing:-0.2px; }
.summary-val.green-val { color:var(--green); font-weight: 900; }

/* ─── SECTION TITLE ─── */
.sec-title {
  font-size:14px; font-weight:900; color:var(--text-dark);
  margin: 12px 0 12px 4px; display:flex; align-items:center; gap:6px;
}
.sec-title-pill { font-size:10px; font-weight:800; background:var(--purple-soft); color:var(--purple); border-radius:8px; padding:2px 8px; }
html[data-theme="dark"] .sec-title-pill { color: var(--text-mid); }

/* ─── TOPUP CARD ─── */
.topup-card {
  background:var(--card-bg); border-radius:var(--r-card); margin-bottom:12px;
  border:1px solid var(--gray-line); border-left:4px solid var(--green);
  box-shadow: var(--shadow-sm); overflow:hidden;
  animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; 
  transition: transform 0.2s ease, background 0.3s, border-color 0.3s;
}
.topup-card:hover { transform:translateY(-2px); box-shadow: var(--shadow-md); }
.topup-card-inner { padding:16px; display:flex; align-items:center; gap:14px; }

.topup-icon {
  width:38px; height:38px; border-radius:12px;
  background:linear-gradient(135deg, var(--green-dark), var(--green));
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  box-shadow: 0 4px 10px rgba(16,185,129,0.2);
}
.topup-icon svg { width:18px; height:18px; fill:none; stroke:#fff; stroke-width:2.5; }

.topup-main { flex:1; min-width:0; }
.topup-amount { font-size:16px; font-weight:900; color:var(--green); line-height:1.2; letter-spacing:-0.1px; }
.topup-method { font-size:12px; font-weight:700; color:var(--text-mid); display:flex; align-items:center; gap:5px; margin-top: 3px; }
.method-dot { width:6px; height:6px; border-radius:50%; background:var(--purple-light); flex-shrink:0; }

.success-badge {
  display:inline-flex; align-items:center; gap:4px;
  background:var(--green-bg); border:1px solid rgba(16,185,129,0.1);
  border-radius:6px; padding:2px 8px; font-size:10px; font-weight:800; color:var(--green);
  margin-top:6px; text-transform: uppercase; letter-spacing: 0.3px;
}
.success-badge svg { width:10px; height:10px; fill:none; stroke:var(--green); stroke-width:2.5; }

.topup-right { text-align:right; flex-shrink:0; }
.topup-ref { font-size:10px; font-weight:700; color:var(--text-light); margin-bottom:3px; max-width:110px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-family: monospace; }
.topup-date { font-size:11px; font-weight:600; color:var(--text-light); display:flex; align-items:center; gap:4px; justify-content:flex-end; }
.topup-date svg { width:12px; height:12px; fill:none; stroke:var(--text-light); stroke-width:2; }

/* ─── EMPTY / LOADING ─── */
.status-box {
  background: var(--card-bg); border-radius: var(--r-card); padding: 48px 24px; margin-top: -40px;
  border: 1px solid var(--gray-line); text-align: center; box-shadow: var(--shadow-sm);
  display: flex; flex-direction: column; align-items: center; gap: 14px; color: var(--text-light);
  transition: background 0.3s, border-color 0.3s;
}
.status-icon-badge {
  width: 48px; height: 48px; border-radius: 50%; background: var(--purple-soft);
  display: flex; align-items: center; justify-content: center;
}
.status-box svg { width: 22px; height: 22px; fill: none; stroke: var(--purple); stroke-width: 2.3; }
html[data-theme="dark"] .status-box svg { stroke: var(--text-mid); }
.status-box.loading svg { animation: spin 1s linear infinite; }
.status-box p { font-size: 13px; font-weight: 700; max-width: 260px; line-height: 1.5; color: var(--text-mid); }

/* ─── BOTTOM NAV ─── */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; background: var(--glass);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top:1px solid var(--glass-border); display:flex; padding:12px 0 calc(12px + env(safe-area-inset-bottom, 0px));
  box-shadow: 0 -8px 32px rgba(0,0,0,0.05); z-index:100; max-width:440px; margin:0 auto;
  border-radius: 24px 24px 0 0; transition: background .3s, border-color .3s;
}
.bottom-nav-inner { display: flex; align-items: center; justify-content: space-around; width: 100%; }
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  text-decoration: none; color: var(--text-light); width: 70px; transition: all 0.25s ease; position: relative;
}
.nav-icon svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2.2; transition: all 0.25s ease; }
.nav-label { font-size: 11px; font-weight: 700; }

.nav-item.active { color: var(--purple); }
.nav-item.active .nav-label { font-weight: 800; }
.nav-item.active .nav-icon svg { stroke: var(--purple); transform: translateY(-2px); }
.nav-item::after {
  content: ''; position: absolute; bottom: -6px; width: 4px; height: 4px; 
  border-radius: 50%; background: transparent; transition: background 0.25s;
}
.nav-item.active::after { background: var(--purple); }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-dots"></div>
  <div class="hero-top">
    <div class="hero-left-area">
      <a class="back-btn" href="dashboard.html">
        <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </a>
      <div class="hero-title">
        <h1>Riwayat Topup</h1>
        <p id="subtitle">Memuat data...</p>
      </div>
    </div>
    
    <div class="hero-right-area">
      <div class="hero-badge" id="countBadge">— Topup</div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle tema">
        <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div class="container">

  <div class="summary-card" id="summaryCard">
    <div class="summary-item green-item">
      <div class="summary-label green-label">
        <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/><line x1="6" y1="15" x2="10" y2="15"/></svg>
        Total Topup
      </div>
      <div class="summary-val green-val" id="sumTotal">Rp 0</div>
    </div>
    <div class="summary-item purple-item">
      <div class="summary-label purple-label">
        <svg viewBox="0 0 24 24"><polygon points="12,2 22,8.5 12,15 2,8.5"/><polyline points="2,15 12,21.5 22,15"/><polyline points="2,11.5 12,18 22,11.5"/></svg>
        Transaksi
      </div>
      <div class="summary-val" id="sumCount">0x</div>
    </div>
  </div>

  <div class="sec-title" id="secTitle" style="display:none;">
    Daftar <span class="sec-title-pill">Topup</span>
  </div>

  <div id="historyArea">
    <div id="history-status" class="status-box loading">
      <div class="status-icon-badge">
        <svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
      </div>
      <p>Memuat riwayat topup kamu...</p>
    </div>
  </div>

</div>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a class="nav-item" href="dashboard.html">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg></div>
      <div class="nav-label">Home</div>
    </a>
    <a class="nav-item active" href="transactions.html">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" stroke-width="1.5"/><polyline points="7,17 10,13 13,15 17,9"/></svg></div>
      <div class="nav-label">Riwayat</div>
    </a>
    <a class="nav-item" href="profile.html">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>
      <div class="nav-label">Profile</div>
    </a>
  </div>
</nav>

<script>
  // ─── THEME MANAGER (SINKRON DENGAN EVENT LISTENERS BARU) ───
  (function initTheme() {
    const saved = localStorage.getItem('theme');
    if (saved === 'dark' || saved === 'light') {
      document.documentElement.setAttribute('data-theme', saved);
    } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.setAttribute('data-theme', 'dark');
    } else {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  })();

  document.getElementById('themeToggle').addEventListener('click', () => {
    const html = document.documentElement;
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  });

  // Token & Proteksi Login
  const token = localStorage.getItem('token');
  if (!token) {
    window.location.href = 'index.html';
  } else {
    loadHistory();
  }

  async function loadHistory() {
    const statusBox = document.getElementById('history-status');
    try {
      const res = await fetch('/api/topup-history', {
        method: 'GET',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        }
      });
      
      const data = await res.json();
      const area = document.getElementById('historyArea');

      if (!data.success || !data.data || data.data.length === 0) {
        document.getElementById('subtitle').textContent   = 'Belum ada transaksi';
        document.getElementById('countBadge').textContent = '0 Topup';
        
        statusBox.className = "status-box";
        statusBox.innerHTML = `
          <div class="status-icon-badge">
            <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/><line x1="9" y1="15" x2="15" y2="15"/><line x1="12" y1="12" x2="12" y2="18"/></svg>
          </div>
          <p>Belum Ada Riwayat. Topup pertamamu akan muncul di sini.</p>
        `;
        return;
      }

      const items    = data.data;
      const totalSum = items.reduce((s, i) => s + Number(i.amount || 0), 0);

      document.getElementById('subtitle').textContent   = items.length + ' transaksi topup';
      document.getElementById('countBadge').textContent = items.length + ' Topup';
      document.getElementById('sumTotal').textContent   = 'Rp ' + totalSum.toLocaleString('id-ID');
      document.getElementById('sumCount').textContent   = items.length + 'x';
      document.getElementById('summaryCard').classList.add('visible');
      document.getElementById('secTitle').style.display = 'flex';

      area.innerHTML = items.map((item, i) => {
        let date = '—';
        if (item.created_at) {
          let d = new Date(item.created_at);
          if (typeof item.created_at === 'string' && !item.created_at.includes('Z') && !item.created_at.includes('+')) {
            d = new Date(item.created_at.replace(' ', 'T') + 'Z'); 
          }
          if (isNaN(d.getTime())) {
            d = new Date(item.created_at);
          }

          date = d.toLocaleString('id-ID', {
            timeZone: 'Asia/Jakarta',
            day: '2-digit',
            month: 'short',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            hour12: false
          });
        }

        return `
        <div class="topup-card" style="animation-delay:${i * 0.05}s;">
          <div class="topup-card-inner">
            <div class="topup-icon">
              <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5,12 12,5 19,12"/></svg>
            </div>
            <div class="topup-main">
              <div class="topup-amount">+ Rp ${Number(item.amount).toLocaleString('id-ID')}</div>
              <div class="topup-method">
                <div class="method-dot"></div>
                ${item.metode || 'QRIS'}
              </div>
              <div class="success-badge">
                <svg viewBox="0 0 24 24"><polyline points="4,12 9,17 20,7"/></svg>
                Berhasil
              </div>
            </div>
            <div class="topup-right">
              <div class="topup-ref">${item.reference || '—'}</div>
              <div class="topup-date">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12,7 12,12 15,15"/></svg>
                ${date}
              </div>
            </div>
          </div>
        </div>`;
      }).join('');

    } catch (err) {
      console.error(err);
      document.getElementById('historyArea').innerHTML = `
        <div class="status-box">
          <div class="status-icon-badge" style="background:var(--red-bg);">
            <svg viewBox="0 0 24 24" style="stroke:var(--red);"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.56 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1" fill="currentColor" stroke="none"/></svg>
          </div>
          <p style="color:var(--text-mid);">Koneksi Gagal. Tidak dapat memuat riwayat topup dari server.</p>
        </div>`;
    }
  }
</script>
</body>
</html>
