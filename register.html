<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar — GabutStore</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="register">

<div id="toast"></div>

<div class="auth-wrapper">
  <div class="auth-box" style="max-width:460px">
    <div class="auth-logo">
      <a href="index.html" style="text-decoration:none">
        <div class="brand">⚡ GabutStore</div>
      </a>
      <p>Daftar gratis & mulai beli VPN premium</p>
    </div>

    <h2 class="auth-title">Buat Akun Baru</h2>

    <div id="registerAlert" class="alert alert-error"></div>

    <form id="registerForm">
      <div class="form-group">
        <label class="form-label" for="username">Username <span style="color:var(--red)">*</span></label>
        <input
          class="form-input"
          type="text"
          id="username"
          placeholder="Huruf dan angka saja, min 4 karakter"
          autocomplete="username"
          pattern="[a-zA-Z0-9]+"
          minlength="4"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email <span style="color:var(--red)">*</span></label>
        <input
          class="form-input"
          type="email"
          id="email"
          placeholder="email@contoh.com"
          autocomplete="email"
          required
        >
        <div style="font-size:11px;color:var(--text3);margin-top:4px">📧 Detail akun akan dikirim ke email ini</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="whatsapp">No. WhatsApp <span style="color:var(--text3)">(opsional)</span></label>
        <input
          class="form-input"
          type="tel"
          id="whatsapp"
          placeholder="08xxxxxxxxxx"
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password <span style="color:var(--red)">*</span></label>
        <input
          class="form-input"
          type="password"
          id="password"
          placeholder="Min. 6 karakter"
          autocomplete="new-password"
          minlength="6"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm_password">Konfirmasi Password <span style="color:var(--red)">*</span></label>
        <input
          class="form-input"
          type="password"
          id="confirm_password"
          placeholder="Ulangi password"
          autocomplete="new-password"
          minlength="6"
          required
        >
      </div>

      <div style="background:var(--bg3);border-radius:8px;padding:12px;font-size:12px;color:var(--text2);margin-bottom:16px">
        Dengan mendaftar, kamu menyetujui <a href="#">Syarat & Ketentuan</a> dan <a href="#">Kebijakan Privasi</a> kami.
      </div>

      <button
        type="submit"
        id="registerBtn"
        class="btn btn-primary btn-block"
        style="padding:12px"
        data-label="✅ Daftar Sekarang"
      >✅ Daftar Sekarang</button>
    </form>

    <div class="form-footer" style="margin-top:16px">
      Sudah punya akun? <a href="login.html">Masuk</a>
    </div>

    <div class="form-footer" style="margin-top:8px">
      <a href="index.html" style="color:var(--text2);font-size:12px">← Kembali ke Beranda</a>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
