<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Media Xtrimer</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="logo">
        <img
            src="https://raw.githubusercontent.com/joytun21/joy/main/image/mediaxtrimer.png"
            alt="Media Xtrimer">
    </div>

    <h1>REGISTER</h1>

    <p class="desc">
        Daftar akun Media Xtrimer
    </p>

    <div class="form-box">

        <input
            type="email"
            id="email"
            placeholder="Masukkan Gmail">

        <div class="otp-row">

            <input
                type="text"
                id="otp"
                placeholder="Kode OTP">

            <button
                class="otp-btn"
                onclick="sendOTP()">
                Kirim
            </button>

        </div>

        <input
            type="password"
            id="password"
            placeholder="Password">

        <input
            type="password"
            id="confirmPassword"
            placeholder="Konfirmasi Password">

        <button
            class="btn"
            onclick="registerUser()">
            Daftar Sekarang
        </button>

        <a href="login.html" class="back-link">
            Sudah punya akun? Login
        </a>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
