<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Xtrimer Tunnel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111827;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.register-box{
    width:100%;
    max-width:400px;
    background:#1f2937;
    padding:30px;
    border-radius:15px;
}

.logo{
    text-align:center;
    color:#facc15;
    font-size:28px;
    font-weight:bold;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    display:block;
    color:white;
    margin-bottom:5px;
}

.input-group input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    outline:none;
}

.btn-register{
    width:100%;
    padding:12px;
    background:#facc15;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.login-link{
    text-align:center;
    margin-top:15px;
    color:white;
}

.login-link a{
    color:#facc15;
    text-decoration:none;
}

#message{
    margin-top:15px;
    text-align:center;
    color:white;
}
</style>
</head>
<body>

<div class="register-box">

    <div class="logo">
        XTRIMER TUNNEL
    </div>

    <form id="registerForm">

        <div class="input-group">
            <label>Username</label>
            <input
                type="text"
                id="username"
                required
                placeholder="Masukkan username">
        </div>

        <div class="input-group">
            <label>Email</label>
            <input
                type="email"
                id="email"
                required
                placeholder="Masukkan email">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input
                type="password"
                id="password"
                required
                placeholder="Masukkan password">
        </div>

        <div class="input-group">
            <label>Konfirmasi Password</label>
            <input
                type="password"
                id="confirmPassword"
                required
                placeholder="Ulangi password">
        </div>

        <button
            type="submit"
            class="btn-register">
            Daftar
        </button>

    </form>

    <div id="message"></div>

    <div class="login-link">
        Sudah punya akun?
        <a href="index.html">Login</a>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
