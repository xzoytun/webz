<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #3D0F72;
  --purple-light: #9B4FDE;
  --purple-soft:  #F3EAFD;
  --purple-mid:   #EAD5FA;
  --accent:       #FF6B2B;
  --accent-light: #FFEFEA;
  --green:        #12C28A;
  --green-bg:     #E6FAF4;
  --green-dark:   #0A9E70;
  --red:          #E84040;
  --red-bg:       #FFECEC;
  --red-dark:     #B91C1C;
  --white:        #FFFFFF;
  --bg:           #F8F6FC;
  --gray-line:    #EEF0F6;
  --text-dark:    #1A0533;
  --text-mid:     #6B3FA0;
  --text-light:   #A882CC;
  --card-bg:      #FFFFFF;
  --input-bg:     #F8F6FC;
  --nav-bg:       #FFFFFF;
  --nav-shadow:   rgba(90,26,154,0.06);
}

/* ── SINKRONISASI TOTAL DENGAN USER SIDE (GOPAY-INSPIRED DARK THEME) ── */
html[data-theme="dark"] {
  --purple-soft:  #202124;
  --purple-mid:   #2a2b2f;
  --green-bg:     #0c2a21;
  --red-bg:       #311111;
  --white:        #17181c;
  --bg:           #0a0b0d;
  --card-bg:      #1c1d21;
  --gray-line:    #303135;
  --text-dark:    #e8eaed;
  --text-mid:     #bdc1c6;
  --text-light:   #9aa0a6;
  --input-bg:     #202124;
  --accent-light: #3A241F;
  --nav-bg:       #17181c;
  --nav-shadow:   rgba(0,0,0,0.4);
}

/* Prevent flash sebelum JS jalan */
html { background: var(--bg); }

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  color: var(--text-dark);
  padding-bottom: 90px;
  overflow-x: hidden;
  transition: background 0.25s ease, color 0.25s ease;
}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes shimmer {
  0%   { background-position:200% 0; }
  100% { background-position:-200% 0; }
}

/* ─── HERO HEADER ─── */
.hero {
  background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple) 60%, var(--purple-light) 100%);
  padding: 28px 20px 75px;
  position: relative; overflow: hidden; z-index: 2;
}
.hero::before {
  content:''; position:absolute; top:-40px; right:-20px;
  width:160px; height:160px;
  border:32px solid rgba(255,255,255,0.05); border-radius:50%;
}
.hero-dots {
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 20px 20px; pointer-events:none;
}

.hero-top {
  display:flex; align-items:center; gap:12px;
  max-width: 440px; margin: 0 auto; position:relative; z-index:2;
  animation: fadeUp 0.35s ease both;
}

.back-btn {
  width:36px; height:36px; border-radius:11px;
  background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.18);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:background 0.15s; backdrop-filter:blur(8px);
  text-decoration: none;
}
.back-btn:hover { background:rgba(255,255,255,0.2); }
.back-btn svg { width:18px; height:18px; fill:none; stroke:#fff; stroke-width:2.5; }

.hero-title { flex:1; min-width:0; }
.hero-title h1 {
  font-size:18px; font-weight:900; color:#fff; line-height:1.1; letter-spacing:-0.2px;
}
.hero-title p {
  font-size:11px; color:rgba(255,255,255,0.55); font-weight:700; margin-top:3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ─── THEME TOGGLE ─── */
.theme-toggle {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s; backdrop-filter: blur(6px);
  flex-shrink: 0;
}
.theme-toggle:hover { background: rgba(255,255,255,0.25); transform: scale(1.08); }
.theme-toggle svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2.2; }
.icon-sun  { display: none; }
.icon-moon { display: block; }
html:not([data-theme="dark"]) .icon-sun  { display: block; }
html:not([data-theme="dark"]) .icon-moon { display: none; }

.admin-badge {
  background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.18);
  border-radius:20px; padding:5px 12px;
  font-size:10px; font-weight:800; color:#fff;
  letter-spacing:0.5px; white-space:nowrap; flex-shrink:0;
  backdrop-filter:blur(8px);
}

/* ─── CONTAINER (LOCK DI 440PX) ─── */
.container {
  max-width: 440px; margin: 0 auto;
  padding: 0 16px; position: relative; z-index: 2;
}

/* ─── STATS GRID ─── */
.stats-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:10px; margin:-50px auto 20px;
  position:relative; z-index:20;
  animation: fadeUp 0.38s 0.06s ease both;
}

.stat-card {
  background:var(--card-bg); border-radius:16px; padding:14px;
  box-shadow: 0 8px 24px rgba(90,26,154,0.04);
  border:1px solid var(--gray-line);
  position:relative; overflow:hidden;
  transition: background 0.25s, border-color 0.25s;
}
html[data-theme="dark"] .stat-card { box-shadow: 0 8px 24px rgba(0,0,0,0.2); }

.stat-accent { position:absolute; top:0; left:0; right:0; height:3px; }
.accent-red    { background:linear-gradient(90deg, var(--red), #FF6B6B); }
.accent-green  { background:linear-gradient(90deg, var(--green), #34D399); }
.accent-purple { background:linear-gradient(90deg, var(--purple), var(--purple-light)); }

.stat-icon-wrap {
  width:32px; height:32px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  margin-bottom:10px;
}
.stat-icon-wrap svg { width:16px; height:16px; fill:none; stroke:#fff; stroke-width:2.2; }
.ic-red    { background:linear-gradient(135deg, var(--red-dark), var(--red)); }
.ic-green  { background:linear-gradient(135deg, var(--green-dark), var(--green)); }
.ic-purple { background:linear-gradient(135deg, var(--purple-dark), var(--purple-light)); }

.stat-label {
  font-size:10px; font-weight:800;
  color:var(--text-light); text-transform:uppercase;
  letter-spacing:0.5px; margin-bottom:2px;
}
.stat-value {
  font-size:18px; font-weight:900;
  color:var(--text-dark); line-height:1.1; letter-spacing:-0.2px;
}

.stat-loading {
  width:60%; height:14px;
  background:linear-gradient(90deg, var(--purple-soft) 25%, var(--purple-mid) 50%, var(--purple-soft) 75%);
  background-size:200% 100%; border-radius:4px;
  animation:shimmer 1.4s infinite; margin-top: 4px;
}

/* ─── SECTION TITLE ─── */
.sec-title {
  font-size:13px; font-weight:900; color:var(--text-dark);
  margin: 24px 0 12px; display:flex; align-items:center; gap:6px;
}
.sec-title-pill {
  font-size:9.5px; font-weight:800; background:var(--purple); color:#fff;
  border-radius:6px; padding:2px 8px; letter-spacing:0.5px;
}
html[data-theme="dark"] .sec-title-pill { background: var(--purple-light); }

/* ─── MENU ITEMS ─── */
.menu-item {
  background:var(--card-bg); border-radius:16px; padding:12px 14px;
  display:flex; align-items:center; gap:12px; margin-bottom:10px;
  text-decoration:none; border:1px solid var(--gray-line);
  box-shadow: 0 8px 24px rgba(90,26,154,0.02);
  transition: all 0.2s ease;
  animation: fadeUp 0.38s ease both;
}
html[data-theme="dark"] .menu-item { box-shadow: 0 8px 24px rgba(0,0,0,0.1); }

.menu-item:hover {
  transform: translateY(-2px);
  border-color: var(--purple);
}
html[data-theme="dark"] .menu-item:hover { border-color: var(--purple-light); }

.menu-icon-wrap {
  width:36px; height:36px; border-radius:11px;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.menu-icon-wrap svg { width:18px; height:18px; fill:none; stroke:#fff; stroke-width:2.2; }
.ic-users-menu  { background:linear-gradient(135deg, var(--purple-deep), var(--purple)); }
.ic-ppob-menu   { background:linear-gradient(135deg, var(--purple), var(--purple-light)); }
.ic-trx-menu    { background:linear-gradient(135deg, var(--accent), #FF8E53); }
.ic-topup-menu  { background:linear-gradient(135deg, var(--green-dark), var(--green)); }

.menu-text { flex:1; min-width: 0; }
.menu-label { font-size:13px; font-weight:800; color:var(--text-dark); margin-bottom:1px; }
.menu-desc { font-size:11px; font-weight:600; color:var(--text-light); }
.menu-arrow svg { width:16px; height:16px; fill:none; stroke:var(--text-light); stroke-width:2.5; }

/* ─── BOTTOM NAV (SAMA DENGAN TRIAL / USER SIDE) ─── */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 440px; background: var(--nav-bg);
  border-top: 1px solid var(--gray-line);
  box-shadow: 0 -4px 20px var(--nav-shadow); z-index: 999;
  transition: background 0.25s ease, border-color 0.25s ease;
}
.bottom-nav-inner { display: flex; align-items: center; justify-content: space-around; padding: 10px 0 14px; }
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  text-decoration: none; color: var(--text-light); width: 70px; transition: all 0.2s;
}
.nav-icon svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; transition: transform 0.2s; }
.nav-label { font-size: 9.5px; font-weight: 800; }
.nav-item:hover .nav-icon svg { transform: translateY(-2px); }
.nav-item.active { color: var(--purple); }
html[data-theme="dark"] .nav-item.active { color: var(--purple-light); }
.nav-item.active .nav-icon svg { stroke: var(--purple); }
html[data-theme="dark"] .nav-item.active .nav-icon svg { stroke: var(--purple-light); }

/* ─── TOAST ─── */
.toast {
  position:fixed; top:20px; left:50%;
  transform:translateX(-50%) translateY(-80px); z-index:9999;
  background:var(--text-dark); color:var(--white);
  padding:12px 22px; border-radius:14px;
  font-weight:800; font-size:13px;
  display:flex; align-items:center; gap:8px;
  box-shadow:0 8px 24px rgba(0,0,0,0.2);
  transition:transform 0.3s cubic-bezier(0.34,1.2,0.64,1), opacity 0.3s;
  opacity:0; white-space:nowrap;
}
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
.toast.error { background:linear-gradient(135deg, var(--red-dark), var(--red)); color: #fff; }
</style>
</head>

<script>
// ─── THEME MANAGER SYSTEM (SINKRON DENGAN LOCALSTORAGE USER) ───
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}
(function() {
  const saved = localStorage.getItem('theme');
  if (saved === 'dark' || saved === 'light') {
    document.documentElement.setAttribute('data-theme', saved);
  } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  } else {
    document.documentElement.setAttribute('data-theme', 'light');
  }
})();

const user = JSON.parse(localStorage.getItem('user'));
const token = localStorage.getItem('token');

if (!user || !token || user.role !== 'admin') {
    window.location.replace('dashboard.html');
} else {
    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById('adminEmail').textContent = user.username || user.email || 'Admin';
        loadStats();
    });
}

async function loadStats() {
    try {
        const res = await fetch('/api/admin/stats', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();

        if (!data.success) {
            showToast('⚠️ ' + data.message, 'error');
            return;
        }

        document.getElementById('statUsers').textContent = data.stats.users;
        document.getElementById('statTransactions').textContent = data.stats.transactions;
        document.getElementById('statBalance').textContent = 'Rp ' + Number(data.stats.balance || 0).toLocaleString('id-ID');
    } catch (err) {
        console.error(err);
        showToast('❌ Gagal memuat statistik', 'error');
    }
}

function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type + ' show';
    setTimeout(() => { t.className = 'toast ' + type; }, 2600);
}
</script>
