<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #3D0F72;
  --purple-light: #9B4FDE;
  --purple-soft:  #F3EAFD;
  --purple-mid:   #EAD5FA;
  --green:        #12C28A;
  --green-bg:     #E6FAF4;
  --red:          #E84040;
  --red-bg:       #FFECEC;
  --red-dark:     #B91C1C;
  --blue:         #0070E0;
  --blue-bg:      #E8F1FD;
  --white:        #FFFFFF;
  --bg:           #F7F0FD;
  --card-bg:      #FFFFFF;
  --gray-line:    #E8D8F8;
  --text-dark:    #1A0533;
  --text-mid:     #6B3FA0;
  --text-light:   #A882CC;
}

[data-theme="dark"] {
  --white:        #1E1130;
  --bg:           #120B22;
  --gray-line:    #2A1D42;
  --text-dark:    #F0E8FF;
  --text-mid:     #C4A0EE;
  --text-light:   #7A5BAA;
  --card-bg:      #1E1130;
  --purple-soft:  #2D1A50;
  --purple-mid:   #3D2265;
  --red-bg:       #3A1F1F;
  --green-bg:     #143A2E;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  overflow-x: hidden;
  padding-bottom: 40px;
  color: var(--text-dark);
  transition: background 0.3s ease, color 0.3s ease;
}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes shimmer {
  0%   { background-position:200% 0; }
  100% { background-position:-200% 0; }
}

/* ─── HERO HEADER ─── */
.hero {
  background: linear-gradient(150deg, var(--red-dark) 0%, var(--red) 55%, #F87171 100%);
  padding: 24px 20px 64px;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.45s ease both;
}
.hero::before {
  content:'';
  position:absolute; top:-50px; right:-30px;
  width:200px; height:200px;
  border:48px solid rgba(255,255,255,0.07);
  border-radius:50%;
}
.hero::after {
  content:'';
  position:absolute; bottom:-60px; left:-30px;
  width:170px; height:170px;
  border:36px solid rgba(255,214,0,0.10);
  border-radius:50%;
}
.hero-dots {
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size: 22px 22px;
  pointer-events:none;
}

.hero-top {
  display:flex; align-items:center; gap:14px;
  position:relative; z-index:2;
}

.back-btn {
  width:40px; height:40px; border-radius:13px;
  background:rgba(255,255,255,0.14);
  border:1px solid rgba(255,255,255,0.2);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; text-decoration:none; flex-shrink:0;
  backdrop-filter:blur(8px);
  transition:background 0.15s;
}
.back-btn:hover { background:rgba(255,255,255,0.24); }
.back-btn svg {
  width:20px; height:20px; fill:none;
  stroke:#fff; stroke-width:2.5;
  stroke-linecap:round; stroke-linejoin:round;
}

.hero-title { flex:1; }
.hero-title h1 {
  font-size:20px; font-weight:900;
  color:#fff; line-height:1.1; letter-spacing:-0.3px;
}
.hero-title p {
  font-size:12px; color:rgba(255,255,255,0.6);
  font-weight:700; margin-top:3px;
}

/* ─── THEME TOGGLE FOR ADMIN ─── */
.theme-toggle {
  width: 40px; height: 40px; border-radius: 13px;
  background: rgba(255,255,255,0.14);
  border: 1px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s;
  backdrop-filter: blur(8px);
  flex-shrink: 0;
}
.theme-toggle:hover { background: rgba(255,255,255,0.24); transform: scale(1.05); }
.theme-toggle svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2.3; }
.icon-sun { display: none; }
.icon-moon { display: block; }
[data-theme="dark"] .icon-sun  { display: block; }
[data-theme="dark"] .icon-moon { display: none; }

.admin-badge {
  background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.25);
  border-radius:20px; padding:5px 14px;
  font-size:11px; font-weight:900; color:#fff;
  letter-spacing:0.8px; white-space:nowrap; flex-shrink:0;
}

/* ─── CONTAINER ─── */
.container {
  max-width:480px; margin:0 auto;
  padding:0 18px;
}

/* ─── STATS GRID ─── */
.stats-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:12px;
  margin:-45px 0 20px;
  position:relative; z-index:10;
  animation: fadeUp 0.45s 0.1s ease both;
}

.stat-card {
  background:var(--card-bg);
  border-radius:18px; padding:16px;
  box-shadow:0 4px 18px rgba(90,26,154,0.06), 0 2px 6px rgba(0,0,0,0.02);
  border:1px solid var(--gray-line);
  position:relative; overflow:hidden;
  transition: background 0.3s, border-color 0.3s;
}

.stat-accent {
  position:absolute; top:0; left:0; right:0; height:3px;
  border-radius:18px 18px 0 0;
}
.accent-red    { background:linear-gradient(90deg, var(--red-dark), var(--red)); }
.accent-green  { background:linear-gradient(90deg, var(--green), #34D399); }
.accent-purple { background:linear-gradient(90deg, var(--purple-dark), var(--purple-light)); }

.stat-icon-wrap {
  width:38px; height:38px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  margin-bottom:10px;
}
.stat-icon-wrap svg {
  width:20px; height:20px; fill:none;
  stroke:#fff; stroke-width:2;
  stroke-linecap:round; stroke-linejoin:round;
}
.ic-red    { background:linear-gradient(135deg, var(--red-dark), var(--red)); }
.ic-green  { background:linear-gradient(135deg, #0A9E70, var(--green)); }
.ic-purple { background:linear-gradient(135deg, var(--purple-dark), var(--purple-light)); }

.stat-label {
  font-size:10px; font-weight:800;
  color:var(--text-light); text-transform:uppercase;
  letter-spacing:0.8px; margin-bottom:4px;
}
.stat-value {
  font-size:24px; font-weight:900;
  color:var(--text-dark); line-height:1; letter-spacing:-0.5px;
}
.stat-value.small { font-size:15px; }

.stat-loading {
  width:55%; height:20px;
  background:linear-gradient(90deg, var(--purple-mid) 25%, var(--purple-soft) 50%, var(--purple-mid) 75%);
  background-size:200% 100%;
  border-radius:8px;
  animation:shimmer 1.4s infinite;
}

/* ─── SECTION TITLE ─── */
.sec-title {
  font-size:15px; font-weight:900;
  color:var(--text-dark);
  margin-bottom:12px;
  display:flex; align-items:center; gap:8px;
  letter-spacing:-0.2px;
}
.sec-title-pill {
  font-size:10px; font-weight:800;
  background:var(--red); color:#fff;
  border-radius:20px; padding:2px 10px; letter-spacing:0.5px;
}

/* ─── MENU ITEMS ─── */
.menu-item {
  background:var(--card-bg);
  border-radius:18px; padding:16px 18px;
  display:flex; align-items:center; gap:14px;
  margin-bottom:10px;
  text-decoration:none;
  border:1.5px solid var(--gray-line);
  box-shadow:0 2px 10px rgba(90,26,154,0.03);
  transition:transform 0.15s, box-shadow 0.15s, border-color 0.15s, background 0.3s;
  animation: fadeUp 0.4s ease both;
}
.menu-item:hover {
  transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(90,26,154,0.12);
  border-color:var(--text-mid);
}
.menu-item:active { transform:translateY(0); }

.menu-icon-wrap {
  width:50px; height:50px; border-radius:16px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.menu-icon-wrap svg {
  width:22px; height:22px; fill:none;
  stroke:#fff; stroke-width:2;
  stroke-linecap:round; stroke-linejoin:round;
}
.ic-users-menu  { background:linear-gradient(135deg, var(--purple-dark), var(--purple-light)); box-shadow:0 4px 12px rgba(123,47,190,0.25); }
.ic-ppob-menu   { background:linear-gradient(135deg, #7B2FBE, #9B4FDE); box-shadow:0 4px 12px rgba(123,47,190,0.2); }
.ic-trx-menu    { background:linear-gradient(135deg, var(--red-dark), var(--red)); box-shadow:0 4px 12px rgba(232,64,64,0.2); }
.ic-topup-menu  { background:linear-gradient(135deg, #12C28A, #00E676); box-shadow:0 4px 12px rgba(18,194,138,0.25); }

.menu-text { flex:1; }
.menu-label {
  font-size:15px; font-weight:900;
  color:var(--text-dark); margin-bottom:2px; letter-spacing:-0.2px;
}
.menu-desc {
  font-size:12px; font-weight:700; color:var(--text-light);
}

.menu-arrow {
  font-size:20px; color:var(--text-light);
  transition:color 0.15s, transform 0.15s;
}
.menu-item:hover .menu-arrow {
  color:var(--purple); transform:translateX(3px);
}

/* ─── ACTION ROW ─── */
.action-row {
  display:grid; grid-template-columns:1fr 1fr;
  gap:12px; margin-top:16px;
  animation: fadeUp 0.4s 0.35s ease both;
}

.action-btn {
  padding:14px 10px;
  border:none; border-radius:14px;
  font-family:'Nunito',sans-serif;
  font-weight:900; font-size:14px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:transform 0.15s, box-shadow 0.15s, background 0.3s;
  text-decoration:none;
}
.action-btn svg {
  width:18px; height:18px; fill:none;
  stroke:#fff; stroke-width:2.5;
  stroke-linecap:round; stroke-linejoin:round;
}
.action-btn:hover  { transform:translateY(-2px); }
.action-btn:active { transform:translateY(0); }

.btn-dashboard {
  background:linear-gradient(135deg, var(--purple-dark), var(--purple-light));
  color:#fff;
  box-shadow:0 4px 14px rgba(123,47,190,0.25);
}
.btn-dashboard:hover { box-shadow:0 8px 20px rgba(123,47,190,0.35); }

.btn-logout {
  background:var(--card-bg);
  color:var(--red);
  border:1.5px solid rgba(232,64,64,0.3);
}
.btn-logout svg { stroke:var(--red); }
.btn-logout:hover { background:var(--red-bg); border-color:var(--red); }

/* ─── TOAST ─── */
.toast {
  position:fixed; top:20px; left:50%;
  transform:translateX(-50%) translateY(-80px);
  z-index:999;
  background:var(--text-dark); color:var(--white);
  padding:12px 22px; border-radius:14px;
  font-weight:800; font-size:13px;
  display:flex; align-items:center; gap:8px;
  box-shadow:0 8px 24px rgba(0,0,0,0.2);
  transition:transform 0.3s cubic-bezier(0.34,1.2,0.64,1), opacity 0.3s;
  opacity:0; white-space:nowrap;
}
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
.toast.error { background:linear-gradient(135deg, var(--red-dark), var(--red)); color: #fff; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-dots"></div>
  <div class="hero-top">
    <a class="back-btn" href="dashboard.html" aria-label="Kembali ke Dashboard">
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </a>
    <div class="hero-title">
      <h1>Admin Panel</h1>
      <p id="adminEmail">Memuat data...</p>
    </div>
    
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle tema" style="margin-right: 6px;">
      <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    
    <div class="admin-badge">ADMIN</div>
  </div>
</div>

<div class="container">

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-accent accent-red"></div>
      <div class="stat-icon-wrap ic-red">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <div class="stat-label">Total User</div>
      <div class="stat-value" id="statUsers"><div class="stat-loading"></div></div>
    </div>    

    <div class="stat-card">
      <div class="stat-accent accent-green"></div>
      <div class="stat-icon-wrap ic-green">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      </div>
      <div class="stat-label">Transaksi</div>
      <div class="stat-value" id="statTransactions"><div class="stat-loading"></div></div>
    </div>

    <div class="stat-card">
      <div class="stat-accent accent-purple"></div>
      <div class="stat-icon-wrap ic-purple">
        <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      </div>
      <div class="stat-label">Total Saldo</div>
      <div class="stat-value small" id="statBalance"><div class="stat-loading"></div></div>
    </div>
  </div>

  <div class="sec-title">
    Menu <span class="sec-title-pill">Admin</span>
  </div>

  <a class="menu-item" href="admin-users.html" style="animation-delay:0.20s;">
    <div class="menu-icon-wrap ic-users-menu">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    </div>
    <div class="menu-text">
      <div class="menu-label">Kelola User</div>
      <div class="menu-desc">Lihat & atur semua pengguna</div>
    </div>
    <div class="menu-arrow">›</div>
  </a>
  
  <a class="menu-item" href="admin-history-ppob.html" style="animation-delay:0.25s;">
    <div class="menu-icon-wrap ic-ppob-menu">
      <svg viewBox="0 0 24 24">
        <line x1="18" y1="20" x2="18" y2="10"></line>
        <line x1="12" y1="20" x2="12" y2="4"></line>
        <line x1="6" y1="20" x2="6" y2="14"></line>
      </svg>
    </div>
    <div class="menu-text">
      <div class="menu-label">Transaksi PPOB</div>
      <div class="menu-desc">Pantau & kelola semua top up user</div>
    </div>
    <div class="menu-arrow">›</div>
  </a>

  <a class="menu-item" href="admin-transactions.html" style="animation-delay:0.30s;">
    <div class="menu-icon-wrap ic-trx-menu">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    </div>
    <div class="menu-text">
      <div class="menu-label">Riwayat Transaksi VPN</div>
      <div class="menu-desc">Monitor semua transaksi akun VPN</div>
    </div>
    <div class="menu-arrow">›</div>
  </a>
  
  <a class="menu-item" href="admin-topup.html" style="animation-delay:0.35s;">
    <div class="menu-icon-wrap ic-topup-menu">
      <svg viewBox="0 0 24 24">
        <line x1="12" y1="1" x2="12" y2="23"/>
        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
      </svg>
    </div>
    <div class="menu-text">
      <div class="menu-label">Riwayat Topup</div>
      <div class="menu-desc">Monitor semua deposit user</div>
    </div>
    <div class="menu-arrow">›</div>
  </a>

  <div class="action-row">
    <a class="action-btn btn-dashboard" href="dashboard.html">
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      Dashboard
    </a>
    <button class="action-btn btn-logout" onclick="logout()">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Logout
    </button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ─── THEME MANAGER SYSTEM ───
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('xt-theme', next);
}
(function() {
  const saved = localStorage.getItem('xt-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
})();

const user = JSON.parse(localStorage.getItem('user'));
const token = localStorage.getItem('token');

if (!user || !token || user.role !== 'admin') {
    window.location.replace('dashboard.html');
} else {
    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById('adminEmail').textContent = user.username || user.email || 'Admin';
        loadStats();
    });
}

async function loadStats() {
    try {
        const res = await fetch('/api/admin/stats', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();

        if (!data.success) {
            showToast('⚠️ ' + data.message, 'error');
            return;
        }

        document.getElementById('statUsers').textContent = data.stats.users;
        document.getElementById('statTransactions').textContent = data.stats.transactions;
        document.getElementById('statBalance').textContent = 'Rp ' + Number(data.stats.balance || 0).toLocaleString('id-ID');
    } catch (err) {
        console.error(err);
        showToast('❌ Gagal memuat statistik', 'error');
    }
}

function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type + ' show';
    setTimeout(() => { t.className = 'toast ' + type; }, 2600);
}

function logout() {
    if (confirm('Yakin mau keluar?')) {
        localStorage.removeItem('user');
        localStorage.removeItem('token');
        window.location.href = 'index.html';
    }
}
</script>
</body>
</html>
