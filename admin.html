<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #3D0F72;
  --purple-light: #9B4FDE;
  --purple-soft:  #F3EAFD;
  --purple-mid:   #EAD5FA;
  --green:        #12C28A;
  --green-bg:     #E6FAF4;
  --red:          #E84040;
  --red-bg:       #FFECEC;
  --red-dark:     #B91C1C;
  --blue:         #0070E0;
  --blue-bg:      #E8F1FD;
  --white:        #FFFFFF;
  --bg:           #F4F0FA; /* Disamakan dengan dashboard */
  --card-bg:      #FFFFFF;
  --gray-line:    #EEF0F6; /* Disamakan dengan dashboard agar konsisten */
  --text-dark:    #1A0533;
  --text-mid:     #6B3FA0;
  --text-light:   #A882CC;
  --nav-bg:       #FFFFFF;
  --nav-border:   #EEF0F6;
  --nav-active:   #7B2FBE;
}

[data-theme="dark"] {
  --white:        #1E1130;
  --bg:           #120B22;
  --gray-line:    #2A1D42;
  --text-dark:    #F0E8FF;
  --text-mid:     #C4A0EE;
  --text-light:   #7A5BAA;
  --card-bg:      #1E1130;
  --nav-bg:       #17102A;
  --nav-border:   #2A1D42;
  --purple-soft:  #2D1A50;
  --purple-mid:   #3D2265;
  --red-bg:       #3A1F1F;
  --green-bg:     #143A2E;
  --nav-active:   #C4A0EE;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  overflow-x: hidden;
  padding-bottom: 100px; /* Disamakan dengan dashboard */
  color: var(--text-dark);
  transition: background 0.3s ease, color 0.3s ease;
}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); } /* Disamakan 14px */
  to   { opacity:1; transform:translateY(0); }
}
@keyframes shimmer {
  0%   { background-position:200% 0; }
  100% { background-position:-200% 0; }
}

/* ─── HERO HEADER ─── */
.hero {
  background: linear-gradient(150deg, var(--red-dark) 0%, var(--red) 55%, #F87171 100%);
  padding: 22px 20px 80px; /* Diubah agar depth penutupan card-nya pas */
  position: relative;
  overflow: hidden;
}
.hero::before {
  content:'';
  position:absolute; top:-50px; right:-30px;
  width:200px; height:200px;
  border:48px solid rgba(255,255,255,0.07);
  border-radius:50%;
}
.hero::after {
  content:'';
  position:absolute; bottom:-60px; left:-30px;
  width:170px; height:170px;
  border:36px solid rgba(255,214,0,0.10);
  border-radius:50%;
}
.hero-dots {
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.055) 1px, transparent 1px);
  background-size: 22px 22px;
  pointer-events:none;
}

.hero-top {
  display:flex; align-items:center; gap:16px; /* Disamakan 16px */
  position:relative; z-index:2;
  max-width: 440px; margin: 0 auto; /* Lock ukuran atas */
  animation: fadeUp 0.35s ease both;
}

.back-btn {
  width:36px; height:36px; border-radius:11px; /* Dibuat lebih slim */
  background:rgba(255,255,255,0.15);
  border:1.5px solid rgba(255,255,255,0.2);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; text-decoration:none; flex-shrink:0;
  backdrop-filter:blur(6px);
  transition:all 0.2s;
}
.back-btn:hover { background:rgba(255,255,255,0.25); transform: scale(1.05); }
.back-btn svg {
  width:16px; height:16px; fill:none;
  stroke:#fff; stroke-width:2.5;
}

.hero-title { flex:1; }
.hero-title h1 {
  font-size:20px; font-weight:900;
  color:#fff; line-height:1.15; letter-spacing:-0.4px;
}
.hero-title p {
  font-size:11px; color:rgba(255,255,255,0.6);
  font-weight:600; margin-top:3px;
}

/* ─── THEME TOGGLE ─── */
.theme-toggle {
  width: 36px; height: 36px; border-radius: 50%; /* Bulat presisi seperti dashboard */
  background: rgba(255,255,255,0.15);
  border: 1.5px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s;
  backdrop-filter: blur(6px);
  flex-shrink: 0;
}
.theme-toggle:hover { background: rgba(255,255,255,0.25); transform: scale(1.08); }
.theme-toggle svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2.2; }
.icon-sun { display: none; }
.icon-moon { display: block; }
[data-theme="dark"] .icon-sun  { display: block; }
[data-theme="dark"] .icon-moon { display: none; }

.admin-badge {
  background:rgba(255,255,255,0.18);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:6px; padding:2px 8px;
  font-size:8.5px; font-weight:900; color:#fff;
  letter-spacing:0.5px; white-space:nowrap; flex-shrink:0;
  text-transform: uppercase;
}

/* ─── CONTAINER (LOCK DI 440PX) ─── */
.container {
  max-width: 440px; margin: 0 auto;
  padding: 0 16px;
}

/* ─── STATS GRID ─── */
.stats-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:10px; /* Disamakan 10px */
  margin:-50px auto 20px; /* Sinking effect disamakan dashboard */
  position:relative; z-index:20;
  animation: fadeUp 0.38s 0.06s ease both;
}

.stat-card {
  background:var(--card-bg);
  border-radius:18px; padding:13px 16px; /* Sizing padding presisi balance-card */
  box-shadow: 0 10px 28px rgba(60,15,114,0.08), 0 1px 4px rgba(0,0,0,0.02);
  border:1px solid var(--gray-line);
  position:relative; overflow:hidden;
  transition: background 0.3s, border-color 0.3s;
}

.stat-accent {
  position:absolute; top:0; left:0; right:0; height:3px;
}
.accent-red    { background:linear-gradient(90deg, var(--red-dark), var(--red)); }
.accent-green  { background:linear-gradient(90deg, var(--green), #34D399); }
.accent-purple { background:linear-gradient(90deg, var(--purple-dark), var(--purple-light)); }

.stat-icon-wrap {
  width:36px; height:36px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  margin-bottom:8px;
}
.stat-icon-wrap svg {
  width:18px; height:18px; fill:none;
  stroke:#fff; stroke-width:2;
}
.ic-red    { background:linear-gradient(135deg, var(--red-dark), var(--red)); }
.ic-green  { background:linear-gradient(135deg, #0A9E70, var(--green)); }
.ic-purple { background:linear-gradient(135deg, var(--purple-dark), var(--purple-light)); }

.stat-label {
  font-size:9.5px; font-weight:800;
  color:var(--text-light); text-transform:uppercase;
  letter-spacing:1px; margin-bottom:2px;
}
.stat-value {
  font-size:20px; font-weight:900;
  color:var(--text-dark); line-height:1.1; letter-spacing:-0.5px;
}
.stat-value.small { font-size:14px; }

.stat-loading {
  width:55%; height:16px;
  background:linear-gradient(90deg, var(--purple-soft) 25%, var(--purple-mid) 50%, var(--purple-soft) 75%);
  background-size:200% 100%;
  border-radius:6px;
  animation:shimmer 1.4s infinite;
}

/* ─── SECTION TITLE ─── */
.sec-title {
  font-size:13.5px; font-weight:900;
  color:var(--text-dark);
  margin-bottom:12px;
  display:flex; align-items:center; gap:6px;
  letter-spacing:-0.1px;
}
.sec-title-pill {
  font-size:9.5px; font-weight:800;
  background:var(--red); color:#fff;
  border-radius:6px; padding:2px 8px; letter-spacing:0.5px;
}

/* ─── MENU ITEMS (UTIL STYLE CONSISTENCY) ─── */
.menu-item {
  background:var(--card-bg);
  border-radius:14px; padding:12px 14px; /* Samakan dgn util-card dashboard */
  display:flex; align-items:center; gap:12px;
  margin-bottom:10px;
  text-decoration:none;
  border:1px solid var(--gray-line);
  box-shadow: 0 2px 6px rgba(0,0,0,0.02);
  transition: all 0.18s cubic-bezier(0.16,1,0.3,1);
  animation: fadeUp 0.38s 0.14s ease both;
}
.menu-item:hover {
  transform:translateY(-2px);
  box-shadow: 0 6px 16px rgba(0,0,0,0.06);
}
.menu-item:active { transform: scale(0.98); }

.menu-icon-wrap {
  width:38px; height:38px; border-radius:10px; /* Samakan dgn util-icon dashboard */
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.menu-icon-wrap svg {
  width:17px; height:17px; fill:none;
  stroke:#fff; stroke-width:2.2;
}
.ic-users-menu  { background:linear-gradient(135deg, var(--purple-dark), var(--purple-light)); box-shadow:0 3px 8px rgba(123,47,190,0.15); }
.ic-ppob-menu   { background:linear-gradient(135deg, #7B2FBE, #9B4FDE); box-shadow:0 3px 8px rgba(123,47,190,0.15); }
.ic-trx-menu    { background:linear-gradient(135deg, var(--red-dark), var(--red)); box-shadow:0 3px 8px rgba(232,64,64,0.15); }
.ic-topup-menu  { background:linear-gradient(135deg, #12C28A, #00E676); box-shadow:0 3px 8px rgba(18,194,138,0.15); }

.menu-text { flex:1; min-width: 0; }
.menu-label {
  font-size:13px; font-weight:800;
  color:var(--text-dark); margin-bottom:1px;
}
.menu-desc {
  font-size:10.5px; font-weight:600; color:var(--text-light);
}

.menu-arrow svg {
  width:15px; height:15px; fill:none;
  stroke:var(--text-light); stroke-width:2.5;
}

/* ─── BOTTOM NAV ─── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--nav-bg); border-top: 1px solid var(--nav-border);
  display: flex; padding: 10px 0 14px;
  box-shadow: 0 -4px 20px rgba(90,26,154,0.05); z-index: 100;
  transition: background 0.3s, border-color 0.3s;
}
.bottom-nav-inner {
  display: flex; width: 100%; max-width: 440px; margin: 0 auto;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; text-decoration: none;
}
.nav-icon svg {
  width: 20px; height: 20px; fill: none; stroke: var(--text-light); stroke-width: 2.2; transition: stroke 0.2s;
}
.nav-label { font-size: 9.5px; font-weight: 800; color: var(--text-light); transition: color 0.2s; }
.nav-item.active .nav-label { color: var(--purple); }
.nav-item.active .nav-icon svg { stroke: var(--purple); }

/* ─── TOAST ─── */
.toast {
  position:fixed; top:20px; left:50%;
  transform:translateX(-50%) translateY(-80px);
  z-index:999;
  background:var(--text-dark); color:var(--white);
  padding:12px 22px; border-radius:14px;
  font-weight:800; font-size:13px;
  display:flex; align-items:center; gap:8px;
  box-shadow:0 8px 24px rgba(0,0,0,0.2);
  transition:transform 0.3s cubic-bezier(0.34,1.2,0.64,1), opacity 0.3s;
  opacity:0; white-space:nowrap;
}
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
.toast.error { background:linear-gradient(135deg, var(--red-dark), var(--red)); color: #fff; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-dots"></div>
  <div class="hero-top">
    <a class="back-btn" href="dashboard.html" aria-label="Kembali ke Dashboard">
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>

    <div class="hero-title">

    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle tema" style="margin-right: 6px;">
      <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    
    <div class="admin-badge">ADMIN</div>
  </div>
</div>

<div class="container">

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-accent accent-red"></div>
      <div class="stat-icon-wrap ic-red">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>

      <div class="stat-value" id="statUsers"><div class="stat-loading"></div></div>

    <div class="stat-card">
      <div class="stat-accent accent-green"></div>
      <div class="stat-icon-wrap ic-green">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>

  <a class="menu-item" href="admin-transactions.html" style="animation-delay:0.30s;">

    </div>
    <div class="menu-text">

  <a class="menu-item" href="admin-topup.html" style="animation-delay:0.35s;">

</div>

<div class="toast" id="toast"></div>

<script>
// ─── THEME MANAGER SYSTEM ───
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('xt-theme', next);
}
(function() {
  const saved = localStorage.getItem('xt-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
})();

const user = JSON.parse(localStorage.getItem('user'));
const token = localStorage.getItem('token');

if (!user || !token || user.role !== 'admin') {
    window.location.replace('dashboard.html');
} else {
    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById('adminEmail').textContent = user.username || user.email || 'Admin';
        loadStats();
    });
}

async function loadStats() {
    try {
        const res = await fetch('/api/admin/stats', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();

        if (!data.success) {
            showToast('⚠️ ' + data.message, 'error');
            return;
        }

        document.getElementById('statUsers').textContent = data.stats.users;
        document.getElementById('statTransactions').textContent = data.stats.transactions;
        document.getElementById('statBalance').textContent = 'Rp ' + Number(data.stats.balance || 0).toLocaleString('id-ID');
    } catch (err) {
        console.error(err);
        showToast('❌ Gagal memuat statistik', 'error');
    }
}

function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type + ' show';
    setTimeout(() => { t.className = 'toast ' + type; }, 2600);
}
</script>
