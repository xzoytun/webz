<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Topup Logs - Xtrimer Tunnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght=400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>

:root {
  --purple:    #6B21D6;
  --purple2:   #8B3FF5;
  --bg-light:  #F6F0FF;
  --card:      #FFFFFF;
  --border:    #EDE0FF;
  --text-dark: #1a0033;
  --text-mid:  #5B3A8C;
  --muted:     #B0A0C0;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg-light);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  color: var(--text-dark);
  padding-bottom: 40px;
  overflow-x: hidden;
}

.blob1 {
  position:fixed; top:-80px; left:-60px;
  width:300px; height:300px;
  background:radial-gradient(circle,rgba(107,33,214,0.12) 0%,transparent 70%);
  pointer-events:none; z-index:0;
}
.blob2 {
  position:fixed; bottom:-60px; right:-60px;
  width:260px; height:260px;
  background:radial-gradient(circle,rgba(107,33,214,0.08) 0%,transparent 70%);
  pointer-events:none; z-index:0;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(145deg, var(--purple) 0%, var(--purple2) 60%, #A855F7 100%);
  padding: 22px 20px 32px;
  position: relative; overflow: hidden; z-index: 2;
}
.header::before {
  content:''; position:absolute; top:-40px; right:-30px;
  width:180px; height:180px; background:rgba(255,255,255,0.07); border-radius:50%;
}
.header-inner {
  display:flex; align-items:center; gap:14px; position:relative; z-index:2;
}
.back-btn-hdr {
  width:40px; height:40px; border-radius:12px;
  background:rgba(255,255,255,0.15); border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:#fff; text-decoration:none; flex-shrink:0; transition:background 0.15s;
}
.back-btn-hdr:hover { background:rgba(255,255,255,0.25); }
.back-btn-hdr svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

.header-title { flex:1; }
.header-title h1 {
  font-family:'Fredoka One',cursive;
  font-size:22px; color:#fff; line-height:1;
  display:flex; align-items:center; gap:8px;
}
.header-title h1 svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.header-title p { font-size:12px; color:rgba(255,255,255,0.7); font-weight:600; margin-top:4px; }
.header-count {
  background:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.3);
  border-radius:20px; padding:5px 14px;
  font-size:11px; font-weight:800; color:#fff; white-space:nowrap;
}

/* ── CONTAINER ── */
.container {
  max-width:480px; margin:0 auto;
  padding:0 18px; position:relative; z-index:2;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── TOOLBAR / SEARCH ── */
.toolbar {
  background:var(--white);
  border-radius:18px; padding:14px;
  border:1.5px solid var(--border);
  box-shadow:0 4px 14px rgba(107,33,214,0.10);
  margin-top:-18px; margin-bottom:14px;
  position:relative; z-index:5;
  animation: fadeUp 0.4s 0.05s ease both;
}
.search-row {
  display:flex; align-items:center; gap:10px;
  background:#FBF8FF; border-radius:12px;
  border:1.5px solid var(--border); padding:10px 14px;
  transition:border-color 0.15s;
}
.search-row:focus-within { border-color:var(--purple2); }
.search-row svg { color:var(--muted); flex-shrink:0; width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
.search-input {
  flex:1; border:none; outline:none;
  font-family:'Nunito',sans-serif; font-size:14px; font-weight:700;
  color:var(--text-dark); background:transparent;
}
.search-input::placeholder { color:#C4B0D8; font-weight:600; }

/* ── LOGS CARDS ── */
.logs-wrap {
  display:flex;
  flex-direction:column;
  gap:10px;
  animation: fadeUp 0.4s 0.10s ease both;
}

.log-card {
  background:var(--card);
  border-radius:18px;
  border:1.5px solid var(--border);
  padding:16px;
  box-shadow:0 2px 10px rgba(107,33,214,0.06);
  transition:transform 0.15s, box-shadow 0.15s;
}
.log-card:hover {
  transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(107,33,214,0.10);
}

.top-row {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
  gap:10px;
}

.username {
  font-family:'Fredoka One',cursive;
  font-size:16px;
  color:var(--text-dark);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.amount {
  font-size:17px;
  font-weight:900;
  color:var(--purple);
  white-space: nowrap;
}

.info {
  display:flex;
  flex-direction:column;
  gap:6px;
  background:#FBF8FF;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
}

.info-item {
  display:flex;
  justify-content:space-between;
  gap:16px;
}

.label {
  font-size:12px;
  font-weight:800;
  color:var(--text-mid);
  opacity:0.8;
}

.value {
  font-size:12px;
  font-weight:800;
  color:var(--text-dark);
  text-align:right;
  word-break:break-all;
}

/* ── EMPTY / LOADING STATES ── */
.empty-state, .loading-state {
  text-align:center; padding:44px 20px;
  display:flex; flex-direction:column; align-items:center; gap:12px;
}
.empty-icon svg { width: 52px; height: 52px; fill: none; stroke: currentColor; color:#C4B0D8; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.loading-icon svg { width: 36px; height: 36px; fill: none; stroke: var(--purple); stroke-width: 2.5; stroke-linecap: round; animation:spin 1s linear infinite; }
.empty-title {
  font-family:'Fredoka One',cursive;
  font-size:18px; color:var(--text-dark);
}
.empty-sub { font-size:13px; color:var(--text-mid); font-weight:600; }

/* ── BACK BTN ── */
.back-btn {
  width:100%; padding:14px; margin-top:14px;
  border:2px solid var(--border); border-radius:16px;
  background:var(--white); color:var(--text-mid);
  font-family:'Nunito',sans-serif; font-weight:800; font-size:14px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:6px;
  transition:border-color 0.15s, color 0.15s;
}
.back-btn:hover { border-color:var(--purple2); color:var(--purple); }
.back-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

</style>
</head>
<body>

<div class="blob1"></div>
<div class="blob2"></div>

<div class="header">
  <div class="header-inner">
    <a class="back-btn-hdr" href="admin.html">
      <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    </a>
    <div class="header-title">
      <h1>
        <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
        Topup Logs
      </h1>
      <p id="subtitle">Memuat data...</p>
    </div>
    <div class="header-count" id="countBadge">—</div>
  </div>
</div>

<div class="container">

  <div class="toolbar">
    <div class="search-row">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input class="search-input" id="searchInput" type="text"
        placeholder="Cari nama user / email / ref..."
        oninput="applyFilter()">
    </div>
  </div>

  <div id="logs" class="logs-wrap">
    <div class="loading-state">
      <div class="loading-icon">
        <svg viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>
      </div>
      <div class="empty-title">Memuat data...</div>
    </div>
  </div>

  <button class="back-btn" onclick="location.href='admin.html'">
    <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    Kembali ke Admin Panel
  </button>

</div>

<script>

let allLogs = [];
const token = localStorage.getItem('token'); // Mengambil token JWT backend
const localUser = JSON.parse(localStorage.getItem('user'));

// Proteksi Halaman Admin
if (!localUser || !token) {
  location.href = 'index.html';
} else if (localUser.role !== 'admin') {
  alert('Akses ditolak!');
  location.href = 'dashboard.html';
}

const svgSearchTemplate = `<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>`;
const svgAlertTemplate  = `<svg viewBox="0 0 24 24" style="fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><line x1="1" y1="1" x2="23" y2="23"></line><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.5c0 0-4 7.5-11 7.5a10.42 10.42 0 0 1-3.64-.67"></path><path d="M6.62 6.62A10.71 10.71 0 0 0 1 12.5c0 0 4 7.5 11 7.5a11.12 11.12 0 0 0 5-.12"></path><path d="M22 12.5a11.16 11.16 0 0 0-2.3-3.06"></path><path d="M10.59 10.59a3 3 0 1 0 4.24 4.24"></path></svg>`;

loadLogs();

async function loadLogs() {
  try {
    // FIX 1: Format header Authorization disesuaikan menjadi Bearer Token
    const response = await fetch('/api/admin/topup-history', {
      method: 'GET',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      }
    });
    
    const result = await response.json();
    const container = document.getElementById('logs');

    if (!result.success) {
      container.innerHTML = errorState(result.message || 'Gagal memuat data dari server');
      return;
    }

    allLogs = result.data || [];
    applyFilter();

  } catch (err) {
    console.error(err);
    document.getElementById('logs').innerHTML = errorState('Server error atau tidak terhubung');
  }
}

function applyFilter() {
  const kw = document.getElementById('searchInput').value.toLowerCase();

  const filtered = allLogs.filter(item => {
    return (
      (item.username || '').toLowerCase().includes(kw) ||
      (item.reference || '').toLowerCase().includes(kw) ||
      (item.metode || '').toLowerCase().includes(kw)
    );
  });

  // FIX 2: Perubahan tanda kutip dua ke backtick (`) agar text interpolasi berfungsi dengan benar
  document.getElementById('subtitle').textContent = `Menampilkan ${filtered.length} riwayat`;
  document.getElementById('countBadge').textContent = allLogs.length + ' Total';

  renderList(filtered);
}

function renderList(data) {
  const container = document.getElementById('logs');

  if (data.length < 1) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${svgSearchTemplate}</div>
        <div class="empty-title">Tidak Ada Data</div>
        <div class="empty-sub">Belum ada riwayat transaksi topup yang cocok</div>
      </div>
    `;
    return;
  }

  let html = '';

  data.forEach((item, i) => {
    const dateFormatted = (item.created_at || '')
      .replace('T', ' ')
      .slice(0, 16) || '-';

    const cleanAmount = Number(item.amount || 0).toLocaleString('id-ID');

    html += `
    <div class="log-card" style="animation: fadeUp .35s ${i * 0.04}s ease both;">
      <div class="top-row">
        <div class="username">${item.username || 'Unknown User'}</div>
        <div class="amount">Rp ${cleanAmount}</div>
      </div>
      <div class="info">
        <div class="info-item">
          <div class="label">User</div>
          <div class="value">${item.username || '-'}</div>
        </div>
        <div class="info-item">
          <div class="label">Metode</div>
          <div class="value">${item.metode || '-'}</div>
        </div>
        <div class="info-item">
          <div class="label">Reference</div>
          <div class="value">${item.reference || '-'}</div>
        </div>
        <div class="info-item">
          <div class="label">Tanggal</div>
          <div class="value">${dateFormatted}</div>
        </div>
      </div>
    </div>
    `;
  });

  container.innerHTML = html;
}

function errorState(msg) {
  return `
    <div class="empty-state">
      <div class="empty-icon">${svgAlertTemplate}</div>
      <div class="empty-title">Terjadi Masalah</div>
      <div class="empty-sub">${msg}</div>
    </div>`;
}

</script>
</body>
</html>
