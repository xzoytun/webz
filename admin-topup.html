<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Admin Topup Logs — Xtrimer</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght=400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── TOKENS SYNCHRONIZED WITH DASHBOARD.HTML (PREMIUM ULTRA LIGHT/DARK) ── */
:root {
  --purple:       #7B2FBE;
  --purple-dark:  #5A1A9A;
  --purple-deep:  #3D0F72;
  --purple-light: #9B4FDE;
  
  --purple-soft:  #E2E8F0; 
  --purple-mid:   #CBD5E1;
  --accent:       #FF6B2B;
  --accent2:      #FFD600;
  --green:        #12C28A;
  --green-bg:     #E2F7F1;
  --red:          #E84040;
  --red-bg:       #FEE2E2;
  
  --white:        #FFFFFF;
  --bg:           #F1F5F9; 
  --card:         #F8FAFC; 
  --gray-line:    #E2E8F0; 
  
  --text-dark:    #0F172A; 
  --text-mid:     #334155; 
  --text-light:   #64748B; 

  --shadow-sm:  0 4px 12px rgba(15, 23, 42, 0.03);
  --shadow-md:  0 6px 18px rgba(15, 23, 42, 0.05);
  --shadow-lg:  0 10px 25px rgba(15, 23, 42, 0.05);

  --r-card: 14px;
  --r-btn:  10px;
  
  --nav-bg:       #F8FAFC;
  --nav-shadow:   rgba(15, 23, 42, 0.08);
}

html[data-theme="dark"] {
  --purple-soft:  #202124;
  --purple-mid:   #2a2b2f;
  --green-bg:     #0c2a21;
  --red-bg:       #311111;
  --white:        #17181c;
  --bg:           #0a0b0d;
  --card:         #1c1d21;
  --gray-line:    #303135;
  --text-dark:    #E2E8F0; 
  --text-mid:     #94A3B8;  
  --text-light:   #64748B;
  --nav-bg:       #17181c;
  --nav-shadow:   rgba(0,0,0,0.4);
}

html { background: var(--bg); }

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text-dark);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: 90px; 
  -webkit-tap-highlight-color: transparent;
  transition: background .25s ease, color .25s ease;
}
a { text-decoration:none; color:inherit; }
button { font-family:inherit; cursor:pointer; border:none; background:none; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ─── HERO HEADER ─── */
.hero {
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, var(--purple-deep) 0%, var(--purple) 60%, var(--purple-light) 100%);
  padding: 24px 20px 48px;
  animation: fadeUp 0.4s ease both;
}
.hero::before {
  content:''; position:absolute; top:-40px; right:-20px;
  width:140px; height:140px;
  border:28px solid rgba(255,255,255,0.05); border-radius:50%;
}
.hero-dots {
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 200px 20px; pointer-events:none;
}
.hero-inner {
  max-width: 440px; margin: 0 auto;
  display: flex; align-items:center; justify-content:space-between;
  position: relative; z-index:2;
}
.hero-left { display:flex; align-items:center; gap:12px; flex:1; min-width:0; }

.back-btn-hdr {
  width:32px; height:32px; border-radius:50%;
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.15);
  display: flex; align-items:center; justify-content:center;
  transition: all .2s; backdrop-filter:blur(10px); flex-shrink:0;
}
.back-btn-hdr:hover { background:rgba(255,255,255,.2); transform:translateX(-2px); }
.back-btn-hdr svg { width:15px; height:15px; stroke:#fff; stroke-width:2.5; fill:none; }

.hero-greeting { display: flex; flex-direction:column; min-width:0; }
.hero-greeting h1 { font-size: 16px; font-weight:900; color: #fff; letter-spacing:-.2px; line-height:1.2; }
.hero-greeting p { font-size: 10.5px; font-weight:600; color: rgba(255,255,255,.75); letter-spacing: .3px; margin-top:1px; }

.hdr-actions { display:flex; gap:8px; align-items:center; }
.hdr-btn {
  width:32px; height:32px; border-radius:50%;
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.15);
  display: flex; align-items:center; justify-content:center;
  transition: all .2s; backdrop-filter:blur(10px);
}
.hdr-btn:hover { background:rgba(255,255,255,.2); transform:translateY(-2px); }
.hdr-btn svg { width:15px; height:15px; stroke:#fff; stroke-width:2.2; fill:none; }

.admin-badge {
  background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.2);
  border-radius:6px; padding:3px 8px;
  font-size:9px; font-weight:800; color:#fff;
  letter-spacing:0.5px; white-space:nowrap; flex-shrink:0;
  text-transform: uppercase;
}

html[data-theme="dark"] .hdr-btn.theme-toggle .icon-sun { display: none; }
html[data-theme="dark"] .hdr-btn.theme-toggle .icon-moon { display: flex; }
html:not([data-theme="dark"]) .hdr-btn.theme-toggle .icon-sun { display: flex; }
html:not([data-theme="dark"]) .hdr-btn.theme-toggle .icon-moon { display: none; }

/* ─── SEARCH BAR CONTAINER ─── */
.search-wrap {
  max-width:440px; margin:-28px auto 0;
  padding: 0 16px;
  position: relative; z-index:10;
  animation: fadeUp 0.4s 0.08s ease both;
}
.search-box {
  background: var(--white);
  border-radius: 16px;
  padding: 12px 14px;
  border: 1px solid var(--gray-line);
  box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
  display: flex; align-items: center; gap: 10px;
  transition: all .25s ease;
}
.search-box svg { color: var(--text-light); flex-shrink: 0; width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 2.5; }
.search-input {
  flex: 1; border: none; outline: none;
  font-family: 'Nunito', sans-serif; font-size: 12.5px; font-weight: 700;
  color: var(--text-dark); background: transparent;
}
.search-input::placeholder { color: var(--text-light); font-weight: 600; }

/* ─── MAIN CONTENT ─── */
.main { max-width:440px; margin:12px auto 0; padding:0 16px; }

.sec-head {
  display:flex; align-items:center; justify-content:space-between;
  margin: 12px 0 8px 4px;
}
.sec-title { font-size:12.5px; font-weight:900; color:var(--text-dark); letter-spacing: -0.1px; }
.sec-badge {
  font-size:8.5px; font-weight:800;
  padding:2px 6px; border-radius:5px; letter-spacing:.3px;
  text-transform: uppercase;
}
.sec-badge.purple  { background:var(--purple-soft); color:var(--purple); border: 1px solid rgba(123,47,190,0.1); }

/* ─── LOADING & EMPTY STATES ─── */
.loading-state, .empty-state {
  text-align: center; padding: 40px 20px;
  color: var(--text-light); font-weight: 700; font-size: 12px;
  background: var(--card); border: 1px solid var(--gray-line); border-radius: var(--r-card);
}
.loading-icon, .empty-icon { display: flex; justify-content: center; margin-bottom: 10px; }
.loading-icon svg { width: 22px; height: 22px; fill: none; stroke: var(--purple); stroke-width: 2.5; animation: spin 1s linear infinite; }
html[data-theme="dark"] .loading-icon svg { stroke: var(--purple-light); }
.empty-icon svg { width: 36px; height: 36px; fill: none; stroke: var(--text-light); stroke-width: 2; }
.empty-title { font-size: 14px; font-weight: 800; color: var(--text-dark); margin-bottom: 2px; }
.empty-sub { font-size: 11px; color: var(--text-light); font-weight: 600; }

/* ─── LOGS LIST CARDS ─── */
.logs-wrap { display: flex; flex-direction: column; gap: 8px; }

.log-card {
  background: var(--card); border-radius: var(--r-card);
  border: 1px solid var(--gray-line); padding: 12px 14px;
  box-shadow: var(--shadow-sm);
  transition: background .25s ease, border-color .25s ease, transform 0.2s;
  animation: fadeUp 0.4s ease both;
}
.log-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

.top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 10px; }
.username { font-size: 13.5px; font-weight: 800; color: var(--text-dark); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.amount { font-size: 14.5px; font-weight: 900; color: var(--purple); white-space: nowrap; }
html[data-theme="dark"] .amount { color: var(--purple-light); }

.info-box {
  display: flex; flex-direction: column; gap: 6px; background: var(--bg);
  padding: 10px; border-radius: 10px; border: 1px solid var(--gray-line);
  transition: background .25s ease, border-color .25s ease;
}
.info-item { display: flex; justify-content: space-between; gap: 16px; align-items: center; }
.label { font-size: 9px; font-weight: 800; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.3px; }
.value { font-size: 11.5px; font-weight: 800; color: var(--text-dark); text-align: right; word-break: break-all; }

/* ─── ACTION BUTTON BOTTOM ─── */
.back-btn {
  width:100%; padding:11px; margin-top:14px;
  border:1px solid var(--gray-line); border-radius:12px;
  background:var(--card); color:var(--text-mid);
  font-family:'Nunito',sans-serif; font-weight:800; font-size:12.5px;
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
  transition:all 0.2s; box-shadow: var(--shadow-sm);
  text-decoration: none;
}
.back-btn:hover { border-color:var(--purple); color:var(--purple); transform: translateY(-1px); }
html[data-theme="dark"] .back-btn:hover { border-color:var(--purple-light); color:var(--purple-light); }
.back-btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2.5; }

/* ─── BOTTOM NAV ─── */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 440px; background: var(--nav-bg);
  border-top: 1px solid var(--gray-line);
  box-shadow: var(--nav-shadow); z-index: 999;
  transition: background 0.25s ease, border-color 0.25s ease;
}
.bottom-nav-inner { display: flex; align-items: center; justify-content: space-around; padding: 10px 0 14px; }
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  text-decoration: none; color: var(--text-light); width: 70px; transition: all 0.2s;
}
.nav-icon svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; transition: transform 0.2s; }
.nav-label { font-size: 9px; font-weight: 800; }
.nav-item:hover .nav-icon svg { transform: translateY(-2px); }
.nav-item.active { color: var(--purple); }
html[data-theme="dark"] .nav-item.active { color: var(--purple-light); }
.nav-item.active .nav-icon svg { stroke: var(--purple); }
html[data-theme="dark"] .nav-item.active .nav-icon svg { stroke: var(--purple-light); }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-dots"></div>
  <div class="hero-inner">
    <div class="hero-left">
      <a class="back-btn-hdr" href="admin.html" aria-label="Kembali ke Admin Panel">
        <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </a>
      <div class="hero-greeting">
        <h1>Topup Logs</h1>
        <p id="subtitle">Memuat data...</p>
      </div>
    </div>
    
    <div class="hdr-actions">
      <button class="hdr-btn theme-toggle" id="themeToggle" aria-label="Ganti tema">
        <span class="icon-sun">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
          </svg>
        </span>
        <span class="icon-moon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
        </span>
      </button>
      <div class="admin-badge" id="countBadge">—</div>
    </div>
  </div>
</div>

<div class="search-wrap">
  <div class="search-box">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <input class="search-input" id="searchInput" type="text" placeholder="Cari nama user, metode, atau ref..." oninput="applyFilter()">
  </div>
</div>

<div class="main">
  <div class="sec-head">
    <span class="sec-title">Riwayat Log Mutasi</span>
    <span class="sec-badge purple">System</span>
  </div>

  <div id="logs" class="logs-wrap">
    <div class="loading-state">
      <div class="loading-icon">
        <svg viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>
      </div>
      Memuat data logs...
    </div>
  </div>

  <a class="back-btn" href="admin.html">
    <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    Kembali ke Admin Panel
  </a>
  <div style="height: 8px;"></div>
</div>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a class="nav-item active" href="admin.html">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg></div>
      <div class="nav-label">Home</div>
    </a>
    <a class="nav-item" href="transactions.html">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" stroke-width="1.5"/><polyline points="7,17 10,13 13,15 17,9"/></svg></div>
      <div class="nav-label">Riwayat</div>
    </a>
    <a class="nav-item" href="profile.html">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>
      <div class="nav-label">Profile</div>
    </a>
  </div>
</nav>

<script>
// ─── THEME MANAGER SYSTEM (SINKRON 100% SAMA DENGAN DASHBOARD) ───
(function initTheme(){
  const saved = localStorage.getItem('theme');
  if (saved === 'dark' || saved === 'light') {
    document.documentElement.setAttribute('data-theme', saved);
  } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  } else {
    document.documentElement.setAttribute('data-theme', 'light');
  }
})();

document.getElementById('themeToggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
});

// ─── HELPER FORMAT TANGGAL SQLITE KE WAKTU LOKAL (DD MMM YYYY, HH:mm WIB) ───
function formatLocalDate(dateString) {
  if (!dateString) return '-';
  try {
    let cleanString = dateString;
    if (typeof dateString === 'string' && !dateString.includes('Z') && !dateString.includes('+')) {
      cleanString = dateString.replace(' ', 'T') + 'Z';
    }
    
    const d = new Date(cleanString);
    if (isNaN(d.getTime())) return dateString;

    const options = { day: '2-digit', month: 'short', year: 'numeric' };
    const tgl = d.toLocaleDateString('id-ID', options);
    const jam = d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false });
    
    return `${tgl}, ${jam} WIB`;
  } catch (e) { 
    return dateString; 
  }
}

// ─── AUTH & STATE CONFIG ───
let allLogs = [];
const token = localStorage.getItem('token');
const localUser = JSON.parse(localStorage.getItem('user') || 'null');

if (!localUser || !token || localUser.role !== 'admin') {
  window.location.replace('dashboard.html');
}

const svgSearchTemplate = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:32px; height:32px;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>`;
const svgAlertTemplate  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:32px; height:32px;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>`;

document.addEventListener("DOMContentLoaded", () => {
    loadLogs();
});

async function loadLogs() {
  try {
    const response = await fetch('/api/admin/topup-history', {
      method: 'GET',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      }
    });
    
    const result = await response.json();
    const container = document.getElementById('logs');

    if (!result.success) {
      container.innerHTML = errorState(result.message || 'Gagal memuat data dari server');
      return;
    }

    allLogs = result.data || [];
    applyFilter();

  } catch (err) {
    console.error(err);
    document.getElementById('logs').innerHTML = errorState('Server error atau tidak terhubung');
  }
}

function applyFilter() {
  const kw = document.getElementById('searchInput').value.toLowerCase();

  const filtered = allLogs.filter(item => {
    return (
      (item.username || '').toLowerCase().includes(kw) ||
      (item.reference || '').toLowerCase().includes(kw) ||
      (item.metode || '').toLowerCase().includes(kw) ||
      String(item.user_id).includes(kw)
    );
  });

  document.getElementById('subtitle').textContent = `Menampilkan ${filtered.length} riwayat`;
  document.getElementById('countBadge').textContent = allLogs.length + ' Logs';

  renderList(filtered);
}

function renderList(data) {
  const container = document.getElementById('logs');

  if (data.length < 1) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${svgSearchTemplate}</div>
        <div class="empty-title">Tidak Ada Data</div>
        <div class="empty-sub">Belum ada riwayat transaksi topup yang cocok</div>
      </div>
    `;
    return;
  }

  let html = '';
  data.forEach((item, i) => {
    const dateFormatted = formatLocalDate(item.created_at);
    const cleanAmount = Number(item.amount || 0).toLocaleString('id-ID');
    
    // ─── LOGIKA IDENTIFIKASI PLATFORM ───
    const usernameStr = String(item.username || '').toLowerCase();
    const refStr = String(item.reference || '').toUpperCase();
    const currentId = Number(item.user_id || 0);

    const isWebUser = usernameStr.includes('@gmail.com') || 
                      refStr.startsWith('WEB-') || 
                      (currentId > 0 && currentId < 1000000);

    const userPlatformBadge = isWebUser 
      ? `<span style="font-size: 9px; padding: 2px 6px; background: #e0f2fe; color: #0369a1; border-radius: 4px; font-weight: 800; margin-left: 6px;">WEB</span>`
      : `<span style="font-size: 9px; padding: 2px 6px; background: #fef3c7; color: #b45309; border-radius: 4px; font-weight: 800; margin-left: 6px;">TELE</span>`;

    // Kondisional baris User ID: Sembunyikan total jika platform WEB
    const userIdRow = isWebUser ? '' : `
        <div class="info-item">
          <div class="label">User ID</div>
          <div class="value" style="font-family: monospace; font-size: 11px;">${item.user_id || '-'}</div>
        </div>`;

    html += `
    <div class="log-card" style="animation-delay: ${i * 0.02}s">
      <div class="top-row">
        <div class="username">
          ${item.username || 'Unknown User'}
          ${userPlatformBadge}
        </div>
        <div class="amount" style="color: var(--green); font-weight: 800;">+ Rp ${cleanAmount}</div>
      </div>
      <div class="info-box">
        ${userIdRow}
        <div class="info-item">
          <div class="label">Metode Pembayaran</div>
          <div class="value">${item.metode || 'Pakasir (QRIS)'}</div>
        </div>
        <div class="info-item">
          <div class="label">No. Referensi (Ref)</div>
          <div class="value" style="font-family: monospace; font-size: 11px; color: var(--purple-light);">${item.reference || '-'}</div>
        </div>
        <div class="info-item">
          <div class="label">Waktu Sukses</div>
          <div class="value" style="color: var(--text-light); font-weight: 600;">${dateFormatted}</div>
        </div>
      </div>
    </div>
    `;
  });

  container.innerHTML = html;
}

function errorState(msg) {
  return `
    <div class="empty-state">
      <div class="empty-icon">${svgAlertTemplate}</div>
      <div class="empty-title">Terjadi Masalah</div>
      <div class="empty-sub">${msg}</div>
    </div>`;
}
</script>
</body>
</html>
